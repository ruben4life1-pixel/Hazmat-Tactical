<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Hazmat Scenario Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b0f1a;
            --bg-card: #111827;
            --bg-input: #1a2235;
            --bg-elevated: #1e293b;
            --border: #2d3a4f;
            --border-accent: rgba(245,158,11,0.35);
            --text: #e2e8f0;
            --text-muted: #8896ab;
            --text-dim: #5a6882;
            --accent-amber: #f59e0b;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --accent-cyan: #06b6d4;
            --accent-violet: #8b5cf6;
            --accent-rose: #f43f5e;
            --white: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .app-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            border-bottom: 2px solid var(--accent-amber);
            padding: 28px 24px;
            text-align: center;
        }

        .app-header h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent-amber), #fbbf24, var(--accent-amber));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-header .sub {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .app-header .version-tag {
            display: inline-block;
            margin-top: 8px;
            padding: 3px 12px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-amber);
            border: 1px solid var(--border-accent);
            border-radius: 2px;
        }

        /* ── CONTAINER ── */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 28px 20px 60px;
        }

        /* ── INPUT PANEL ── */
        .input-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 28px;
            margin-bottom: 28px;
        }

        .panel-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-amber);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-grid .full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            display: block;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-group select,
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px;
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .form-group select:focus,
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-amber);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-dim);
        }

        .weather-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        /* ── GENERATE BUTTON ── */
        .btn-generate {
            display: block;
            width: 100%;
            padding: 16px;
            margin-top: 24px;
            background: linear-gradient(135deg, var(--accent-amber), #d97706);
            border: none;
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #0b0f1a;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-generate:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(245,158,11,0.3);
        }

        /* ── PRINT BUTTON ── */
        .btn-print {
            display: none;
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            background: rgba(6,182,212,0.1);
            border: 2px solid var(--accent-cyan);
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-cyan);
            cursor: pointer;
            transition: all 0.2s;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .btn-print:hover {
            background: rgba(6,182,212,0.1);
        }

        /* ── DOWNLOAD BUTTON ── */
        .btn-download {
            display: none;
            width: 100%;
            padding: 14px;
            margin-bottom: 6px;
            background: rgba(245,158,11,0.12);
            border: 2px solid var(--accent-amber);
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-amber);
            cursor: pointer;
            transition: all 0.2s;
            position: sticky;
            top: 48px;
            z-index: 49;
        }

        .btn-download:hover {
            background: rgba(245,158,11,0.22);
        }

        .btn-download:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        /* ── TAB NAVIGATION (output) ── */
        .output-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 0;
            border-bottom: 2px solid var(--border);
        }

        .output-tab-btn {
            flex: 1;
            padding: 12px 16px;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--text-muted);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: -2px;
        }

        .output-tab-btn:hover { color: var(--text); }

        .output-tab-btn.active {
            color: var(--accent-amber);
            border-bottom-color: var(--accent-amber);
        }

        .output-tab-content { display: none; }
        .output-tab-content.active { display: block; }

        /* ── TACTICAL DIAGRAM ── */
        .diagram-wrapper {
            background: #fff;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            max-height: 75vh;
            margin-bottom: 0;
        }

        #advTacCanvas {
            display: block;
            width: 1400px;
            height: 1000px;
            min-width: 1400px;
        }

        .diagram-scroll-hint {
            text-align: center;
            padding: 8px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .diagram-legend-adv {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 6px 20px;
            padding: 14px 18px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 4px 4px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .adv-legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 3px 0;
        }

        .adv-legend-sym {
            flex-shrink: 0;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            border-radius: 4px;
        }

        @media (max-width: 600px) {
            #advTacCanvas { min-width: 1000px; width: 1000px; height: 750px; }
        }

        .drill-output {
            padding: 32px;
        }
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .drill-title-block {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding-bottom: 14px;
            border-bottom: 2px solid var(--accent-amber);
            margin-bottom: 8px;
        }

        .drill-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .drill-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--white);
        }

        .drill-subtitle {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 28px;
        }

        /* ── SECTION BLOCKS ── */
        .drill-section {
            margin-bottom: 24px;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .drill-section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            background: var(--bg-elevated);
        }

        .section-number {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-amber);
            color: #0b0f1a;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .drill-section-header h3 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--white);
        }

        .drill-section-body {
            padding: 18px;
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--text);
        }

        .drill-section-body p { margin-bottom: 10px; }
        .drill-section-body p:last-child { margin-bottom: 0; }

        .drill-section-body ol { padding-left: 20px; }
        .drill-section-body ol li { margin-bottom: 8px; padding-left: 6px; }
        .drill-section-body ul { padding-left: 20px; list-style: disc; }
        .drill-section-body ul li { margin-bottom: 6px; }

        /* Section color accents */
        .section-dispatch { border-left: 3px solid var(--accent-amber); }
        .section-weather { border-left: 3px solid var(--accent-cyan); }
        .section-equipment { border-left: 3px solid var(--accent-green); }
        .section-inject { border-left: 3px solid var(--accent-rose); }
        .section-math { border-left: 3px solid var(--accent-violet); }
        .section-tool { border-left: 3px solid #10b981; }
        .section-nfpa { border-left: 3px solid var(--accent-amber); }

        .section-inject .section-number { background: var(--accent-rose); }
        .section-math .section-number { background: var(--accent-violet); }
        .section-tool .section-number { background: #10b981; }

        /* ── MATH DISPLAY ── */
        .math-block {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 16px 20px;
            margin: 12px 0;
            font-family: 'Source Sans 3', monospace;
        }

        .math-block .formula {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-violet);
            margin-bottom: 6px;
        }

        .math-block .formula-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .math-block .answer-key {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--accent-green);
        }

        /* ── INJECT CARDS ── */
        .inject-card {
            background: rgba(244,63,94,0.05);
            border: 1px solid rgba(244,63,94,0.2);
            border-radius: 4px;
            padding: 14px 16px;
            margin-bottom: 12px;
        }

        .inject-card:last-child { margin-bottom: 0; }

        .inject-card .inject-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-rose);
            margin-bottom: 4px;
        }

        /* ── TOOL DIRECTIVE ── */
        .tool-directive {
            background: var(--bg-primary);
            border: 1px solid rgba(16,185,129,0.25);
            border-left: 3px solid #10b981;
            padding: 14px 18px;
            margin: 10px 0;
            border-radius: 2px;
        }

        .tool-directive .tool-label {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #10b981;
            margin-bottom: 4px;
        }

        .tool-directive .tool-label.pro-label {
            color: var(--accent-amber);
        }

        .tool-directive .tool-calc-name {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: var(--white);
            margin-bottom: 4px;
        }

        /* ── NFPA TAG ── */
        .nfpa-tag {
            display: inline-block;
            background: rgba(245,158,11,0.08);
            border: 1px solid var(--border-accent);
            color: var(--accent-amber);
            padding: 5px 12px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 1px;
            border-radius: 2px;
            margin: 3px 4px 3px 0;
        }

        /* ── SIGNATURE BLOCK ── */
        .sig-block {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 2px solid var(--border);
        }

        .sig-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 16px;
        }

        .sig-line {
            border-bottom: 1px solid var(--text-muted);
            padding-bottom: 6px;
            margin-bottom: 4px;
        }

        .sig-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        /* ── EQUIPMENT NOTE ── */
        .equip-note {
            background: rgba(16,185,129,0.06);
            border: 1px solid rgba(16,185,129,0.2);
            border-radius: 4px;
            padding: 12px 16px;
            margin-bottom: 10px;
        }

        .equip-note .equip-name {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--accent-green);
            margin-bottom: 3px;
        }

        .equip-note p {
            font-size: 0.85rem;
            color: var(--text);
            margin: 0;
        }

        /* ── DISCLAIMER ── */
        .drill-disclaimer {
            margin-top: 28px;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            line-height: 1.6;
            color: var(--text-dim);
        }

        .drill-disclaimer .disclaimer-copy {
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        /* ── PRINT CSS ── */
        @media print {
            body {
                background: #fff;
                color: #111;
                font-size: 11pt;
            }

            .app-header, .input-panel, .btn-generate, .btn-print {
                display: none !important;
            }

            .container { padding: 0; max-width: 100%; }

            .output-area { display: block !important; }

            .drill-output {
                background: #fff;
                border: none;
                padding: 0;
                box-shadow: none;
            }

            .drill-title-block {
                border-bottom: 2px solid #111;
            }

            .drill-title {
                color: #111;
                font-size: 16pt;
                -webkit-text-fill-color: #111;
            }

            .drill-logo {
                width: 50px;
                height: 50px;
            }

            .drill-subtitle { color: #555; }

            .drill-section {
                border: 1px solid #ccc;
            }

            /* Allow sections to break across pages to eliminate wasted space.
               Only protect individual content blocks from being split mid-paragraph. */
            .drill-section-header {
                background: #f0f0f0;
                break-after: avoid;
            }

            .drill-section-body p,
            .inject-card,
            .math-block,
            .equip-note,
            .tool-directive,
            .nfpa-tag {
                break-inside: avoid;
            }

            .sig-block {
                break-inside: avoid;
            }

            .drill-section-header h3 { color: #111; }

            .section-number {
                background: #333;
                color: #fff;
            }

            .drill-section-body { color: #222; }

            .math-block {
                background: #f5f5f5;
                border: 1px solid #ccc;
            }

            .math-block .formula { color: #333; }
            .math-block .answer-key { color: #111; }

            .inject-card {
                background: #fef2f2;
                border: 1px solid #ddd;
            }

            .inject-card .inject-label { color: #b91c1c; }

            .tool-directive {
                background: #f0fdf4;
                border: 1px solid #ccc;
                border-left: 3px solid #333;
            }

            .tool-directive .tool-label, .tool-directive .tool-calc-name { color: #111; }

            .nfpa-tag {
                background: #fffbeb;
                border: 1px solid #aaa;
                color: #92400e;
            }

            .equip-note { background: #f0fdf4; border: 1px solid #ccc; }
            .equip-note .equip-name { color: #111; }

            .sig-block { border-top: 2px solid #111; }
            .sig-line { border-bottom: 1px solid #111; }
            .sig-label { color: #555; }

            .drill-disclaimer {
                border-top: 1px solid #aaa;
                color: #666;
                font-size: 7pt;
            }

            .drill-disclaimer .disclaimer-copy {
                color: #333;
            }
        }

        /* ── EQUIPMENT CHECKBOX ── */
        .equip-checkbox-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 6px 4px;
            border-bottom: 1px solid rgba(45,58,79,0.4);
            cursor: pointer;
            transition: background 0.15s;
        }

        .equip-checkbox-row:last-child { border-bottom: none; }

        .equip-checkbox-row:hover {
            background: rgba(245,158,11,0.06);
        }

        .equip-checkbox-row input[type="checkbox"] {
            margin-top: 3px;
            accent-color: var(--accent-amber);
            flex-shrink: 0;
            width: 16px;
            height: 16px;
        }

        .equip-checkbox-row .equip-cb-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
        }

        .equip-checkbox-row .equip-cb-cat {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .equip-checkbox-row.hidden { display: none; }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .weather-row { grid-template-columns: 1fr; }
            .sig-row { grid-template-columns: 1fr; gap: 20px; }
            .app-header h1 { font-size: 1.4rem; letter-spacing: 2px; }
        }

        /* ── LEVEL TOGGLE ── */
        .level-toggle-wrap { margin-bottom: 20px; }

        .level-toggle-wrap > .toggle-label {
            display: block;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .level-toggle {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .level-btn {
            flex: 1;
            padding: 11px 14px;
            background: var(--bg-input);
            border: none;
            border-right: 1px solid var(--border);
            color: var(--text-muted);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .level-btn:last-child { border-right: none; }
        .level-btn:hover { color: var(--text); background: var(--bg-elevated); }

        .level-btn.active-ops {
            background: rgba(16,185,129,0.12);
            color: var(--accent-green);
            border-bottom: 2px solid var(--accent-green);
        }

        .level-btn.active-tech {
            background: rgba(245,158,11,0.1);
            color: var(--accent-amber);
            border-bottom: 2px solid var(--accent-amber);
        }

        .level-btn.active-all {
            background: rgba(6,182,212,0.1);
            color: var(--accent-cyan);
            border-bottom: 2px solid var(--accent-cyan);
        }

        /* ── LEVEL DIVIDER (All mode) ── */
        .level-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 32px 0 24px;
        }

        .level-divider-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .level-divider-label {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 4px 14px;
            border-radius: 2px;
        }

        .level-divider-label.ops-label {
            background: rgba(16,185,129,0.1);
            color: var(--accent-green);
            border: 1px solid rgba(16,185,129,0.3);
        }

        .level-divider-label.tech-label {
            background: rgba(245,158,11,0.08);
            color: var(--accent-amber);
            border: 1px solid var(--border-accent);
        }

        /* ops scope notice */
        .ops-scope-notice {
            margin-top: 10px;
            padding: 10px 14px;
            background: rgba(16,185,129,0.07);
            border: 1px solid rgba(16,185,129,0.25);
            border-radius: 4px;
            font-size: 0.82rem;
            color: var(--accent-green);
        }
    </style>
</head>

function populateEquipment() {
    const container = document.getElementById('equipCheckboxes');
    if (!container) return;

    // Sort equipment by name
    const sorted = Object.entries(equipmentLibrary).sort((a, b) => a[1].name.localeCompare(b[1].name));
    let html = '';

    sorted.forEach(([key, eq]) => {
        const cats = eq.category.map(c => c.charAt(0).toUpperCase() + c.slice(1)).join(', ');
        html += `<label class="equip-checkbox-row" data-key="${key}" data-name="${eq.name.toLowerCase()}">
            <input type="checkbox" value="${key}" onchange="updateEquipCount()">
            <div>
                <div class="equip-cb-name">${eq.name}</div>
                <div class="equip-cb-cat">${cats}</div>
            </div>
        </label>`;
    });

    container.innerHTML = html;
}

function filterEquipment() {
    const filter = document.getElementById('equipFilter').value.toLowerCase();
    const rows = document.querySelectorAll('.equip-checkbox-row');
    rows.forEach(row => {
        const name = row.getAttribute('data-name');
        const key = row.getAttribute('data-key');
        const match = name.includes(filter) || key.includes(filter);
        row.classList.toggle('hidden', !match);
    });
}

function clearEquipment() {
    document.querySelectorAll('#equipCheckboxes input[type="checkbox"]').forEach(cb => cb.checked = false);
    document.getElementById('equipFilter').value = '';
    filterEquipment();
    updateEquipCount();
}

function updateEquipCount() {
    const count = document.querySelectorAll('#equipCheckboxes input[type="checkbox"]:checked').length;
    document.getElementById('equipCount').textContent = count;
}

function getSelectedEquipment() {
    const checked = document.querySelectorAll('#equipCheckboxes input[type="checkbox"]:checked');
    return Array.from(checked).map(cb => cb.value);
}

// Initialize on load
window.addEventListener('DOMContentLoaded', function() {
    populateEquipment();
});

function getCategoryIcon(cat) {
    const icons = { chemical: '⚗️', biological: '🧬', radiological: '☢️', nuclear: '☢️', explosive: '💥' };
    return icons[cat] || '⚠️';
}

function getCategoryColor(cat) {
    const colors = { chemical: 'var(--accent-amber)', biological: 'var(--accent-green)', radiological: 'var(--accent-violet)', nuclear: 'var(--accent-violet)', explosive: 'var(--accent-rose)' };
    return colors[cat] || 'var(--accent-amber)';
}

// ── Weather impact generator ──
function generateWeatherImpact(cat, hazard, temp, humidity, wind) {
    let impact = '';

    if (cat === 'chemical') {
        impact += `<p><strong>Temperature (${temp}):</strong> Higher ambient temperatures increase vapor pressure and evaporation rate. For ${hazard}, this means a larger vapor cloud, faster dispersion, and potentially higher airborne concentrations at the source. If the temperature is above the boiling point of the product, expect a rapid gas-off upon release.</p>`;
        impact += `<p><strong>Humidity (${humidity}):</strong> High humidity can affect colorimetric tube accuracy and PID (Photoionization Detector) lamp performance (moisture fouling). Some chemicals (e.g., HCl, NH₃) are highly water-soluble — humid conditions may cause the vapor cloud to settle closer to the ground rather than dispersing.</p>`;
        impact += `<p><strong>Wind (${wind}):</strong> Wind speed and direction directly determine the PAZ (Protective Action Zone). A wind shift during operations requires immediate reassessment of all downwind zones. Low wind speeds (<5 mph) create unpredictable vapor migration patterns — increase safety margins.</p>`;
    } else if (cat === 'radiological' || cat === 'nuclear') {
        impact += `<p><strong>Temperature (${temp}):</strong> Ambient temperature does not significantly affect radiation emission from sealed sources. However, if a contamination event involves particulate dispersal, thermal convection from hot surfaces can loft radioactive particles and increase the inhalation hazard zone.</p>`;
        impact += `<p><strong>Humidity (${humidity}):</strong> High humidity can cause radioactive particulates to settle faster (washout effect). Rain during a contamination event creates runoff contamination pathways — storm drains and low-lying areas become secondary hazard zones.</p>`;
        impact += `<p><strong>Wind (${wind}):</strong> Wind is the primary dispersal vector for radioactive particulates. Current wind conditions dictate the downwind exclusion zone. Model the plume using current wind data and update if conditions change. For sealed source incidents with no particulate release, wind is not a primary factor.</p>`;
    } else if (cat === 'biological') {
        impact += `<p><strong>Temperature (${temp}):</strong> Biological agent viability is temperature-dependent. Most bacterial agents degrade faster at higher temperatures and under UV exposure. Spore-forming agents (e.g., Bacillus anthracis) are resistant to environmental degradation.</p>`;
        impact += `<p><strong>Humidity (${humidity}):</strong> High humidity can extend the viability window of some biological agents in aerosol form. It can also increase the settling rate of heavier particles, concentrating contamination on surfaces.</p>`;
        impact += `<p><strong>Wind (${wind}):</strong> Wind disperses aerosolized biological agents rapidly. Downwind sampling stations must be established to define the extent of contamination. Calm conditions concentrate the agent near the release point.</p>`;
    } else if (cat === 'explosive') {
        impact += `<p><strong>Temperature (${temp}):</strong> Many explosive materials become more sensitive to initiation at elevated temperatures. Some commercial explosives and improvised mixtures off-gas at high temperatures, creating secondary vapor hazards. Assess thermal stability before approach.</p>`;
        impact += `<p><strong>Humidity (${humidity}):</strong> Moisture can desensitize some explosive compounds but may also create conductive pathways for static-sensitive materials. Humidity affects post-blast evidence preservation.</p>`;
        impact += `<p><strong>Wind (${wind}):</strong> Wind affects post-blast vapor/particulate dispersal and must be factored into perimeter decisions. In a secondary device scenario, wind direction determines the safe approach corridor for EOD (Explosive Ordnance Disposal) and hazmat teams.</p>`;
    }

    return impact;
}

// ── Tactical Math ──
function generateTacticalMath(cat, hazard) {
    let html = '';

    if (cat === 'chemical') {
        // LEL to PPM
        html += `
            <div class="math-block">
                <div class="formula-label">LEL (Lower Explosive Limit) to PPM (Parts Per Million) Conversion</div>
                <div class="formula">Actual PPM = (LEL% ÷ 100) × LEL Value (ppm)</div>
                <p style="font-size:0.85rem; color:var(--text-muted); margin-top:8px;">The LEL (Lower Explosive Limit) value is the concentration in ppm (Parts Per Million) at which a gas becomes explosive. Your 4-gas meter reads in %LEL — this formula converts that reading to actual ppm concentration.</p>
                <div class="answer-key">
                    <strong>Example (${hazard || 'Gasoline'}):</strong> A reading of 10% LEL × 14,000 ppm (Gasoline LEL) = 1,400 ppm actual concentration.<br>
                    <strong>Training Point:</strong> Chemicals are TOXIC before they are EXPLOSIVE. Even "low" LEL readings can represent concentrations far above the IDLH (Immediately Dangerous to Life or Health).
                </div>
            </div>`;

        // Vapor Density
        html += `
            <div class="math-block">
                <div class="formula-label">Vapor Density (VD) Assessment</div>
                <div class="formula">VD > 1 = Sinks (pools in low areas) | VD < 1 = Rises (dissipates upward)</div>
                <p style="font-size:0.85rem; color:var(--text-muted); margin-top:8px;">VD (Vapor Density) is the weight of the vapor relative to air (Air = 1). Determines where the vapor cloud will concentrate — critical for monitoring locations and evacuation priorities.</p>
                <div class="answer-key">
                    <strong>Instructor Note:</strong> For ${hazard || 'the identified chemical'}, verify the VD (Vapor Density) in the Chemical Identification section of the Hazmat Tactical Tool. If VD > 1, emphasize monitoring in basements, trenches, and low-lying areas. If VD < 1, monitor upper levels and ventilation intakes.
                </div>
            </div>`;

        // PID Correction Factor
        html += `
            <div class="math-block">
                <div class="formula-label">PID (Photoionization Detector) Correction Factor</div>
                <div class="formula">True Concentration = PID Reading × CF (Correction Factor)</div>
                <p style="font-size:0.85rem; color:var(--text-muted); margin-top:8px;">PIDs (Photoionization Detectors) are calibrated to isobutylene. The CF (Correction Factor) adjusts the reading to reflect the true concentration of the target chemical.</p>
                <div class="answer-key">
                    <strong>Instructor Note:</strong> Have the entry team calculate the corrected reading before reporting to Command. An uncorrected PID reading can understate the actual hazard by 2–3x or more depending on the chemical.
                </div>
            </div>`;

    } else if (cat === 'radiological' || cat === 'nuclear') {
        // Inverse Square Law
        html += `
            <div class="math-block">
                <div class="formula-label">Inverse Square Law</div>
                <div class="formula">I₁ × D₁² = I₂ × D₂²</div>
                <p style="font-size:0.85rem; color:var(--text-muted); margin-top:8px;">Where I = Intensity (dose rate) and D = Distance from the source. This formula allows you to calculate the expected dose rate at any distance if you know the rate at one distance.</p>
                <div class="answer-key">
                    <strong>Drill Problem:</strong> The survey team measures <strong>50 mR/hr at 10 feet</strong>. What is the expected dose rate at 25 feet?<br>
                    <strong>Solution:</strong> 50 × 10² = I₂ × 25² → 5,000 = I₂ × 625 → I₂ = <strong>8.0 mR/hr at 25 feet</strong><br>
                    <strong>Source Strength (at 1 ft):</strong> 50 × 10² = <strong>5,000 mR/hr at 1 foot</strong> (High — industrial source category)
                </div>
            </div>`;

        // Stay-Time Calculation
        html += `
            <div class="math-block">
                <div class="formula-label">Stay-Time / Dose Calculation</div>
                <div class="formula">Dose = Dose Rate × Time</div>
                <p style="font-size:0.85rem; color:var(--text-muted); margin-top:8px;">Maximum stay time is determined by dividing the allowable dose by the measured dose rate at the working distance.</p>
                <div class="answer-key">
                    <strong>Drill Problem:</strong> The working dose rate is <strong>8 mR/hr</strong> at the task location. The IC (Incident Commander) has authorized a maximum exposure of <strong>100 mR</strong> for this entry. How long can the team work?<br>
                    <strong>Solution:</strong> 100 mR ÷ 8 mR/hr = <strong>12.5 minutes</strong> maximum stay time.<br>
                    <strong>Instructor Note:</strong> Apply the ALARA (As Low As Reasonably Achievable) principle — set the actual time limit BELOW the calculated maximum. A 10-minute limit provides a safety margin.
                </div>
            </div>`;

    } else if (cat === 'biological') {
        html += `
            <div class="math-block">
                <div class="formula-label">Biological Agent Assessment</div>
                <div class="formula">Field screening is presumptive — NOT confirmatory</div>
                <p style="font-size:0.85rem; color:var(--text-muted); margin-top:8px;">Biological incidents rely on clinical indicators, epidemiological data, and laboratory confirmation. Field detection equipment provides presumptive results only.</p>
                <div class="answer-key">
                    <strong>Instructor Note:</strong> Emphasize the difference between presumptive and confirmatory results. The decision to escalate PPE or expand the perimeter should be based on the presumptive positive PLUS the totality of circumstances (credible threat, clinical symptoms, delivery mechanism).
                </div>
            </div>`;

    } else if (cat === 'explosive') {
        html += `
            <div class="math-block">
                <div class="formula-label">Blast Standoff Distance</div>
                <div class="formula">Mandatory Evacuation Distance (MED) = based on container/charge size per ATF (Bureau of Alcohol, Tobacco, Firearms and Explosives) / DHS (Department of Homeland Security) guidelines</div>
                <p style="font-size:0.85rem; color:var(--text-muted); margin-top:8px;">Standoff distances are determined by the estimated net explosive weight (NEW) and the type of container. Refer to the DHS (Department of Homeland Security) / ATF Bomb Threat Standoff Chart for specific distances.</p>
                <div class="answer-key">
                    <strong>Reference Points:</strong><br>
                    Pipe Bomb: 1,850 ft evacuation / 850 ft for outdoor<br>
                    Backpack/Briefcase (50 lbs): 1,850 ft evacuation<br>
                    Sedan (500 lbs): 1,500 ft outdoor / 320 ft shelter-in-place<br>
                    <strong>Instructor Note:</strong> These are MINIMUM distances. Fragmentation hazard from the container can extend well beyond the blast overpressure zone.
                </div>
            </div>`;
    }

    return html;
}

//  DECONTAMINATION SECTION
// ═══════════════════════════════════════════════════════════
function generateDeconSection(cat, hazard, isPractical) {
    let html = '';
    const hazardLower = hazard.toLowerCase();

    if (cat === 'chemical') {
        const isAcid = hazardLower.includes('acid') || hazardLower.includes('hcl') || hazardLower.includes('hf ') || hazardLower.includes('nitric');
        const isBase = hazardLower.includes('hydroxide') || hazardLower.includes('naoh') || hazardLower.includes('ammonia refrig');
        const isCyanide = hazardLower.includes('cyanide') || hazardLower.includes('hcn');
        const isCorrosive = isAcid || isBase;
        const isChlorine = hazardLower.includes('chlorine');
        const isPhosgene = hazardLower.includes('phosgene');
        const isBenzene = hazardLower.includes('benzene');
        const isMethanol = hazardLower.includes('methanol');
        const isEtO = hazardLower.includes('ethylene oxide');

        html += `<p><strong>Decon Type:</strong> `;
        if (isCyanide) {
            html += `Emergency + Chemical Decon (Cyanide Protocol)</p>`;
            html += `<p><strong>Setup:</strong> Establish emergency decon with high-volume water. Stage cyanide antidote kits (amyl nitrite, sodium nitrite, sodium thiosulfate) at the decon line. EMS staged for immediate treatment.</p>`;
            html += `<p><strong>Procedure:</strong> Gross water wash of all PPE. Remove and bag contaminated PPE. Decon with alkaline sodium hypochlorite solution (pH >10) to neutralize residual cyanide on equipment. Any symptomatic personnel receive antidote protocol immediately.</p>`;
            html += `<p><strong>Waste:</strong> All decon water is hazardous — cyanide remains toxic. Contain all runoff. Do NOT release to drains.</p>`;
            html += `<p style="margin-top:8px; padding:10px; background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25); border-radius:4px;"><strong style="color:var(--accent-rose);">⚠ INCOMPATIBILITY:</strong> Do NOT use acid-based decon solutions — acid + cyanide generates lethal HCN gas. Maintain alkaline conditions throughout decon.</p>`;
        } else if (isCorrosive) {
            html += `Emergency Medical Decon (${isAcid ? 'Acid' : 'Caustic'} Protocol)</p>`;
            html += `<p><strong>Setup:</strong> Emergency decon corridor with copious water supply. Minimum 15-20 minute flush capability. ${isAcid ? 'Stage soda ash or baking soda for neutralization AFTER gross decon.' : 'Stage citric acid or vinegar for neutralization AFTER gross decon.'}</p>`;
            html += `<p><strong>Procedure:</strong> High-volume, low-pressure water flush for minimum 15-20 minutes for any skin contact. Remove contaminated clothing during flush — do NOT delay flushing to remove clothing. ${isAcid ? 'After gross decon, apply dilute baking soda solution to neutralize residual acid.' : 'After gross decon, apply dilute citric acid solution to neutralize residual base.'}</p>`;
            html += `<p><strong>Waste:</strong> All decon water is corrosive waste. Test pH of runoff before release.</p>`;
            if (isBase) {
                html += `<p style="margin-top:8px; padding:10px; background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25); border-radius:4px;"><strong style="color:var(--accent-rose);">⚠ INCOMPATIBILITY:</strong> Sodium hydroxide reacts violently with aluminum — do NOT use aluminum containers for waste collection. Do NOT mix caustic waste with acid waste — violent exothermic reaction.</p>`;
            } else if (hazardLower.includes('hydrofluoric') || hazardLower.includes('hf refinery')) {
                html += `<p style="margin-top:8px; padding:10px; background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25); border-radius:4px;"><strong style="color:var(--accent-rose);">⚠ INCOMPATIBILITY:</strong> Hydrofluoric acid causes deep tissue burns that may not be immediately painful. Apply calcium gluconate gel to all exposed skin. HF penetrates latex and nitrile gloves — use butyl rubber or neoprene.</p>`;
            }
        } else if (isPhosgene) {
            html += `Emergency + Technical Decon (Phosgene — Delayed Effects)</p>`;
            html += `<p><strong>Setup:</strong> Two-stage decon corridor. High-volume water supply for gross decon.</p>`;
            html += `<p><strong>Procedure:</strong> Gross decon while in SCBA. Systematic PPE removal with rinse between layers. Bag all contaminated PPE as hazardous waste.</p>`;
            html += `<p><strong>Waste:</strong> Phosgene decon water is hazardous — contain all runoff.</p>`;
            html += `<p style="margin-top:8px; padding:10px; background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25); border-radius:4px;"><strong style="color:var(--accent-rose);">⚠ CRITICAL:</strong> Phosgene causes DELAYED pulmonary edema — symptoms may not appear for 24-72 hours. ALL exposed personnel must be medically evaluated and monitored for 72 hours, even if completely asymptomatic at the scene.</p>`;
        } else if (isBenzene || isEtO) {
            html += `Technical Decon (Carcinogen Protocol)</p>`;
            html += `<p><strong>Setup:</strong> Standard two-stage decon corridor. Document all personnel who enter the Hot Zone — exposure records are required for carcinogens.</p>`;
            html += `<p><strong>Procedure:</strong> Gross water wash followed by technical decon. All contaminated PPE must be professionally cleaned or disposed of — do NOT reuse without verified decon. Document exposure duration and estimated concentration for all personnel.</p>`;
            html += `<p><strong>Waste:</strong> Contain all decon water. Carcinogenic waste requires special handling per AHJ requirements.</p>`;
            if (isEtO) {
                html += `<p style="margin-top:8px; padding:10px; background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25); border-radius:4px;"><strong style="color:var(--accent-rose);">⚠ INCOMPATIBILITY:</strong> Ethylene oxide can polymerize explosively if contaminated. Keep away from acids, bases, and oxidizers during decon. EtO flammable range is 3%–100% — ensure decon area is well-ventilated and free of ignition sources.</p>`;
            }
        } else {
            html += `Standard Emergency + Technical Decon</p>`;
            html += `<p><strong>Setup:</strong> Two-stage decon corridor at the Hot/Warm Zone boundary. Gross wash station and rinse station. ${isChlorine ? 'Warm water preferred to reduce hypothermia risk during extended decon.' : ''}</p>`;
            html += `<p><strong>Procedure:</strong> Gross decon: high-volume, low-pressure water wash of all PPE while personnel remain in SCBA. Technical decon: systematic PPE removal (outer to inner) with rinse between layers. Bag all contaminated PPE.</p>`;
            html += `<p><strong>Waste:</strong> Contain decon water per AHJ requirements. For toxic products, decon water is hazardous waste.</p>`;
        }

        if (isPractical) {
            html += `<p style="margin-top:14px;"><strong>Evaluator Checkpoint:</strong> Verify decon corridor is established BEFORE entry team makes Hot Zone entry. Confirm water supply is flowing, runoff containment is in place, and EMS is staged at the decon line.</p>`;
        } else {
            html += `<p style="margin-top:14px;"><strong>Discussion:</strong> What decon method is appropriate for this hazard? Where should the decon corridor be positioned relative to wind direction? What are the waste containment requirements? Who manages the decon line?</p>`;
        }

    } else if (cat === 'radiological' || cat === 'nuclear') {
        html += `<p><strong>Decon Type:</strong> Radiological Contamination Control</p>`;
        html += `<p><strong>Setup:</strong> Establish contamination-control boundary with plastic sheeting at the Hot Zone exit. Step-off pads at each transition zone. Survey station with pancake probe (alpha/beta) at Warm/Cold boundary. All personnel wear dosimeters.</p>`;
        html += `<p><strong>Procedure:</strong> All personnel and equipment exiting the Hot Zone must be surveyed with the pancake probe. Readings above 2× background indicate contamination — conduct wet decon (water wash) and re-survey. Repeat until readings are at or near background. All contaminated PPE is double-bagged and labeled with isotope, date, and dose rate.</p>`;
        html += `<p><strong>Waste:</strong> All decon water and contaminated materials are radioactive waste. Contain, bag, label, and hold for the Radiation Safety Officer or state radiation control authority. Do NOT release decon water into drains or waterways.</p>`;

        if (isPractical) {
            html += `<p style="margin-top:14px;"><strong>Evaluator Checkpoint:</strong> Verify contamination control is established before entry. Confirm all entry personnel have dosimeters. Verify survey station is operational at the Warm/Cold boundary.</p>`;
        } else {
            html += `<p style="margin-top:14px;"><strong>Discussion:</strong> How does radiological decon differ from chemical decon? What constitutes "clean" after decon? Who has authority to release personnel from the contamination control zone? What happens to contaminated waste?</p>`;
        }

    } else if (cat === 'biological') {
        html += `<p><strong>Decon Type:</strong> Biological Agent Decon (Presumptive Protocol)</p>`;
        html += `<p><strong>Setup:</strong> Establish decon corridor with 0.5% sodium hypochlorite (household bleach dilution) solution. Stage collection bags for clothing and personal effects. EMS and public health coordination required.</p>`;
        html += `<p><strong>Procedure:</strong> Gross decon with 0.5% hypochlorite solution followed by copious water rinse. For mass decon of civilians: clothing removal followed by water wash provides ~90% decontamination. Bag all clothing as evidence AND biohazard. Provide cover garments to decontaminated individuals.</p>`;
        html += `<p><strong>Waste:</strong> All decon water and contaminated materials are biohazard waste. Coordinate disposal with public health and law enforcement (evidence preservation).</p>`;
        html += `<p style="margin-top:8px; padding:10px; background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25); border-radius:4px;"><strong style="color:var(--accent-rose);">⚠ CRITICAL:</strong> Victims are potential witnesses — coordinate with law enforcement for evidence collection during decon. Clothing must be bagged and labeled per chain-of-custody requirements. Privacy and dignity considerations are critical for civilian mass decon.</p>`;

        if (isPractical) {
            html += `<p style="margin-top:14px;"><strong>Evaluator Checkpoint:</strong> Verify hypochlorite solution concentration. Confirm privacy considerations are addressed. Verify evidence collection procedures are integrated with decon.</p>`;
        } else {
            html += `<p style="margin-top:14px;"><strong>Discussion:</strong> How do you balance decontamination speed with evidence preservation? What are the privacy considerations for mass civilian decon? How do you manage the transition from decon to medical triage?</p>`;
        }

    } else if (cat === 'explosive') {
        html += `<p><strong>Decon Type:</strong> Limited Personnel Decon (Post-Blast / EOD Coordination)</p>`;
        html += `<p><strong>Setup:</strong> Standard decon corridor ONLY after the blast zone has been cleared by EOD (Explosive Ordnance Disposal) for secondary devices. Do NOT establish decon in the potential blast radius.</p>`;
        html += `<p><strong>Procedure:</strong> Decon of personnel only — do NOT attempt to decontaminate explosive materials or residue. Standard gross water wash for personnel PPE. Evidence preservation is critical — coordinate with EOD and law enforcement before disturbing any materials.</p>`;
        html += `<p><strong>Waste:</strong> Coordinate with EOD for any contaminated materials. Do NOT handle, move, or dispose of blast residue — it is evidence.</p>`;
        html += `<p style="margin-top:8px; padding:10px; background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25); border-radius:4px;"><strong style="color:var(--accent-rose);">⚠ CRITICAL:</strong> Always assume secondary devices. Do NOT establish staging, decon, or medical in areas that have not been cleared by EOD. Decon location must be outside the established fragmentation distance.</p>`;

        if (isPractical) {
            html += `<p style="margin-top:14px;"><strong>Evaluator Checkpoint:</strong> Verify EOD has cleared the decon area before setup. Confirm decon is outside fragmentation distance. Verify evidence preservation procedures.</p>`;
        } else {
            html += `<p style="margin-top:14px;"><strong>Discussion:</strong> What is the relationship between the decon corridor and the secondary device search? Where should decon be positioned relative to the blast zone? Who has authority over evidence in the decon area?</p>`;
        }

    } else {
        html += `<p><strong>Decon Type:</strong> Standard Emergency Decon</p>`;
        html += `<p><strong>Setup:</strong> Two-stage decon corridor at the Hot/Warm boundary.</p>`;
        html += `<p><strong>Procedure:</strong> Gross decon followed by technical decon. Bag all contaminated PPE.</p>`;
        html += `<p><strong>Waste:</strong> Contain all decon water per AHJ requirements.</p>`;
    }

    return html;
}


function generateToolIntegration(cat, opsOnly) {
    let html = '';

    // Basic tier (always shown)
    html += `<div class="tool-directive">
        <div class="tool-label">Basic</div>
        <div class="tool-calc-name">▸ Chemical Identification / Reference Library</div>
        <p style="font-size:0.85rem; color:var(--text);">Look up the specific hazard by name or UN number to confirm REL (Recommended Exposure Limit), TWA (Time-Weighted Average), STEL (Short-Term Exposure Limit), IDLH (Immediately Dangerous to Life or Health), VD (Vapor Density), SG (Specific Gravity), and ERG (Emergency Response Guidebook) isolation distances before making entry decisions.</p>
    </div>`;

    html += `<div class="tool-directive">
        <div class="tool-label">Basic</div>
        <div class="tool-calc-name">▸ Air Monitoring & Meter Alarms</div>
        <p style="font-size:0.85rem; color:var(--text);">Reference alarm setpoints for the specific meters being deployed (MultiRAE, Altair, PID [Photoionization Detector], Ludlum, PRD [Personal Radiation Detector]) to confirm low/high alarm thresholds before operations.</p>
    </div>`;

    html += `<div class="tool-directive">
        <div class="tool-label">Basic</div>
        <div class="tool-calc-name">▸ Entry Timer</div>
        <p style="font-size:0.85rem; color:var(--text);">Start the Entry Timer when the team crosses the Hot Zone boundary. Document entry time, exit time, and total time for each team member.</p>
    </div>`;

    if (opsOnly) return html;   // Operations level: Basic tool only

    // Advanced tier — category specific
    if (cat === 'chemical') {
        html += `<div class="tool-directive">
            <div class="tool-label pro-label">Advanced</div>
            <div class="tool-calc-name">▸ VOC (Volatile Organic Compound) Correction Factor — PID (Photoionization Detector)</div>
            <p style="font-size:0.85rem; color:var(--text);">Apply the PID correction factor for the specific chemical to convert the isobutylene-calibrated reading to true concentration. Verify the entry team's corrected readings before reporting to Command.</p>
        </div>`;

        html += `<div class="tool-directive">
            <div class="tool-label pro-label">Advanced</div>
            <div class="tool-calc-name">▸ LEL (Lower Explosive Limit) to PPM (Parts Per Million) Converter</div>
            <p style="font-size:0.85rem; color:var(--text);">Convert the 4-gas monitor's LEL% reading to actual ppm (Parts Per Million) concentration. Verify whether the actual concentration exceeds the IDLH (Immediately Dangerous to Life or Health) even at "low" LEL readings.</p>
        </div>`;

        html += `<div class="tool-directive">
            <div class="tool-label pro-label">Advanced</div>
            <div class="tool-calc-name">▸ GEBMO (General Emergency Behavior Model)</div>
            <p style="font-size:0.85rem; color:var(--text);">Select the container stress type (mechanical, thermal, or chemical) to model the likely release behavior and predict escalation potential.</p>
        </div>`;

    } else if (cat === 'radiological' || cat === 'nuclear') {
        html += `<div class="tool-directive">
            <div class="tool-label pro-label">Advanced</div>
            <div class="tool-calc-name">▸ Radiation: Inverse Square Law Calculator</div>
            <p style="font-size:0.85rem; color:var(--text);">Use the Inverse Square Law calculator to verify the entry team's math. Input the measured dose rate and distance to calculate safe staging distances, dose at working distance, or source strength. Cross-check all field calculations before authorizing entry.</p>
        </div>`;
    }

    return html;
}

            description += ' IC (Incident Commander) competencies include exposure tracking, population dose assessment coordination, and multi-agency notification (NRC [Nuclear Regulatory Commission], state radiation control).';
        }

    } else if (cat === 'biological') {
        tags += '<div class="nfpa-tag">NFPA 470 §7.2 — Technician: Planning the Response</div>';
        tags += '<div class="nfpa-tag">NFPA 470 §7.3 — Technician: Implementing the Planned Response</div>';
        tags += '<div class="nfpa-tag">NFPA 470 §10.2 — Specialist: Biological (Detection & Sampling)</div>';
        description = 'The responder shall demonstrate Technician-level response competencies plus Specialist competencies in biological agent detection, presumptive field screening, sample collection and chain of custody, and decontamination procedures specific to biological hazards.';

        if (level >= 3) {
            tags += '<div class="nfpa-tag">NFPA 470 §8.2 — Incident Commander: Planning the Response</div>';
            description += ' IC (Incident Commander) competencies include coordination with public health authorities, epidemiological data integration, and mass prophylaxis/decontamination planning.';
        }

    } else if (cat === 'explosive') {
        tags += '<div class="nfpa-tag">NFPA 470 §7.2 — Technician: Planning the Response</div>';
        tags += '<div class="nfpa-tag">NFPA 470 §11.2 — Specialist: Explosives (Scene Assessment)</div>';
        description = 'The responder shall demonstrate Technician-level response competencies plus Specialist competencies in explosive hazard recognition, secondary device assessment, blast standoff distance determination, and coordination with EOD (Explosive Ordnance Disposal) / bomb squad operations.';

        if (level >= 3) {
            tags += '<div class="nfpa-tag">NFPA 470 §8.2 — Incident Commander: Planning the Response</div>';
            description += ' IC (Incident Commander) competencies include unified command with law enforcement, evidence preservation coordination, and mass casualty/mass decontamination interface.';
        }
    }

    return { tags, description };
}

//  EQUIPMENT MATCHING
// ═══════════════════════════════════════════════════════════
function matchEquipment(inputStr) {
    // Checkboxes pass exact library keys as comma-separated values
    const items = inputStr.toLowerCase().split(',').map(s => s.trim()).filter(Boolean);
    const matched = [];

    items.forEach(item => {
        // Direct key match (from checkboxes)
        if (equipmentLibrary[item] && !matched.find(m => m.key === item)) {
            matched.push({ key: item, ...equipmentLibrary[item] });
            return;
        }
        // Fallback: partial match for any manual/legacy input
        for (const [key, equip] of Object.entries(equipmentLibrary)) {
            if ((item.includes(key) || key.includes(item)) && !matched.find(m => m.key === key)) {
                matched.push({ key, ...equip });
            }
        }
    });

    return matched;
}

// ═══════════════════════════════════════════════════════════
//  DYNAMIC UI FUNCTIONS
// ═══════════════════════════════════════════════════════════
function onCategoryChange() {
    const cat = document.getElementById('hazardCategory').value;
    const hazardSelect = document.getElementById('specificHazard');

    if (!cat || !hazardScenarios[cat]) {
        hazardSelect.disabled = true;
        hazardSelect.innerHTML = '<option value="">— Select a Hazard Category first —</option>';
        return;
    }

    hazardSelect.disabled = false;
    let html = '<option value="">— Select a Scenario —</option>';
    hazardScenarios[cat].forEach(s => {
        const idLabel = s.id !== 'N/A' ? ` [${s.id}]` : '';
        html += `<option value="${s.value}" data-hazid="${s.id}">${s.value}${idLabel}</option>`;
    });
    hazardSelect.innerHTML = html;
}

function onNfpaChapterChange() {
    const ch = document.getElementById('nfpaChapter').value;
    if (!ch || !nfpaChapterData[ch]) return;

    const data = nfpaChapterData[ch];
    const catSelect = document.getElementById('hazardCategory');

    // Auto-suggest the category if one isn't already selected
    if (!catSelect.value && data.suggestedCat) {
        catSelect.value = data.suggestedCat;
        onCategoryChange();
    }
}

let currentLevel = 'operations';

function setLevel(level) {
    currentLevel = level;
    document.getElementById('btnOps').className  = 'level-btn' + (level === 'operations' ? ' active-ops'  : '');
    document.getElementById('btnTech').className = 'level-btn' + (level === 'technician' ? ' active-tech' : '');
    document.getElementById('btnAll').className  = 'level-btn' + (level === 'all'        ? ' active-all'  : '');
}

// ═══════════════════════════════════════════════════════════
//  MAIN GENERATOR
// ═══════════════════════════════════════════════════════════
function generateAdvancedDrill() {
    const cat = document.getElementById('hazardCategory').value;
    const env = document.getElementById('environment').value;
    const hazardSelect = document.getElementById('specificHazard');
    const hazard = hazardSelect.value;
    const hazardId = hazardSelect.selectedOptions[0]?.getAttribute('data-hazid') || '';
    const level = parseInt(document.getElementById('injectLevel').value);
    const format = document.getElementById('drillFormat').value;
    const nfpaChapter = document.getElementById('nfpaChapter').value;
    const equipInput = getSelectedEquipment().join(', ');

    if (!cat)    return alert('Select a Hazard Category.');
    if (!env)    return alert('Select an Environment.');
    if (!hazard) return alert('Select a Specific Hazard.');

    const ADV_WIND_POOL = [
        {name:'North',abbr:'N',deg:0}, {name:'Northeast',abbr:'NE',deg:45},
        {name:'East',abbr:'E',deg:90}, {name:'Southeast',abbr:'SE',deg:135},
        {name:'South',abbr:'S',deg:180}, {name:'Southwest',abbr:'SW',deg:225},
        {name:'West',abbr:'W',deg:270}, {name:'Northwest',abbr:'NW',deg:315}
    ];
    const autoWindDir  = ADV_WIND_POOL[Math.floor(Math.random() * ADV_WIND_POOL.length)];
    const autoWindSpd  = [5,6,7,8,9,10,12,15][Math.floor(Math.random() * 8)];
    const autoTempF    = Math.floor(Math.random() * 55) + 45;
    const autoHumidity = Math.floor(Math.random() * 55) + 30;
    const temp     = autoTempF + '°F';
    const humidity = autoHumidity + '%';
    const wind     = autoWindSpd + ' mph ' + autoWindDir.abbr;

    const params = { cat, env, hazard, hazardId, level, format, nfpaChapter, equipInput,
                     autoWindDir, autoWindSpd, temp, humidity, wind };

    let html = '';
    if (currentLevel === 'operations') {
        html = buildAdvHTML(params, 'operations');
    } else if (currentLevel === 'technician') {
        html = buildAdvHTML(params, 'technician');
    } else {
        html = buildLevelDividerAdv('ops') + buildAdvHTML(params, 'operations') +
               buildLevelDividerAdv('tech') + buildAdvHTML(params, 'technician');
    }

    document.getElementById('drillOutput').innerHTML = html;
    document.getElementById('outputArea').classList.add('visible');
    document.getElementById('printBtn').style.display = 'block';
    document.getElementById('printBtnBottom').style.display = 'block';
    document.getElementById('downloadBtn').style.display = 'block';
    document.getElementById('downloadBtnBottom').style.display = 'block';

    const catIso = advCatIso[cat] || advCatIso['chemical'];
    storeAdvDiagramData({
        hazardLabel: hazard, envLabel: environmentData[env].name,
        envKey: environmentData[env].envKey,
        initialIsolation: catIso.iso, downwind: catIso.downwind,
        windDeg: autoWindDir.deg,
        windLabel: 'From ' + autoWindDir.name + ' (' + autoWindDir.abbr + ') at ' + autoWindSpd + ' mph',
        isRad: cat === 'radiological' || cat === 'nuclear', hazClass: cat
    });

    document.getElementById('outputArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function buildLevelDividerAdv(level) {
    if (level === 'ops') {
        return `<div class="level-divider"><div class="level-divider-line"></div><div class="level-divider-label ops-label">⚙ Operations Level</div><div class="level-divider-line"></div></div>`;
    }
    return `<div class="level-divider" style="margin-top:40px;"><div class="level-divider-line"></div><div class="level-divider-label tech-label">☣ Technician / IC Level</div><div class="level-divider-line"></div></div>`;
}

    // ── 7. TOOL INTEGRATION ──

// ═══════════════════════════════════════════════════════════
//  OPERATIONS — INJECTS
// ═══════════════════════════════════════════════════════════
function generateOpsInjects(level, cat, hazard, env) {
    const hazL = hazard.toLowerCase();
    const injects = [];

    // Inject 1 — always present (initial complication)
    const inj1Pool = {
        chemical: [
            `A bystander runs toward the incident to retrieve personal belongings from their vehicle parked inside your initial isolation perimeter. Redirect without physical contact. How do you manage unauthorized entry attempts while maintaining zone integrity?`,
            `Your 4-gas monitor LEL alarm activates at the perimeter — 12% LEL. This exceeds your entry threshold. The source is still releasing. How do you communicate this to IC and what protective actions do you initiate?`,
            `Wind shifts 90° during perimeter monitoring, putting your current Command Post position in the projected downwind zone. IC must relocate Command and reassess the protective action zone immediately. What are your actions?`
        ],
        radiological: [
            `Your survey meter reads 1.8 mR/hr at 120 feet from the reported source. A worker tells you three of their coworkers went to investigate the object earlier and were closer than 30 feet. How do you manage these potential exposure victims while maintaining the Hot Zone boundary?`,
            `A media crew attempts to enter your isolation perimeter claiming First Amendment access. How do you manage the situation without physical confrontation? Who at Command handles media liaison?`,
            `Your dosimeter is showing accumulated dose as you establish the perimeter boundary. At what reading do you withdraw and notify IC? What documentation is required before you exit?`
        ],
        biological: [
            `Three people from the immediate area have self-evacuated and are requesting medical evaluation at a nearby parking lot. They may have been exposed to the suspected biological material. How do you manage potential exposed persons at the Operations level?`,
            `A HVAC unit for the building is actively running and pulling air from the area where the suspicious powder was discovered. How does this affect your isolation perimeter and shelter-in-place decisions?`
        ],
        explosive: [
            `A secondary package is located 150 feet from the initial device — after your perimeter was established. How does this change your perimeter and staging locations? Who has authority to authorize movement of any personnel inside the current perimeter?`,
            `A cell phone begins ringing inside the isolation perimeter. No one is in the immediate area. What is your response?`
        ],
        nuclear: [
            `Your state radiation control authority is requesting a status update — but you don't yet have definitive meter readings or isotope identification. What information can you provide at the Operations level?`
        ]
    };

    const pool1 = inj1Pool[cat] || inj1Pool['chemical'];
    injects.push(pool1[Math.floor(Math.random() * pool1.length)]);

    if (level >= 2) {
        // Inject 2 — escalation / scope boundary
        const inj2Pool = {
            chemical: [
                `A victim is found lying on the ground approximately 60 feet into the Hot Zone — inside your isolation perimeter. The victim appears unconscious. Hazmat Technician response is 15 minutes out. How do you assess the rescue decision? What factors determine whether Operations-level personnel attempt a rescue?`,
                `The material is identified as ${hazL.includes('chlorine') ? 'Chlorine (UN1017)' : hazL.includes('ammonia') ? 'Anhydrous Ammonia (UN1005)' : 'a toxic gas'} via the ERG. Your IC requests you attempt remote valve closure on the container. The valve is visible but requires entering approximately 80 feet into the isolated area. Do you proceed or hold for Technicians?`
            ],
            radiological: [
                `Meter readings at your established boundary are now increasing — rising from 1.8 to 2.4 mR/hr over 10 minutes. This suggests either the source is moving or conditions are changing. How does this change your perimeter? Do you expand without Technician confirmation?`,
                `A contaminated patient self-presents at your staging area — clothing visibly dusty, possible contact with the source. You have no pancake probe for contamination survey. How do you manage this patient without spreading contamination?`
            ],
            biological: [
                `Twelve additional people from the immediate area are now reporting symptoms — burning eyes, nausea, and shortness of breath. You have not confirmed whether this is the biological agent or a psychosomatic response. How do you triage and manage this group at the Operations level?`
            ],
            explosive: [
                `EOD reports they require 45 minutes to arrive. The IC is requesting your hazmat team assess the package for chemical or radiological components. How do you respond, and what is the Operations-level authority on this decision?`
            ],
            nuclear: [
                `Your IC is being pressured by facility management to allow limited re-entry to retrieve critical business records. The 2 mR/hr boundary is established. How do you advise IC on this request? What is the appropriate Operations-level response?`
            ]
        };
        const pool2 = inj2Pool[cat] || inj2Pool['chemical'];
        injects.push(pool2[Math.floor(Math.random() * pool2.length)]);
    }

    if (level >= 3) {
        injects.push(`Media vehicles have established a position that gives their cameras a clear line of sight into the incident area. Simultaneously, a local elected official arrives on scene and is requesting an immediate briefing from the senior officer. How does IC manage the political and media interface while operations continue? Who is the authorized spokesperson?`);
    }

    if (level >= 4) {
        injects.push(`A mutual aid engine company arrives and begins to freelance — their crew is donning PPE without authorization and moving toward the Hot Zone. IC must simultaneously manage an unauthorized entry attempt, the active hazmat operation, and incoming mutual aid. What are the immediate command priorities?`);
    }

    return injects;
}


// ═══════════════════════════════════════════════════════════
//  OPERATIONS — DECON SECTION
// ═══════════════════════════════════════════════════════════
function generateOpsDeconSection(cat, hazard, isPractical) {
    let html = '';
    html += `<p><strong>Decon Type:</strong> Emergency Gross Decon — Operations Level</p>`;
    html += `<p><strong>Setup:</strong> Establish emergency decon using a hoseline with fog nozzle at the Hot/Warm Zone boundary. Life-safety decon does not require a formal corridor — position upwind and uphill. Stage EMS at the decon line.</p>`;
    html += `<p><strong>Procedure:</strong> High-volume, low-pressure water wash of all exposed personnel and equipment. Remove contaminated clothing if safe and appropriate. Gross flush minimum 3–5 minutes. Operations-level teams do NOT perform technical decon — request Hazmat Technician team for formal decon corridor setup and equipment decon.</p>`;
    html += `<p><strong>Waste:</strong> Contain decon water where possible. Notify environmental authorities for significant runoff. Do NOT allow decon water to enter storm drains — coordinate with arriving Technician team for formal containment.</p>`;

    if (cat === 'radiological' || cat === 'nuclear') {
        html += `<p><strong>Radiological Specific:</strong> Survey all personnel with available meter before releasing from the decon area. Any reading above 2× background — do NOT release. Hold for Technician-level contamination control and re-survey. All decon water is radioactive waste — contain and hold for RSO.</p>`;
    }
    if (cat === 'biological') {
        html += `<p style="margin-top:8px; padding:10px; background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25); border-radius:4px;"><strong style="color:var(--accent-rose);">⚠ OPERATIONS SCOPE LIMIT:</strong> Operations-level personnel do NOT perform biological decon beyond basic water wash. Request WMD-CST or HazMat Technician team with biological-specific decon capability. Clothing collection for evidence is a Technician/law enforcement function.</p>`;
    }
    if (cat === 'explosive') {
        html += `<p style="margin-top:8px; padding:10px; background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25); border-radius:4px;"><strong style="color:var(--accent-rose);">⚠ SECONDARY DEVICE:</strong> Do NOT establish decon within the explosive hazard radius. Decon site must be pre-cleared by EOD. Evidence preservation is critical — coordinate all decon with law enforcement before proceeding.</p>`;
    }

    if (isPractical) {
        html += `<p style="margin-top:14px;"><strong>Evaluator Checkpoint:</strong> Verify emergency decon is positioned upwind, EMS is staged at the line, and personnel are NOT entering the Hot Zone for Technician-level mitigation. Confirm IC has requested Technician team response.</p>`;
    } else {
        html += `<p style="margin-top:14px;"><strong>Discussion:</strong> What is the difference between emergency gross decon and technical decon? At what point does decon exceed Operations-level scope? Who has authority to clear personnel from the decon area?</p>`;
    }

    return html;
}


// ═══════════════════════════════════════════════════════════
//  OPERATIONS — NFPA 470
// ═══════════════════════════════════════════════════════════
function generateOpsNFPA470(cat, level) {
    let tags = '';
    let description = '';

    tags += '<div class="nfpa-tag">NFPA 470 §5.2 — Operations: Identifying Potential Hazards</div>';
    tags += '<div class="nfpa-tag">NFPA 470 §5.3 — Operations: Identifying Action Options</div>';
    tags += '<div class="nfpa-tag">NFPA 470 §5.5 — Operations: Implementing the Planned Response</div>';

    if (cat === 'chemical') {
        tags += '<div class="nfpa-tag">NFPA 470 §5.4 — Operations: Planning the Response</div>';
        description = 'The responder shall demonstrate the ability to identify chemical hazards via placard, UN number, and ERG; establish initial isolation zones; perform perimeter atmospheric monitoring without hot zone entry; implement protective actions (evacuation / shelter-in-place); and initiate emergency gross decontamination at the Operations level. Offensive mitigation and technical decon require Hazmat Technician-level response.';
    } else if (cat === 'radiological' || cat === 'nuclear') {
        tags += '<div class="nfpa-tag">NFPA 470 §6.7 — Operations Mission-Specific: Detection, Monitoring, and Sampling</div>';
        description = 'The responder shall demonstrate the ability to identify radioactive materials via placard and label; establish a Hot Zone boundary using survey meter data and the 2/2 Rule (2 mR/hr); apply ALARA principles (Time, Distance, Shielding); and relay findings to IC at the Operations level. Source recovery, advanced survey, and dose assessment require Hazmat Technician or Specialist-level response.';
    } else if (cat === 'biological') {
        tags += '<div class="nfpa-tag">NFPA 470 §5.3 — Operations: Identifying Action Options</div>';
        description = 'The responder shall demonstrate the ability to recognize indicators of a biological threat; establish conservative isolation; deny entry; initiate notification to public health and law enforcement; and stage resources for arriving Hazmat Technician and WMD-CST teams at the Operations level.';
    } else if (cat === 'explosive') {
        tags += '<div class="nfpa-tag">NFPA 470 §5.2 — Operations: Identifying Potential Hazards</div>';
        description = 'The responder shall demonstrate the ability to recognize indicators of an explosive threat; apply ERG standoff distances; establish isolation; deny entry pending EOD arrival; and manage the scene boundary at the Operations level. Device assessment and render-safe are exclusively EOD functions.';
    } else {
        description = 'The responder shall demonstrate Operations-level response competencies including hazard identification, zone establishment, protective action implementation, and emergency decontamination for this CBRNE category.';
    }

    if (level >= 3) {
        tags += '<div class="nfpa-tag">NFPA 470 §5.5 — Operations: Implementing — Multi-Agency Coordination</div>';
        description += ' At Level 3+, Operations-level IC competencies include unified command interface with law enforcement and emergency management, public protective action communication, and formal handoff to Hazmat Technician teams.';
    }

    return { tags, description };
}

// ═══════════════════════════════════════════════════════════
//  ADV — PARSE ISO DISTANCE FROM TEXT
// ═══════════════════════════════════════════════════════════
function advParseIsoFt(str) {
    if (!str || str === 'N/A') return 0;
    str = str.trim();
    if (str.includes('mi')) return (parseFloat(str) || 0) * 5280;
    if (str.includes('ft')) return parseFloat(str) || 0;
    const n = parseFloat(str) || 0;
    return n > 0 && n < 20 ? n * 5280 : n;
}
