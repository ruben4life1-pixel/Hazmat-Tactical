    'port / marine terminal':           { shape: 'rect',   label: 'PORT\nTERMINAL',       doors: [{side:'bottom',pos:0.3},{side:'bottom',pos:0.7},{side:'left',pos:0.5}] },
    'underground parking structure':    { shape: 'rect',   label: 'PARKING\nSTRUCTURE',   doors: [{side:'bottom',pos:0.3},{side:'bottom',pos:0.7},{side:'right',pos:0.5}] }
};


// ═══════════════════════════════════════════════════════════
//  ADV — DRAW ENVIRONMENT STRUCTURE
// ═══════════════════════════════════════════════════════════
function advDrawStructure(ctx, cx, cy, hotR, info) {
    const bw = Math.max(hotR * 1.4, 120);
    const bh = Math.max(hotR * 0.9, 80);
    const bx = cx - bw / 2;
    const by = cy - bh / 2;

    if (info.shape === 'road') {
        const roadW = hotR * 3;
        const laneH = 22;
        ctx.fillStyle = 'rgba(71,85,105,0.06)';
        ctx.fillRect(cx - roadW, cy - laneH * 2.5, roadW * 2, laneH * 5);
        ctx.fillStyle = 'rgba(71,85,105,0.10)';
        ctx.fillRect(cx - roadW, cy - laneH * 1.5, roadW * 2, laneH * 3);
        ctx.strokeStyle = 'rgba(71,85,105,0.3)'; ctx.lineWidth = 1;
        ctx.strokeRect(cx - roadW, cy - laneH * 1.5, roadW * 2, laneH * 3);
        ctx.setLineDash([16, 12]);
        ctx.strokeStyle = 'rgba(245,158,11,0.5)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(cx - roadW, cy); ctx.lineTo(cx + roadW, cy); ctx.stroke();
        ctx.setLineDash([10, 10]);
        ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(cx - roadW, cy - laneH); ctx.lineTo(cx + roadW, cy - laneH); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx - roadW, cy + laneH); ctx.lineTo(cx + roadW, cy + laneH); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(71,85,105,0.15)'; ctx.strokeStyle = 'rgba(100,116,139,0.5)'; ctx.lineWidth = 1.5;
        ctx.fillRect(cx - 60, cy - laneH * 0.9, 120, laneH * 1.8);
        ctx.strokeRect(cx - 60, cy - laneH * 0.9, 120, laneH * 1.8);
        ctx.fillStyle = 'rgba(71,85,105,0.25)';
        ctx.fillRect(cx + 32, cy - laneH * 0.7, 20, laneH * 1.4);
        return;
    }

    if (info.shape === 'rail') {
        const trackW = hotR * 2.5;
        for (let t = -1; t <= 1; t += 2) {
            const ry = cy + t * 14;
            ctx.fillStyle = 'rgba(100,116,139,0.06)';
            ctx.fillRect(cx - trackW, ry - 8, trackW * 2, 16);
            ctx.strokeStyle = 'rgba(148,163,184,0.35)'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.moveTo(cx - trackW, ry - 5); ctx.lineTo(cx + trackW, ry - 5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx - trackW, ry + 5); ctx.lineTo(cx + trackW, ry + 5); ctx.stroke();
            ctx.strokeStyle = 'rgba(100,116,139,0.2)'; ctx.lineWidth = 3;
            for (let x = cx - trackW; x < cx + trackW; x += 18) {
                ctx.beginPath(); ctx.moveTo(x, ry - 8); ctx.lineTo(x, ry + 8); ctx.stroke();
            }
        }
        ctx.fillStyle = 'rgba(71,85,105,0.12)'; ctx.strokeStyle = 'rgba(148,163,184,0.35)'; ctx.lineWidth = 1.5;
        ctx.fillRect(cx - 55, cy - 22, 110, 44); ctx.strokeRect(cx - 55, cy - 22, 110, 44);
        ctx.beginPath(); ctx.arc(cx, cy, 16, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(100,116,139,0.15)'; ctx.fill();
        ctx.strokeStyle = 'rgba(148,163,184,0.4)'; ctx.stroke();
        return;
    }

    if (info.shape === 'houses') {
        ctx.strokeStyle = 'rgba(71,85,105,0.12)'; ctx.lineWidth = 12;
        ctx.beginPath(); ctx.moveTo(cx - bw, cy); ctx.lineTo(cx + bw, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, cy - bh); ctx.lineTo(cx, cy + bh); ctx.stroke();
        const housePositions = [
            {x:-60,y:-50},{x:-20,y:-50},{x:20,y:-50},{x:60,y:-50},
            {x:-60,y:50}, {x:-20,y:50}, {x:20,y:50}, {x:60,y:50},
            {x:-80,y:0},  {x:80,y:0}
        ];
        housePositions.forEach(function(h) {
            const hx = cx + h.x, hy = cy + h.y;
            ctx.fillStyle = 'rgba(71,85,105,0.08)'; ctx.strokeStyle = 'rgba(71,85,105,0.3)'; ctx.lineWidth = 1;
            ctx.fillRect(hx - 12, hy - 10, 24, 20); ctx.strokeRect(hx - 12, hy - 10, 24, 20);
            ctx.beginPath(); ctx.moveTo(hx - 14, hy - 10); ctx.lineTo(hx, hy - 22); ctx.lineTo(hx + 14, hy - 10);
            ctx.closePath(); ctx.fillStyle = 'rgba(71,85,105,0.12)'; ctx.fill();
            ctx.strokeStyle = 'rgba(71,85,105,0.35)'; ctx.stroke();
        });
        return;
    }

    // Default: building with windows and doors
    ctx.fillStyle = 'rgba(71,85,105,0.06)'; ctx.strokeStyle = 'rgba(71,85,105,0.35)'; ctx.lineWidth = 2;
    ctx.fillRect(bx, by, bw, bh); ctx.strokeRect(bx, by, bw, bh);
    ctx.strokeStyle = 'rgba(100,116,139,0.2)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(bx + 5, by + 5); ctx.lineTo(bx + bw - 5, by + 5); ctx.stroke();
    const numWin = Math.floor(bw / 30);
    const winSpacing = bw / (numWin + 1);
    for (let i = 1; i <= numWin; i++) {
        const wx = bx + i * winSpacing;
        ctx.fillStyle = 'rgba(96,165,250,0.06)'; ctx.strokeStyle = 'rgba(100,116,139,0.2)'; ctx.lineWidth = 0.5;
        ctx.fillRect(wx - 6, by + 14, 12, 12); ctx.strokeRect(wx - 6, by + 14, 12, 12);
        ctx.beginPath(); ctx.moveTo(wx, by + 14); ctx.lineTo(wx, by + 26); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(wx - 6, by + 20); ctx.lineTo(wx + 6, by + 20); ctx.stroke();
    }
    const blines = info.label.split('\n');
    ctx.font = '700 12px Barlow Condensed, sans-serif'; ctx.fillStyle = 'rgba(71,85,105,0.3)'; ctx.textAlign = 'center';
    blines.forEach(function(line, i) { ctx.fillText(line, cx, cy + bh * 0.15 - (blines.length - 1) * 8 + i * 16); });
    info.doors.forEach(function(door) {
        let dx, dy;
        if (door.side === 'bottom')    { dx = bx + bw * door.pos; dy = by + bh; }
        else if (door.side === 'top')  { dx = bx + bw * door.pos; dy = by; }
        else if (door.side === 'left') { dx = bx; dy = by + bh * door.pos; }
        else                           { dx = bx + bw; dy = by + bh * door.pos; }
        ctx.fillStyle = 'rgba(245,158,11,0.25)'; ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 1.5;
        ctx.fillRect(dx - 8, dy - 5, 16, 10); ctx.strokeRect(dx - 8, dy - 5, 16, 10);
    });
}


// ═══════════════════════════════════════════════════════════
//  ADV — DRAW HAZARD SOURCE
// ═══════════════════════════════════════════════════════════
function advDrawHazardSource(ctx, cx, cy, d) {
    const isRad = d.isRad;
    const isExp = d.hazClass === 'explosive';
    const isBio = d.hazClass === 'biological';

    if (isRad) {
        ctx.fillStyle = 'rgba(168,85,247,0.18)'; ctx.strokeStyle = 'rgba(168,85,247,0.6)'; ctx.lineWidth = 2;
        ctx.fillRect(cx - 14, cy - 12, 28, 24); ctx.strokeRect(cx - 14, cy - 12, 28, 24);
        ctx.strokeStyle = 'rgba(168,85,247,0.35)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(cx - 14, cy - 5); ctx.lineTo(cx + 14, cy - 5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx - 14, cy + 5); ctx.lineTo(cx + 14, cy + 5); ctx.stroke();
    } else if (isExp) {
        ctx.fillStyle = 'rgba(239,68,68,0.15)'; ctx.strokeStyle = 'rgba(239,68,68,0.6)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(cx, cy, 16, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.strokeStyle = 'rgba(239,68,68,0.35)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(cx, cy, 9, 0, Math.PI * 2); ctx.stroke();
    } else if (isBio) {
        ctx.fillStyle = 'rgba(16,185,129,0.15)'; ctx.strokeStyle = 'rgba(16,185,129,0.6)'; ctx.lineWidth = 2;
        ctx.fillRect(cx - 12, cy - 14, 24, 28); ctx.strokeRect(cx - 12, cy - 14, 24, 28);
        ctx.strokeStyle = 'rgba(16,185,129,0.35)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(cx - 12, cy - 5); ctx.lineTo(cx + 12, cy - 5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx - 12, cy + 5); ctx.lineTo(cx + 12, cy + 5); ctx.stroke();
    } else {
        ctx.fillStyle = 'rgba(239,68,68,0.12)'; ctx.strokeStyle = 'rgba(239,68,68,0.6)'; ctx.lineWidth = 2;
        ctx.fillRect(cx - 10, cy - 14, 20, 28); ctx.strokeRect(cx - 10, cy - 14, 20, 28);
        ctx.strokeStyle = 'rgba(239,68,68,0.35)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(cx - 10, cy - 7); ctx.lineTo(cx + 10, cy - 7); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx - 10, cy + 7); ctx.lineTo(cx + 10, cy + 7); ctx.stroke();
        ctx.globalAlpha = 0.15; ctx.fillStyle = '#ef4444';
        ctx.beginPath(); ctx.ellipse(cx + 5, cy + 22, 20, 7, 0, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
    }
    ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2);
    ctx.fillStyle = isRad ? '#a855f7' : '#ef4444'; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5; ctx.stroke();
}


// ═══════════════════════════════════════════════════════════
//  ADV — TACTICAL DIAGRAM DRAW
// ═══════════════════════════════════════════════════════════
function drawAdvDiagram() {
    if (!advDiagramData) return;
    const canvas = document.getElementById('advTacCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const d = advDiagramData;

    const W = 1400, H = 1000;
    canvas.width = W; canvas.height = H;

    const windFromDeg  = d.windDeg !== undefined ? d.windDeg : 225;
    const upwindRad    = (windFromDeg - 90) * Math.PI / 180;
    const crosswindRad = upwindRad + Math.PI / 2;

    const hotFt  = advParseIsoFt(d.initialIsolation) || 200;
    const warmFt = hotFt * 2.5;
    const scale  = (Math.min(W, H) * 0.26) / warmFt;
    const hotR   = Math.max(hotFt * scale, 80);
    const warmR  = Math.max(warmFt * scale, hotR * 1.8);
    const coldR  = warmR * 1.55;
    const cx = W * 0.48, cy = H * 0.42;

    // Background + grid
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(0,0,0,0.04)'; ctx.lineWidth = 0.5;
    for (let x = 0; x < W; x += 50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = 0; y < H; y += 50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    // Scale bar
    ctx.strokeStyle = '#999'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(20, H-40); ctx.lineTo(20+hotR, H-40); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(20, H-46); ctx.lineTo(20, H-34); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(20+hotR, H-46); ctx.lineTo(20+hotR, H-34); ctx.stroke();
    ctx.font = '600 13px Barlow Condensed, sans-serif'; ctx.fillStyle = '#666'; ctx.textAlign = 'center';
    ctx.fillText(hotFt + ' ft', 20 + hotR/2, H-50);

    // Plume cone
    const plumeAngle = 35 * Math.PI / 180;
    const windDirRad  = (windFromDeg + 180 - 90) * Math.PI / 180;
    const plumeLen    = Math.min(W,H) * 0.44;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(windDirRad - plumeAngle) * plumeLen, cy + Math.sin(windDirRad - plumeAngle) * plumeLen);
    ctx.lineTo(cx + Math.cos(windDirRad + plumeAngle) * plumeLen, cy + Math.sin(windDirRad + plumeAngle) * plumeLen);
    ctx.closePath();
    ctx.fillStyle = d.isRad ? 'rgba(168,85,247,0.06)' : 'rgba(239,68,68,0.06)'; ctx.fill();
    ctx.strokeStyle = d.isRad ? 'rgba(168,85,247,0.2)' : 'rgba(239,68,68,0.2)';
    ctx.lineWidth = 1; ctx.setLineDash([8,5]); ctx.stroke(); ctx.setLineDash([]);

    // Zones
    ctx.beginPath(); ctx.arc(cx,cy,coldR,0,Math.PI*2);
    ctx.fillStyle='rgba(34,197,94,0.05)'; ctx.fill();
    ctx.strokeStyle='rgba(34,197,94,0.45)'; ctx.lineWidth=2.5; ctx.setLineDash([14,10]); ctx.stroke(); ctx.setLineDash([]);

    ctx.beginPath(); ctx.arc(cx,cy,warmR,0,Math.PI*2);
    ctx.fillStyle='rgba(245,158,11,0.05)'; ctx.fill();
    ctx.strokeStyle='rgba(245,158,11,0.55)'; ctx.lineWidth=2.5; ctx.setLineDash([12,8]); ctx.stroke(); ctx.setLineDash([]);

    ctx.beginPath(); ctx.arc(cx,cy,hotR,0,Math.PI*2);
    ctx.fillStyle = d.isRad ? 'rgba(168,85,247,0.08)' : 'rgba(239,68,68,0.06)'; ctx.fill();
    ctx.strokeStyle = d.isRad ? 'rgba(168,85,247,0.65)' : 'rgba(239,68,68,0.65)';
    ctx.lineWidth=3; ctx.setLineDash([10,5]); ctx.stroke(); ctx.setLineDash([]);

    // Environment structure
    var envInfo = advEnvFeatures[d.envKey] || { shape:'rect', label:'INCIDENT\nSCENE', doors:[] };
    advDrawStructure(ctx, cx, cy, hotR, envInfo);

    // Hazard source
    advDrawHazardSource(ctx, cx, cy, d);

    // Zone labels
    function zLbl(x, y, text, color) {
        ctx.font = '700 11px Barlow Condensed, sans-serif'; ctx.textAlign = 'center';
        var tw = ctx.measureText(text).width + 14;
        ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fillRect(x-tw/2, y-9, tw, 18);
        ctx.strokeStyle=color; ctx.lineWidth=1; ctx.strokeRect(x-tw/2, y-9, tw, 18);
        ctx.fillStyle=color; ctx.fillText(text, x, y+4);
    }
    var lblRad = upwindRad + Math.PI;
    zLbl(cx+Math.cos(lblRad)*hotR*0.65,  cy+Math.sin(lblRad)*hotR*0.65,  'HOT ZONE',  d.isRad?'rgba(168,85,247,0.9)':'rgba(239,68,68,0.9)');
    zLbl(cx+Math.cos(lblRad)*warmR*0.8,  cy+Math.sin(lblRad)*warmR*0.8,  'WARM ZONE', 'rgba(202,138,4,0.9)');
    zLbl(cx+Math.cos(lblRad)*coldR*0.88, cy+Math.sin(lblRad)*coldR*0.88, 'COLD ZONE', 'rgba(22,163,74,0.9)');

    // Decon corridor
    var deconDist  = (hotR + warmR) / 2;
    var deconCross = (warmR - hotR) * 0.3;
    var deconX = cx + Math.cos(upwindRad)*deconDist + Math.cos(crosswindRad)*deconCross;
    var deconY = cy + Math.sin(upwindRad)*deconDist + Math.sin(crosswindRad)*deconCross;
    ctx.save(); ctx.translate(deconX, deconY); ctx.rotate(crosswindRad);
    ctx.fillStyle='rgba(6,182,212,0.1)'; ctx.strokeStyle='#06b6d4'; ctx.lineWidth=2; ctx.setLineDash([4,3]);
    ctx.fillRect(-40,-17,80,34); ctx.strokeRect(-40,-17,80,34); ctx.setLineDash([]);
    ctx.strokeStyle='rgba(6,182,212,0.4)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    for (var s=-30; s<40; s+=14) { ctx.beginPath(); ctx.moveTo(s,-17); ctx.lineTo(s,17); ctx.stroke(); }
    ctx.setLineDash([]); ctx.restore();
    zLbl(deconX, deconY-22, 'DECON', '#06b6d4');

    // Arrow hot → decon
    var ahx=cx+Math.cos(upwindRad)*hotR, ahy=cy+Math.sin(upwindRad)*hotR;
    ctx.beginPath(); ctx.moveTo(ahx,ahy); ctx.lineTo(deconX-Math.cos(upwindRad)*20, deconY-Math.sin(upwindRad)*20);
    ctx.strokeStyle='rgba(6,182,212,0.3)'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);

    // Entry Control Point
    var ecpX=cx+Math.cos(upwindRad)*(hotR+12), ecpY=cy+Math.sin(upwindRad)*(hotR+12);
    ctx.beginPath(); ctx.arc(ecpX,ecpY,16,0,Math.PI*2);
    ctx.fillStyle='#a855f7'; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
    ctx.font='700 15px Barlow Condensed, sans-serif'; ctx.fillStyle='#fff'; ctx.textAlign='center';
    ctx.fillText('E',ecpX,ecpY+6);

    // Command Post
    var cpDist=coldR+coldR*0.25, cpX=cx+Math.cos(upwindRad)*cpDist, cpY=cy+Math.sin(upwindRad)*cpDist;
    ctx.fillStyle='#16a34a'; ctx.fillRect(cpX-24,cpY-24,48,48);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(cpX-24,cpY-24,48,48);
    ctx.font='700 18px Barlow Condensed, sans-serif'; ctx.fillStyle='#fff'; ctx.textAlign='center';
    ctx.fillText('CP',cpX,cpY+7);
    advDrawVehicle(ctx, cpX+52, cpY, upwindRad, '#16a34a', 'CMD');

    // EMS
    var emsDist=coldR+coldR*0.2, emsCross=coldR*0.45;
    var emsX=cx+Math.cos(upwindRad)*emsDist-Math.cos(crosswindRad)*emsCross;
    var emsY=cy+Math.sin(upwindRad)*emsDist-Math.sin(crosswindRad)*emsCross;
    ctx.beginPath(); ctx.arc(emsX,emsY,18,0,Math.PI*2);
    ctx.fillStyle='#e11d48'; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
    ctx.font='700 22px Barlow, sans-serif'; ctx.fillStyle='#fff'; ctx.textAlign='center';
    ctx.fillText('+',emsX,emsY+8);
    advDrawVehicle(ctx, emsX+44, emsY, upwindRad+0.3, '#e11d48', 'ALS');

    // Staging
    var stageDist=warmR+(coldR-warmR)*0.5, stageCross=(coldR-warmR)*0.6;
    var stageX=cx+Math.cos(upwindRad)*stageDist+Math.cos(crosswindRad)*stageCross;
    var stageY=cy+Math.sin(upwindRad)*stageDist+Math.sin(crosswindRad)*stageCross;
    ctx.fillStyle='rgba(59,130,246,0.06)'; ctx.strokeStyle='rgba(59,130,246,0.45)';
    ctx.lineWidth=2; ctx.setLineDash([8,5]);
    ctx.fillRect(stageX-70,stageY-50,140,100); ctx.strokeRect(stageX-70,stageY-50,140,100); ctx.setLineDash([]);
    ctx.font='700 28px Barlow Condensed, sans-serif'; ctx.fillStyle='rgba(59,130,246,0.2)'; ctx.textAlign='center';
    ctx.fillText('S',stageX,stageY-16);
    advDrawVehicle(ctx,stageX-32,stageY+12,0,'#3b82f6','E1');
    advDrawVehicle(ctx,stageX+32,stageY+12,0,'#3b82f6','E2');
    advDrawVehicle(ctx,stageX,stageY+34,0,'#d97706','HZ');

    // Wind arrow
    var wEdge=Math.min(W,H)*0.42;
    var waX=cx+Math.cos(upwindRad)*wEdge, waY=cy+Math.sin(upwindRad)*wEdge;
    var wToRad=upwindRad+Math.PI, aLen=65;
    var waEX=waX+Math.cos(wToRad)*aLen, waEY=waY+Math.sin(wToRad)*aLen;
    ctx.beginPath(); ctx.moveTo(waX,waY); ctx.lineTo(waEX,waEY);
    ctx.strokeStyle='#1d4ed8'; ctx.lineWidth=5; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(waEX,waEY);
    ctx.lineTo(waEX-Math.cos(wToRad-0.45)*18, waEY-Math.sin(wToRad-0.45)*18);
    ctx.lineTo(waEX-Math.cos(wToRad+0.45)*18, waEY-Math.sin(wToRad+0.45)*18);
    ctx.closePath(); ctx.fillStyle='#1d4ed8'; ctx.fill();
    ctx.font='700 12px Barlow Condensed, sans-serif'; ctx.fillStyle='#1d4ed8'; ctx.textAlign='center';
    ctx.fillText('WIND', waX+Math.cos(upwindRad+Math.PI/2)*26, waY+Math.sin(upwindRad+Math.PI/2)*26);

    // Title block
    ctx.fillStyle='#f8fafc'; ctx.fillRect(0,0,480,92);
    ctx.strokeStyle='#d1d5db'; ctx.lineWidth=1; ctx.strokeRect(0,0,480,92);
    ctx.font='700 20px Barlow Condensed, sans-serif'; ctx.fillStyle='#111'; ctx.textAlign='left';
    ctx.fillText('TACTICAL SITE DIAGRAM \u2014 ADVANCED',14,28);
    ctx.font='500 14px Barlow, sans-serif'; ctx.fillStyle='#555';
    ctx.fillText(String(d.hazardLabel||'Hazmat Incident').substring(0,55)+' \u2014 '+(d.envLabel||''),14,48);
    ctx.fillText('Isolation: '+(d.initialIsolation||'See ERG')+'  |  Downwind PAZ: '+(d.downwind||'N/A'),14,66);
    ctx.font='600 13px Barlow, sans-serif'; ctx.fillStyle='#1d4ed8';
    ctx.fillText('WIND: '+(d.windLabel||'Variable'),14,82);

    // Compass rose
    var compX=W-55, compY=55;
    ctx.beginPath(); ctx.arc(compX,compY,30,0,Math.PI*2);
    ctx.fillStyle='#f1f5f9'; ctx.fill(); ctx.strokeStyle='#94a3b8'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(compX,compY); ctx.lineTo(compX,compY-22);
    ctx.strokeStyle='#dc2626'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(compX,compY); ctx.lineTo(compX,compY+18);
    ctx.strokeStyle='#94a3b8'; ctx.lineWidth=2; ctx.stroke();
    ctx.font='700 17px Barlow Condensed, sans-serif'; ctx.fillStyle='#dc2626'; ctx.textAlign='center';
    ctx.fillText('N',compX,compY-8);
    ctx.font='500 11px Barlow Condensed, sans-serif'; ctx.fillStyle='#64748b';
    ctx.fillText('S',compX,compY+20); ctx.fillText('E',compX+18,compY+5); ctx.fillText('W',compX-18,compY+5);

    // Legend
    var lgX=W-280, lgY=H-228;
    ctx.fillStyle='rgba(248,250,252,0.95)'; ctx.fillRect(lgX-12,lgY-12,272,218);
    ctx.strokeStyle='#d1d5db'; ctx.lineWidth=1; ctx.strokeRect(lgX-12,lgY-12,272,218);
    ctx.font='700 12px Barlow Condensed, sans-serif'; ctx.fillStyle='#374151'; ctx.textAlign='left';
    ctx.fillText('LEGEND',lgX,lgY+4);
    var lgItems=[
        {sym:'●',color:d.isRad?'#a855f7':'#dc2626',text:'Source / Release Point'},
        {sym:'\u2501',color:d.isRad?'rgba(168,85,247,0.8)':'rgba(239,68,68,0.8)',text:'Hot Zone boundary'},
        {sym:'- -',color:'rgba(202,138,4,0.9)',text:'Warm Zone boundary'},
        {sym:'\u00b7\u00b7\u00b7',color:'rgba(22,163,74,0.7)',text:'Cold Zone / Outer Perimeter'},
        {sym:'CP',color:'#16a34a',text:'Command Post (upwind)'},
        {sym:'+', color:'#e11d48',text:'EMS / Medical Staging'},
        {sym:'E', color:'#a855f7',text:'Entry Control Point'},
        {sym:'\u2261',color:'#06b6d4',text:'Decon Corridor'},
        {sym:'S', color:'#3b82f6',text:'Staging Area'},
        {sym:'\u2192',color:'#1d4ed8',text:'Wind Direction'}
    ];
    lgItems.forEach(function(item,i) {
        var iy=lgY+22+i*19;
        ctx.font='700 13px Barlow Condensed, sans-serif'; ctx.fillStyle=item.color; ctx.textAlign='left';
        ctx.fillText(item.sym,lgX,iy);
        ctx.font='400 12px Barlow, sans-serif'; ctx.fillStyle='#374151';
        ctx.fillText(item.text,lgX+30,iy);
    });
}

function getRecommendedEquipmentHTML(cat, hazard) {
    const catData = recommendedEquipmentData[cat] || recommendedEquipmentData['chemical'];
    let items = [...catData.default];
    let matchedKeyword = null;

    if (catData.keywords && hazard) {
        const hazLower = hazard.toLowerCase();
        for (const [kw, kwItems] of Object.entries(catData.keywords)) {
            if (hazLower.includes(kw)) {
                items = kwItems;
                matchedKeyword = kw;
                break;
            }
        }
    }

    const listItems = items.map(i =>
        `<li style="margin-bottom:5px; color:var(--text); font-size:0.875rem;">${i}</li>`
    ).join('');

    const subtitle = matchedKeyword
        ? `Recommended for: <strong style="color:var(--accent-cyan);">${hazard.split('—')[0].trim()}</strong>`
        : `Recommended for <strong style="color:var(--accent-cyan);">${(cat.charAt(0).toUpperCase()+cat.slice(1))} hazards</strong> — verify against your AHJ's SOGs`;

    return `<div style="margin-bottom:18px; padding:14px 16px; background:rgba(6,182,212,0.06); border:1px solid rgba(6,182,212,0.28); border-left:3px solid var(--accent-cyan); border-radius:4px;">
        <div style="font-family:'Rajdhani',sans-serif; font-size:0.75rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--accent-cyan); margin-bottom:6px;">📋 Recommended Equipment for This Hazard</div>
        <div style="font-size:0.78rem; color:var(--text-muted); margin-bottom:10px;">${subtitle}</div>
        <ul style="padding-left:18px; margin:0; line-height:1.7;">
            ${listItems}
        </ul>
        <div style="margin-top:8px; font-size:0.72rem; color:var(--text-dim); font-style:italic;">This list is advisory. Deploy only equipment your team is trained and competent on (NFPA 1500 principle). Equipment listed may not be available on all apparatus.</div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  PDF DOWNLOAD  — clean print clone + smart page breaks
// ═══════════════════════════════════════════════════════════
async function downloadScenarioPDF() {
    const btn      = document.getElementById('downloadBtn');
    const btn2     = document.getElementById('downloadBtnBottom');
    const origText = '⬇️ Download as PDF';

    btn.textContent = '⏳ Building PDF…';
    btn.disabled    = true;
    if (btn2) { btn2.textContent = '⏳ Building PDF…'; btn2.disabled = true; }

    const WRAP_W = 860; // px — matches a comfortable letter-width render

    try {
        // ── 1. Build an offscreen white print clone ──────────────
        const source    = document.getElementById('drillOutput');
        const printWrap = document.createElement('div');
        printWrap.id    = '__pdf_wrap';
        printWrap.style.cssText =
            `position:absolute;left:-9999px;top:0;width:${WRAP_W}px;` +
            `background:#fff;padding:28px 36px;box-sizing:border-box;` +
            `font-family:'Source Sans 3',sans-serif;color:#111;`;

        const clone   = source.cloneNode(true);
        const styleEl = document.createElement('style');
        styleEl.textContent = getPrintStyles();

        printWrap.appendChild(clone);
        printWrap.appendChild(styleEl);
        document.body.appendChild(printWrap);

        // Two rAF cycles so the browser applies styles before capture
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

        // ── 2. Collect section top/bottom positions for page breaks ──
        // All values in DOM pixels (1x) — we multiply by scale later
        const breakPoints = new Set([0]);
        const selectors   = [
            '.drill-title-block', '.drill-subtitle',
            '.drill-section',
            '.sig-block', '.drill-disclaimer'
        ];
        selectors.forEach(sel => {
            printWrap.querySelectorAll(sel).forEach(el => {
                breakPoints.add(el.offsetTop);
                breakPoints.add(el.offsetTop + el.offsetHeight);
            });
        });
        const sortedBreaks = Array.from(breakPoints).sort((a, b) => a - b);

        // ── 3. Capture the clone ─────────────────────────────────
        const SCALE = 2;
        const canvas = await window.html2canvas(printWrap, {
            scale:           SCALE,
            useCORS:         true,
            logging:         false,
            backgroundColor: '#ffffff',
            width:           WRAP_W,
            scrollX:         0,
            scrollY:         0
        });

        document.body.removeChild(printWrap);

        // ── 4. Build PDF with section-aware page breaks ──────────
        const { jsPDF }  = window.jspdf;
        const pdf        = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'letter' });
        const pageW      = pdf.internal.pageSize.getWidth();   // 215.9 mm
        const pageH      = pdf.internal.pageSize.getHeight();  // 279.4 mm
        const mTop       = 13;   // mm
        const mBottom    = 16;
        const mSide      = 12;
        const usableW    = pageW - mSide * 2;   // ≈ 191.9 mm
        const usableH    = pageH - mTop - mBottom; // ≈ 253.4 mm
        const pxPerMM    = (WRAP_W * SCALE) / usableW;         // canvas px per mm
        const pageHeightPx = usableH * pxPerMM;                // canvas px per page
        const totalPx    = canvas.height;

        // Convert DOM-pixel break list → canvas pixels
        const breaksPx = sortedBreaks.map(b => b * SCALE);

        // Page footer helper — two-line layout to prevent overlap
        function addPageFooter(pdf, pageNum, totalPages, docTitle) {
            const ruleY  = pageH - mBottom + 2;
            const line1Y = pageH - mBottom + 6;
            const line2Y = pageH - mBottom + 10;

            pdf.setDrawColor(180, 180, 180);
            pdf.setLineWidth(0.3);
            pdf.line(mSide, ruleY, pageW - mSide, ruleY);

            // Line 1: Brand left | Page right
            const shortTitle = docTitle.length > 55 ? docTitle.substring(0, 52) + '…' : docTitle;
            pdf.setFontSize(7.5);
            pdf.setTextColor(80, 80, 80);
            pdf.text('HAZMAT TACTICAL — ' + shortTitle, mSide, line1Y);
            pdf.text('Page ' + pageNum + ' of ' + totalPages, pageW - mSide, line1Y, { align: 'right' });

            // Line 2: Training disclaimer centered
            pdf.setFontSize(6.5);
            pdf.setTextColor(140, 140, 140);
            pdf.text('For Training Use Only — Not for Field Operations', pageW / 2, line2Y, { align: 'center' });
        }

        // First pass: determine page break positions
        const pageStarts = [0];
        let cursor = 0;
        while (cursor < totalPx) {
            const naturalCut = cursor + pageHeightPx;
            if (naturalCut >= totalPx) break;

            // Find the nearest section boundary within ±8% of page height above the natural cut
            // Prefer breaking BEFORE a section (clean gap) rather than inside one
            const tolerance = pageHeightPx * 0.10;
            let bestBreak = naturalCut;
            let bestDist  = Infinity;

            breaksPx.forEach(bp => {
                if (bp <= cursor + pageHeightPx * 0.5) return; // must be in the lower half of page
                if (bp > naturalCut + tolerance)       return; // too far ahead
                const dist = Math.abs(bp - naturalCut);
                if (dist < bestDist) { bestDist = dist; bestBreak = bp; }
            });

            // Never advance backward or stay in place
            if (bestBreak <= cursor) bestBreak = naturalCut;
            pageStarts.push(Math.round(bestBreak));
            cursor = Math.round(bestBreak);
        }
        const totalPages = pageStarts.length;

        // Build title string for footer
        const hazardVal = document.getElementById('specificHazard').value || 'Advanced Drill';
        const catVal    = document.getElementById('hazardCategory').value || 'Hazmat';
        const docTitle  = (catVal.charAt(0).toUpperCase() + catVal.slice(1)) + ' — ' +
                          hazardVal.split('—')[0].trim().substring(0, 50);

        // Second pass: render pages
        pageStarts.forEach((pageStart, idx) => {
            if (idx > 0) pdf.addPage();

            const nextStart = pageStarts[idx + 1] || totalPx;
            const sliceH    = Math.min(nextStart - pageStart, totalPx - pageStart);
            if (sliceH <= 0) return;

            // Render slice onto a page-sized white canvas
            const sliceHMM   = sliceH / pxPerMM;
            const pageCanvas = document.createElement('canvas');
            pageCanvas.width  = canvas.width;
            pageCanvas.height = Math.round(pageHeightPx);
            const ctx = pageCanvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, pageCanvas.width, pageCanvas.height);
            ctx.drawImage(canvas, 0, pageStart, canvas.width, sliceH, 0, 0, canvas.width, sliceH);

            const imgData = pageCanvas.toDataURL('image/jpeg', 0.95);
            pdf.addImage(imgData, 'JPEG', mSide, mTop, usableW, Math.min(sliceHMM, usableH));

            // Footer
            addPageFooter(pdf, idx + 1, totalPages, docTitle);
        });

        // Save
        const date  = new Date().toISOString().split('T')[0];
        const fname = `HazmatTactical_${catVal}_${date}.pdf`.replace(/[^a-zA-Z0-9_\-.]/g, '_');
        pdf.save(fname);

    } catch (err) {
        alert('PDF generation failed. Use the Print button and choose "Save as PDF" in your browser\'s print dialog.');
        console.error('PDF error:', err);
    } finally {
        btn.textContent = origText;
        btn.disabled    = false;
        if (btn2) { btn2.textContent = origText; btn2.disabled = false; }
    }
}

function advDrawVehicle(ctx, x, y, angle, color, label) {
    ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
    ctx.fillStyle=color+'22'; ctx.strokeStyle=color; ctx.lineWidth=1.5;
    ctx.fillRect(-18,-8,36,16); ctx.strokeRect(-18,-8,36,16);
    ctx.fillStyle=color+'33';
    ctx.fillRect(-16,-6,10,12); ctx.strokeRect(-16,-6,10,12);
    ctx.restore();
    ctx.font='700 9px Barlow Condensed, sans-serif'; ctx.fillStyle=color; ctx.textAlign='center';
    ctx.fillText(label,x,y+22);
}

// Generate NFPA compliance from specific chapter selection
function generateNFPAFromChapter(ch, format) {
    const data = nfpaChapterData[ch];
    if (!data) return generateNFPA470('chemical', 1);

    let tags = '';
    data.sections.forEach(s => {
        tags += `<div class="nfpa-tag">${s}</div>`;
    });

    const formatNote = format === 'practical'
        ? 'Competencies assessed through direct observation of physical task performance and equipment operation.'
        : 'Competencies assessed through verbal decision-making, problem-solving, and demonstrated knowledge of procedures during facilitated discussion.';

    return {
        tags,
        description: `<strong>${data.title}:</strong> ${data.focus} ${formatNote}`
    };
}
