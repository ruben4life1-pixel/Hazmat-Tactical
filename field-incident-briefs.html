<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Incident Briefs | Operations-Level Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   DESIGN SYSTEM
═══════════════════════════════════════════════════ */
:root {
  --navy:      #060b16;
  --navy2:     #0a1020;
  --navy3:     #0f1628;
  --navy4:     #151e35;
  --navy5:     #1c2845;
  --border:    #1e2d4a;
  --border2:   #283d62;
  --amber:     #f5a623;
  --amber2:    #ffbc4a;
  --amber-dim: rgba(245,166,35,0.12);
  --red:       #c9252e;
  --red2:      #e8333d;
  --red-dim:   rgba(201,37,46,0.12);
  --green:     #1a9e5c;
  --green2:    #22c072;
  --green-dim: rgba(26,158,92,0.12);
  --text:      #d8e2f0;
  --text-dim:  #6b82a8;
  --text-muted:#374f72;

  /* difficulty */
  --basic:     #1a9e5c;
  --inter:     #d4910a;
  --adv:       #c9252e;

  /* hazard class colors */
  --hc-tg:     #b52be0;   /* toxic gas */
  --hc-fg:     #f5a623;   /* flammable gas */
  --hc-nfg:    #3b9ef5;   /* non-flammable gas */
  --hc-fl:     #e8333d;   /* flammable liquid */
  --hc-ox:     #e8b419;   /* oxidizer */
  --hc-px:     #a020c0;   /* poison */
  --hc-co:     #e85819;   /* corrosive */
  --hc-ra:     #22c072;   /* radioactive */
  --hc-wmd:    #c94a4a;   /* unknown/wmd */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--navy);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* noise texture overlay */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  background-size: 256px 256px;
  pointer-events: none;
  z-index: 0;
}

/* animated background gradient */
body::after {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 5% 15%, rgba(201,37,46,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 95% 85%, rgba(245,166,35,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 50% 50%, rgba(21,30,53,0.8) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* ═══════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════ */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(6,11,22,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.topbar-inner {
  max-width: 1600px;
  margin: 0 auto;
  padding: 0 24px;
  height: 68px;
  display: flex;
  align-items: center;
  gap: 24px;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex-shrink: 0;
}

.brand-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.35rem;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text);
  line-height: 1;
}
.brand-title span { color: var(--amber); }

.brand-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--navy);
  background: var(--amber);
  padding: 2px 7px;
  border-radius: 2px;
}

.topbar-spacer { flex: 1; }

.counter-group {
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}

.counter-pill {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}

.counter-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--amber);
  line-height: 1;
}

.counter-label {
  font-size: 0.58rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
}

.divider-v {
  width: 1px; height: 32px;
  background: var(--border);
}

/* ═══════════════════════════════════════════════════
   CONTROL PANEL
═══════════════════════════════════════════════════ */
.control-panel {
  position: sticky; top: 68px; z-index: 90;
  background: rgba(10,16,32,0.96);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 0;
}

.controls-inner {
  max-width: 1600px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}

/* search */
.search-wrap {
  position: relative;
  flex: 0 0 240px;
}

.search-icon {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 0.85rem;
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 9px 12px 9px 34px;
  background: var(--navy3);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 0.85rem;
  transition: border-color 0.2s;
}

.search-input::placeholder { color: var(--text-muted); }
.search-input:focus {
  outline: none;
  border-color: var(--amber);
  background: var(--navy4);
}

/* filter groups */
.filter-group {
  display: flex;
  align-items: center;
  gap: 4px;
}

.filter-group-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-right: 4px;
  white-space: nowrap;
}

.filter-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--navy3);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.filter-btn:hover { border-color: var(--amber); color: var(--text); }

.filter-btn.active-all    { background: rgba(255,255,255,0.08); color: var(--text); border-color: rgba(255,255,255,0.2); }
.filter-btn.active-basic  { background: var(--green-dim); color: var(--basic); border-color: rgba(26,158,92,0.4); }
.filter-btn.active-inter  { background: rgba(212,145,10,0.12); color: var(--inter); border-color: rgba(212,145,10,0.4); }
.filter-btn.active-adv    { background: var(--red-dim); color: var(--adv); border-color: rgba(201,37,46,0.4); }

.select-filter {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 7px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--navy3);
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.2s;
}

.select-filter:focus { outline: none; border-color: var(--amber); }

.reset-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 7px 14px;
  border-radius: 4px;
  border: 1px solid var(--amber);
  background: var(--amber-dim);
  color: var(--amber);
  cursor: pointer;
  margin-left: auto;
  transition: all 0.2s;
}

.reset-btn:hover { background: rgba(245,166,35,0.2); }

/* ═══════════════════════════════════════════════════
   SCENARIO GRID
═══════════════════════════════════════════════════ */
.grid-wrap {
  max-width: 1600px;
  margin: 0 auto;
  padding: 28px 24px 60px;
  position: relative;
  z-index: 1;
}

.no-results {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  display: none;
}

.scenario-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
  gap: 20px;
}

/* ═══════════════════════════════════════════════════
   SCENARIO CARD
═══════════════════════════════════════════════════ */
.sc-card {
  background: var(--navy2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: box-shadow 0.2s, border-color 0.2s;
  cursor: pointer;
}

.sc-card:hover {
  border-color: var(--border2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

.sc-card.diff-basic  { border-top: 3px solid var(--basic); }
.sc-card.diff-inter  { border-top: 3px solid var(--inter); }
.sc-card.diff-adv    { border-top: 3px solid var(--adv);   }

/* card head */
.sc-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--navy3);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.sc-id {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  flex-shrink: 0;
}

.diff-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.diff-dot.basic { background: var(--basic); }
.diff-dot.inter { background: var(--inter); }
.diff-dot.adv   { background: var(--adv);   }

.diff-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 3px;
  flex-shrink: 0;
}
.diff-badge.basic { background: var(--green-dim); color: var(--basic); border: 1px solid rgba(26,158,92,0.3); }
.diff-badge.inter { background: rgba(212,145,10,0.12); color: var(--inter); border: 1px solid rgba(212,145,10,0.3); }
.diff-badge.adv   { background: var(--red-dim); color: var(--adv); border: 1px solid rgba(201,37,46,0.3); }

.haz-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 3px;
  flex-shrink: 0;
  margin-left: auto;
}

/* hazard class badge colors */
.haz-tg  { background: rgba(181,43,224,0.15); color: #d060f0; border: 1px solid rgba(181,43,224,0.3); }
.haz-fg  { background: rgba(245,166,35,0.12); color: var(--amber); border: 1px solid rgba(245,166,35,0.3); }
.haz-nfg { background: rgba(59,158,245,0.12); color: #6db8f8; border: 1px solid rgba(59,158,245,0.3); }
.haz-fl  { background: rgba(232,51,61,0.12);  color: #f0666e; border: 1px solid rgba(232,51,61,0.3); }
.haz-ox  { background: rgba(232,180,25,0.12); color: #e8b419; border: 1px solid rgba(232,180,25,0.3); }
.haz-px  { background: rgba(160,32,192,0.15); color: #c864e0; border: 1px solid rgba(160,32,192,0.3); }
.haz-co  { background: rgba(232,88,25,0.12);  color: #f07840; border: 1px solid rgba(232,88,25,0.3); }
.haz-ra  { background: rgba(34,192,114,0.12); color: var(--green2); border: 1px solid rgba(34,192,114,0.3); }
.haz-wmd { background: rgba(201,74,74,0.15);  color: #e88888; border: 1px solid rgba(201,74,74,0.3); }

/* card title area */
.sc-title-area {
  padding: 14px 16px 10px;
}

.sc-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem;
  font-weight: 800;
  letter-spacing: 0.5px;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.sc-chem {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.sc-chem-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--amber2);
  letter-spacing: 0.3px;
}

.sc-un {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--text-muted);
  background: var(--navy4);
  padding: 2px 6px;
  border-radius: 3px;
  border: 1px solid var(--border);
  font-family: 'Barlow Condensed', sans-serif;
}

.sc-erg {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--text-muted);
  font-family: 'Barlow Condensed', sans-serif;
}

/* summary row */
.sc-summary-row {
  display: flex;
  gap: 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.sc-summary-cell {
  flex: 1;
  padding: 8px 12px;
  border-right: 1px solid var(--border);
}

.sc-summary-cell:last-child { border-right: none; }

.sc-summary-key {
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 3px;
  font-family: 'Barlow Condensed', sans-serif;
}

.sc-summary-val {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
  font-family: 'Barlow Condensed', sans-serif;
}

/* incident description */
.sc-desc {
  padding: 14px 16px;
  font-size: 0.88rem;
  line-height: 1.65;
  color: var(--text);
  border-left: 3px solid var(--amber);
  margin: 0 16px 14px;
  border-radius: 0 4px 4px 0;
  background: rgba(245,166,35,0.04);
  font-style: italic;
}

/* section blocks */
.sc-sections {
  padding: 0 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.sc-section {
  background: var(--navy3);
  border: 1px solid var(--border);
  border-radius: 5px;
  overflow: hidden;
}

.sc-section-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--navy4);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}

.sc-section-head:hover { background: var(--navy5); }

.sc-section-icon {
  font-size: 0.85rem;
  flex-shrink: 0;
  width: 18px;
  text-align: center;
}

.sc-section-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  flex: 1;
}

.sc-section-chevron {
  font-size: 0.7rem;
  color: var(--text-muted);
  transition: transform 0.2s;
  flex-shrink: 0;
}

.sc-section-body {
  padding: 10px 12px;
  display: none;
}

.sc-section.open .sc-section-body { display: block; }
.sc-section.open .sc-section-chevron { transform: rotate(180deg); }

/* field rows inside sections */
.field-row {
  display: flex;
  gap: 8px;
  margin-bottom: 7px;
}
.field-row:last-child { margin-bottom: 0; }

.field-key {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  flex-shrink: 0;
  min-width: 90px;
  padding-top: 1px;
}

.field-val {
  font-size: 0.85rem;
  color: var(--text);
  line-height: 1.5;
  flex: 1;
}

/* challenge list */
.challenge-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.challenge-item {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  font-size: 0.85rem;
  color: var(--text);
  line-height: 1.45;
}

.challenge-bullet {
  color: var(--red);
  font-weight: 900;
  flex-shrink: 0;
  margin-top: 1px;
}

/* decision points section */
.sc-section.decision .sc-section-head { background: rgba(245,166,35,0.06); border-bottom-color: rgba(245,166,35,0.2); }
.sc-section.decision .sc-section-label { color: var(--amber); }
.sc-section.decision .sc-section-icon { color: var(--amber); }

.decision-item {
  background: var(--navy4);
  border: 1px solid var(--border);
  border-left: 3px solid var(--amber);
  border-radius: 4px;
  padding: 10px 12px;
  margin-bottom: 8px;
}
.decision-item:last-child { margin-bottom: 0; }

.decision-key {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 5px;
}

.decision-val {
  font-size: 0.85rem;
  color: var(--text);
  line-height: 1.55;
  font-style: italic;
}

/* module tags */
.module-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
}

.module-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 2px;
  border: 1px solid var(--border);
  background: var(--navy3);
  color: var(--text-muted);
}

/* ═══════════════════════════════════════════════════
   MODAL (full scenario detail)
═══════════════════════════════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(3,6,14,0.88);
  backdrop-filter: blur(8px);
  z-index: 200;
  padding: 24px 16px;
  overflow-y: auto;
}

.modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

.modal-box {
  background: var(--navy2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  width: 100%;
  max-width: 800px;
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.7);
  margin: auto;
  position: relative;
}

.modal-close {
  position: absolute; top: 14px; right: 16px;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--navy4);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  z-index: 10;
}
.modal-close:hover { background: var(--red-dim); color: var(--red2); border-color: var(--red); }

.modal-content { padding: 0; }

/* ═══════════════════════════════════════════════════
   PRINT
═══════════════════════════════════════════════════ */
@media print {
  .topbar, .control-panel, .modal-overlay { display: none !important; }
  body { background: white; color: black; }
  .sc-card { break-inside: avoid; page-break-inside: avoid; border: 1px solid #ccc; }
  .sc-section-body { display: block !important; }
}

/* ═══════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════ */
@media (max-width: 768px) {
  .scenario-grid { grid-template-columns: 1fr; }
  .controls-inner { gap: 8px; }
  .search-wrap { flex: 0 0 100%; }
  .counter-group { gap: 12px; }
  .topbar-inner { flex-wrap: wrap; height: auto; padding: 10px 16px; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-title">HAZMAT <span>TACTICAL</span> — FIELD INCIDENT BRIEFS</span>
      <span class="brand-badge">OPS-LEVEL</span>
    </div>
    <div class="topbar-spacer"></div>
    <div class="counter-group">
      <div class="counter-pill">
        <div class="counter-val" id="countShown">105</div>
        <div class="counter-label">Shown</div>
      </div>
      <div class="divider-v"></div>
      <div class="counter-pill">
        <div class="counter-val" style="color:var(--basic);" id="countBasic">35</div>
        <div class="counter-label">Basic</div>
      </div>
      <div class="counter-pill">
        <div class="counter-val" style="color:var(--inter);" id="countInter">35</div>
        <div class="counter-label">Inter.</div>
      </div>
      <div class="counter-pill">

   HELPERS
══════════════════════════════════════════════════ */
function hazClass(s) { return s._haz_group || 'Unknown/WMD'; }

function hazBadgeClass(hg) {
  const map = {
    'Toxic Gas': 'haz-tg',
    'Flammable Gas': 'haz-fg',
    'Non-Flammable Gas': 'haz-nfg',
    'Flammable Liquid': 'haz-fl',
    'Oxidizer': 'haz-ox',
    'Poison/Toxic': 'haz-px',
    'Corrosive': 'haz-co',
    'Radioactive': 'haz-ra',
    'Unknown/WMD': 'haz-wmd'
  };
  return map[hg] || 'haz-wmd';
}

function getModuleTags(s) {
  const tags = new Set();
  const desc = (s.incident_description + JSON.stringify(s.key_decision_points)).toLowerCase();
  const challenges = s.operational_challenges.join(' ').toLowerCase();
  if (desc.includes('decon') || challenges.includes('decon')) tags.add('DECON');
  if (desc.includes('ppe') || challenges.includes('ppe')) tags.add('PPE');
  if (desc.includes('confined space') || desc.includes('manhole') || desc.includes('sump') || desc.includes('tank') || desc.includes('hold')) tags.add('CONFINED SPACE');
  if (desc.includes('wmd') || desc.includes('fbi') || desc.includes('intentional') || desc.includes('suspected')) tags.add('WMD');
  if (s.life_safety_factors.potential_victims && /\d{2,}/.test(s.life_safety_factors.potential_victims)) tags.add('MASS CAS');
  if (desc.includes('railroad') || desc.includes('rail') || desc.includes('train')) tags.add('RAIL');
  if (desc.includes('highway') || desc.includes('tanker') || desc.includes('mc-')) tags.add('TRANSPORT');
  if (s.difficulty === 'advanced') tags.add('ADVANCED OPS');
  if (desc.includes('shelter-in-place') || desc.includes('evacuation')) tags.add('PROTECTIVE ACTION');
  tags.add('SIZE-UP');
  tags.add('RISK ASSESS.');
  return [...tags].slice(0, 6);
}

function escH(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function hasModuleTag(s, mod) {
  if (mod === 'all') return true;
  const tags = getModuleTags(s).map(t => t.toLowerCase());
  const map = {
    decon: 'decon',
    ppe: 'ppe',
    sizeup: 'size-up',
    risk: 'risk',
    tactics: 'advanced ops',
    masscas: 'mass cas',
    confined: 'confined space',
    wmd: 'wmd'
  };
  return tags.some(t => t.includes(map[mod] || mod));
}

let activeDiff = 'all';
let activeHaz  = 'all';
let activeMod  = 'all';
let searchTerm = '';
let currentIdx = 0;
let filteredCache = [];

function setDiff(d, btn) {
  activeDiff = d;
  document.querySelectorAll('.filter-btn[data-diff]').forEach(b => {
    b.className = 'filter-btn';
  });
  if (d === 'all')           btn.classList.add('active-all');
  else if (d === 'basic')    btn.classList.add('active-basic');
  else if (d === 'intermediate') btn.classList.add('active-inter');
  else if (d === 'advanced') btn.classList.add('active-adv');
  applyFilters();
}

function applyFilters() {
  activeHaz  = document.getElementById('hazSelect').value;
  activeMod  = document.getElementById('moduleSelect').value;
  searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
  renderGrid();
}

function resetAll() {
  activeDiff = 'all';
  activeHaz  = 'all';
  activeMod  = 'all';
  searchTerm = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('hazSelect').value = 'all';
  document.getElementById('moduleSelect').value = 'all';
  document.querySelectorAll('.filter-btn[data-diff]').forEach((b,i) => {
    b.className = 'filter-btn' + (i === 0 ? ' active-all' : '');
  });
  renderGrid();
}

document.getElementById('searchInput').addEventListener('input', applyFilters);

/* ══════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════ */
function filtered() {
  return SCENARIOS.filter(s => {
    if (activeDiff !== 'all' && s.difficulty !== activeDiff) return false;
    if (activeHaz  !== 'all' && s._haz_group !== activeHaz)  return false;
    if (!hasModuleTag(s, activeMod)) return false;
    if (searchTerm) {
      const hay = (s.id + s.title + s.chemical.name + s.chemical.un_number + s.incident_description).toLowerCase();
      if (!hay.includes(searchTerm)) return false;
    }
    return true;
  });
}

function buildCard(s, expandAll) {
  const hg = s._haz_group || 'Unknown/WMD';
  const hbc = hazBadgeClass(hg);
  const diffLabel = s.difficulty === 'intermediate' ? 'Inter.' : s.difficulty.charAt(0).toUpperCase() + s.difficulty.slice(1);
  const moduleTags = getModuleTags(s);

  const challenges = s.operational_challenges.map(c =>
    `<li class="challenge-item"><span class="challenge-bullet">▸</span>${escH(c)}</li>`
  ).join('');

  const decisionKeys = {
    primary_hazard_recognition_cue:      { icon: '&#128269;', label: 'Hazard Recognition Cue' },
    initial_isolation_protective_action: { icon: '&#127987;', label: 'Isolation / Protective Action' },
    decontamination_consideration:       { icon: '&#128167;', label: 'Decontamination Trigger' },
    ppe_consideration:                   { icon: '&#9875;',   label: 'PPE Consideration' },
    defensive_tactical_consideration:    { icon: '&#9760;',   label: 'Defensive Tactical' }
  };

  const decisionItems = Object.entries(decisionKeys).map(([key, meta]) =>
    `<div class="decision-item">
      <div class="decision-key">${meta.icon} ${escH(meta.label)}</div>
      <div class="decision-val">${escH(s.key_decision_points[key] || '')}</div>
    </div>`
  ).join('');

  const tagHtml = moduleTags.map(t => `<span class="module-tag">${escH(t)}</span>`).join('');

  return `
<div class="sc-card diff-${s.difficulty}" id="card-${s.id}" onclick="openModal('${s.id}')">
  <div class="sc-head">
    <span class="sc-id">${escH(s.id)}</span>
    <span class="diff-dot ${s.difficulty}"></span>
    <span class="diff-badge ${s.difficulty}">${escH(diffLabel)}</span>
    <span class="haz-badge ${hbc}">${escH(hg)}</span>
  </div>

  <div class="sc-title-area">

function renderGrid() {
  const items = filtered();
  filteredCache = items;
  // Reset to first card whenever filters change
  currentIdx = 0;

  const grid   = document.getElementById('scenarioGrid');
  const none   = document.getElementById('noResults');
  const pagerT = document.getElementById('pagerBar');
  const pagerB = document.getElementById('pagerBarBottom');

  if (items.length === 0) {
    grid.innerHTML = '';
    none.style.display = 'block';
    pagerT.style.display = 'none';
    pagerB.style.display = 'none';
  } else {
    none.style.display = 'none';
    pagerT.style.display = 'flex';
    pagerB.style.display = 'flex';
    renderCard();
  }

  // Update counters
  const shown  = items.length;
  const basics = items.filter(s => s.difficulty === 'basic').length;
  const inters = items.filter(s => s.difficulty === 'intermediate').length;
  const advs   = items.filter(s => s.difficulty === 'advanced').length;
  document.getElementById('countShown').textContent = shown;
  document.getElementById('countBasic').textContent = basics;
  document.getElementById('countInter').textContent = inters;
  document.getElementById('countAdv').textContent   = advs;
}

function renderCard() {
  const items = filteredCache;
  const total = items.length;
  const grid  = document.getElementById('scenarioGrid');

  grid.innerHTML = buildCard(items[currentIdx]);

  // Pager labels
  document.getElementById('pagerCurrent').textContent  = currentIdx + 1;
  document.getElementById('pagerTotal').textContent    = total;
  document.getElementById('pagerCurrentB').textContent = currentIdx + 1;
  document.getElementById('pagerTotalB').textContent   = total;

  // Button states
  const atFirst = currentIdx === 0;
  const atLast  = currentIdx === total - 1;
  document.getElementById('btnPrev').disabled  = atFirst;
  document.getElementById('btnPrevB').disabled = atFirst;
  document.getElementById('btnNext').disabled  = atLast;
  document.getElementById('btnNextB').disabled = atLast;

  // Scroll to top of card
  document.getElementById('scenarioGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function prevCard() {
  if (currentIdx > 0) { currentIdx--; renderCard(); }
}

function nextCard() {
  if (currentIdx < filteredCache.length - 1) { currentIdx++; renderCard(); }
}

function toggleSection(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

/* ══════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════ */
function openModal(id) {
  const s = SCENARIOS.find(x => x.id === id);
  if (!s) return;
  document.getElementById('modalContent').innerHTML = buildCard(s, true);
  // open all sections in modal
  ['phys','exp','env','ls','res','chal','dec'].forEach(k => {
    const el = document.getElementById(`sec-${k}-${id}`);
    if (el) el.classList.add('open');
  });
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});

/* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
renderGrid();
</script>
