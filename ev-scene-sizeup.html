  {cat:'Post-Incident Decontamination',skill:'EV-Specific Decon Planning',refs:[R.osha_gas,R.teex_conc],
   q:'Following suppression of an EV fire, what is the correct decontamination consideration for the suppression crew?',
   ans:[
    {text:'Gross decon with water. Remove structural gear before re-entering apparatus. Document all personnel for exposure records. Isolate gear for thorough cleaning — EV fire residue contains toxic metal compounds and electrolyte decomposition products.',correct:true},
    {text:'Standard gross decon with water — same as any structural fire. No additional steps needed.',correct:false,trap:'EV fire residue includes lithium compounds, cobalt compounds, and electrolyte decomposition products. These are not equivalent to standard combustion products.'},
    {text:'No decon needed — SCBA use prevented all exposure.',correct:false,trap:'SCBA prevents respiratory exposure. Exterior gear surfaces carry contaminants. External decon is required regardless of SCBA use.'},
    {text:'Level A decon procedures for all personnel after every EV fire suppression.',correct:false,trap:'Level A decon procedures exceed what is required following EV fire suppression with structural gear. Thorough gross decon and gear isolation are appropriate.'}
   ],sources:[SRC.oshaLiIon,SRC.teexEmissions]},
  {cat:'Transit Bus Electrical Hazard',skill:'Voltage-Level PPE Assessment',refs:[R.faa_chem],
   q:'Tech-level crew approaching a fully involved transit bus pack at 600–750V. What PPE limitation exists with standard structural gear at this voltage?',
   ans:[
    {text:'Standard structural PPE provides no tested electrical protection at transit bus system voltages. Electrical contact must be avoided. High-voltage rated equipment must be used by qualified personnel for any electrical operations.',correct:true},
    {text:'Standard structural gloves are rated for transit bus system voltage.',correct:false,trap:'Standard structural gloves are not tested or rated for 600–750V DC electrical protection.'},
    {text:'Transit bus voltage is within safe handling range for structural firefighting gloves.',correct:false,trap:'This is incorrect and hazardous. 600–750V DC is not within safe handling range for standard structural gloves.'},
    {text:'Level A chemical protection suits provide adequate electrical protection.',correct:false,trap:'Level A suits are not electrical protection equipment. Electrical protection requires specifically rated equipment operated by qualified personnel.'}
   ],sources:[SRC.faaVent,SRC.nfpaAFV]},
  {cat:'SCBA Entry into Confirmed Atmosphere',skill:'IDLH Entry Decision',refs:[R.niosh_idlh,R.teex_conc],
   q:'Entry into a parking structure with confirmed HCN — monitoring at the entrance shows 12 ppm. NIOSH IDLH for HCN is 50 ppm. Entry decision?',
   ans:[
    {text:'Entry with full SCBA and backup team in place. Entrance readings of 12 ppm mean interior concentrations are at least 12 ppm and likely significantly higher.',correct:true},
    {text:'Entry approved — 12 ppm is below IDLH.',correct:false,trap:'Below IDLH does not mean safe entry without SCBA. IDLH defines immediately dangerous to life and health — it is not an entry permission level. Interior concentrations are higher than entrance readings.'},
    {text:'Entry denied until concentration is below 1 ppm.',correct:false,trap:'1 ppm is not a recognized ops or tech entry threshold. SCBA allows entry into IDLH atmospheres when the tactical objective justifies it.'},
    {text:'APR with HCN cartridge is acceptable at 12 ppm.',correct:false,trap:'APR is not appropriate for IDLH-proximate atmospheres. SCBA with positive pressure is required regardless of specific concentrations.'}
   ],sources:[SRC.niosh,SRC.teexEmissions]},
  {cat:'HF Systemic Toxicity',skill:'Medical Emergency Recognition',refs:[R.niosh_idlh],
   q:'A crew member experienced significant HF skin contact during EV fire suppression. What is the specific medical priority beyond standard decontamination?',
   ans:[
    {text:'Immediate calcium gluconate gel application to exposed areas. Emergent transport — systemic hypocalcemia from fluoride ion penetration is life-threatening and progresses even after apparent decon.',correct:true},
    {text:'Standard burn treatment — HF causes contact burns like other acids.',correct:false,trap:'HF is a systemic toxin, not just a contact irritant. It depletes calcium systemically causing hypocalcemia and can cause fatal cardiac arrhythmia. Calcium gluconate is the antidote — standard burn care is inadequate.'},
    {text:'HF burns appear mild — standard wound care and observation is sufficient.',correct:false,trap:'HF burns may appear mild initially while systemic fluoride toxicity progresses. Delayed recognition of HF systemic toxicity is a documented cause of death in HF exposure cases.'},
    {text:'SCBA use eliminates HF exposure entirely — no specific medical treatment is needed.',correct:false,trap:'SCBA prevents respiratory exposure but not dermal exposure. HF at high concentrations penetrates structural gear and causes systemic toxicity through skin absorption.'}
   ],sources:[SRC.niosh]},
  {cat:'BESS Post-Incident Exposure Documentation',skill:'Occupational Health Protocol',refs:[R.teex_conc,R.osha_gas],
   q:'A BESS facility fire involved confirmed cobalt oxide and lithium compound off-gas. What post-incident medical monitoring is appropriate?',
   ans:[
    {text:'Document all hot zone personnel. Initiate exposure records including air monitoring data. Coordinate with occupational health for cobalt-specific follow-up.',correct:true},
    {text:'Standard post-fire medical evaluation — BESS adds no specific consideration beyond structural fire.',correct:false,trap:'Cobalt compounds and lithium compounds are distinct from standard combustion products. Cobalt oxide is classified as a potential carcinogen. Documented exposure warrants specific follow-up.'},
    {text:'Medical monitoring only if personnel reported symptoms during the incident.',correct:false,trap:'Asymptomatic exposure to potential carcinogens still warrants documentation and follow-up. Absence of immediate symptoms does not eliminate long-term risk.'},
    {text:'SCBA use eliminates all exposure risk — no post-incident monitoring is needed.',correct:false,trap:'SCBA prevents respiratory exposure during the incident. Dermal exposure and post-doff contact with contaminated gear are also exposure pathways that require documentation.'}
   ],sources:[SRC.teexEmissions,SRC.oshaLiIon]},
  {cat:'Extended Operations SCBA Management',skill:'Resource Planning',refs:[R.nfpa_scba],
   q:'Tech-level crews planning extended operations (2+ hours) at an EV salvage yard fire. What specific SCBA consideration applies?',
   ans:[
    {text:'Plan SCBA bottle rotation with defined rehab intervals. Confirm bottle pressure before every re-entry. Document cumulative exposure at each rehab cycle for post-incident reporting.',correct:true},
    {text:'Standard bottle exchange as needed — no additional planning required for extended operations.',correct:false,trap:'Extended EV operations require structured bottle management with defined rehab cycles and exposure tracking — not ad hoc bottle changes.'},
    {text:'Extended SCBA use beyond the first hour requires switching to APR to conserve cylinders.',correct:false,trap:'APR is not appropriate for active EV fire atmospheres regardless of duration. Extended operations require logistics planning, not a shift to APR.'},
    {text:'Rotate crews every 30 minutes regardless of bottle pressure.',correct:false,trap:'30-minute rotation may be appropriate but is incomplete without pressure tracking, cumulative exposure documentation, and defined rehab protocol.'}
   ],sources:[SRC.nfpaAFV]},
  {cat:'SCBA Face Seal Criticality',skill:'Equipment Verification Protocol',refs:[R.niosh_idlh,R.teex_conc],
   q:'What is the specific reason a complete SCBA face seal check is more critical in an HF atmosphere than a standard fire atmosphere?',
   ans:[
    {text:'HF absorbs through facial tissue and mucous membranes from even minor seal leaks, causing rapid systemic fluoride absorption. Any seal compromise allows direct HF contact with high-absorption tissue.',correct:true},
    {text:'No additional reason — the face seal check is equally critical for all atmosphere types.',correct:false,trap:'While seal checks are always required, HF specifically has high absorption through facial mucous membranes. Even very small seal leaks that would be tolerable in a standard smoke atmosphere become significant in an HF-containing atmosphere.'},
    {text:'Seal check is not required for structural firefighting SCBA entries.',correct:false,trap:'Seal check is mandatory for all SCBA entries. This is a basic requirement, not optional.'},
    {text:'Visual inspection of the facepiece is sufficient confirmation of seal for EV entry.',correct:false,trap:'Visual inspection does not confirm seal integrity. Positive and negative pressure checks are required and are the only reliable field confirmation.'}
   ],sources:[SRC.niosh,SRC.teexEmissions]}
]},
supp:{ops:[
  {cat:'Water Goal Clarification',skill:'Tactical Application',refs:[R.erg_water,R.erg_water_goal],
   q:'Your IC asks how much water will stop the internal thermal runaway chain reaction. What is your answer?',
   ans:[
    {text:'Water cannot stop an established internal thermal runaway. No volume halts the internal reaction. Water manages external fire, cools exposures, and slows heat transfer to adjacent cells.',correct:true},
    {text:'10,000–30,000 gallons applied directly to the pack area will halt the reaction.',correct:false,trap:'No volume of water halts an established internal thermal runaway. The reaction is self-sustaining and internally sealed. This misconception has led to underestimation of incident duration and resource needs.'},
    {text:'500 gallons of Class A foam will extinguish the reaction faster than water.',correct:false,trap:'Class A foam has no effect on the internal thermal runaway reaction. Foam may assist with exposure protection but does not address internal cell chemistry.'},
    {text:'Dry chemical stops thermal runaway more quickly than water by smothering the reaction.',correct:false,trap:'Dry chemical has no effect on thermal runaway. It may briefly knock down external flame while the internal reaction continues completely unaffected.'}
   ],sources:[SRC.erg147]},
  {cat:'Rural Water Supply',skill:'Water Supply Logistics',refs:[R.erg_water],
   q:'Rural highway, no hydrant within 1 mile. A mid-size EV sedan is fully involved. Your tanker holds 3,000 gallons. First tactical priority?',
   ans:[
    {text:'Establish a tanker shuttle for sustained water supply. Prioritize exposure protection. Manage water supply before committing to direct attack volumes.',correct:true},
    {text:'Begin aggressive direct attack immediately with all available water.',correct:false,trap:'Committing all available water without a supply plan risks running dry before the situation is controlled. EV fires require sustained water application, not a single aggressive push.'},
    {text:'Wait for mutual aid — this event exceeds your water supply capability.',correct:false,trap:'Waiting without any action abandons exposure protection and allows the event to escalate. Exposure protection and water logistics must begin with first-arriving resources.'},
    {text:'Apply foam to reduce water consumption requirements.',correct:false,trap:'Foam is not a water conservation strategy for EV fires. Volume requirements for cooling remain substantial regardless of foam addition.'}
   ],sources:[SRC.erg147]},
  {cat:'Building Suppression Augmentation',skill:'Suppression System Integration',refs:[R.erg_water,R.erg_water_goal],
   q:'A parking structure has activated its sprinkler system over a burning EV. Should you supplement with handlines?',
   ans:[
    {text:'Yes. EV packs require water volumes well beyond standard sprinkler output. Supplement aggressively and monitor for thermal runaway spread to adjacent vehicles.',correct:true},
    {text:'No — the building system is handling it.',correct:false,trap:'Standard sprinkler systems are not designed for EV pack fire water volume requirements. They are inadequate as the sole suppression for an active pack fire.'},
    {text:'Shut down the building system and take over with handlines.',correct:false,trap:'The building system provides cooling value. Taking it offline removes that benefit without tactical justification.'},
    {text:'Augment only if fire has not reduced in 10 minutes.',correct:false,trap:'Waiting 10 minutes to augment loses critical cooling time in the early stages of the event.'}
   ],sources:[SRC.erg147]},
  {cat:'Runoff Containment',skill:'Secondary Hazmat Recognition',refs:[R.erg_water,R.osha_gas],
   q:'High-volume water application during EV fire suppression produces significant runoff. What secondary hazmat concern does this create?',
   ans:[
    {text:'Runoff contains electrolyte, thermal decomposition products, and metal compounds. It must be contained to prevent environmental release.',correct:true},
    {text:'None — water is non-hazardous.',correct:false,trap:'Water that has contacted thermal decomposition products, electrolyte, and metal compounds is contaminated. It cannot be released to storm drains or waterways.'},
    {text:'Water pressure from runoff can destabilize the vehicle.',correct:false,trap:'Vehicle destabilization from runoff is not the primary concern. Contaminated runoff environmental release is the secondary hazmat issue.'},
    {text:'Runoff creates a slip hazard — primary concern is personnel footing.',correct:false,trap:'Personnel hazard from runoff is real but secondary. The primary concern is hazmat release to the environment.'}
   ],sources:[SRC.erg147,SRC.oshaLiIon]},
  {cat:'Sealed Cell Limitation',skill:'Suppression Effectiveness Assessment',refs:[R.erg_water_goal],
   q:'Direct handline attack on an EV fire cannot penetrate to the sealed battery cells. External fire is controlled. What is the tactical shift?',
   ans:[
    {text:'Shift to exposure protection and thermal monitoring. Direct attack on sealed cells is ineffective once external fire is controlled.',correct:true},
    {text:'Increase flow rate — sufficient water volume will eventually penetrate sealed cells.',correct:false,trap:'Flow rate increase cannot overcome sealed cell construction. Water cannot reach internal cells regardless of external volume applied.'},
    {text:'Apply suppression foam directly to the pack to penetrate the cells.',correct:false,trap:'Foam does not penetrate sealed cells and does not address the internal thermal runaway reaction.'},
    {text:'Abandon operations — sealed cell fires are inherently uncontrollable.',correct:false,trap:'Abandonment is not the standard when external fire is controlled. Exposure protection and monitoring are the appropriate ongoing operations.'}
   ],sources:[SRC.erg147]},
  {cat:'BESS Facility Suppression Role',skill:'Coordinated Suppression',refs:[R.erg_water,R.nfpa855_auth],
   q:'A BESS facility has an active internal fire in one module. The facility built-in suppression system is engaged. What is the fire department role?',
   ans:[
    {text:'Coordinate with facility personnel. Support the built-in system rather than interfere. Assess for fire spread and ventilation pathway hazards.',correct:true},
    {text:'Override the facility system and apply handlines to all modules as a precaution.',correct:false,trap:'Overriding the facility system without coordination may interfere with an engineered suppression solution designed specifically for that installation.'},
    {text:'The facility system is sufficient — stage outside and monitor only.',correct:false,trap:'Passive staging without coordination abandons assessment of spread risk and ventilation hazards. The fire department role is coordination and assessment, not passive standby.'},
    {text:'Apply foam to all unaffected modules as a precaution.',correct:false,trap:'Applying foam to unaffected modules without coordination is not appropriate. Facility engineering determines suppression coverage.'}
   ],sources:[SRC.erg147,SRC.nfpa855]},
  {cat:'Submersion Container Use',skill:'Tactical Tool Selection',refs:[R.ntsb_reinit,R.erg_water_goal],
   q:'Your department has a submersion container for EV pack transport. When is submersion the appropriate tactic?',
   ans:[
    {text:'After external fire is controlled and the pack remains thermally active. Submersion provides extended cooling for transport and safe storage pending disposition.',correct:true},
    {text:'Immediately on arrival for any EV fire.',correct:false,trap:'Submersion containers are a post-suppression transport and storage tool, not an initial attack tactic. Initial suppression uses handlines, not submersion.'},
    {text:'Only for e-bikes and small packs — not appropriate for full-size EVs.',correct:false,trap:'Submersion containers sized for full EV packs are available and are appropriate for managing residual thermal activity during transport.'},
    {text:'Submersion is not an approved tactic and is not used operationally.',correct:false,trap:'Submersion containers are an approved and commercially available tactic used by departments nationally.'}
   ],sources:[SRC.ntsbEV,SRC.erg147]},
  {cat:'Roof-Mounted Pack Attack',skill:'Tactical Geometry Problem-Solving',refs:[R.erg_water],
   q:'An electric transit bus roof-mounted battery pack is on fire. Ground-level handlines cannot reach the pack. Options?',
   ans:[
    {text:'Consider aerial application for direct pack cooling. Maintain exposure protection for structure and occupant compartment. Request aerial resource if not on scene.',correct:true},
    {text:'Continue ground-level attack — water will eventually reach the pack through runoff.',correct:false,trap:'Ground-level attack on a roof-mounted pack is ineffective for direct cooling. Water flowing over the vehicle body does not cool the roof-mounted pack.'},
    {text:'Abandon the bus — roof-mounted packs are not accessible from ground level.',correct:false,trap:'Abandonment is not the standard when aerial resources are available or can be requested.'},
    {text:'Wait for the pack to vent and self-extinguish.',correct:false,trap:'Thermal runaway does not self-extinguish safely. Allowing uninhibited burning increases exposures and structural damage.'}
   ],sources:[SRC.erg147]}
],tech:[
  {cat:'Flow Rate Estimation',skill:'Suppression Resource Calculation',refs:[R.erg_water,R.erg_water_goal],
   q:'A 200 kWh electric delivery van pack is in full thermal runaway. Using the operational estimate of 100–150 gpm per 100 kWh of pack energy, what minimum sustained flow is needed for external temperature management?',
   ans:[
    {text:'200–300 gpm minimum sustained flow. This is for external temperature management only — not internal pack control, which is not achievable with water alone.',correct:true},
    {text:'50 gpm — similar to a standard vehicle fire.',correct:false,trap:'50 gpm is far below the operational estimate for a 200 kWh pack. Standard vehicle fire flows do not account for EV pack thermal output.'},
    {text:'10,000 gallons total volume will control the event.',correct:false,trap:'Total volume without sustained flow rate is not a suppression standard. Flow rate determines cooling effect. Total volume must support the required sustained flow.'},
    {text:'Water flow is irrelevant — only submersion stops thermal runaway.',correct:false,trap:'Submersion is a post-attack transport and storage tool. Sustained water flow during active events manages external temperature and exposures.'}
   ],sources:[SRC.erg147]},
  {cat:'Temperature Plateau Assessment',skill:'Suppression Effectiveness Interpretation',refs:[R.erg_water_goal,R.ntsb_reinit],
   q:'Thermal imaging during suppression shows a transit bus pack at 220°C (428°F) sustained for 20 minutes despite continuous water application. Assessment?',
   ans:[
    {text:'Temperature plateau under sustained flow suggests active thermal runaway in multiple cells is exceeding your cooling capacity. Reassess flow rate, aerial application, and exposure geometry.',correct:true},
    {text:'Increase water flow — temperature will eventually drop with enough volume.',correct:false,trap:'If sustained flow has not reduced temperature in 20 minutes, the thermal output from active runaway cells may be exceeding current cooling capacity. A tactical reassessment is required, not just more volume.'},
    {text:'Temperature plateau means the reaction has stabilized — maintain current approach.',correct:false,trap:'Plateau under active suppression is not stabilization. It means the reaction is matching your cooling output. Ceasing or reducing application will allow temperature to rise.'},
    {text:'Thermal imaging is inaccurate at these temperatures — readings are unreliable.',correct:false,trap:'Thermal imaging limitations exist but are not the appropriate response to a sustained high-temperature reading. Treat the reading as reliable until proven otherwise.'}
   ],sources:[SRC.erg147,SRC.ntsbEV]},
  {cat:'Suppression Runoff Containment',skill:'Environmental Hazard Management',refs:[R.erg_water,R.osha_gas],
   q:'During suppression of an EV sedan fire you apply 500 gpm for 20 minutes — approximately 10,000 gallons total. Runoff containment protocol?',
   ans:[
    {text:'Dike runoff to prevent storm drain entry. Collect contaminated water for proper disposal as hazardous waste.',correct:true},
    {text:'No action — storm drain release is acceptable for vehicle fire suppression water.',correct:false,trap:'EV fire runoff is not equivalent to standard vehicle fire water. It contains electrolyte decomposition products, metal compounds, and toxic byproducts. Storm drain release is not acceptable.'},
    {text:'Dilute runoff with additional water before release to reduce concentration.',correct:false,trap:'Dilution is not an appropriate disposal method for hazardous runoff. Containment and proper disposal are required.'},
    {text:'Containment is only required for BESS fires, not vehicle fires.',correct:false,trap:'Any EV fire producing contaminated runoff requires containment. Volume scale differs but the hazard category is the same.'}
   ],sources:[SRC.erg147,SRC.oshaLiIon]},
  {cat:'Nitrogen-Flooded Space Entry',skill:'Oxygen-Deficient Hazard Recognition',refs:[R.niosh_idlh,R.nfpa855_auth],
   q:'A BESS facility nitrogen flooding system suppressed a fire in a sealed module room. Fire department arrives post-flooding. Entry?',
   ans:[
    {text:'The module room is an IDLH oxygen-deficient atmosphere. SCBA is mandatory. Ventilate before entry if possible. Enter with SCBA and backup team in place.',correct:true},
    {text:'Nitrogen atmosphere is safe for entry with structural PPE — nitrogen is inert.',correct:false,trap:'Nitrogen flooding displaces oxygen below safe breathing levels. Entry without supplied air is an asphyxiation hazard. Nitrogen is inert but IDLH due to oxygen displacement.'},
    {text:'Wait 30 minutes for nitrogen to dissipate naturally before entry.',correct:false,trap:'Nitrogen dissipation rate in a sealed room cannot be predicted without ventilation and atmospheric monitoring. 30 minutes is not a recognized clearance time.'},
    {text:'SCBA required only if battery fire products are confirmed present alongside the nitrogen.',correct:false,trap:'Nitrogen displaces oxygen regardless of co-presence of fire products. The oxygen-deficient atmosphere alone is IDLH. SCBA is mandatory.'}
   ],sources:[SRC.niosh,SRC.nfpa855]},
  {cat:'Piercing Nozzle Purpose',skill:'Technical Tool Application',refs:[R.erg_water_goal],
   q:'What is the primary purpose of piercing nozzle technology in EV battery pack suppression?',
   ans:[
    {text:'To penetrate battery pack housings and deliver water directly to cell modules — providing internal cooling that external application cannot achieve.',correct:true},
    {text:'To apply foam directly to individual battery cells.',correct:false,trap:'Piercing nozzles are not primarily foam delivery tools. Their function is direct water access to sealed internal compartments.'},
    {text:'To increase water pressure for penetrating the vehicle body through existing openings.',correct:false,trap:'Piercing nozzle function is physical penetration of the sealed housing to reach internal spaces — not increasing pressure through existing openings.'},
    {text:'Piercing nozzles are experimental and not approved for EV battery suppression.',correct:false,trap:'Piercing nozzles are an approved tactic referenced in NFPA guidance and manufacturer recommendations for EV battery fires.'}
   ],sources:[SRC.erg147]},
  {cat:'Vehicle Release Authority',skill:'Post-Incident Decision Authority',refs:[R.nfpa855_auth,R.ntsb_reinit],
   q:'After transit bus fire suppression, IC asks: "Can we release the vehicle to the tow company for transport?" Your answer?',
   ans:[
    {text:'No. The AHJ and Fire Marshal hold post-incident disposition authority. The manufacturer emergency line must be consulted for pack condition assessment. The crew coordinates and documents but does not authorize release.',correct:true},
    {text:'Yes — the fire is out and transport is a tow company determination.',correct:false,trap:'Vehicle disposition after a thermal event is not a tow company determination. Re-ignition risk and pack instability make formal disposition authority essential.'},
    {text:'The crew senior officer can authorize release once the scene appears stable.',correct:false,trap:'The responding crew coordinates and documents. Disposition authority rests with the AHJ and Fire Marshal, not the crew.'},
    {text:'Release is automatic once fire is extinguished — no additional authorization is required.',correct:false,trap:'Fire extinguishment does not authorize vehicle release. Re-ignition risk from incompletely cooled cells requires formal disposition authority.'}
   ],sources:[SRC.nfpa855,SRC.ntsbEV]},
  {cat:'Sustained Suppression Planning',skill:'Long-Duration Resource Planning',refs:[R.erg_water,R.erg_water_goal],
   q:'What does field experience and current research indicate about the most effective water application technique for EV pack fires?',
   ans:[
    {text:'Piercing nozzle direct injection where accessible combined with sustained external application for exposure protection provides the best combination of internal cooling and external management.',correct:true},
    {text:'Maximum flow rate at all times provides the best cooling effect.',correct:false,trap:'Maximum flow without penetration strategy results in water flowing over sealed cell housings without reaching the thermal event. Technique matters as much as volume.'},
    {text:'Foam application to the pack surface is more effective than water and reduces total volume required.',correct:false,trap:'Foam does not penetrate sealed cells. External cooling requires sustained water volume regardless of foam addition.'},
    {text:'Intermittent application is more effective than continuous flow — it allows heat to concentrate, making cooling more efficient.',correct:false,trap:'Continuous sustained flow is the standard for EV pack cooling. Intermittent application allows temperature recovery between applications.'}
   ],sources:[SRC.erg147]},
  {cat:'BESS Water Supply on Isolated Site',skill:'Water Logistics — Remote Incident',refs:[R.erg_water,R.nfpa855_auth],
   q:'A BESS solar farm fire — no hydrant within 2 miles and the facility suppression system is overwhelmed. Strategy?',
   ans:[
    {text:'Apply available water to protect uninvolved BESS modules. Establish tanker operations with all available resources. Consult the facility emergency action plan for on-site water storage.',correct:true},
    {text:'Withdraw — no hydrant means no meaningful suppression capability.',correct:false,trap:'Rural fire departments operate without hydrants routinely. On-site water storage (often required by code for BESS installations), mutual aid tankers, and rural water sources are all resources.'},
    {text:'Commit all available water to aggressive attack on the involved module.',correct:false,trap:'Committing limited water to aggressive attack without supply secured risks running dry. Exposure protection of uninvolved modules is the priority when supply is limited.'},
    {text:'The facility owner is responsible for suppression — fire department can only provide scene safety.',correct:false,trap:'Fire department mandate is not limited by facility responsibility. Life safety and fire spread prevention are the fire department obligation regardless of ownership.'}
   ],sources:[SRC.erg147,SRC.nfpa855]}
]},
auth:{ops:[
  {cat:'Vehicle Release Authority',skill:'Authority Chain Recognition',refs:[R.nfpa855_auth,R.ntsb_reinit],
   q:'The vehicle owner wants their EV returned after apparent suppression. Who holds vehicle release authority?',
   ans:[
    {text:'The AHJ and Fire Marshal hold post-incident vehicle disposition authority. Manufacturer emergency guidance should also be obtained before release.',correct:true},
    {text:'The incident commander on scene.',correct:false,trap:'The IC manages the incident but does not hold post-incident disposition authority for thermally compromised vehicles.'},
    {text:'Release is automatic 24 hours after suppression — no authorization required.',correct:false,trap:'There is no automatic release timeline for thermally compromised EVs. Pack condition and confirmed thermal stabilization determine disposition.'},
    {text:'The insurance adjuster authorizes release on behalf of the owner.',correct:false,trap:'Insurance adjusters manage financial disposition, not public safety aspects of vehicle release.'}
   ],sources:[SRC.nfpa855,SRC.ntsbEV]},
  {cat:'Transport Authorization',skill:'Pre-Transport Protocol',refs:[R.nfpa855_auth,R.ntsb_reinit],
   q:'A tow company arrives to transport a post-fire EV. What is required before transport begins?',
   ans:[
    {text:'AHJ and Fire Marshal authorization of transport conditions, manufacturer guidance on pack state, and documentation of the transport plan.',correct:true},
    {text:'Tow company determines transport safety — it is their liability.',correct:false,trap:'Transport of a post-fire EV is a public safety matter. Tow company liability is separate from the authorization requirement.'},
    {text:'IC verbal authorization on scene is sufficient to release for transport.',correct:false,trap:'IC verbal authorization does not represent AHJ and Fire Marshal disposition authority.'},
    {text:'Transport can proceed once suppression is complete — no additional authorization needed.',correct:false,trap:'Suppression completion is not transport authorization. Re-ignition risk and pack instability make formal authorization essential.'}
   ],sources:[SRC.nfpa855,SRC.ntsbEV]},
  {cat:'Manufacturer Guidance Role',skill:'Technical Advisory vs. Authority',refs:[R.nfpa855_auth],
   q:'The manufacturer technical representative says the pack is stable and the vehicle can be released. Is their statement sufficient authorization?',
   ans:[
    {text:'No. Manufacturer guidance is technical input, not disposition authority. The AHJ and Fire Marshal make the final release decision.',correct:true},
    {text:'Yes — the manufacturer has the most technical knowledge about the pack condition.',correct:false,trap:'Manufacturer technical guidance is valuable and should be documented, but it does not supersede AHJ and Fire Marshal authority.'},
    {text:'Yes if the senior firefighter on scene agrees with the manufacturer assessment.',correct:false,trap:'The responding crew does not hold disposition authority regardless of agreement with the manufacturer.'},
    {text:'Manufacturer assessment of pack stability is not relevant to release decisions.',correct:false,trap:'Manufacturer assessment is highly relevant and should be obtained. The distinction is that it informs — not authorizes — the disposition decision.'}
   ],sources:[SRC.nfpa855]},
  {cat:'Scene Documentation',skill:'Post-Incident Protocol',refs:[R.nfpa855_auth,R.osha_gas],
   q:'What documentation should be completed before the crew leaves an EV fire scene?',
   ans:[
    {text:'Incident report, AHJ and Fire Marshal notification, manufacturer contact record, exposure documentation for all hot zone personnel, and hazmat release documentation if runoff occurred.',correct:true},
    {text:'Standard incident report only.',correct:false,trap:'Standard incident report is required but insufficient for EV fires. Authority notifications and personnel exposure documentation are additional requirements.'},
    {text:'No documentation beyond state fire reporting is required.',correct:false,trap:'State fire reporting captures basic incident data. EV fires require additional documentation for authority notifications and exposure records.'},
    {text:'Documentation is the hazmat team responsibility if they responded.',correct:false,trap:'Primary incident documentation is the first-in crew responsibility regardless of hazmat team involvement.'}
   ],sources:[SRC.nfpa855,SRC.oshaLiIon]},
  {cat:'Storage Facility Guidance',skill:'Re-Ignition Risk Communication',refs:[R.ntsb_reinit],
   q:'The receiving storage facility for a post-fire EV asks if the vehicle is safe to store indoors. Your answer?',
   ans:[
    {text:'Provide the last documented pack temperature and air monitoring data. Recommend outdoor isolated storage until pack cooling is confirmed. Re-ignition risk persists without confirmed thermal stabilization.',correct:true},
    {text:'Yes — the fire is out.',correct:false,trap:'Fire extinguishment does not guarantee pack thermal stability. Re-ignition risk from incompletely cooled cells is real.'},
    {text:'Indoor storage is acceptable if the building has sprinkler coverage.',correct:false,trap:'Indoor storage of a thermally active EV under sprinklers does not eliminate risk to the facility. Isolated outdoor storage with clearance distance is the standard recommendation.'},
    {text:'Storage questions are for the insurance adjuster to resolve.',correct:false,trap:'Public safety guidance on re-ignition risk is a fire department responsibility, not an insurance function.'}
   ],sources:[SRC.ntsbEV]},
  {cat:'Disposition Authority Chain',skill:'Multi-Party Coordination',refs:[R.nfpa855_auth],
   q:'Who has authority to approve transport conditions and storage requirements for a thermally compromised EV after a fire?',
   ans:[
    {text:'The AHJ, in coordination with the Fire Marshal and informed by manufacturer technical guidance.',correct:true},
    {text:'The tow company, as the transport specialist.',correct:false,trap:'The tow company executes transport under authorized conditions. They do not set those conditions.'},
    {text:'The responding crew captain makes all post-incident disposition decisions.',correct:false,trap:'The responding crew coordinates and documents. Disposition authority rests with the AHJ and Fire Marshal.'},
    {text:'No formal authorization is required once the fire is extinguished.',correct:false,trap:'Fire extinguishment does not remove the requirement for formal disposition authorization.'}
   ],sources:[SRC.nfpa855]},
  {cat:'Fire Investigator Access',skill:'Concurrent Process Management',refs:[R.nfpa855_auth],
   q:'A fire investigator wants access to the post-fire EV before AHJ disposition is complete. Protocol?',
   ans:[
    {text:'Fire investigator access is coordinated through the AHJ. Thermal monitoring must continue during investigation. Access does not constitute vehicle release or disposition authorization.',correct:true},
    {text:'Fire investigator access supersedes AHJ disposition proceedings.',correct:false,trap:'Fire investigation and AHJ disposition are concurrent processes. Investigation access does not bypass disposition authority.'},
    {text:'Access can be granted by the senior firefighter on scene.',correct:false,trap:'The responding crew does not grant investigator access to a vehicle under AHJ disposition authority.'},
    {text:'Fire investigation cannot begin until disposition is complete.',correct:false,trap:'Investigation typically begins during the disposition process. The processes are concurrent and coordinated, not sequential.'}
   ],sources:[SRC.nfpa855]},
  {cat:'Extended Monitoring Endpoint',skill:'Monitoring Duration Decision',refs:[R.ntsb_reinit,R.niosh_idlh],
   q:'Extended re-ignition risk monitoring at a storage facility — when does the fire department monitoring obligation end?',
   ans:[
    {text:'When pack temperature has reached ambient, air monitoring confirms no active off-gassing, and the manufacturer has confirmed pack thermal stability.',correct:true},
    {text:'After 24 hours of storage without incident.',correct:false,trap:'Time-based endpoints are not the standard for EV fire monitoring. Objective data — temperature and air monitoring — determines when monitoring is no longer required.'},
    {text:'When the storage facility accepts custody of the vehicle.',correct:false,trap:'Transfer of custody does not automatically transfer monitoring responsibility for a thermally active pack. Formal hand-off with documented stability confirmation is required.'},
    {text:'Once the vehicle is transported from the incident scene, fire department obligation ends.',correct:false,trap:'If pack thermal stabilization has not been confirmed, fire department responsibility does not automatically end at vehicle transport.'}
   ],sources:[SRC.ntsbEV,SRC.niosh]}
],tech:[
  {cat:'BESS Post-Incident Coordination',skill:'Multi-Agency Authority Framework',refs:[R.nfpa855_auth],
   q:'A BESS facility fire post-incident involves fire department, facility owner, AHJ, Fire Marshal, and manufacturer. What is the fire department specific role?',
   ans:[
    {text:'Document incident details, provide hazard findings to the AHJ, make manufacturer consultation records available, coordinate pack stabilization monitoring. AHJ and Fire Marshal authorize final disposition.',correct:true},
    {text:'The fire department holds all authority once on scene — including post-incident disposition.',correct:false,trap:'Fire department on-scene authority is clear. Post-incident disposition authority specifically rests with the AHJ and Fire Marshal.'},
    {text:'Fire department releases the scene to the facility owner once suppression is complete.',correct:false,trap:'Scene release does not equal disposition authorization. AHJ and Fire Marshal authorize disposition of a thermally compromised BESS installation.'},
    {text:'Manufacturer technical authority supersedes fire department on all post-incident findings.',correct:false,trap:'Manufacturer findings are advisory. Fire department authority and AHJ and Fire Marshal disposition authority are separate from technical guidance.'}
   ],sources:[SRC.nfpa855]},
  {cat:'Transit Vehicle Return to Service',skill:'Return-to-Service Authority',refs:[R.nfpa855_auth,R.ntsb_reinit],
   q:'Post-incident, a transit agency wants to return a fire-damaged electric bus to service after the manufacturer certifies it as safe. Fire department position?',
   ans:[
    {text:'AHJ, in coordination with the Fire Marshal and informed by manufacturer findings, holds authority over return-to-service disposition. Fire department provides hazard documentation to support that determination.',correct:true},
    {text:'If the manufacturer certifies it, fire department has no further role.',correct:false,trap:'Manufacturer certification is technical guidance. Return to service for a fire-damaged transit vehicle is an AHJ function, not solely a manufacturer determination.'},
    {text:'Document objection if the vehicle appears unsafe.',correct:false,trap:'Documenting objection alone is insufficient. Formal coordination with the AHJ and Fire Marshal is required for disposition of a fire-damaged transit vehicle.'},
    {text:'Transit agency authority supersedes fire department on fleet operational decisions.',correct:false,trap:'Transit agency authority governs normal fleet operations. Post-fire disposition involves AHJ and Fire Marshal authority that supersedes routine fleet decisions.'}
   ],sources:[SRC.nfpa855,SRC.ntsbEV]},
  {cat:'Scene Closure Criteria',skill:'Documentation Completion Standard',refs:[R.nfpa855_auth,R.osha_gas],
   q:'At what point can a post-fire EV scene be formally closed and documentation considered complete?',
   ans:[
    {text:'When the vehicle has been formally released by AHJ and Fire Marshal, all exposure documentation is complete, environmental release documentation is filed if applicable, and manufacturer contact is recorded.',correct:true},
    {text:'When the fire is extinguished and the crew leaves the scene.',correct:false,trap:'Scene departure does not close post-EV-fire documentation obligations. Authority notifications and pack disposition must be formally documented.'},
    {text:'When the incident report is submitted to the state reporting system.',correct:false,trap:'State reporting is one component of post-incident documentation, not the totality of it.'},
    {text:'30 days after the incident, all obligations are automatically satisfied.',correct:false,trap:'No time-based automatic closure exists for EV fire documentation obligations. Completion is event-driven, not time-driven.'}
   ],sources:[SRC.nfpa855,SRC.oshaLiIon]},
  {cat:'Mandatory Hold Authority',skill:'Legal Authority Framework',refs:[R.nfpa855_auth],
   q:'The vehicle owner demands their EV immediately. Can the fire department legally prevent this?',
   ans:[
    {text:'Yes. AHJ authority, exercised through the Fire Marshal, provides legal basis for mandatory hold when a thermally compromised vehicle poses an ongoing public safety risk.',correct:true},
    {text:'No — the fire department has no legal authority to hold private property post-incident.',correct:false,trap:'AHJ authority, typically exercised through the Fire Marshal, provides legal basis under state fire codes for holding a thermally compromised vehicle that poses a public safety risk.'},
    {text:'Only with a court order — which takes too long to be practical.',correct:false,trap:'AHJ authority under state fire codes does not require a court order for an immediate public safety determination.'},
    {text:'The vehicle owner always has the right to take their property immediately.',correct:false,trap:'Property rights do not supersede public safety authority. AHJ and Fire Marshal jurisdiction over thermally compromised vehicles is established in state fire codes.'}
   ],sources:[SRC.nfpa855]},
  {cat:'Defect Causation and Authority',skill:'Cause vs. Authority Distinction',refs:[R.nfpa855_auth,R.ntsb_reinit],
   q:'Fire investigation reveals the EV fire was caused by a manufacturing defect. Does this change who holds post-incident disposition authority?',
   ans:[
    {text:'No. AHJ and Fire Marshal retain post-incident disposition authority regardless of cause determination. Cause affects liability and potential recall action — not immediate disposition authority.',correct:true},
    {text:'Yes — manufacturer is now fully responsible for all disposition decisions.',correct:false,trap:'Cause determination does not transfer disposition authority. AHJ and Fire Marshal retain post-incident authority regardless of origin.'},
    {text:'Yes — NHTSA federal jurisdiction takes over once a manufacturing defect is confirmed.',correct:false,trap:'NHTSA jurisdiction applies to recall and safety standard processes. Immediate post-incident public safety disposition remains at the AHJ and Fire Marshal level.'},
    {text:'Yes — the vehicle must be immediately surrendered to the manufacturer.',correct:false,trap:'Return to manufacturer is not an automatic consequence of defect finding. Disposition follows the standard AHJ and Fire Marshal authority chain.'}
   ],sources:[SRC.nfpa855]},
  {cat:'Investigator Scene Access',skill:'Concurrent Process Coordination',refs:[R.nfpa855_auth],
   q:'A fire investigator wants access to a post-fire BESS module before AHJ disposition is complete. What is the protocol?',
   ans:[
    {text:'Investigator access is coordinated through the AHJ. Thermal monitoring continues during investigation. Access does not constitute disposition. The module remains monitored throughout.',correct:true},
    {text:'Investigator access supersedes AHJ disposition proceedings.',correct:false,trap:'Investigation and AHJ disposition are concurrent processes. Investigator access does not bypass disposition authority.'},
    {text:'Investigation cannot proceed until disposition is formally complete.',correct:false,trap:'Investigation typically begins during the disposition process. The processes are concurrent and coordinated, not sequential.'},
    {text:'The responding crew leader can grant investigator access.',correct:false,trap:'The responding crew does not grant access to a module under AHJ disposition authority.'}
   ],sources:[SRC.nfpa855]},
  {cat:'After-Action Documentation Value',skill:'Documentation Purpose',refs:[R.nfpa855_auth,R.osha_gas],
   q:'What documentation from an EV fire specifically supports future response improvement?',
   ans:[
    {text:'Air monitoring data, suppression flow rates and volumes, thermal imaging readings over time, pack temperature trends, isolation geometry, personnel exposure records, and manufacturer consultation records.',correct:true},
    {text:'Only the final incident report matters for after-action review.',correct:false,trap:'Scene-level data including air monitoring, suppression flow rates, and temperature trends provides the information needed for meaningful tactical improvement.'},
    {text:'Post-incident review documentation is the hazmat team responsibility.',correct:false,trap:'Post-incident review involves all responding units. First-in crew documentation is foundational to any meaningful after-action review.'},
    {text:'Outcome documentation is sufficient — process documentation is not required.',correct:false,trap:'Process documentation — what was done, when, and at what measurements — is what enables improvement. Outcome-only documentation cannot support tactical refinement.'}
   ],sources:[SRC.nfpa855,SRC.oshaLiIon]},
  {cat:'Tech-Level Scope Boundary',skill:'Role Boundary Recognition',refs:[R.nfpa855_auth],
   q:'The IC asks a tech-level crew leader to confirm the vehicle is safe for the owner to drive. Which part of this request falls outside fire department scope?',
   ans:[
    {text:'Certifying a fire-damaged vehicle as roadworthy or safe for operation is outside fire department scope. This requires AHJ disposition, manufacturer assessment, and potentially DMV or state motor vehicle authority.',correct:true},
    {text:'Maintaining pack temperature monitoring until disposition is authorized.',correct:false,trap:'Pack temperature monitoring is a fire department function until formal disposition is authorized. This is within scope.'},
    {text:'Documenting personnel exposure for occupational health records.',correct:false,trap:'Personnel exposure documentation is a fire department responsibility. This is within scope.'},
    {text:'Coordinating with the facility emergency contact for BESS post-incident notifications.',correct:false,trap:'Coordination with facility emergency contacts is a fire department function during and after an incident. This is within scope.'}
   ],sources:[SRC.nfpa855]}
]}
};
// ================================================================
// STATE AND LOGIC
// ================================================================
var currentLevel='ops',answeredCount=0,totalQuestions=0,selectedAnswers={},usedSources=new Set();
var qIndices={hr:{ops:[],tech:[]},iso:{ops:[],tech:[]},ppe:{ops:[],tech:[]},supp:{ops:[],tech:[]},auth:{ops:[],tech:[]}};
var usedScenarios=new Set();

function setLevel(l){
  currentLevel=l;
  document.querySelectorAll('.toggle-btn').forEach(function(b){b.classList.toggle('active',b.dataset.level===l)});
}

function rand(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}

function nextQ(bank){
  var idx=qIndices[bank][currentLevel];
  if(!idx||idx.length===0){
    var data=BANKS[bank][currentLevel];
    idx=shuffle(Array.from({length:data.length},function(_,i){return i}));
    qIndices[bank][currentLevel]=idx;
  }
  return BANKS[bank][currentLevel][idx.shift()];
}

function genScenario(){
  for(var t=0;t<60;t++){
    var v=rand(VEHICLES),inc=rand(INCIDENTS),loc=rand(LOCATIONS),cond=rand(CONDITIONS);
    var key=v.type+'|'+inc.type+'|'+loc.name;
    if(!usedScenarios.has(key)||usedScenarios.size>150){
      usedScenarios.add(key);
      return{v:v,inc:inc,loc:loc,cond:cond};
    }
  }
  return{v:rand(VEHICLES),inc:rand(INCIDENTS),loc:rand(LOCATIONS),cond:rand(CONDITIONS)};
}

function generateDrill(){
  answeredCount=0;selectedAnswers={};usedSources=new Set();
  var sc=genScenario();
  var qs=[nextQ('hr'),nextQ('iso'),nextQ('ppe'),nextQ('supp'),nextQ('auth')];
  totalQuestions=qs.length;
  qs.forEach(function(q){if(q.sources)q.sources.forEach(function(s){usedSources.add(s)})});
  renderDrill(sc,qs);
}

function renderDrill(sc,qs){
  var area=document.getElementById('drillArea');
  var vNote=sc.v.note?'<br><span style="font-size:.8rem;color:var(--text-muted)">'+sc.v.note+'</span>':'';
  var h='<div class="scenario-card"><div class="sc-header"><div class="sc-label">⚡ Incident Scenario</div></div><div class="sc-body"><div class="sc-grid">';
  h+='<div><strong>Vehicle / Source:</strong> '+sc.v.type+'</div>';
  h+='<div><strong>Incident Type:</strong> '+sc.inc.type+'</div>';
  h+='<div><strong>Location:</strong> '+sc.loc.name+'</div>';
  h+='<div><strong>Confinement:</strong> '+sc.loc.conf+'</div>';
  h+='<div><strong>Time / Weather:</strong> '+sc.cond.time+' — '+sc.cond.wx+'</div>';
  h+='<div><strong>Ventilation:</strong> '+sc.loc.vent+'</div>';
  h+='</div>';
  h+='<div style="margin-top:10px"><strong>Exposures:</strong> '+sc.loc.exp+'</div>';
  h+='<div style="margin-top:6px"><strong>Scene Note:</strong> '+sc.cond.note+'</div>';
  h+='<div style="margin-top:6px"><strong>Battery Location:</strong> '+sc.v.batteryLoc+'</div>';
  h+='<div style="margin-top:6px"><strong>System Voltage:</strong> <span class="sc-volt">'+sc.v.volt+'</span>'+vNote+' &nbsp;|&nbsp; <strong>Pack Energy:</strong> '+sc.v.energy+'</div>';
  h+='</div></div>';

  qs.forEach(function(q,qi){
    var shuf=shuffle(q.ans.map(function(a){return{text:a.text,correct:a.correct,trap:a.trap||''}}));
    h+='<div class="q-card'+(qi>0?' locked':'')+'" id="qc-'+qi+'">';
    h+='<div class="q-head"><span class="q-num">Question '+(qi+1)+' — '+q.cat+'</span><span class="q-skill">'+q.skill+'</span></div>';
    q.refs.forEach(function(r){
      h+='<div class="ref-panel"><div class="ref-title">'+r.t+'</div><div class="ref-body">'+r.c+'</div>';
      if(r.src)h+='<div class="ref-src">— '+r.src.p+'</div>';
      h+='</div>';
    });
    h+='<div class="q-text">'+q.q+'</div>';
    h+='<div class="q-options" id="qo-'+qi+'">';
    shuf.forEach(function(a,ai){
      h+='<button class="opt-btn" id="ob-'+qi+'-'+ai+'" onclick="selAns('+qi+','+ai+')" data-c="'+a.correct+'" data-t="'+a.trap.replace(/"/g,'&quot;').replace(/'/g,"&#39;")+'">'+a.text+'</button>';
    });
    h+='<button class="commit-btn" id="cb-'+qi+'" onclick="commitAns('+qi+')" disabled>Commit to Decision</button>';
    h+='</div><div class="fb-panel" id="fb-'+qi+'"></div></div>';
  });

  h+='<div class="drill-refs" id="drillRefs"><div class="dr-inner"><div class="dr-title">Drill References</div><div class="dr-sub">Sources used in this drill — review, verify, or explore further.</div><div id="refsList"></div></div></div>';
  area.innerHTML=h;
  area.scrollIntoView({behavior:'smooth',block:'start'});
}

function selAns(qi,ai){
  if(document.getElementById('cb-'+qi).style.display==='none')return;
  document.querySelectorAll('#qo-'+qi+' .opt-btn').forEach(function(o){o.classList.remove('selected')});
  document.getElementById('ob-'+qi+'-'+ai).classList.add('selected');
  selectedAnswers[qi]=ai;
  document.getElementById('cb-'+qi).disabled=false;
}

function commitAns(qi){
  var ai=selectedAnswers[qi];
  if(ai===undefined)return;
  var opts=document.querySelectorAll('#qo-'+qi+' .opt-btn');
  var sel=document.getElementById('ob-'+qi+'-'+ai);
  var ok=sel.dataset.c==='true';
  opts.forEach(function(o){
    o.classList.add('locked-opt');
    o.setAttribute('onclick','');
    if(o.dataset.c==='true')o.classList.add('correct');
  });
  if(!ok)sel.classList.add('incorrect');
  document.getElementById('cb-'+qi).style.display='none';
  var fb=document.getElementById('fb-'+qi);
  fb.classList.add('show');
  if(ok){
    fb.classList.add('correct-fb');
    fb.innerHTML='<div class="fb-label correct">✓ CORRECT DECISION</div><div class="fb-text">You correctly interpreted the reference material and applied it to this scenario. This is the decision the source data supports given the conditions presented.</div>';
  } else {
    fb.classList.add('incorrect-fb');
    fb.innerHTML='<div class="fb-label incorrect">✗ INCORRECT DECISION</div><div class="fb-text"><strong>Why this is wrong:</strong> '+sel.dataset.t+'</div>';
  }
  answeredCount++;
  if(answeredCount===totalQuestions)showRefs();
  if(qi+1<totalQuestions){
    setTimeout(function(){
      var nc=document.getElementById('qc-'+(qi+1));
      if(nc){nc.classList.remove('locked');nc.scrollIntoView({behavior:'smooth',block:'start'})}
    },700);
  }
}

function showRefs(){
  var d=document.getElementById('drillRefs');
  var r=document.getElementById('refsList');
  var h='';
  usedSources.forEach(function(s){
    h+='<div class="ref-item"><div class="ri-name">'+s.n+'</div><div class="ri-pub">Publisher: '+s.p+'</div><a class="ri-link" href="'+s.u+'" target="_blank" rel="noopener">View Source ↗</a></div>';
  });
  var allSrc=[SRC.erg147,SRC.oshaLiIon,SRC.teexEmissions,SRC.nfpaAFV,SRC.nfpa855];
  allSrc.forEach(function(s){
    if(!usedSources.has(s)){
      h+='<div class="ref-item"><div class="ri-name">'+s.n+'</div><div class="ri-pub">Publisher: '+s.p+' — Additional reference</div><a class="ri-link" href="'+s.u+'" target="_blank" rel="noopener">View Source ↗</a></div>';
    }
  });
  r.innerHTML=h;

  var score=0;
  for(var qi=0;qi<totalQuestions;qi++){
    var ai=selectedAnswers[qi];
    if(ai!==undefined){var btn=document.getElementById('ob-'+qi+'-'+ai);if(btn&&btn.dataset.c==='true')score++;}
  }
  var pct=Math.round((score/totalQuestions)*100);
  var msg=pct===100?'Clean sweep. All five correct.':pct>=80?'Strong performance. Review any missed questions.':pct>=60?'Passing range. Revisit missed explanations.':'Below passing. Review explanations and run another drill.';
  r.innerHTML+='<div class="score-bar"><div><div class="score-val">'+score+' / '+totalQuestions+'</div><div class="score-lbl">Score This Drill</div></div><div style="font-family:var(--body);font-size:.95rem;color:var(--text-dim)">'+msg+'</div></div>';

  d.classList.add('show');
  var btn=document.createElement('div');
  btn.style.cssText='text-align:center;margin-top:20px';
  btn.innerHTML='<button class="gen-btn" onclick="generateDrill()">Generate New Drill</button>';
  d.querySelector('.dr-inner').appendChild(btn);
  setTimeout(function(){d.scrollIntoView({behavior:'smooth',block:'start'})},500);
}
</script>
