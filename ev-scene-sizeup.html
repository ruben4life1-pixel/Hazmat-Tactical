<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>EV Scene Size-Up Drill | Hazmat Tactical</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a0e1a;
  --navy-mid: #111827;
  --navy-card: #141c2e;
  --navy-elevated: #1a2340;
  --amber: #f0a500;
  --amber-dim: rgba(240,165,0,0.15);
  --amber-glow: rgba(240,165,0,0.08);
  --red: #e03a3a;
  --red-dim: rgba(224,58,58,0.12);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --border: rgba(255,255,255,0.07);
  --border-amber: rgba(240,165,0,0.3);
  --text: #e8eaf0;
  --text-muted: #6b7280;
  --text-dim: #9ca3af;
  --display: 'Bebas Neue', sans-serif;
  --ui: 'Barlow Condensed', sans-serif;
  --body: 'Rajdhani', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);color:var(--text);font-family:var(--body);min-height:100vh;overflow-x:hidden;line-height:1.6}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(240,165,0,0.04) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 80% 90%,rgba(224,58,58,0.03) 0%,transparent 50%),url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
.site-header{border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:64px;background:rgba(10,14,26,0.92);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50;box-shadow:0 1px 0 var(--border),0 8px 32px rgba(0,0,0,.5)}
.site-title{font-family:var(--body);font-size:1.2rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--text)}
.site-title span{color:var(--amber)}
.header-badge{font-family:var(--mono);font-size:.58rem;color:var(--text-muted);letter-spacing:.2em;text-transform:uppercase;margin-left:auto;border:1px solid var(--border);padding:4px 10px;border-radius:2px}
.wrap{max-width:820px;margin:0 auto;padding:0 20px 80px;position:relative;z-index:1}
.hero{text-align:center;padding:48px 0 36px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);border:1px solid var(--border-amber);padding:6px 16px;border-radius:2px;margin-bottom:20px;background:var(--amber-dim);box-shadow:0 0 16px rgba(240,165,0,.12)}
.hero h1{font-family:var(--display);font-size:clamp(2.4rem,6vw,3.8rem);letter-spacing:4px;text-transform:uppercase;line-height:1.0;margin-bottom:8px;color:var(--text)}
.hero-sub{font-family:var(--body);font-size:1.1rem;font-weight:500;color:var(--text-dim);max-width:520px;margin:0 auto 24px}
.hero-rule{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--amber),transparent);margin:0 auto 28px}
.level-controls{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:28px;flex-wrap:wrap}
.level-label{font-family:var(--ui);font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted)}
.toggle-group{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden}
.toggle-btn{padding:8px 22px;background:transparent;color:var(--text-dim);border:none;font-family:var(--ui);font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;transition:all .2s}
.toggle-btn.active{background:var(--amber);color:var(--navy)}
.toggle-btn:not(.active):hover{color:var(--text);background:rgba(255,255,255,0.04)}
.gen-btn{padding:12px 32px;background:var(--amber);color:var(--navy);border:none;border-radius:3px;font-family:var(--ui);font-size:.9rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 0 20px rgba(240,165,0,.25)}
.gen-btn:hover{background:#d4920a;box-shadow:0 0 28px rgba(240,165,0,.4)}
.disclaimer{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:.6rem;color:var(--text-muted);letter-spacing:.15em;text-transform:uppercase;border:1px solid var(--border);padding:6px 16px;border-radius:2px;margin-top:20px}
.scenario-card{background:var(--navy-card);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:4px;margin-bottom:16px;overflow:hidden}
.sc-header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sc-label{font-family:var(--ui);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--amber)}
.sc-body{padding:16px;font-family:var(--body);font-size:.95rem;color:var(--text-dim);line-height:1.8}
.sc-body strong{color:var(--text);font-weight:600}
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 24px}
.sc-volt{display:inline-block;font-family:var(--mono);font-size:.75rem;color:var(--amber);background:rgba(240,165,0,0.1);border:1px solid var(--border-amber);border-radius:2px;padding:2px 8px;margin-left:4px}
.q-card{background:var(--navy-card);border:1px solid var(--border);border-radius:4px;margin-bottom:14px;overflow:hidden;transition:opacity .25s}
.q-card.locked{opacity:.28;pointer-events:none}
.q-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;background:rgba(0,0,0,.15)}
.q-num{font-family:var(--ui);font-size:.78rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--amber)}
.q-skill{font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);text-align:right;flex-shrink:0}
.ref-panel{margin:0;padding:14px 16px;border-bottom:1px solid var(--border);background:rgba(240,165,0,0.04);border-left:3px solid rgba(240,165,0,0.25)}
.ref-title{font-family:var(--ui);font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
.ref-body{font-family:var(--body);font-size:.9rem;color:var(--text-dim);line-height:1.65}
.ref-src{font-family:var(--mono);font-size:.58rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:8px}
.hl{color:var(--amber);font-weight:600}
.warn{color:var(--red);font-weight:600}
.q-text{padding:16px 16px 12px;font-family:var(--body);font-size:1.05rem;font-weight:500;color:var(--text);line-height:1.6;border-bottom:1px solid var(--border)}
.q-options{padding:12px}
.opt-btn{display:block;width:100%;margin-bottom:8px;padding:12px 16px;background:var(--navy-elevated);border:1px solid var(--border);border-radius:3px;text-align:left;color:var(--text-dim);font-family:var(--body);font-size:.95rem;cursor:pointer;transition:all .15s;line-height:1.5}
.opt-btn:last-of-type{margin-bottom:12px}
.opt-btn:hover:not(.locked-opt){border-color:rgba(240,165,0,.4);color:var(--text);background:rgba(240,165,0,0.05)}
.opt-btn.selected{border-color:var(--amber);color:var(--text);background:var(--amber-glow)}
.opt-btn.correct{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.opt-btn.incorrect{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.opt-btn.locked-opt{cursor:default}
.commit-btn{display:block;width:100%;padding:11px;background:transparent;border:1px solid var(--border-amber);border-radius:3px;color:var(--amber);font-family:var(--ui);font-size:.82rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:4px}
.commit-btn:not(:disabled):hover{background:var(--amber-dim);box-shadow:0 0 12px rgba(240,165,0,.2)}
.commit-btn:disabled{opacity:.3;cursor:not-allowed;border-color:var(--border)}
.fb-panel{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s}
.fb-panel.show{max-height:300px;padding:16px}
.fb-label{font-family:var(--ui);font-size:.72rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px}
.fb-label.correct{color:var(--green)}
.fb-label.incorrect{color:var(--red)}
.fb-text{font-family:var(--body);font-size:.92rem;color:var(--text-dim);line-height:1.6}
.fb-panel.correct-fb{border-top:1px solid rgba(34,197,94,0.2);background:rgba(34,197,94,0.04)}
.fb-panel.incorrect-fb{border-top:1px solid rgba(224,58,58,0.2);background:rgba(224,58,58,0.04)}
.drill-refs{background:var(--navy-card);border:1px solid var(--border);border-radius:4px;margin-top:16px;max-height:0;overflow:hidden;transition:max-height .5s ease}
.drill-refs.show{max-height:1200px}
.dr-inner{padding:24px}
.dr-title{font-family:var(--display);font-size:1.4rem;letter-spacing:3px;color:var(--text);margin-bottom:4px}
.dr-sub{font-family:var(--body);font-size:.88rem;color:var(--text-muted);margin-bottom:20px}
.ref-item{padding:14px 0;border-bottom:1px solid var(--border)}
.ref-item:last-of-type{border-bottom:none}
.ri-name{font-family:var(--ui);font-size:.88rem;font-weight:700;letter-spacing:.08em;color:var(--text);margin-bottom:3px}
.ri-pub{font-family:var(--mono);font-size:.6rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.ri-link{font-family:var(--mono);font-size:.62rem;color:var(--amber);letter-spacing:.08em;text-decoration:none;border-bottom:1px solid var(--border-amber)}
.ri-link:hover{color:#d4920a}
.score-bar{display:flex;align-items:center;gap:20px;padding:16px 0;border-top:1px solid var(--border);margin-top:16px}
.score-val{font-family:var(--display);font-size:2.4rem;color:var(--amber);line-height:1}
.score-lbl{font-family:var(--ui);font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted)}
@media(max-width:600px){.sc-grid{grid-template-columns:1fr}.q-head{flex-direction:column;gap:4px}.q-skill{text-align:left}}
</style>
</head>
<body>
<header class="site-header">
  <svg width="32" height="36" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
    <path d="M50 5 L95 25 L95 60 C95 82 75 100 50 108 C25 100 5 82 5 60 L5 25 Z" fill="#f0a500" fill-opacity=".12" stroke="#f0a500" stroke-width="2"/>
    <text x="50" y="70" text-anchor="middle" font-family="Bebas Neue" font-size="36" fill="#f0a500">HT</text>
  </svg>
  <div class="site-title">HAZMAT <span>TACTICAL</span></div>

</header>

<div class="wrap">
  <div class="hero">
    <div class="hero-badge">⚡ Scenario-Based Drill</div>
    <h1>EV Scene<br>Size-Up</h1>
    <p class="hero-sub">Reference-backed scenario drills for electric vehicle emergency response — hazard recognition, isolation, PPE, suppression, and post-incident authority.</p>
    <div class="hero-rule"></div>
    <div class="level-controls">
      <span class="level-label">Training Level</span>
      <div class="toggle-group">
        <button class="toggle-btn active" data-level="ops" onclick="setLevel('ops')">Operations</button>
        <button class="toggle-btn" data-level="tech" onclick="setLevel('tech')">Technician</button>
      </div>
    </div>
    <button class="gen-btn" onclick="generateDrill()">Generate Drill</button>
    <div><span class="disclaimer">⚠ Not for use during live incidents</span></div>
  </div>

  <div id="drillArea"></div>
</div>
<script>
// ================================================================
// SOURCES
// ================================================================
var SRC={
  erg147:{n:'ERG 2024, Guide 147 — Lithium Ion Batteries',p:'U.S. DOT PHMSA',u:'https://www.phmsa.dot.gov/hazmat/erg/emergency-response-guidebook-erg'},
  oshaLiIon:{n:'OSHA — Lithium Ion Battery Hazards',p:'OSHA / U.S. Department of Labor',u:'https://www.osha.gov/lithium-batteries'},
  teexEmissions:{n:'TEEX / UL FSRI — EV Battery Fire Emissions Research',p:'Texas A&M TEEX / UL Fire Safety Research Institute',u:'https://fsri.org'},
  nfpaAFV:{n:'NFPA — Alternative Fuel Vehicles Emergency Response',p:'NFPA',u:'https://www.nfpa.org/resources/resources-and-tools/for-first-responders/alternative-fuel-vehicles'},
  nfpa855:{n:'NFPA 855 (2023) — Standard for ESS Installation',p:'NFPA',u:'https://www.nfpa.org/codes-and-standards/nfpa-855'},
  ntsbEV:{n:'NTSB — EV Battery Fire Safety Findings',p:'National Transportation Safety Board',u:'https://www.ntsb.gov'},
  niosh:{n:'NIOSH — IDLH Documentation',p:'NIOSH / Centers for Disease Control',u:'https://www.cdc.gov/niosh/idlh'},
  faaVent:{n:'FAA — Battery Vent Gas Flammability Research',p:'FAA William J. Hughes Technical Center',u:'https://www.fire.tc.faa.gov'}
};

// ================================================================
// REFERENCE LIBRARY — reusable ref panels
// ================================================================
var R={
  erg_fire:{t:'ERG 2024, Guide 147 — Fire Response',c:'A lithium ion battery fire may <span class="hl">reignite at any point</span> after the initial fire is extinguished, <span class="warn">up to weeks later</span> where pack cooling was incomplete. Use thermal imaging, if available, to continuously monitor the battery pack.',src:SRC.erg147},
  erg_iso:{t:'ERG 2024, Guide 147 — Isolation Distances',c:'Initial isolation: <span class="hl">100 ft (30 m) in all directions</span>. LARGE BATTERY FIRE: Consider initial evacuation of emergency responders for <span class="hl">330 ft (100 m)</span> in all directions. BESS or multi-vehicle events may warrant extended isolation.',src:SRC.erg147},
  erg_water:{t:'ERG 2024, Guide 147 — Suppression Guidance',c:'If available, use <span class="hl">large amount of water</span> to extinguish or suppress a high-voltage battery fire. <span class="warn">CAUTION: Salt water is not recommended</span> as it may increase hydrogen and hydrogen fluoride gas production. Water cannot stop an established internal thermal runaway — the goal is external cooling and exposure management.',src:SRC.erg147},
  osha_gas:{t:'OSHA — Thermal Runaway Off-Gas Hazards',c:'Thermal runaway can produce: <span class="warn">hydrogen fluoride (HF)</span>, hydrogen chloride (HCl), <span class="warn">hydrogen cyanide (HCN)</span>, phosphoryl fluoride (POF₃), <span class="warn">carbon monoxide (CO)</span>, CO₂, black carbon, and other hazardous chemicals and particulates. All are produced with or without visible flame.',src:SRC.oshaLiIon},
  teex_conc:{t:'TEEX / UL FSRI — Measured Toxic Concentrations',c:'CO: up to <span class="warn">25,000 ppm</span> (IDLH 1,200 ppm). HF: measured at <span class="warn">IDLH levels (30 ppm)</span> in both cell-stack and module tests. HCN: <span class="warn">34–200 ppm</span> (IDLH 50 ppm). Formaldehyde: up to <span class="warn">150× OSHA 8-hr limit</span>.',src:SRC.teexEmissions},
  niosh_idlh:{t:'NIOSH — IDLH Values for Primary EV Off-Gases',c:'HF IDLH: <span class="warn">30 ppm</span> | HCN IDLH: <span class="warn">50 ppm</span> | CO IDLH: <span class="warn">1,200 ppm</span><br>Perimeter readings are floor values. Approach-zone concentrations are significantly higher. IDLH is not a safe-entry threshold — it defines <span class="hl">immediately dangerous to life and health</span>.',src:SRC.niosh},
  ntsb_reinit:{t:'NTSB — EV Battery Re-Ignition Data',c:'Documented re-ignition events have occurred <span class="hl">20 minutes to more than 24 hours</span> after apparent suppression. The HV battery pack retains <span class="warn">full voltage internally</span> even after 12V disconnect. Pack temperature drop is not confirmation of thermal stabilization.',src:SRC.ntsbEV},
  nfpa855_auth:{t:'NFPA 855 (2023) — Post-Incident Authority',c:'The <span class="hl">Authority Having Jurisdiction (AHJ)</span> holds post-incident disposition authority. Manufacturer emergency guidance must be obtained for pack condition assessment. The <span class="hl">Fire Marshal</span> coordinates release authorization. Responding crew coordinates and documents — it does not unilaterally authorize or deny release.',src:SRC.nfpa855},
  nfpa_hvac:{t:'NFPA / OSHA — HVAC Distribution Hazard',c:'EV battery off-gas travels through <span class="warn">HVAC ductwork, stairwells, and elevator shafts</span> into occupied areas beyond the immediate fire floor. The primary hazard is chemical distribution — not oxygen supply to the fire. <span class="hl">NMC thermal runaway is self-oxidizing</span>; the cathode releases its own oxygen during decomposition.',src:SRC.oshaLiIon},
  nfpa_scba:{t:'NFPA / OSHA — Minimum Respiratory Protection',c:'Full structural PPE with <span class="hl">SCBA positive pressure</span> is required for all operations within the isolation zone of an active or recently active EV battery event. APRs cannot filter HF, HCN, or CO at concentrations produced during thermal runaway. SCBA is required <span class="warn">with or without visible flame</span>.',src:SRC.nfpaAFV},
  faa_chem:{t:'FAA — Battery Chemistry and Vent Gas Profile',c:'<span class="hl">NMC (Nickel Manganese Cobalt):</span> Onset ~150°C (302°F). Cathode releases oxygen — self-sustaining fire without external air supply.<br><span class="hl">LFP (Lithium Iron Phosphate):</span> Onset ~270°C (518°F). Does not release oxygen but still produces HF, CO, and flammable vent gases. All lithium-ion chemistries contain LiPF₆ electrolyte — HF production is chemistry-independent.',src:SRC.faaVent},
  nfpa_phev:{t:'NFPA AFV Guide — PHEV Hazard Profile',c:'Plug-in hybrids present <span class="warn">dual hazard</span>: conventional gasoline fuel fire risk PLUS lithium-ion battery thermal runaway risk. Both must be managed simultaneously. Pack size is smaller than full EVs but thermal runaway risk is equivalent. Fuel spill ignition can trigger battery thermal event and vice versa.',src:SRC.nfpaAFV},
  erg_water_goal:{t:'ERG 2024 / NFPA — What Water Actually Does',c:'Water cannot stop an <span class="warn">established internal thermal runaway</span>. Once the internal exothermic cascade is underway, it is self-sustaining. Water manages <span class="hl">external fire, cools exposures, and slows heat transfer to adjacent cells</span>. The internal reaction must exhaust available fuel.',src:SRC.erg147}
};

// ================================================================
// SCENARIO DATA
// ================================================================
var VEHICLES=[
  {type:'Passenger EV Sedan',volt:'200–400V',energy:'40–100 kWh',chem:'NMC (common)',batteryLoc:'Underfloor slab, full vehicle length'},
  {type:'Passenger EV SUV / Crossover',volt:'300–800V*',energy:'60–200 kWh',chem:'NMC (common)',batteryLoc:'Underfloor slab',note:'*800V on select high-performance platforms only'},
  {type:'Plug-in Hybrid (PHEV)',volt:'100–350V',energy:'8–40 kWh',chem:'NMC or LFP',batteryLoc:'Under rear seat / trunk floor'},
  {type:'Electric Delivery Van',volt:'400–700V',energy:'80–200 kWh',chem:'NMC or LFP',batteryLoc:'Underfloor or frame-mounted'},
  {type:'Electric Transit Bus',volt:'600–750V',energy:'150–600 kWh',chem:'LFP (common)',batteryLoc:'Roof-mounted or underfloor modules'},
  {type:'E-Bike / E-Scooter',volt:'36–72V',energy:'0.5–2 kWh',chem:'NMC (common)',batteryLoc:'Frame-integrated or removable pack'},
  {type:'Electric Motorcycle',volt:'48–96V',energy:'5–20 kWh',chem:'NMC or LFP',batteryLoc:'Frame-integrated'},
  {type:'BESS Module (Commercial)',volt:'480–1,500V',energy:'100–2,000+ kWh',chem:'NMC or LFP',batteryLoc:'Fixed installation — rack or containerized'}
];
var INCIDENTS=[
  {type:'Active Battery Fire',desc:'Vehicle / unit confirmed on fire with visible flame and/or heavy smoke from battery area'},
  {type:'Thermal Runaway — No Visible Flame',desc:'Chemical odor, audible hissing, and/or heat signature with no open flame — early thermal event suspected'},
  {type:'Post-Collision Battery Damage',desc:'Structural impact to battery area confirmed — thermal event has not yet manifested but cell damage is suspected'},
  {type:'Submerged Vehicle Recovery',desc:'Vehicle submerged for extended period — recovery underway with confirmed battery damage'},
  {type:'ESS / BESS Facility Alarm',desc:'Facility battery alarm active — no visible fire or smoke; facility worker reports possible false alarm'},
  {type:'Charging Station Fire',desc:'Fire at or near active charging infrastructure — one or more plugged-in vehicles involved'},
  {type:'Overheating / Smoking Pack',desc:'Smoke or chemical odor from battery area — thermal runaway may be developing'},
  {type:'Post-Suppression Monitoring',desc:'Fire appears knocked down — unit on scene for re-ignition monitoring and disposition'}
];
var LOCATIONS=[
  {name:'Highway / Interstate',conf:'Open roadway',vent:'Wind-dependent',exp:'Adjacent traffic, guardrail barriers, overpass below'},
  {name:'Parking Structure',conf:'Enclosed — multiple levels',vent:'Mechanical HVAC — off-gas distributes to all floors',exp:'Occupied vehicle, HVAC intakes, stairwells, elevator shafts'},
  {name:'Residential Street',conf:'Semi-open',vent:'Natural — wind-dependent',exp:'Adjacent structures, HVAC intakes, pedestrians'},
  {name:'Shopping Center Lot',conf:'Open with adjacent structures',vent:'Natural with HVAC exposure',exp:'Adjacent occupied building, charging infrastructure, high pedestrian traffic'},
  {name:'Transit Depot',conf:'Partially enclosed',vent:'Mechanical — duct network',exp:'Adjacent buses, maintenance personnel, fuel storage'},
  {name:'Public Charging Station',conf:'Open or semi-covered canopy',vent:'Natural ventilation',exp:'Multiple plugged-in vehicles, electrical infrastructure'},
  {name:'Waterway / Canal',conf:'Open — water access',vent:'Wind-dependent',exp:'Recovery crew, waterway contamination, marine traffic'},
  {name:'ESS / BESS Facility',conf:'Enclosed — purpose-built',vent:'Engineered suppression and ventilation',exp:'Rack-mounted adjacent modules, facility personnel, built-in suppression systems'}
];
var CONDITIONS=[
  {time:'Night — 0230 hours',wx:'Clear, wind calm',note:'Reduced visibility. Delayed discovery likely.'},
  {time:'Daytime — 1400 hours',wx:'Hot, 95°F (35°C) ambient',note:'High ambient temperature may accelerate external heat transfer to adjacent cells.'},
  {time:'Daytime — 1000 hours',wx:'Rain, 45°F (7°C)',note:'Water runoff management required. Cold ambient does NOT suppress established internal thermal runaway.'},
  {time:'Evening — 1830 hours',wx:'Overcast, moderate wind 15 mph (24 km/h)',note:'Wind affecting plume direction. Account for off-gas dispersion downwind.'},
  {time:'Night — 2100 hours',wx:'Freezing, 25°F (-4°C)',note:'Cold ambient temperature does not meaningfully slow an established internal thermal runaway. Do not reduce operational urgency based on ambient temperature.'}
];
// ================================================================
// QUESTION BANKS
// ================================================================
// Format: {cat, skill, refs:[{t,c,src}], q, ans:[{text,correct,trap?}], sources:[SRC.x]}

var BANKS={
hr:{ops:[
  {cat:'Initial Size-Up',skill:'Thermal Event Recognition',refs:[R.erg_fire,R.osha_gas],
   q:'First-arriving unit reports a parked EV with no visible smoke or flame but a strong chemical odor and audible hissing. What is the correct immediate action?',
   ans:[
    {text:'Establish initial isolation, don full structural PPE and SCBA, and treat as thermal runaway in progress.',correct:true},
    {text:'Approach the vehicle without PPE to confirm the odor source before committing resources.',correct:false,trap:'Chemical odor and audible hissing are confirmed thermal runaway indicators. HF and HCN are present in the off-gas before visible flame. Approaching without SCBA and structural PPE risks immediate toxic exposure.'},
    {text:'Ventilate the area and monitor for 15 minutes before committing resources.',correct:false,trap:'Delaying intervention allows thermal runaway to progress. Ventilating without monitoring can spread toxic off-gas through HVAC pathways to occupied areas.'},
    {text:'Contact the manufacturer before any on-scene action.',correct:false,trap:'Manufacturer contact is appropriate later. Initial isolation and life safety do not wait for manufacturer guidance.'}
   ],sources:[SRC.erg147,SRC.oshaLiIon]},
  {cat:'Cold Weather Assessment',skill:'Risk-Benefit Analysis',refs:[R.erg_fire],
   q:'A crew member states that freezing temperatures at the scene will slow the thermal runaway reaction. Is this accurate, and how should it affect your operational urgency?',
   ans:[
    {text:'Inaccurate. Cold ambient temperature does not meaningfully slow an established internal thermal runaway. Operational urgency is unchanged.',correct:true},
    {text:'Accurate — freezing temperatures significantly suppress lithium-ion thermal reactions and allow more time for resource staging.',correct:false,trap:'The exothermic reaction is internally self-sustaining. Ambient temperature does not control the internal cascade once initiated. This misconception has led to delayed action.'},
    {text:'Partially accurate — cold slows early stages, giving extra time before full thermal runaway develops.',correct:false,trap:'Cold does not reliably slow any stage of established internal thermal runaway in lithium cells. Onset temperature is determined by internal chemistry, not ambient conditions.'},
    {text:'Accurate — reduce SCBA requirements when ambient temperature is below 32°F (0°C).',correct:false,trap:'PPE requirements are not modified by ambient temperature. Toxic off-gases are produced regardless of ambient conditions.'}
   ],sources:[SRC.erg147]},
  {cat:'Re-Ignition Recognition',skill:'Post-Knockdown Hazard Assessment',refs:[R.ntsb_reinit,R.erg_fire],
   q:'An hour after apparent suppression, a sedan EV begins producing thin white smoke from the battery compartment. What does this indicate and what is your response?',
   ans:[
    {text:'Thermal runaway is likely restarting in incompletely cooled cells. Re-ignition risk is real — reassess immediately and prepare to resume suppression.',correct:true},
    {text:'Residual steam from water application — normal post-suppression behavior. Monitor for 10 minutes.',correct:false,trap:'Thin white smoke appearing an hour after knockdown is not residual steam. Steam dissipates quickly. Late-onset smoke indicates continuing or restarting thermal activity in incompletely cooled cells.'},
    {text:'Off-gassing is complete. White smoke indicates the reaction is winding down — the scene is stabilizing.',correct:false,trap:'Post-suppression smoke is not a clearance signal. Thermal events can restart in incompletely cooled cells with no warning. White smoke from the pack is the opposite of clearance.'},
    {text:'Battery chemistry prevents re-ignition after water has been applied.',correct:false,trap:'Water does not chemically prevent re-ignition. It only manages heat — and only while actively applied. Re-ignition has been documented more than 24 hours after knockdown.'}
   ],sources:[SRC.ntsbEV,SRC.erg147]},
  {cat:'PHEV Hazard Profile',skill:'Dual-Hazard Recognition',refs:[R.nfpa_phev],
   q:'You respond to a PHEV post-collision with a confirmed gasoline spill and suspected battery damage. What does the PHEV classification add to your hazard profile compared to a full EV?',
   ans:[
    {text:'A gasoline fuel hazard in addition to battery thermal event risk — both must be managed simultaneously.',correct:true},
    {text:'Nothing significant — PHEVs use the same battery chemistry as full EVs and present the same hazard profile.',correct:false,trap:'While battery chemistry is similar, PHEVs add a gasoline fuel hazard that full EVs do not have. A fuel spill adds ignition risk and hazmat runoff concern as a second simultaneous hazard stream.'},
    {text:'Reduced battery hazard because PHEV packs are smaller — focus on the fuel spill.',correct:false,trap:'Pack size affects stored energy but does not eliminate thermal runaway risk. The additive fuel hazard is the key change, not a reduced battery risk.'},
    {text:'Higher system voltage than a full EV due to the combined drivetrain.',correct:false,trap:'PHEV voltage is typically lower than full EVs (100–350V). The hazard change is additive fuel, not higher voltage.'}
   ],sources:[SRC.nfpaAFV]},
  {cat:'Submerged Vehicle',skill:'Post-Submersion Risk Assessment',refs:[R.ntsb_reinit],
   q:'A submerged EV is being recovered from a canal after 8 hours. A bystander says it is safe because the water cooled it. How do you respond?',
   ans:[
    {text:'Disagree — damaged cells can reactivate on air exposure. Treat extraction as a potential thermal event with suppression staged and ready.',correct:true},
    {text:'Agree — 8 hours of submersion provides complete pack cooling and eliminates thermal risk.',correct:false,trap:'Submersion cools externally but does not neutralize damaged cells. Air exposure on extraction can reactivate a thermal event. Post-submersion thermal events have been documented hours after recovery.'},
    {text:'Agree if submersion time exceeded 6 hours.',correct:false,trap:'There is no submersion duration that guarantees safety. Cell damage determines reactivation risk, not how long the vehicle was submerged.'},
    {text:'Agree only if the battery compartment appears visually intact.',correct:false,trap:'Damage may not be externally visible. Visual appearance does not confirm cell integrity after submersion and mechanical stress.'}
   ],sources:[SRC.ntsbEV]},
  {cat:'Charging Station Fire',skill:'Scene Complexity Recognition',refs:[R.erg_fire,R.osha_gas],
   q:'A charging station fire involves one fully involved EV and a second plugged-in EV that appears undamaged. What is your priority regarding the second vehicle?',
   ans:[
    {text:'Isolate both vehicles. Assess whether the second can be safely unplugged to interrupt charge feedback — do not approach without full PPE and SCBA.',correct:true},
    {text:'The second vehicle is low priority — no fire is visible.',correct:false,trap:'Electrical proximity to an active thermal event places the second vehicle at risk from charge feedback and sympathetic thermal runaway. Apparent normalcy is not confirmation of safety.'},
    {text:'Unplug the second vehicle immediately as the first action on scene before donning PPE.',correct:false,trap:'Approaching without PPE and scene assessment is not appropriate. Isolate the area, don PPE, then assess safe access to the second vehicle.'},
    {text:'The second vehicle has automatic circuit protection that handles charge isolation during fires.',correct:false,trap:'Charging circuit protection does not guarantee isolation from thermal hazards in an active fire scenario.'}
   ],sources:[SRC.erg147,SRC.oshaLiIon]},
  {cat:'HF Detection',skill:'Atmospheric Indicator Interpretation',refs:[R.teex_conc,R.niosh_idlh],
   q:'Air monitoring at the scene perimeter detects hydrogen fluoride at low concentration. What does this indicate tactically?',
   ans:[
    {text:'Active thermal decomposition of lithium cell electrolyte is underway. Concentrations may escalate rapidly toward IDLH. SCBA is mandatory for all approach.',correct:true},
    {text:'The pack has fully vented — HF concentration will decrease from here.',correct:false,trap:'Low initial concentration may indicate early thermal decomposition, not the end of it. Concentrations can increase significantly as the event progresses.'},
    {text:'Concentrations below IDLH are not actionable. Continue current approach without modification.',correct:false,trap:'IDLH is not a "safe below this value" threshold. Perimeter readings are floor values. Approach-zone concentrations are higher. Any HF detection signals active thermal decomposition.'},
    {text:'HF at low concentration indicates a separate chemical hazard unrelated to the battery event.',correct:false,trap:'HF is a confirmed thermal decomposition product of LiPF₆-based electrolytes used in lithium-ion batteries. Its presence at the perimeter confirms the battery event is actively off-gassing.'}
   ],sources:[SRC.teexEmissions,SRC.niosh]},
  {cat:'Re-Ignition Timeline',skill:'Threshold Recognition',refs:[R.ntsb_reinit],
   q:'A crew member asks how long re-ignition risk remains after suppression. What is the correct answer?',
   ans:[
    {text:'Until pack cooling is fully confirmed — re-ignition risk can extend days to weeks without complete thermal stabilization.',correct:true},
    {text:'30 minutes — standard overhaul time accounts for this.',correct:false,trap:'Standard 30-minute overhaul was developed for conventional fires and does not account for the re-ignition characteristics of lithium-ion cells.'},
    {text:'24 hours — the established EV monitoring period.',correct:false,trap:'24 hours is a minimum monitoring baseline, not a definitive endpoint. Pack temperature and cooling completeness determine actual risk duration — not elapsed time.'},
    {text:'Risk ends when smoke production stops.',correct:false,trap:'Smoke cessation does not indicate thermal stabilization. Internal reactions can continue without visible external indicators.'}
   ],sources:[SRC.ntsbEV,SRC.erg147]},
  {cat:'HVAC Pathway Hazard',skill:'Hazard Pathway Recognition',refs:[R.nfpa_hvac],
   q:'An EV fire in a parking structure appears controlled. Outside the building, HVAC exhaust is producing visible fumes. What is the hazard?',
   ans:[
    {text:'HVAC is distributing toxic off-gas through the structure — evacuation must follow ventilation pathways, not just proximity to the vehicle.',correct:true},
    {text:'HVAC exhaust is a building management concern, not a fire department issue.',correct:false,trap:'Battery off-gas distributed through HVAC exposes building occupants far beyond the vehicle area. Evacuation following ventilation pathways is a fire department life safety function.'},
    {text:'The fumes are residual steam from suppression water in the ductwork.',correct:false,trap:'Sustained HVAC fumes after apparent suppression indicate continuing off-gas generation, not residual steam.'},
    {text:'HVAC ventilation is helping by dispersing and diluting the hazard.',correct:false,trap:'HVAC distributes the hazard into occupied areas throughout the building. Dispersion does not make toxic concentrations safe for building occupants.'}
   ],sources:[SRC.oshaLiIon,SRC.nfpaAFV]},
  {cat:'BESS Alarm',skill:'Hazard Confirmation Protocol',refs:[R.erg_fire,R.teex_conc],
   q:'A battery alarm at a commercial BESS facility — no visible fire or smoke. The facility worker says it is probably a false alarm. Your priority?',
   ans:[
    {text:'Treat as a confirmed thermal event until monitoring rules it out. Establish isolation and request the facility emergency action plan.',correct:true},
    {text:'Accept the worker\'s assessment, reset the alarm, and monitor for 15 minutes.',correct:false,trap:'A facility worker\'s assessment does not override hazard confirmation protocol. Thermal runaway can precede visible indicators. Accepting the false alarm assessment has led to delayed response in documented incidents.'},
    {text:'Apply water to the modules as a precaution before confirming the hazard location.',correct:false,trap:'Applying water before locating and confirming the hazard is not appropriate. Indiscriminate water application may interfere with engineered suppression systems.'},
    {text:'Wait for visible smoke before committing resources.',correct:false,trap:'Waiting for visible confirmation while thermal runaway progresses risks a much larger event. BESS alarms must be treated as real until confirmed otherwise.'}
   ],sources:[SRC.erg147,SRC.teexEmissions]}
],
tech:[
  {cat:'Off-Gas Monitoring',skill:'Instrument Selection & Interpretation',refs:[R.teex_conc,R.niosh_idlh],
   q:'Air monitoring shows HCN at 8 ppm and HF at 2 ppm at the scene perimeter. NIOSH IDLH: HCN = 50 ppm; HF = 30 ppm. What is the correct tactical assessment?',
   ans:[
    {text:'Perimeter readings indicate active thermal decomposition. Approach-zone concentrations are higher. SCBA is mandatory for all hot zone entry regardless of perimeter values.',correct:true},
    {text:'Both values are well below IDLH — monitor and proceed with current approach without modification.',correct:false,trap:'Perimeter values are floor readings. Approach-zone concentrations may be several times higher. IDLH headroom based on perimeter data is not a sound assumption.'},
    {text:'HCN is the priority at 8 ppm. HF at 2 ppm is below OSHA PEL and negligible.',correct:false,trap:'Both represent active thermal decomposition products. Combined exposure effects are additive. HF at 2 ppm at the perimeter does not mean approach-zone concentrations are safe.'},
    {text:'Values below 10 ppm for either gas mean SCBA is not required.',correct:false,trap:'SCBA is required for any EV fire approach regardless of monitoring values. Monitoring informs isolation geometry — not the PPE level required.'}
   ],sources:[SRC.teexEmissions,SRC.niosh]},
  {cat:'Battery Chemistry Interpretation',skill:'Chemistry-to-Tactics Translation',refs:[R.faa_chem],
   q:'A transit bus with LFP (Lithium Iron Phosphate) chemistry is involved in a fire. A crew member says LFP is safer and the crew can back off. How do you respond?',
   ans:[
    {text:'LFP has a higher onset threshold (~270°C / 518°F), but once thermal runaway begins it still produces HF, CO, and HCN. All electrolyte-based chemistries produce toxic off-gas. SCBA and isolation requirements are unchanged.',correct:true},
    {text:'Agree — LFP has significantly lower thermal runaway risk and reduced PPE requirements.',correct:false,trap:'LFP has higher thermal stability but does not eliminate toxic off-gas production. All lithium-ion chemistries contain LiPF₆ electrolyte — HF production is chemistry-independent. SCBA is required for all.'},
    {text:'Agree — LFP does not release oxygen during thermal runaway, so water can extinguish it easily.',correct:false,trap:'While LFP does not release oxygen from the cathode, the fire is still driven by exothermic cell decomposition. Water volume requirements and cooling strategy are similar to NMC.'},
    {text:'Agree — LFP is used in transit buses because it is inherently non-hazardous.',correct:false,trap:'LFP is selected for transit buses for its longer cycle life and safety profile, not because it is non-hazardous. Thermal events still produce toxic off-gas and require full PPE.'}
   ],sources:[SRC.faaVent,SRC.teexEmissions]},
  {cat:'Self-Sustaining Reaction',skill:'Thermal Runaway Mechanism',refs:[R.erg_water_goal,R.faa_chem],
   q:'Thermal imaging shows a battery pack at 180°C (356°F). NMC thermal runaway onset is approximately 150°C (302°F). A crew member requests confirmation that enough water will stop the reaction. Your response?',
   ans:[
    {text:'Negative. At 180°C with NMC chemistry, internal thermal runaway is in progress. Water manages external fire and slows propagation — it cannot halt the internal self-sustaining reaction. The reaction must exhaust available fuel.',correct:true},
    {text:'Correct — apply 10,000–30,000 gallons directly to the pack to halt the reaction at this temperature.',correct:false,trap:'No volume of water halts an established internal thermal runaway. This is a critical operational misconception. Water manages external fire and exposures — not internal cell chemistry.'},
    {text:'The pack is near onset but has not yet reached thermal runaway at 180°C.',correct:false,trap:'180°C exceeds the NMC onset threshold of 150°C (302°F). Thermal runaway is in progress, not approaching.'},
    {text:'Thermal cameras cannot accurately read through battery pack housings — the reading is unreliable.',correct:false,trap:'180°C surface temperature on a pack is a confirmed thermal event indicator. Camera limitations do not change the tactical significance of a high surface temperature reading.'}
   ],sources:[SRC.erg147,SRC.faaVent]},
  {cat:'BESS Hazard Scaling',skill:'Energy Scale Assessment',refs:[R.erg_iso,R.teex_conc],
   q:'A 2 MWh commercial BESS installation has an active alarm. No fire visible. How does the energy scale of this installation change your approach compared to a passenger sedan event?',
   ans:[
    {text:'Energy scale dramatically changes isolation geometry, off-gas volume potential, and suppression requirements. Isolation must be established in coordination with the facility emergency action plan and scaled to actual hazard potential.',correct:true},
    {text:'Same approach — lithium-ion chemistry is the same regardless of installation size.',correct:false,trap:'Same chemistry, radically different energy scale. A 2 MWh system is 20–50 times the energy of a passenger sedan. Off-gas volume, isolation distance, and suppression water volume all scale accordingly.'},
    {text:'Use the facility isolation plan as-is — it was engineered for this system.',correct:false,trap:'Facility plans are a starting point. Fire department authority and on-scene assessment govern actual isolation. Facility plans may not account for worst-case off-gas distribution.'},
    {text:'Isolation scales linearly — twice the energy means twice the distance.',correct:false,trap:'Isolation does not scale linearly with energy. Hazard geometry, off-gas volume, ventilation, and plume modeling all influence the calculation.'}
   ],sources:[SRC.erg147,SRC.teexEmissions]},
  {cat:'Electrolyte Release Hazard',skill:'Pre-Fire Chemical Hazard Recognition',refs:[R.faa_chem,R.osha_gas],
   q:'A post-collision EV on a highway overpass shows a ruptured battery pack with visible electrolyte release and no fire. What is the chemical hazard from the electrolyte alone?',
   ans:[
    {text:'LiPF₆-based electrolyte reacts with atmospheric moisture to produce HF. This is a chemical hazard independent of fire. Treat as a pre-event hazmat scenario with full PPE.',correct:true},
    {text:'Electrolyte release is a slip hazard only — no air quality concern exists without active fire.',correct:false,trap:'LiPF₆ electrolyte reacts with atmospheric moisture to form HF on contact. This is a chemical hazard independent of combustion. Ignoring pre-fire electrolyte release is operationally dangerous.'},
    {text:'Electrolyte spills are equivalent to a fuel spill — use standard fuel spill isolation.',correct:false,trap:'LiPF₆ electrolyte is not equivalent to a fuel spill. HF generation on moisture contact and the delayed thermal runaway risk differentiate it from petroleum products.'},
    {text:'No hazmat concern until visible smoke or fire confirms a thermal event.',correct:false,trap:'The wait-for-fire approach bypasses the pre-thermal intervention window where isolation and PPE protect responders from both chemical and thermal hazards.'}
   ],sources:[SRC.faaVent,SRC.oshaLiIon]},
  {cat:'Salvage Yard Scaling',skill:'Multi-Pack Hazard Multiplication',refs:[R.erg_iso,R.erg_water_goal],
   q:'A salvage yard reports a smoldering pile of crushed lithium-ion battery components from multiple vehicles. How does this differ from a single-vehicle event?',
   ans:[
    {text:'Multiple damaged packs represent a much larger energy release and off-gas volume. Isolation distances, water supply, and runoff containment must all scale accordingly.',correct:true},
    {text:'No meaningful difference — lithium-ion chemistry is the same regardless of quantity.',correct:false,trap:'Quantity dramatically changes the energy involved, off-gas volume, suppression water requirements, and isolation geometry.'},
    {text:'Crushed cells are fully discharged — the energy hazard is eliminated on crushing.',correct:false,trap:'Crushing does not discharge cells — it damages them and increases short-circuit risk. Thermal events are common in crushed battery components.'},
    {text:'Water suppression is contraindicated for all salvage battery fires.',correct:false,trap:'Water is the primary suppression agent for battery fires. Volume requirements and runoff management are the tactical differences from single-vehicle events.'}
   ],sources:[SRC.erg147]},
  {cat:'BESS Nitrogen System Entry',skill:'Oxygen-Deficient Atmosphere Recognition',refs:[R.niosh_idlh],
   q:'A BESS facility automatic suppression system used nitrogen flooding to suppress fire in a sealed module room. Fire department arrives post-flooding. Entry decision?',
   ans:[
    {text:'The module room is an IDLH oxygen-deficient atmosphere. SCBA is mandatory for entry. Ventilate before entry if tactically possible, or enter with SCBA and backup team in place.',correct:true},
    {text:'Nitrogen atmosphere is safe for entry with structural PPE — nitrogen is non-toxic.',correct:false,trap:'Nitrogen flooding displaces oxygen below safe breathing levels. Entry into a nitrogen-flooded space without supplied air is an asphyxiation hazard. Nitrogen is non-toxic but IDLH due to oxygen displacement.'},
    {text:'Wait 30 minutes for nitrogen to dissipate naturally before entry.',correct:false,trap:'Nitrogen dissipation rate in a sealed room cannot be predicted without ventilation and monitoring. 30 minutes is not a recognized clearance time.'},
    {text:'SCBA is required only if battery fire products are also present alongside the nitrogen.',correct:false,trap:'Nitrogen displaces oxygen regardless of co-presence of fire products. The oxygen-deficient atmosphere alone makes it IDLH. SCBA is mandatory.'}
   ],sources:[SRC.niosh]},
  {cat:'HF Skin Exposure',skill:'Toxicological Emergency Recognition',refs:[R.niosh_idlh,R.teex_conc],
   q:'A crew member experienced significant HF skin contact during EV fire suppression despite wearing structural PPE and SCBA. What is the specific medical priority?',
   ans:[
    {text:'Immediate decon with copious water followed by calcium gluconate gel application to exposed areas. Emergent transport — systemic hypocalcemia from fluoride ion penetration is life-threatening.',correct:true},
    {text:'Standard burn treatment — HF causes contact burns like other acids.',correct:false,trap:'HF is a systemic toxin, not just a contact irritant. It depletes calcium causing hypocalcemia and can cause fatal cardiac arrhythmia from fluoride ion penetration. Calcium gluconate is the antidote — not standard burn care.'},
    {text:'Standard wound care — HF burns appear mild and are less severe than other acid burns.',correct:false,trap:'HF burns may appear mild initially while systemic fluoride toxicity progresses internally. Delayed recognition of HF systemic toxicity is a documented cause of death.'},
    {text:'No treatment beyond decon if SCBA was worn — respiratory protection eliminates all exposure risk.',correct:false,trap:'SCBA prevents respiratory exposure but not dermal exposure. HF at high concentrations penetrates structural gear and causes systemic toxicity through skin absorption.'}
   ],sources:[SRC.niosh,SRC.teexEmissions]},
  {cat:'HVAC Oxygen Supply Misconception',skill:'Technical Hazard Correction',refs:[R.nfpa_hvac,R.faa_chem],
   q:'During a parking structure EV fire, a crew member argues against ventilation because it "feeds oxygen to the thermal runaway." Is this reasoning correct?',
   ans:[
    {text:'Incorrect reasoning — NMC thermal runaway is self-oxidizing and does not depend on atmospheric oxygen. The actual HVAC concern is toxic off-gas distribution to building occupants through ductwork and stairwells.',correct:true},
    {text:'Correct — HVAC ventilation directly accelerates the internal thermal runaway reaction.',correct:false,trap:'NMC thermal runaway releases oxygen from the cathode and does not depend on atmospheric oxygen supply. Ventilation decisions must be evaluated against off-gas distribution risk, not oxygen supply to the fire.'},
    {text:'Correct — positive pressure ventilation is always appropriate for EV fires in structures.',correct:false,trap:'PPV during an active EV off-gas event would drive toxic products into occupied areas. Ventilation strategy must follow atmospheric monitoring.'},
    {text:'Partially correct — ventilation feeds the fire but also protects occupants, so it is a tradeoff.',correct:false,trap:'The oxygen-supply concern is technically incorrect for NMC chemistry. The actual tradeoff is between off-gas evacuation and distribution to occupied areas — not fire feeding.'}
   ],sources:[SRC.oshaLiIon,SRC.faaVent]},
  {cat:'Pre-Runaway Recognition',skill:'Onset Temperature Assessment',refs:[R.faa_chem],
   q:'A BESS module registers 140°C (284°F) on thermal imaging during an alarm-only event. NMC thermal runaway onset is approximately 150°C (302°F). What does this reading indicate?',
   ans:[
    {text:'The module is 10°C below NMC onset with no external cooling applied. Thermal runaway is imminent without intervention. Prepare for active event transition immediately.',correct:true},
    {text:'Below onset — this is a monitor-and-wait situation.',correct:false,trap:'At 140°C (284°F) with no cooling applied and no heat sink, temperature will continue rising. Being 10°C below onset is an immediate escalation concern, not a passive monitoring situation.'},
    {text:'BESS modules require 200°C (392°F) before thermal runaway risk is significant.',correct:false,trap:'NMC onset is approximately 150°C (302°F). Waiting until 200°C means thermal runaway has already been active for some time.'},
    {text:'A 140°C surface reading indicates the internal cell temperature is much lower.',correct:false,trap:'A 140°C surface temperature indicates a serious internal event in progress. Assuming safer internal temperatures from a surface reading is not sound practice at this proximity to onset.'}
   ],sources:[SRC.faaVent]}
]},

iso:{ops:[
  {cat:'Isolation Distance',skill:'Distance Interpretation',refs:[R.erg_iso],
   q:'Per ERG Guide 147 (2024), what is the recommended initial isolation distance for a passenger EV battery fire?',
   ans:[
    {text:'100 feet (30 m) in all directions. Expand to 330 feet (100 m) for large packs or escalating multi-vehicle events.',correct:true},
    {text:'25 feet (8 m) — same as a standard vehicle fire.',correct:false,trap:'Standard vehicle fire distances do not account for EV off-gas hazards. ERG 147 provides EV-specific guidance that significantly exceeds standard vehicle perimeters.'},
    {text:'500 feet (150 m) for all EV fires regardless of size.',correct:false,trap:'500 feet exceeds ERG guidance for standard passenger EV fires and may not be operationally practical. ERG 147 provides tiered guidance scaled to incident size.'},
    {text:'IC discretion only — no published distance guidance exists for EV fires.',correct:false,trap:'ERG 147 provides specific distance guidance. IC discretion applies to expansion of distances, not elimination of them.'}
   ],sources:[SRC.erg147]},
  {cat:'Plume Direction',skill:'Wind and Plume Assessment',refs:[R.erg_iso],
   q:'Wind is blowing from the southwest at 18 mph (29 km/h). An EV fire is in an open parking lot. Where is your primary evacuation priority?',
   ans:[
    {text:'Downwind to the northeast — the toxic off-gas plume follows wind direction. Evacuate downwind and uphill where applicable.',correct:true},
    {text:'All directions equally — wind disperses the hazard uniformly.',correct:false,trap:'Wind creates a dominant downwind plume. The hazard concentration is highest along the downwind axis, not uniformly distributed.'},
    {text:'Upwind — personnel there face the greatest heat exposure from the fire.',correct:false,trap:'Upwind personnel face radiant heat from the fire, not the off-gas plume. The chemical hazard moves downwind.'},
    {text:'Perpendicular to the wind — crosswind areas have the highest plume concentration.',correct:false,trap:'The downwind plume centerline carries the highest concentration. Crosswind areas are transitional zones, not the highest-concentration area.'}
   ],sources:[SRC.erg147]},
  {cat:'Enclosed Space Isolation',skill:'Perimeter Geometry Adaptation',refs:[R.erg_iso,R.nfpa_hvac],
   q:'A burning EV in a parking structure has triggered HVAC alarms in the building. How does this change your evacuation plan?',
   ans:[
    {text:'Evacuation must follow HVAC distribution pathways — the entire building may require evacuation if off-gas is confirmed in the system.',correct:true},
    {text:'Evacuation stays limited to the fire floor — structural walls contain the hazard.',correct:false,trap:'HVAC distributes off-gas beyond the fire floor. Structure walls trap the chemical hazard — they do not contain it.'},
    {text:'Evacuate the floor above and below the fire floor only.',correct:false,trap:'HVAC coverage can extend throughout the building. Partial floor evacuation is insufficient when HVAC contamination is confirmed.'},
    {text:'HVAC systems automatically shut off during fire events, limiting spread.',correct:false,trap:'HVAC may not shut down immediately, and gas already in the system continues distributing even after shutdown.'}
   ],sources:[SRC.erg147,SRC.oshaLiIon]},
  {cat:'Dual-Hazard Isolation',skill:'Multi-Hazard Perimeter Setting',refs:[R.erg_iso],
   q:'A PHEV with a confirmed gasoline spill and battery damage is post-collision on a residential street. How do you set isolation?',
   ans:[
    {text:'Use the larger of the two required isolation zones and address both hazards simultaneously.',correct:true},
    {text:'Use only the battery isolation distance — it is larger and covers both hazards by default.',correct:false,trap:'The two hazards have different geometries and plume directions. One distance set to a single hazard may leave parts of the second hazard unaddressed.'},
    {text:'Use gasoline isolation only — it is the more familiar hazard.',correct:false,trap:'Battery off-gas is a different hazard than gasoline vapor and requires separate isolation geometry. Using only one isolation ignores the other hazard completely.'},
    {text:'Wait for hazmat to establish isolation — ops-level crews do not have this authority.',correct:false,trap:'Initial isolation is an ops-level function. Hazmat refines isolation — it does not replace the first-in crew\'s responsibility to establish it.'}
   ],sources:[SRC.erg147]},
  {cat:'Submerged Vehicle Isolation',skill:'Extraction Zone Safety',refs:[R.ntsb_reinit,R.erg_iso],
   q:'During recovery of a submerged EV from a waterway, what isolation consideration applies to the extraction operation?',
   ans:[
    {text:'Isolate the recovery zone. All non-essential personnel must be clear. Suppression must be staged and ready before extraction begins.',correct:true},
    {text:'No isolation needed — the vehicle has been cooled by submersion.',correct:false,trap:'Submersion does not neutralize cell damage. Air exposure on extraction is a known thermal event trigger. Isolation before extraction is required.'},
    {text:'Isolation applies only once fire is visible.',correct:false,trap:'Isolation precedes fire in hazmat response. Waiting for visible fire before isolating is not the ops-level standard.'},
    {text:'Water rescue personnel determine isolation for all submerged vehicle operations.',correct:false,trap:'Hazmat isolation for a battery event is a fire department function. It is coordinated with rescue personnel, not delegated to them.'}
   ],sources:[SRC.ntsbEV,SRC.erg147]},
  {cat:'Large Pack Isolation',skill:'Pack Size to Distance Scaling',refs:[R.erg_iso],
   q:'An electric transit bus fire involves a 300 kWh roof-mounted pack. How does pack size affect your isolation decision?',
   ans:[
    {text:'Expand isolation beyond standard ERG 147 passenger vehicle guidance. A 300 kWh pack represents significantly more energy and off-gas potential than a sedan.',correct:true},
    {text:'No change — chemistry is the hazard, not pack size.',correct:false,trap:'Pack size determines energy available for release and the volume of off-gas producible. Larger packs require larger isolation.'},
    {text:'Roof mounting reduces ground-level hazard — standard passenger vehicle isolation applies.',correct:false,trap:'Roof mounting changes the suppression approach but does not reduce off-gas or thermal hazard. Isolation must be commensurate with pack size.'},
    {text:'Apply BESS facility isolation standards to transit bus fires.',correct:false,trap:'BESS facility protocols apply to fixed installations. Transit bus fires warrant expanded vehicle-level isolation, not fixed-installation protocols.'}
   ],sources:[SRC.erg147]},
  {cat:'Reduction Criteria',skill:'Threshold Recognition',refs:[R.ntsb_reinit,R.niosh_idlh],
   q:'When is it appropriate to reduce isolation distance at an EV fire scene?',
   ans:[
    {text:'When air monitoring confirms concentrations below action levels AND pack temperature has stabilized toward ambient.',correct:true},
    {text:'After 30 minutes with no visible re-ignition.',correct:false,trap:'Elapsed time is not the deciding factor. Air monitoring values and pack temperature — not time — determine when reduction is appropriate.'},
    {text:'When the IC determines the scene is visually stable.',correct:false,trap:'Visual assessment without objective monitoring data is insufficient for isolation reduction at EV fire scenes.'},
    {text:'Isolation once established for an EV fire is permanent until hazmat formally clears the scene.',correct:false,trap:'Isolation can be reduced when objective data supports it. Indefinite isolation is not the standard.'}
   ],sources:[SRC.ntsbEV,SRC.niosh]},
  {cat:'HVAC Exposure Pathway',skill:'Hazard Zone Extension',refs:[R.nfpa_hvac,R.erg_iso],
   q:'An EV fire off-gas is confirmed entering a building HVAC intake 250 feet (76 m) away — beyond the ERG 100 ft (30 m) zone. Does your isolation extend to cover the building?',
   ans:[
    {text:'Yes — a confirmed HVAC exposure pathway extends the hazard zone to the building. Evacuation of affected areas is required.',correct:true},
    {text:'No — the building is beyond the ERG guideline distance.',correct:false,trap:'ERG distances are minimums. A confirmed exposure pathway that extends further requires the perimeter to follow the actual hazard, not just the vehicle proximity.'},
    {text:'Notify building management but do not expand the perimeter.',correct:false,trap:'Notification alone is insufficient when occupants are being actively exposed via HVAC. Evacuation of affected areas is required.'},
    {text:'HVAC concentration is diluted below IDLH levels at 250 ft (76 m).',correct:false,trap:'HVAC concentrates and distributes off-gas — it does not reliably dilute it below action levels for building occupants.'}
   ],sources:[SRC.oshaLiIon,SRC.erg147]}
],tech:[
  {cat:'Isolation Expansion Criteria',skill:'Technical Isolation Decision',refs:[R.erg_iso],
   q:'What specific factors justify expanding initial EV fire isolation from 100 ft (30 m) to 330 ft (100 m) per ERG Guide 147?',
   ans:[
    {text:'Large pack size (transit bus, BESS, multi-vehicle involvement), active venting with confirmed off-gas, or an unstable scene with re-ignition risk.',correct:true},
    {text:'Any active flame — all flaming events require the larger isolation.',correct:false,trap:'Isolation scales with energy and quantity involved, not flame presence alone. A small e-bike fire with active flame does not warrant 330 ft (100 m) isolation.'},
    {text:'Expanded isolation applies only to BESS — vehicle fires use only the 100 ft (30 m) standard.',correct:false,trap:'Transit bus packs (150–600 kWh) and multi-vehicle events can warrant 330 ft (100 m) isolation under ERG 147. The criteria is energy scale, not installation type.'},
    {text:'Expand only when hazmat requests a tech-level response.',correct:false,trap:'Isolation decisions are driven by hazard characteristics, not administrative escalation levels.'}
   ],sources:[SRC.erg147]},
  {cat:'HF Perimeter Data Interpretation',skill:'Toxicological Assessment',refs:[R.niosh_idlh,R.teex_conc],
   q:'Off-gas monitoring at the perimeter shows HF at 1.5 ppm. OSHA PEL for HF is 3 ppm (TWA). NIOSH IDLH is 30 ppm. How does this inform isolation?',
   ans:[
    {text:'Perimeter at 1.5 ppm indicates active off-gassing. Approach-zone concentrations are higher. Maintain or expand isolation until off-gassing stops regardless of PEL headroom.',correct:true},
    {text:'At 1.5 ppm — below the OSHA PEL — isolation can be reduced.',correct:false,trap:'OSHA PEL is a time-weighted average for 8-hour occupational exposure, not an emergency action threshold. Perimeter readings are floor values, not scene-wide values.'},
    {text:'IDLH headroom of 28.5 ppm means current readings pose no isolation concern.',correct:false,trap:'Perimeter readings at 1.5 ppm may correspond to IDLH-proximate concentrations in the approach zone. Assuming IDLH headroom from perimeter data is not sound practice.'},
    {text:'Below IDLH means SCBA is not required for perimeter personnel.',correct:false,trap:'SCBA is required for EV fire approach regardless of perimeter monitoring values. Monitoring informs isolation geometry, not the PPE level required.'}
   ],sources:[SRC.niosh,SRC.teexEmissions]},
  {cat:'Wind Shift Response',skill:'Dynamic Perimeter Management',refs:[R.erg_iso,R.osha_gas],
   q:'Wind shifts 180° during EV fire operations after initial isolation was established. What is required?',
   ans:[
    {text:'Reassess and reposition the downwind isolation boundary. Personnel previously upwind may now be in the plume path.',correct:true},
    {text:'Isolation geometry remains fixed — the perimeter does not move with wind.',correct:false,trap:'Isolation geometry is wind-dependent. A 180° shift moves the plume directly to the previously upwind side. Fixed perimeters expose previously safe personnel.'},
    {text:'Apply full 360° circular isolation at maximum distance — wind shifts require omnidirectional coverage.',correct:false,trap:'Full circular isolation at maximum distance is operationally impractical in most settings. Directional reassessment is the tactical standard.'},
    {text:'Wind shift concerns are for plume modeling only, not initial isolation decisions.',correct:false,trap:'Initial isolation geometry must account for wind in real time. Plume modeling is a planning tool, not a substitute for situational awareness.'}
   ],sources:[SRC.erg147,SRC.oshaLiIon]},
  {cat:'Post-Suppression Reduction',skill:'Objective Data-Driven Decision',refs:[R.ntsb_reinit,R.niosh_idlh],
   q:'Post-suppression monitoring shows the pack trending downward from 220°C (428°F) — currently reading 70°C (158°F). Is it appropriate to reduce isolation?',
   ans:[
    {text:'Not yet. Monitor until temperature reaches ambient AND air monitoring confirms below action levels. Trending downward is not sufficient.',correct:true},
    {text:'Yes — 70°C (158°F) is well below thermal runaway onset. Isolation can be reduced now.',correct:false,trap:'Trending downward is positive but insufficient. Pack temperature returning to ambient with confirmed clean air monitoring is the appropriate threshold — not any temperature below onset.'},
    {text:'Reduce isolation after 1 hour of confirmed cooling trend.',correct:false,trap:'Time-based reduction without confirming both temperature and air quality is not objective standard. Packs can re-ignite after appearing to cool.'},
    {text:'IC can reduce isolation at any point based on combined scene assessment.',correct:false,trap:'Scene assessment without objective data — temperature AND air monitoring — is insufficient for isolation reduction at EV fire scenes.'}
   ],sources:[SRC.ntsbEV,SRC.niosh]},
  {cat:'Multi-Vehicle Depot Isolation',skill:'Compound Energy Assessment',refs:[R.erg_iso],
   q:'A transit bus fire at a depot involves multiple buses in close formation. What isolation consideration applies beyond the single-vehicle standard?',
   ans:[
    {text:'Adjacent vehicles become exposures. Thermal propagation from pack to pack is a real risk. Isolation must account for potential multi-vehicle escalation.',correct:true},
    {text:'Same isolation — chemistry and hazard are identical regardless of vehicle count.',correct:false,trap:'Multiple vehicles in close proximity change the exposure geometry and create real risk of thermal event propagation between packs.'},
    {text:'Depot facility suppression systems handle multi-vehicle events — standard isolation applies.',correct:false,trap:'Facility suppression systems are not designed for multi-pack EV thermal events at scale. Fire department authority and isolation protocols apply.'},
    {text:'Evacuation of the depot replaces isolation in an enclosed multi-vehicle scenario.',correct:false,trap:'Evacuation and isolation are complementary, not alternatives. Both apply in a depot fire scenario.'}
   ],sources:[SRC.erg147]},
  {cat:'E-Bike Basement Fire Isolation',skill:'Confined Space Accumulation',refs:[R.osha_gas,R.niosh_idlh],
   q:'An e-bike fire in a basement garage is generating smoke spreading to the main structure. What isolation consideration is specific to this configuration?',
   ans:[
    {text:'Basement configuration creates an accumulation zone. Off-gas from an e-bike fire can reach IDLH concentrations rapidly in this confined low space.',correct:true},
    {text:'E-bike voltage (36–72V) means the electrical hazard is minimal — focus on smoke management only.',correct:false,trap:'Voltage level does not determine chemical hazard. Thermal decomposition products are a function of battery chemistry, not voltage. HF and HCN are produced regardless of pack voltage.'},
    {text:'E-bike fires do not generate HF or HCN — only large packs produce these compounds.',correct:false,trap:'All lithium-ion cell thermal events generate toxic decomposition products including HF and HCN, regardless of pack size or voltage.'},
    {text:'Residential occupancy type does not require hazmat isolation procedures.',correct:false,trap:'The chemistry of the event determines isolation requirements, not the occupancy classification.'}
   ],sources:[SRC.oshaLiIon,SRC.niosh]},
  {cat:'Bridge Runoff Isolation',skill:'Environmental Hazard Integration',refs:[R.erg_water,R.erg_iso],
   q:'An EV fire on a highway bridge raises concerns about contaminated runoff entering the waterway below. How does this affect isolation and tactical decisions?',
   ans:[
    {text:'Attempt to block bridge drains before suppression begins. Coordinate with environmental agencies. Balance suppression volume against environmental release if complete containment is not achievable.',correct:true},
    {text:'Bridge drainage is a post-incident environmental concern — focus on suppression first.',correct:false,trap:'Active environmental harm during operations is a concurrent responsibility. Bridge drains route directly to the waterway below. Containment must be addressed simultaneously with suppression.'},
    {text:'Reduce water application to eliminate runoff — environmental protection takes priority over suppression.',correct:false,trap:'Life safety and fire control remain primary. Containment must be pursued, but suppression is not abandoned in favor of environmental protection alone.'},
    {text:'Environmental concerns apply only to hazmat incidents, not vehicle fires.',correct:false,trap:'Any EV fire producing contaminated runoff triggers environmental protection obligations. EV fire suppression water is a hazardous runoff stream.'}
   ],sources:[SRC.erg147]},
  {cat:'BESS Scale Isolation',skill:'Fixed Installation Scaling',refs:[R.erg_iso,R.nfpa855_auth],
   q:'A 2 MWh BESS installation fire — facility suppression system is overwhelmed and no hydrant is within 2 miles. Water supply strategy?',
   ans:[
    {text:'Apply available water to protect uninvolved BESS modules. Establish tanker operations with all available resources. Consult the facility emergency action plan for on-site water storage.',correct:true},
    {text:'Withdraw — no nearby hydrant means no suppression capability.',correct:false,trap:'Rural fire departments operate without hydrants routinely. Tanker operations, on-site storage (often required for BESS installations), and mutual aid are standard resources.'},
    {text:'Begin aggressive attack on the involved module with all available water.',correct:false,trap:'Committing limited water to aggressive attack without supply secured risks running dry. Exposure protection of uninvolved modules is the priority when supply is limited.'},
    {text:'Facilities are responsible for their own suppression beyond the initial alarm.',correct:false,trap:'Fire department response mandate is not limited by facility responsibility. Life safety and fire spread prevention are the fire department obligation.'}
   ],sources:[SRC.erg147,SRC.nfpa855]}
]},
ppe:{ops:[
  {cat:'PPE Minimum Standard',skill:'Exposure Assessment',refs:[R.nfpa_scba,R.osha_gas],
   q:'What is the minimum PPE for any approach to an EV in thermal runaway, with or without visible flame?',
   ans:[
    {text:'Full structural firefighting PPE with SCBA on positive pressure — no exceptions, regardless of whether flames are visible.',correct:true},
    {text:'Station wear with an air-purifying respirator rated for organic vapors.',correct:false,trap:'APRs cannot filter HF, HCN, or CO at concentrations produced during thermal runaway. CO at 500x the OSHA PEL will overwhelm any cartridge-based filter. SCBA is the only acceptable respiratory protection.'},
    {text:'Structural PPE without SCBA if no visible smoke is present.',correct:false,trap:'HF and CO are colorless. Toxic off-gas is present before, during, and after visible fire. Crews have been exposed to IDLH atmospheres from EV battery events with no visible flame.'},
    {text:'Level A chemical protection since HF is present at scene.',correct:false,trap:'Level A is not indicated for initial operations. Structural PPE and SCBA are appropriate for EV fire approach. Level A considerations arise for specific extended tech-level entries, not initial response.'}
   ],sources:[SRC.nfpaAFV,SRC.oshaLiIon]},
  {cat:'Post-Knockdown SCBA',skill:'Post-Fire Atmosphere Assessment',refs:[R.osha_gas,R.teex_conc],
   q:'Visible flame is extinguished after active suppression of an EV fire. A crew member wants to doff SCBA for overhaul. Your call?',
   ans:[
    {text:'Deny. Off-gassing continues after knockdown. SCBA stays on until air monitoring confirms safe atmosphere.',correct:true},
    {text:'Approve — fire is out; the respiratory hazard is eliminated.',correct:false,trap:'Off-gassing continues after visible fire is extinguished. SCBA must remain on until air monitoring confirms a safe atmosphere. Thermal decomposition products are still being produced from a thermally compromised pack.'},
    {text:'Approve after 15 minutes of apparent stability.',correct:false,trap:'Elapsed time without air monitoring data does not justify SCBA removal at an EV fire scene.'},
    {text:'Deny only if smell is present. Allow doff if air appears clear.',correct:false,trap:'HF is detectable by smell in some conditions, but HCN is not reliably detected by odor at all concentrations. Sensory assessment is inadequate for this atmosphere.'}
   ],sources:[SRC.oshaLiIon,SRC.teexEmissions]},
  {cat:'Non-Firefighting Personnel',skill:'Hazard Zone Access Control',refs:[R.nfpa_scba],
   q:'A manufacturer technical representative arrives on scene and wants to approach the vehicle to assess the pack. What PPE is required?',
   ans:[
    {text:'Full structural PPE and SCBA are required for any entry to the hot zone. Manufacturer credentials do not change PPE requirements.',correct:true},
    {text:'No PPE — they are not firefighting personnel and have different standards.',correct:false,trap:'Chemical hazard does not distinguish between firefighters and civilians. Anyone in the hot zone requires appropriate PPE regardless of role.'},
    {text:'Hard hat and safety vest are sufficient for a brief technical assessment.',correct:false,trap:'Hard hat and vest provide no respiratory or thermal protection. They are inadequate for a thermal event scene.'},
    {text:'Their standard inspection equipment is sufficient if they sign a liability waiver.',correct:false,trap:'PPE requirements are not waivable based on liability documents. Hazard exists regardless of waiver or credentials.'}
   ],sources:[SRC.nfpaAFV]},
  {cat:'Staged Personnel PPE',skill:'PPE Readiness Planning',refs:[R.nfpa_scba,R.osha_gas],
   q:'Personnel are staged 150 feet (46 m) upwind from a smoking EV with no active flame. Minimum PPE requirement for staged personnel?',
   ans:[
    {text:'Structural PPE donned, SCBA accessible and ready for immediate use. Air monitoring guides doff/don decisions as scene evolves.',correct:true},
    {text:'No PPE — they are upwind and outside the hot zone.',correct:false,trap:'Staged personnel should have structural PPE donned and SCBA accessible. Wind shifts are unpredictable and can place previously safe personnel in the plume path rapidly.'},
    {text:'SCBA only — staging does not require structural PPE.',correct:false,trap:'Both structural PPE and SCBA readiness are appropriate for staged personnel at an active off-gas event.'},
    {text:'Full Level B chemical protection for all staged personnel.',correct:false,trap:'Level B is not standard for ops-level staging. Structural PPE with SCBA readiness is the appropriate standard.'}
   ],sources:[SRC.nfpaAFV,SRC.oshaLiIon]},
  {cat:'Submerged Vehicle PPE',skill:'Extraction Phase PPE',refs:[R.ntsb_reinit,R.nfpa_scba],
   q:'You are approaching a submerged EV being recovered from a waterway. What PPE consideration is specific to this scenario?',
   ans:[
    {text:'Full structural PPE and SCBA. Extraction may trigger a thermal event and off-gassing. Suppression must be staged and ready before recovery begins.',correct:true},
    {text:'Water rescue suit only — this is a water operation, not a fire operation.',correct:false,trap:'The primary hazard on extraction is thermal event and off-gas, not drowning risk. Structural PPE and SCBA are required for approach.'},
    {text:'No PPE beyond personal flotation — the vehicle is cooled from submersion.',correct:false,trap:'Submersion does not eliminate thermal event risk. Air exposure on extraction can trigger off-gassing and fire in damaged cells.'},
    {text:'Level A chemical protective suit due to electrolyte contamination of the water.',correct:false,trap:'Level A is not standard for this scenario at ops level. Structural PPE with SCBA addresses the primary thermal and respiratory hazards.'}
   ],sources:[SRC.ntsbEV,SRC.nfpaAFV]},
  {cat:'SCBA Working Time',skill:'Air Management Planning',refs:[R.nfpa_scba],
   q:'Your 30-minute SCBA bottle is at full rated pressure. Engaged in active EV suppression with a charged handline, how long should you plan for effective working time?',
   ans:[
    {text:'15–20 minutes. Exertion during active suppression significantly reduces rated bottle duration.',correct:true},
    {text:'30 minutes — full rated bottle duration.',correct:false,trap:'Rated duration is measured at rest or light activity. Active suppression is moderate-to-heavy exertion and reduces effective working time to approximately 15–20 minutes.'},
    {text:'45 minutes with controlled breathing.',correct:false,trap:'Active suppression is not a low-exertion task. Breathing control extends duration slightly at rest but does not bring working time to 45 minutes under active suppression conditions.'},
    {text:'Unlimited — buddy breathing extends working time as needed.',correct:false,trap:'Buddy breathing is an emergency survival technique, not a planned extension of working time. It should not be used as a supply strategy.'}
   ],sources:[SRC.nfpaAFV]},
  {cat:'E-Bike vs Transit Bus PPE',skill:'Chemistry-Based PPE Decision',refs:[R.nfpa_scba,R.osha_gas],
   q:'Does an e-bike fire require the same structural PPE and SCBA as an electric transit bus fire?',
   ans:[
    {text:'Yes — both generate the same thermal decomposition products. Structural PPE and SCBA are required for both. Water volume and tactics differ — not PPE level.',correct:true},
    {text:'No — e-bike voltage (36–72V) is too low to require SCBA.',correct:false,trap:'Voltage level does not determine respiratory PPE requirements. Thermal decomposition products are a function of battery chemistry, not voltage.'},
    {text:'No — transit buses require Level B chemical protection that e-bike fires do not.',correct:false,trap:'Transit bus fires do not require Level B at ops level. Structural PPE and SCBA apply to both e-bike and transit bus fires.'},
    {text:'Only if fire is visible — small pack fires without flame do not require SCBA.',correct:false,trap:'SCBA is required for any approach to a thermally compromised EV, with or without visible fire. E-bike thermal events produce the same toxic off-gas as larger packs.'}
   ],sources:[SRC.nfpaAFV,SRC.oshaLiIon]},
  {cat:'HF Detection PPE Response',skill:'Atmospheric Data to PPE Translation',refs:[R.niosh_idlh,R.teex_conc],
   q:'Air monitoring detects hydrogen fluoride at the scene perimeter during an EV fire. What changes in your PPE approach?',
   ans:[
    {text:'Confirm SCBA face seal is properly seated. HF at high concentrations can cause dermal exposure through structural PPE — minimize exposure time and complete thorough decon on exit.',correct:true},
    {text:'Nothing changes — structural PPE already fully covers HF exposure at any concentration.',correct:false,trap:'Structural PPE does not provide full protection against HF at elevated concentrations. Face seal confirmation and minimized exposure time are the tactical adjustments at ops level.'},
    {text:'Add an APR acid gas cartridge over your SCBA facepiece.',correct:false,trap:'You do not add APR cartridges to SCBA. SCBA provides respiratory protection via supplied air. Adding an APR to a SCBA facepiece is not a recognized or approved modification.'},
    {text:'Immediately withdraw all personnel to Level A before continuing.',correct:false,trap:'Level A is not warranted by perimeter HF detection alone. Confirm PPE seal integrity, manage exposure time, and continue monitoring.'}
   ],sources:[SRC.niosh,SRC.teexEmissions]}
],tech:[
  {cat:'HF Dermal Exposure Threshold',skill:'High-Concentration PPE Decision',refs:[R.niosh_idlh,R.osha_gas],
   q:'NIOSH IDLH for hydrogen fluoride is 30 ppm. At what monitoring value should approach distance be reassessed even with full SCBA in use?',
   ans:[
    {text:'At concentrations approaching IDLH (30 ppm), assess whether structural PPE provides adequate dermal protection for the required approach distance.',correct:true},
    {text:'Never — SCBA covers all HF concentrations regardless of approach distance.',correct:false,trap:'SCBA provides respiratory protection regardless of HF concentration. However, dermal HF exposure at high concentrations becomes a significant concern that structural PPE may not fully address.'},
    {text:'Below 10 ppm — any HF detection above that level requires full withdrawal.',correct:false,trap:'10 ppm is below IDLH. Detection does not automatically require withdrawal when SCBA is in use and tactical objectives are present.'},
    {text:'HF concentration is irrelevant with SCBA in place — proceed at any concentration.',correct:false,trap:'Very high HF concentrations create dermal exposure risk that SCBA alone does not address. Concentration informs approach decisions beyond just respiratory protection.'}
   ],sources:[SRC.niosh,SRC.oshaLiIon]},
