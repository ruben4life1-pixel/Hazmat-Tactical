<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operations Defensive Tactics — Hazmat Tactical</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-900: #0b1120;
            --navy-800: #111827;
            --navy-700: #1a2332;
            --navy-600: #243044;
            --navy-500: #2e3d55;
            --amber-500: #d4a437;
            --amber-400: #e8b94a;
            --amber-300: #f0c95e;
            --red-600: #c41e1e;
            --red-500: #dc2626;
            --red-400: #ef4444;
            --green-500: #22c55e;
            --green-400: #4ade80;
            --blue-500: #3b82f6;
            --blue-400: #60a5fa;
            --text-primary: #e8ecf1;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #2a3650;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--navy-900);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* ── HEADER ── */
        .app-header {
            background: linear-gradient(180deg, var(--navy-800) 0%, var(--navy-900) 100%);
            border-bottom: 2px solid var(--amber-500);
            padding: 20px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .header-inner {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .brand-block h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--amber-400);
            line-height: 1.1;
        }

        .brand-block .sub {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .level-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(212, 164, 55, 0.12);
            border: 1px solid var(--amber-500);
            padding: 6px 14px;
            border-radius: 4px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--amber-400);
        }

        /* ── MAIN CONTAINER ── */
        .main {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 20px 60px;
        }

        /* ── CONTROLS BAR ── */
        .controls-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .ctrl-select {
            background: var(--navy-700);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 4px;
            font-family: 'Barlow', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .ctrl-select:focus {
            outline: none;
            border-color: var(--amber-500);
        }

        .btn {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--amber-500);
            color: var(--navy-900);
        }

        .btn-primary:hover {
            background: var(--amber-400);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(212, 164, 55, 0.25);
        }

        .btn-secondary {
            background: var(--navy-600);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--navy-500);
        }

        /* ── SCENARIO CARD ── */
        .scenario-card {
            background: var(--navy-800);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .scenario-stripe {
            height: 4px;
            background: linear-gradient(90deg, var(--red-500), var(--amber-500), var(--red-500));
        }

        .scenario-header {
            padding: 20px 24px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 12px;
        }

        .scenario-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-primary);
        }

        .scenario-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tag {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 3px;
        }

        .tag-red { background: rgba(196, 30, 30, 0.2); color: var(--red-400); border: 1px solid rgba(196, 30, 30, 0.35); }
        .tag-amber { background: rgba(212, 164, 55, 0.15); color: var(--amber-400); border: 1px solid rgba(212, 164, 55, 0.3); }
        .tag-blue { background: rgba(59, 130, 246, 0.15); color: var(--blue-400); border: 1px solid rgba(59, 130, 246, 0.3); }

        .scenario-body {
            padding: 20px 24px;
        }

        .dispatch-box {
            background: var(--navy-900);
            border-left: 3px solid var(--red-500);
            padding: 16px 20px;
            border-radius: 0 4px 4px 0;
            margin-bottom: 20px;
        }

        .dispatch-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--red-400);
            margin-bottom: 8px;
        }

        .dispatch-text {
            font-size: 0.95rem;
            color: var(--text-primary);
            line-height: 1.7;
        }

        .intel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .intel-cell {
            background: var(--navy-700);
            padding: 12px 16px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .intel-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .intel-value {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-primary);
        }

        .intel-value.warn { color: var(--red-400); }
        .intel-value.caution { color: var(--amber-400); }

        /* ── CANVAS SITE DIAGRAM ── */
        .diagram-section {
            margin-top: 20px;
        }

        .diagram-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .canvas-wrap {
            background: var(--navy-900);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 8px;
            display: flex;
            justify-content: center;
        }

        canvas#siteCanvas {
            width: 100%;
            max-width: 600px;
            height: auto;
            border-radius: 2px;
        }

        /* ── DECISIONS ── */
        .decisions-section {
            margin-top: 24px;
        }

        .decisions-prompt {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--amber-400);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .decisions-prompt::before {
            content: '';
            width: 3px;
            height: 16px;
            background: var(--amber-500);
            border-radius: 1px;
        }

        .decision-btn {
            display: block;
            width: 100%;
            background: var(--navy-700);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 16px 20px;
            margin-bottom: 10px;
            border-radius: 4px;
            text-align: left;
            font-family: 'Barlow', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1.5;
            position: relative;
        }

        .decision-btn:hover:not(.selected):not(.locked) {
            background: var(--navy-600);
            border-color: var(--amber-500);
            padding-left: 24px;
        }

        .decision-btn .opt-letter {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            color: var(--amber-400);
            margin-right: 10px;
            font-size: 0.95rem;
        }

        .decision-btn.correct {
            background: rgba(34, 197, 94, 0.1);
            border-color: var(--green-500);
        }

        .decision-btn.incorrect {
            background: rgba(220, 38, 38, 0.08);
            border-color: rgba(220, 38, 38, 0.3);
            opacity: 0.7;
        }

        .decision-btn.locked {
            cursor: default;
        }

        /* ── FEEDBACK ── */
        .feedback-panel {
            display: none;
            margin-top: 20px;
            border-radius: 6px;
            overflow: hidden;
        }

        .feedback-panel.show { display: block; animation: fadeUp 0.35s ease; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback-result {
            padding: 20px 24px;
        }

        .feedback-result.good {
            background: rgba(34, 197, 94, 0.08);
            border-left: 4px solid var(--green-500);
        }

        .feedback-result.poor {
            background: rgba(220, 38, 38, 0.08);
            border-left: 4px solid var(--red-500);
        }

        .feedback-heading {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .feedback-heading.good { color: var(--green-400); }
        .feedback-heading.poor { color: var(--red-400); }

        .feedback-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .instructor-box {
            background: var(--navy-700);
            border-top: 1px solid var(--border);
            padding: 20px 24px;
        }

        .instructor-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--amber-400);
            margin-bottom: 10px;
        }

        .instructor-text {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .erg-ref {
            display: inline-block;
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--blue-400);
            padding: 2px 8px;
            border-radius: 3px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        /* ── SCENARIO COUNTER ── */
        .scenario-counter {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        /* ── WELCOME SCREEN ── */
        .welcome {
            text-align: center;
            padding: 60px 20px;
        }

        .welcome h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--amber-400);
            margin-bottom: 16px;
        }

        .welcome p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 12px;
            line-height: 1.7;
        }

        .welcome .start-btn {
            margin-top: 28px;
            padding: 14px 40px;
            font-size: 1rem;
        }

        .scope-box {
            background: var(--navy-800);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px 24px;
            max-width: 600px;
            margin: 24px auto 0;
            text-align: left;
        }

        .scope-heading {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--red-400);
            margin-bottom: 10px;
        }

        .scope-list {
            list-style: none;
            padding: 0;
        }

        .scope-list li {
            font-size: 0.85rem;
            color: var(--text-secondary);
            padding: 4px 0;
            padding-left: 16px;
            position: relative;
        }

        .scope-list li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: var(--amber-500);
        }

        /* ── FOOTER ── */
        .app-footer {
            text-align: center;
            padding: 20px;
            font-size: 0.7rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 1px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            .brand-block h1 { font-size: 1.3rem; }
            .intel-grid { grid-template-columns: 1fr 1fr; }
            .scenario-title { font-size: 1.1rem; }
            .header-inner { justify-content: center; text-align: center; }
        }
    </style>
</head>

</header>

let scenarioCount = 0;

let currentDifficulty = "standard";

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickIdx(arr) { const i = Math.floor(Math.random() * arr.length); return { item: arr[i], idx: i }; }
function shuffle(arr) { const a = [...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function getContainerForChemical(chem) {
    const s = chem.state;
    const h = chem.hazards.join(' ').toLowerCase();
    let pool = [];
    if(s.includes('Gas (liquefied)')) {
        pool.push(...CARGO_TANKS.filter(t => t.type.includes('MC-331')));
        pool.push(...RAIL_CARS.filter(t => t.type.includes('105') || t.type.includes('112')));
        if(chem.name.includes('Chlorine')) pool.push(...CYLINDERS.filter(t => t.type.includes('Ton')));
        if(chem.name.includes('Propane') || chem.name.includes('LPG')) pool.push(...CYLINDERS.filter(t => t.type.includes('Propane')));
        if(chem.name.includes('Ammonia')) pool.push(...CYLINDERS.filter(t => t.type.includes('Compressed Gas')));
    } else if(s.includes('Cryogenic')) {
        pool.push(...CARGO_TANKS.filter(t => t.type.includes('MC-338')));
        pool.push(...RAIL_CARS.filter(t => t.type.includes('113')));
        pool.push(...CYLINDERS.filter(t => t.type.includes('Dewar')));
    } else if(s.includes('Liquid')) {
        if(h.includes('flammable') || h.includes('combustible') || chem.name.includes('Gasoline') || chem.name.includes('Diesel') || chem.name.includes('Ethanol')) {
            pool.push(...CARGO_TANKS.filter(t => t.type.includes('306') || t.type.includes('406')));
            pool.push(...RAIL_CARS.filter(t => t.type.includes('111') || t.type.includes('117')));
        }
        if(h.includes('corrosive') || h.includes('acid') || chem.placard.includes('Corrosive')) {
            pool.push(...CARGO_TANKS.filter(t => t.type.includes('312') || t.type.includes('412') || t.type.includes('307') || t.type.includes('407')));
            pool.push(...RAIL_CARS.filter(t => t.type.includes('111')));
        }
        if(h.includes('poison') || h.includes('toxic')) {
            pool.push(...CARGO_TANKS.filter(t => t.type.includes('307') || t.type.includes('407')));
        }
        if(pool.length === 0) {
            pool.push(...CARGO_TANKS.filter(t => t.type.includes('307') || t.type.includes('407')));
            pool.push(...RAIL_CARS.filter(t => t.type.includes('111')));
        }
    }
    if(pool.length === 0) {
        pool.push(pick(CARGO_TANKS));
    }
    return pick(pool);
}

function generateScenario() {
    const chem = pick(CHEMICALS);
    const container = getContainerForChemical(chem);
    const location = pick(LOCATIONS);
    const weather = pick(WEATHER);
    const time = pick(TIMES);
    const release = pick(RELEASE_TYPES);

    // If fire impingement selected but container can't BLEVE, adjust
    let adjustedRelease = release;
    if(release.type.includes('Fire impingement') && !container.bleve && !container.type.includes('105') && !container.type.includes('112') && !container.type.includes('Propane') && !container.type.includes('Acetylene')) {
        adjustedRelease = RELEASE_TYPES.find(r => !r.type.includes('Fire impingement')) || release;
    }

    // Generate tactical decisions
    const decisions = generateDecisions(chem, container, location, weather, adjustedRelease);
    const instructorInsight = generateInstructorInsight(chem, container, location, weather, adjustedRelease, decisions.correct);

    scenarioCount++;

    return {
        id: scenarioCount,
        chem, container, location, weather, time,
        release: adjustedRelease,
        decisions,
        instructorInsight
    };
}

function generateDecisions(chem, container, location, weather, release) {
    const h = chem.hazards.join(' ').toLowerCase();
    const isGas = chem.state.includes('Gas');
    const isFlam = h.includes('flammable');
    const isToxic = h.includes('toxic') || h.includes('poison');
    const isCorrosive = h.includes('corrosive');
    const isBleveRisk = release.type.includes('Fire impingement') && (container.bleve || container.type.includes('105') || container.type.includes('112') || container.type.includes('Propane') || container.type.includes('Acetylene'));
    const isVaporCloud = release.type.includes('Vapor cloud') || isGas;
    const isPoolFire = release.type.includes('Pool fire');
    const isLiquidSpill = chem.state.includes('Liquid') && !isPoolFire;
    const isPRD = release.type.includes('PRD');
    const isHighPop = location.pop.toLowerCase().includes('high') || location.pop.toLowerCase().includes('dense') || location.pop.toLowerCase().includes('very');

    let correctActions = [];
    let correctExplanations = [];
    let wrongActions = [];
    let wrongExplanations = [];

    // Always: Isolation
    correctActions.push(`Establish initial isolation at ${chem.isolation_sm} per ERG Guide ${chem.erg}. Position apparatus upwind/uphill. Deny entry.`);
    correctExplanations.push(`ERG Guide ${chem.erg} for ${chem.name} (UN ${chem.un}) specifies initial isolation of ${chem.isolation_sm}. Upwind/uphill positioning protects crews from vapor exposure and runoff. This is always your first defensive action.`);

    // BLEVE scenario
    if(isBleveRisk) {
        correctActions.push(`Evacuate to BLEVE-safe distance immediately — minimum 1,600 feet in all directions. Cool container ONLY with unmanned monitors from maximum distance. If relief device pitch changes or flame impingement exceeds 20 minutes with no water on the tank — WITHDRAW.`);
        correctExplanations.push(`A pressurized container under fire impingement is the highest-priority defensive emergency. BLEVE fragments have been documented traveling over 1,600 feet. Unmanned monitors let you cool without risking personnel. Never approach a pressurized container under fire. Listen for the relief device — if the pitch rises or it goes silent, failure may be imminent.`);

        wrongActions.push(`Approach the tank to check the relief device and try to cool it with a handline at close range.`);
        wrongExplanations.push(`NEVER approach a pressurized container under fire impingement. BLEVE failure is instantaneous and catastrophic — the tank becomes a projectile. Handline range puts you well inside the lethal fragment zone. Unmanned monitors from maximum distance are the only acceptable cooling method.`);

        wrongActions.push(`The relief device is working, so the situation is stable. Hold position and monitor.`);
        wrongExplanations.push(`A working relief device only means it hasn't failed YET. It is venting product under pressure — the situation is actively escalating. Fire impingement weakens the tank shell where the relief device can't compensate. You should be evacuating and setting up unmanned cooling, not holding position.`);
    }

    // Toxic gas / vapor cloud
    if(isToxic && isVaporCloud) {
        const downwind = weather.wind.toLowerCase().includes('calm') ? chem.downwind_night : chem.downwind_day;
        const evac = downwind !== "N/A" ? downwind : "0.5 mi minimum";
        if(isHighPop) {
            correctActions.push(`Initiate downwind evacuation to ${evac}. Coordinate with PD for traffic control. For immobile populations (nursing homes, schools), implement shelter-in-place: close windows/doors, shut off HVAC systems. Use water fog to slow vapor migration while evacuation proceeds.`);
            correctExplanations.push(`${chem.name} is toxic by inhalation (IDLH: ${chem.idlh}). In a populated area, evacuation is the priority protective action. Shelter-in-place is appropriate for populations that can't be moved quickly — it buys time but is not a substitute for evacuation. Water fog can knock down or redirect vapor but won't eliminate the hazard.`);
        } else {
            correctActions.push(`Evacuate downwind to ${evac}. Apply water fog streams from upwind position to disperse/knock down vapor cloud. Monitor cloud movement and adjust zones as wind shifts.`);
            correctExplanations.push(`${chem.name} IDLH is ${chem.idlh} — the toxic hazard is the priority. Water fog applied from upwind can slow vapor migration and knock down concentrations, giving civilians time to evacuate. This is a core defensive tactic. Continuous monitoring is essential because wind shifts change everything.`);
        }

        wrongActions.push(`Enter the vapor cloud to search for civilians who may be trapped inside the hazard zone.`);
        wrongExplanations.push(`Entering a toxic vapor cloud without proper chemical PPE (Level A/B) is an operations-level boundary violation and potentially fatal. ${chem.name} IDLH is ${chem.idlh}. Operations-level responders do not have the PPE or training for entry into IDLH atmospheres. Evacuate from the OUTSIDE, establish a perimeter, and wait for technician-level entry teams.`);
    }

    // Flammable liquid spill (no fire)
    if(isFlam && isLiquidSpill && !isPoolFire) {
        correctActions.push(`Eliminate ALL ignition sources within 300+ feet — shut down traffic, no apparatus repositioning near spill. Dike the spill to prevent spread. Protect storm drains with absorbent booms or plastic sheeting. ${parseFloat(chem.vd) > 1 ? 'Vapor density ' + chem.vd + ' — check low-lying areas, sewers, and basements for vapor accumulation.' : ''}`);
        correctExplanations.push(`With a flammable liquid spill, ignition prevention and spill containment are your two priorities. ${chem.name} LEL is ${chem.lel} — vapors can reach explosive concentrations quickly. Storm drain protection prevents environmental disaster and eliminates a vapor migration pathway. ${parseFloat(chem.vd) > 1 ? 'Heavy vapors (VD ' + chem.vd + ') travel along the ground and accumulate in enclosed low areas — these become explosion hazards.' : ''}`);

        wrongActions.push(`Use apparatus to push the spill off the road surface with a straight stream to clear the lane.`);
        wrongExplanations.push(`Spreading a flammable liquid with a hose stream increases the vapor surface area (more evaporation = higher vapor concentrations), spreads the spill to uncontrolled areas, and the stream itself can generate static. Contain the spill — don't spread it.`);
    }

    // Pool fire
    if(isPoolFire) {
        correctActions.push(`Protect exposures with water streams from maximum safe distance. Do NOT attempt to extinguish unless you can simultaneously eliminate the fuel source — an extinguished pool fire leaves explosive vapors. Cool adjacent containers/structures threatened by radiant heat.`);
        correctExplanations.push(`A pool fire from ${chem.name} requires exposure protection as the primary defensive action. Extinguishing the fire without stopping the fuel supply creates an unignited vapor cloud — which is MORE dangerous than a burning pool because the next ignition source causes a flash fire or vapor cloud explosion. Let it burn while you protect what's around it.`);

        wrongActions.push(`Extinguish the pool fire immediately with foam, then address the spill.`);
        wrongExplanations.push(`If you extinguish a pool fire but the product is still flowing, you've traded a visible hazard for an invisible one — an expanding vapor cloud looking for an ignition source. The resulting flash fire or explosion will be far more destructive than the original pool fire. Offensive firefighting on hazmat pool fires requires stopping the fuel source first — that's technician-level work.`);
    }

    // Corrosive spill
    if(isCorrosive && isLiquidSpill) {
        correctActions.push(`Contain the spill using compatible diking materials. Protect waterways and storm drains. Do NOT apply water directly to concentrated acids — exothermic reaction risk. ${chem.name.includes('Nitric') ? 'Brown/orange fumes indicate NOx gas — extremely toxic. Evacuate downwind immediately.' : ''} ${chem.name.includes('Hypochlorite') ? 'Check for nearby acids — mixing produces chlorine gas.' : ''}`);
        correctExplanations.push(`Corrosive spills require containment and waterway protection as primary actions. ${chem.name} is corrosive to skin, eyes, and respiratory tract. Water on concentrated acid generates dangerous heat and splatter. The correct approach is diking and containment, then awaiting technician-level neutralization/cleanup.`);
    }

    // PRD operating
    if(isPRD) {
        correctActions.push(`The PRD is doing its job — do NOT attempt to stop it. Establish isolation. If the container is NOT under fire impingement, the PRD venting may stabilize pressure. Monitor from safe distance. If the container IS under fire impingement, implement BLEVE procedures: withdraw to safe distance and cool with unmanned monitors only.`);
        correctExplanations.push(`A PRD venting is a safety system working as designed. Interfering with it (attempting to close or block) could cause catastrophic container failure. Your job is to maintain isolation, protect civilians, and monitor the situation. The PRD tells you pressure is elevated — that's information, not a problem to solve at the operations level.`);
    }

    // Generic wrong options to fill out
    if(wrongActions.length < 2) {
        wrongActions.push(`Do nothing — hold position at the original staging area and wait for the HazMat technician team to arrive and handle everything.`);
        wrongExplanations.push(`"Wait for HazMat" is NOT a defensive strategy — it's inaction. Operations-level responders are trained and expected to take defensive action: isolate, evacuate/shelter, deny entry, protect exposures, contain spills, and establish command. Waiting passively while a chemical release threatens the public is a failure of duty and training. You have the authority and tools to act defensively right now.`);
    }

    if(wrongActions.length < 2) {
        wrongActions.push(`The placard says ${chem.placard} — that's not really that dangerous. Reduce isolation to 50 feet and open the road.`);
        wrongExplanations.push(`Minimizing the hazard based on a placard alone is dangerous. ${chem.name} (IDLH: ${chem.idlh}) requires ERG-specified isolation of ${chem.isolation_sm} minimum. ERG distances are based on worst-case modeling. Reducing isolation below those distances exposes civilians and responders to the hazard. The ERG is the floor, not the ceiling.`);
    }

    // Build the options — 1 correct, 3 wrong (or 2 correct + 2 wrong for complex)
    let correctIdx;
    let options = [];

    if(currentDifficulty === "complex" && correctActions.length >= 2) {
        // 2 correct, 2 wrong
        const c1 = 0, c2 = 1;
        const w1 = 0, w2 = Math.min(1, wrongActions.length - 1);
        options = shuffle([
            { text: correctActions[c1], correct: true, explanation: correctExplanations[c1] },
            { text: correctActions[c2], correct: true, explanation: correctExplanations[c2] },
            { text: wrongActions[w1], correct: false, explanation: wrongExplanations[w1] },
            { text: wrongActions[w2], correct: false, explanation: wrongExplanations[w2] }
        ]);
    } else {
        // 1 correct, 3 wrong
        const ci = correctActions.length > 1 ? Math.floor(Math.random() * Math.min(correctActions.length, 2)) : 0;
        const wrongs = shuffle(wrongActions).slice(0, 3);
        const wrongExps = [];
        wrongs.forEach(w => {
            const idx = wrongActions.indexOf(w);
            wrongExps.push(wrongExplanations[idx]);
        });

        // Pad if needed
        while(wrongs.length < 3) {
            wrongs.push(pick(ACTION_CATEGORIES.wrong_passive));
            wrongExps.push(`Passive inaction is not a defensive strategy. Operations-level responders have clear responsibilities: isolate, deny entry, protect civilians, and establish command. Defaulting to inaction leaves the public unprotected.`);
        }

        options = shuffle([
            { text: correctActions[ci], correct: true, explanation: correctExplanations[ci] },
            { text: wrongs[0], correct: false, explanation: wrongExps[0] },
            { text: wrongs[1], correct: false, explanation: wrongExps[1] },
            { text: wrongs[2], correct: false, explanation: wrongExps[2] }
        ]);
    }

    const bestAction = correctActions.length > 1 ? correctActions.slice(0, 2).join(' Additionally: ') : correctActions[0];

    return { options, correct: bestAction, correctExplanation: correctExplanations.join(' ') };
}

function generateInstructorInsight(chem, container, location, weather, release, bestAction) {
    let insight = `The optimal approach for this scenario centers on ${chem.name} (UN ${chem.un}, ERG Guide ${chem.erg}) in a ${container.type}. `;

    if(release.type.includes('Fire impingement')) {
        insight += `Fire impingement on a ${container.type} is a critical emergency. ${container.bleve ? 'This container is a BLEVE candidate — evacuate to safe distance immediately and use unmanned monitors only.' : 'While this container type has a lower BLEVE risk, thermal stress still compromises structural integrity.'} `;
    }

    if(chem.state.includes('Gas')) {
        insight += `As a gas/liquefied gas, the release produces an immediate vapor hazard. Vapor density of ${chem.vd} means vapors will ${parseFloat(chem.vd) > 1 ? 'sink and accumulate in low-lying areas' : 'rise and disperse — but a cold release may initially hug the ground'}. `;
    }

    insight += `Key defensive actions at the operations level: ${bestAction} `;

    if(weather.note) {
        insight += `Weather conditions are significant: ${weather.note} `;
    }

    insight += `Remember: Operations-level responders are NOT passive bystanders. You isolate, evacuate, deny entry, contain spills defensively, protect exposures, and establish command. The line between operations and technician is OFFENSIVE action on the product or container — you don't cross that line, but everything on this side of it is YOUR responsibility.`;

    return insight;
}

/* ── CANVAS SITE DIAGRAM ── */
function drawSiteDiagram(scenario) {
    const canvas = document.getElementById('siteCanvas');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = 600, H = 400;
    canvas.width = W;
    canvas.height = H;

    // Background
    ctx.fillStyle = '#0b1120';
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = 'rgba(42,54,80,0.4)';
    ctx.lineWidth = 0.5;
    for(let x = 0; x < W; x += 30) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for(let y = 0; y < H; y += 30) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

    // Road
    ctx.fillStyle = '#1a2332';
    ctx.fillRect(0, 170, W, 60);
    ctx.strokeStyle = '#d4a437';
    ctx.lineWidth = 1;
    ctx.setLineDash([12, 8]);
    ctx.beginPath(); ctx.moveTo(0, 200); ctx.lineTo(W, 200); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#64748b';
    ctx.font = '10px Barlow Condensed';
    ctx.fillText('ROADWAY', 10, 195);

    // Incident location
    const incX = 280, incY = 195;

    // Container icon
    ctx.fillStyle = 'rgba(220, 38, 38, 0.15)';
    ctx.beginPath();
    ctx.arc(incX, incY, 40, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#dc2626';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Tank shape
    ctx.fillStyle = '#dc2626';
    ctx.beginPath();
    if(scenario.container.type.includes('MC-331') || scenario.container.type.includes('105') || scenario.container.type.includes('112')) {
        // Bullet shape
        ctx.ellipse(incX, incY, 22, 10, 0, 0, Math.PI * 2);
    } else {
        // Rectangle tank
        ctx.rect(incX - 20, incY - 8, 40, 16);
    }
    ctx.fill();

    // Incident label
    ctx.fillStyle = '#ef4444';
    ctx.font = 'bold 11px Barlow Condensed';
    ctx.textAlign = 'center';
    ctx.fillText('INCIDENT', incX, incY - 48);
    ctx.fillStyle = '#fbbf24';
    ctx.font = '10px Barlow Condensed';
    ctx.fillText(scenario.container.type.split('/')[0].trim(), incX, incY - 36);

    // Release indicator
    const releaseType = scenario.release.type;
    if(releaseType.includes('Vapor') || releaseType.includes('leak') || releaseType.includes('PRD')) {
        // Vapor puffs
        ctx.fillStyle = 'rgba(148, 163, 184, 0.2)';
        for(let i = 0; i < 5; i++) {
            const px = incX + 50 + i * 25 + Math.random() * 15;
            const py = incY - 15 + Math.random() * 30;
            ctx.beginPath();
            ctx.arc(px, py, 8 + Math.random() * 8, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.fillStyle = '#64748b';
        ctx.font = '9px Barlow Condensed';
        ctx.textAlign = 'left';
        ctx.fillText('VAPOR', incX + 55, incY - 25);
    }

    if(releaseType.includes('Pool') || releaseType.includes('breach') || releaseType.includes('Puncture')) {
        // Spill pool
        ctx.fillStyle = 'rgba(212, 164, 55, 0.15)';
        ctx.beginPath();
        ctx.ellipse(incX + 10, incY + 25, 35, 15, 0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(212, 164, 55, 0.4)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = '#d4a437';
        ctx.font = '9px Barlow Condensed';
        ctx.textAlign = 'center';
        ctx.fillText('SPILL', incX + 10, incY + 30);
    }

    if(releaseType.includes('fire') || releaseType.includes('Fire')) {
        // Fire icon
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.moveTo(incX, incY - 25);
        ctx.quadraticCurveTo(incX + 12, incY - 40, incX + 5, incY - 55);
        ctx.quadraticCurveTo(incX + 8, incY - 42, incX + 18, incY - 50);
        ctx.quadraticCurveTo(incX + 10, incY - 30, incX, incY - 25);
        ctx.fill();
        ctx.fillStyle = '#fbbf24';
        ctx.font = '9px Barlow Condensed';
        ctx.textAlign = 'center';
        ctx.fillText('FIRE', incX + 5, incY - 58);
    }

    // Wind arrow
    const windStr = scenario.weather.wind;
    let windDir = null;
    if(windStr.includes(' N ') || windStr.startsWith('Steady N') || windStr.includes(' N ')) windDir = 'N';
    else if(windStr.includes(' S ') || windStr.includes('Strong S')) windDir = 'S';
    else if(windStr.includes(' E ') || windStr.includes('Light E')) windDir = 'E';
    else if(windStr.includes(' NW ')) windDir = 'NW';
    else if(windStr.includes(' SW ')) windDir = 'SW';

    ctx.fillStyle = '#3b82f6';
    ctx.font = 'bold 11px Barlow Condensed';
    ctx.textAlign = 'left';
    if(windDir) {
        const windLabel = `WIND FROM ${windDir}`;
        ctx.fillText(windLabel, 10, 30);
        // Arrow
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 2;
        const arrowMap = { N:[0,-1], S:[0,1], E:[1,0], NW:[-0.7,-0.7], SW:[-0.7,0.7] };
        const d = arrowMap[windDir] || [0, -1];
        const ax = 80, ay = 50;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax + d[0] * 35, ay + d[1] * 35);
        ctx.stroke();
        // Arrowhead
        ctx.beginPath();
        ctx.moveTo(ax + d[0] * 35, ay + d[1] * 35);
        ctx.lineTo(ax + d[0] * 28 - d[1] * 5, ay + d[1] * 28 + d[0] * 5);
        ctx.lineTo(ax + d[0] * 28 + d[1] * 5, ay + d[1] * 28 - d[0] * 5);
        ctx.closePath();
        ctx.fillStyle = '#3b82f6';
        ctx.fill();
    } else {
        ctx.fillText('WIND: CALM / VARIABLE', 10, 30);
    }

    // Isolation zone
    const isoRadius = 70;
    ctx.strokeStyle = 'rgba(239, 68, 68, 0.5)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.arc(incX, incY, isoRadius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(239, 68, 68, 0.6)';
    ctx.font = 'bold 9px Barlow Condensed';
    ctx.textAlign = 'center';
    ctx.fillText('INITIAL ISOLATION', incX, incY + isoRadius + 14);
    ctx.fillText(scenario.chem.isolation_sm, incX, incY + isoRadius + 26);

    // Apparatus / CP suggested position
    const cpX = 100, cpY = 320;
    ctx.fillStyle = '#22c55e';
    ctx.fillRect(cpX - 15, cpY - 8, 30, 16);
    ctx.fillStyle = '#0b1120';
    ctx.font = 'bold 8px Barlow Condensed';
    ctx.textAlign = 'center';
    ctx.fillText('CP', cpX, cpY + 4);
    ctx.fillStyle = '#22c55e';
    ctx.font = '9px Barlow Condensed';
    ctx.fillText('COMMAND POST', cpX, cpY + 22);
    ctx.fillText('(UPWIND)', cpX, cpY + 33);

    // Staging
    const stgX = 500, stgY = 340;
    ctx.fillStyle = '#60a5fa';
    ctx.fillRect(stgX - 18, stgY - 8, 36, 16);
    ctx.fillStyle = '#0b1120';
    ctx.font = 'bold 8px Barlow Condensed';
    ctx.fillText('STG', stgX, stgY + 4);
    ctx.fillStyle = '#60a5fa';
    ctx.font = '9px Barlow Condensed';
    ctx.fillText('STAGING', stgX, stgY + 22);

    // Legend
    ctx.textAlign = 'right';
    ctx.fillStyle = '#64748b';
    ctx.font = '9px Barlow Condensed';
    ctx.fillText('NOT TO SCALE — TACTICAL REFERENCE ONLY', W - 10, H - 10);

    ctx.textAlign = 'left';
    ctx.resetTransform();
}

    window._currentScenario = s;

    // Draw canvas
    setTimeout(() => drawSiteDiagram(s), 50);
}

function selectOption(idx) {
    const s = window._currentScenario;
    if(!s) return;

    const opt = s.decisions.options[idx];
    const btns = document.querySelectorAll('.decision-btn');

    // Lock all buttons
    btns.forEach((btn, i) => {
        btn.classList.add('locked');
        btn.onclick = null;
        if(s.decisions.options[i].correct) {
            btn.classList.add('correct');
        }
        if(i === idx && !opt.correct) {
            btn.classList.add('incorrect');
        }
    });

    // Show feedback
    const panel = document.getElementById('feedbackPanel');
    const result = document.getElementById('feedbackResult');

    if(opt.correct) {
        result.className = 'feedback-result good';
        result.innerHTML = `
            <div class="feedback-heading good">✓ Correct Defensive Action</div>
            <div class="feedback-text">${opt.explanation}</div>
        `;
    } else {
        result.className = 'feedback-result poor';
        result.innerHTML = `
            <div class="feedback-heading poor">✗ Incorrect — Risk Identified</div>
            <div class="feedback-text" style="margin-bottom:16px;">${opt.explanation}</div>
            <div style="padding-top:12px; border-top:1px solid var(--border);">
                <div style="font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; color:var(--green-400); margin-bottom:8px;">Recommended Action</div>
                <div class="feedback-text" style="color:var(--text-primary);">${s.decisions.correct}</div>
            </div>
        `;
    }

    panel.classList.add('show');
    document.getElementById('nextBtn').style.display = 'inline-block';

    // Scroll to feedback
    setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

/* ── INIT ── */
renderWelcome();
</script>
</body>
</html>
