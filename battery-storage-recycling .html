  {text:"LFP\u2019s higher thermal onset and slower propagation allow a reduction in the post-fire monitoring window from 24\u201348 hours to 8\u201312 hours. The slower chemistry stabilizes at the cell level faster after knockdown, reducing the re-ignition monitoring requirement.",correct:false,trap:"Post-fire stabilization time is a function of thermal mass, energy density, and pack configuration, not exclusively the initiating chemistry. LFP\u2019s slower propagation during active fire does not produce faster post-fire thermal stabilization. ERG (Emergency Response Guidebook) 147 re-ignition language applies to all lithium-ion chemistries without exception."},
  {text:"LFP confirmation significantly reduces the toxicological hazard. No cathode oxygen release means fewer reactive decomposition products, so HF (Hydrogen Fluoride) and HCN (Hydrogen Cyanide) IDLH (Immediately Dangerous to Life or Health) thresholds are less likely to be reached and entry PPE can be downgraded accordingly.",correct:false,trap:"LFP does produce fluorinated decomposition products. The HF IDLH of 30 ppm does not change based on battery chemistry. Monitor for the same thresholds regardless of chemistry type. Chemistry confirmation does not authorize PPE downgrade."},
  {text:"LFP\u2019s absence of cathode oxygen release means the fire cannot sustain itself without an external fuel source. Once visible flames are controlled, an aggressive interior approach with structural PPE is appropriate since re-ignition requires a new ignition source.",correct:false,trap:"At ESS energy inventory levels, LFP cells store enough energy to sustain thermal runaway through internal exothermic pathways that do not require cathode oxygen release. The voltage hazard, off-gas profile, and re-ignition risk remain. LFP\u2019s advantage is a longer intervention window, not authorization for structural PPE entry."}]},

{level:'tech',cat:"Suppression Agent Assessment",skill:"Clean Agent Discharge \u2014 Entry Conditions",
 refs:[{t:"Clean Agent Systems at Indoor ESS",c:'Post-discharge clean agent concentration may exceed breathable levels: Novec 1230 NOAEL (No Observed Adverse Effect Level): 10%; FM-200 NOAEL: 9%. <span class="warn">Agent concentration is colorless and invisible.</span>',src:SRC.nfpa855},
  {t:"Clean Agent Discharge \u2014 Entry Conditions",c:'A clean agent discharge confirms agent was applied, not that the fire is extinguished. Battery cells may still be in thermal runaway. <span class="hl">SCBA (Self-Contained Breathing Apparatus) is required for any entry after clean agent discharge.</span>',src:SRC.oshaLiIon}],
 q:"The "+fac.name+" uses a Novec 1230 clean agent suppression system. The system has fully discharged into the ESS room. The fire alarm has reset and no smoke is visible at the door. Can your entry team proceed without SCBA?",
 ans:[
  {text:"No. Post-discharge Novec 1230 concentration in the sealed ESS room may exceed its NOAEL (No Observed Adverse Effect Level) of 10%, displacing oxygen to incapacitating levels. Battery off-gas may also be present. SCBA (Self-Contained Breathing Apparatus) is required for any entry regardless of visible conditions.",correct:true,trap:""},
  {text:"No, but this is a ventilation issue rather than a toxicological one. Restore NFPA 855 mechanical ventilation for a minimum of 15 minutes before entry. Once the ventilation cycle is complete, entry without SCBA is acceptable if atmospheric monitoring at the door confirms readings below action levels.",correct:false,trap:"Ventilation restoration reduces agent concentration but does not eliminate battery off-gas risk. The cells may still be off-gassing HF (Hydrogen Fluoride) and HCN (Hydrogen Cyanide). Restoring ventilation and monitoring at the doorway does not address gases being produced by an ongoing thermal event inside the room. SCBA is required regardless."},
  {text:"Novec 1230 is rated safe for occupied spaces during discharge. Post-discharge in a ventilated room, the agent disperses quickly. A brief entry without SCBA for a damage assessment is acceptable given the agent\u2019s safety profile.",correct:false,trap:"Novec 1230\u2019s safety rating applies during brief discharge in a normally ventilated area. Post-discharge in an unventilated sealed ESS room at fire-suppression concentrations may exceed the NOAEL and displace oxygen to incapacitating levels. The agent\u2019s occupied-space rating is not a post-discharge entry authorization."},
  {text:"The fire alarm reset confirms suppression was successful and the room has cleared. A reset detection system means the room has returned to below-threshold conditions across all monitored parameters.",correct:false,trap:"Fire alarm reset indicates the detection system no longer sees conditions above its threshold \u2014 it does not measure agent concentration or battery off-gas. A reset alarm in a sealed room with elevated Novec 1230 and residual HF provides false confidence. Atmospheric monitoring with calibrated instruments is required."}]},

{level:'tech',cat:"Suppression Agent Selection",skill:"Dry Chemical Limitations on Thermal Runaway",
 refs:[{t:"Dry Chemical \u2014 Surface vs Cell-Level Effectiveness",c:'Dry chemical agents suppress surface flames by interrupting the chemical chain reaction but <span class="warn">do not penetrate battery cell enclosures and do not address the thermal runaway occurring inside the cell.</span>',src:SRC.teexEmissions},
  {t:"Water for Li-Ion Thermal Management",c:'Water provides <span class="hl">cooling to the cell level, not just surface suppression.</span> Dry chemical produces apparent extinguishment followed by rapid re-ignition because the underlying thermal runaway was not interrupted.',src:SRC.ntsbEV}],
 q:"During fire attack at the "+fac.name+", a crew member suggests applying dry chemical from an on-site extinguisher to knock down surface flames quickly while water lines are positioned. Is this an appropriate tactical step?",
 ans:[
  {text:"Dry chemical can suppress visible surface flames but does not address thermal runaway inside the cells. Apparent extinguishment may be followed by rapid re-ignition. Use dry chemical only if water is unavailable and flame spread must be slowed \u2014 not as a primary suppression strategy.",correct:true,trap:""},
  {text:"Dry chemical is appropriate as a bridging measure if it produces complete knockdown before water lines are positioned. Complete knockdown confirmed by TIC (Thermal Imaging Camera) followed immediately by water application creates a managed transition rather than leaving an active fire unaddressed.",correct:false,trap:"TIC confirmation of surface knockdown does not indicate internal cell temperatures. Re-ignition from ongoing internal thermal runaway can occur in seconds to minutes after dry chemical knockdown, before water lines are repositioned. Dry chemical without simultaneous water application does not produce a managed transition."},
  {text:"Dry chemical is preferred for initial knockdown because it reduces re-ignition risk compared to water. Water application to thermally active cells can cause steam explosion and electrolyte ejection, making dry chemical the safer initial agent.",correct:false,trap:"Dry chemical reduces surface flame visibility without reducing re-ignition risk \u2014 it increases re-ignition risk by leaving thermal runaway unaddressed. Water\u2019s steam and ejection risks are managed through application technique and approach distance, not by substituting an agent that does not interrupt thermal runaway."},
  {text:"Do not apply dry chemical under any circumstances. It is chemically incompatible with lithium-ion electrolyte chemistry and applying it accelerates thermal runaway in the affected cells.",correct:false,trap:"Dry chemical does not accelerate lithium-ion battery thermal runaway. The problem is tactical ineffectiveness, not chemical incompatibility. It is not contraindicated \u2014 it is insufficient as a primary suppression strategy because it does not interrupt cell-level thermal runaway."}]},

{level:'tech',cat:"Electrical Hazard",skill:"BMS Failure \u2014 Energy Hazard Assessment",
 refs:[{t:"Stranded Energy \u2014 BMS-Independent Storage",c:'Each battery module stores energy through internal electrochemistry independent of the BMS (Battery Management System). <span class="warn">BMS failure does not discharge the modules.</span> The energy is unchanged.',src:SRC.ntsbEV},
  {t:"BMS Failure Increases Hazard Level",c:'A failed BMS removes fault detection, contactor control, and thermal monitoring. <span class="warn">A failed BMS is a more hazardous condition, not a safer one.</span>',src:SRC.oshaLiIon}],
 q:"During post-fire assessment at the "+fac.name+", a crew member notes the BMS (Battery Management System) has completely failed. They argue that since the BMS is down, the modules are no longer actively managed and present a lower electrical hazard. Is this correct?",
 ans:[
  {text:"No. The BMS manages monitoring and contactor control \u2014 it does not store or discharge the energy in the modules. A failed BMS means the safety monitoring layer is gone, not the energy. Modules retain full charge independently of BMS status. A failed BMS at "+fac.volt+" is more hazardous, not less.",correct:true,trap:""},
  {text:"No. The BMS failure removes active charge management so the modules are now in passive self-discharge mode. However, passive discharge at this voltage still takes weeks to reach a safe level, so the hazard remains and no approach is safe without calibrated metering.",correct:false,trap:"While the 'weeks to discharge' conclusion is correct, the reasoning is wrong. Passive self-discharge does not begin at normal rate after BMS failure \u2014 damaged cells may discharge differently or not at all. More critically, a failed BMS means no fault detection or thermal monitoring, which is an increase in hazard level regardless of discharge rate."},
  {text:"Partially correct. The BMS failure stops active charging and removes contactor-controlled current paths, reducing the system\u2019s ability to push current through a fault. The hazard is present but the active fault risk is reduced.",correct:false,trap:"An 'unmanaged' ESS system is not lower hazard. The BMS provides fault detection, contactor control, and thermal monitoring. Without it, there is no system response to a developing arc fault or cell failure. The energy is still present and no longer monitored \u2014 that is an increase in hazard level, not a reduction."},
  {text:"Correct. Without the BMS operating, module voltage depends on the BMS supply circuit. Modules become isolated from each other and from any external voltage source when the BMS goes offline.",correct:false,trap:"Module-level voltage does not depend on the BMS supply circuit. Each electrochemical cell maintains its charge through internal chemistry. The BMS reads and manages modules but does not supply voltage to them. BMS status has no bearing on module terminal voltage."}]}
];} 
function buildRecyclingQuestions(fac,inc,cond){return[

{level:'ops',cat:"Scene Size-Up",skill:"Recycling Facility vs Single-Vehicle Differences",
 refs:[{t:"Battery Recycling Facility \u2014 Baseline Hazard Profile",c:'A single storage rack can contain the energy equivalent of <span class="warn">10\u201320 full EV (Electric Vehicle) battery packs</span> across mixed chemistries with unknown charge states and pre-existing physical damage.',src:SRC.ntsbEV},
  {t:"Operations-Level Role",c:'<span class="hl">Isolate, deny entry, evacuate, protect exposures, and request hazmat resources immediately.</span> Do not attempt entry, water application, or contact with any battery material.',src:SRC.oshaLiIon}],
 q:"You are first on scene at a "+fac.name+". "+inc.desc+" What does your size-up prioritize differently compared to a single-vehicle EV fire?",
 ans:[
  {text:"Establish a significantly larger isolation perimeter \u2014 one rack contains the energy equivalent of 10\u201320 EV battery packs with unknown chemistry and charge state. Request hazmat immediately. Deny all entry. PFAS (Per- and Polyfluoroalkyl Substances) contamination from prior processing may already be present.",correct:true,trap:""},
  {text:"Establish the same 100-foot ERG (Emergency Response Guidebook) perimeter as a single-vehicle EV incident but expand it immediately once hazmat arrives and can assess the energy inventory. Pre-hazmat response is standardized regardless of facility type.",correct:false,trap:"Energy inventory at a battery recycling facility requires a larger initial perimeter than a single-vehicle incident because a single rack may contain 10\u201320 EV battery pack equivalents. The ERG 147 minimum of 100 feet is the floor for any lithium battery incident \u2014 facility scale requires immediate expansion beyond that floor from the outset."},
  {text:"One rack involved means the incident scope is comparable to a single-vehicle EV fire. Scale resources accordingly and expand if additional racks become involved during the incident.",correct:false,trap:"One rack at a battery recycling facility is not equivalent to one vehicle. A single rack may contain 10\u201320 EV battery pack equivalents across mixed chemistries. Scale the response to the actual energy inventory, not the number of storage units."},
  {text:"Focus size-up on the actively burning modules. Intact-appearing adjacent modules are stable until they show thermal involvement such as swelling or visible smoke.",correct:false,trap:"Intact-appearing modules at a recycling facility may be internally damaged from prior processing, retain significant charge, and already be in early thermal runaway with no visible external signs. Waiting for visible indicators removes the intervention window. Treat the entire rack as involved until hazmat assesses."}]},

{level:'ops',cat:"Isolation & Perimeter",skill:"ERG Guide 147 at Recycling Facility Scale",
 refs:[{t:"ERG 2024, Guide 147 \u2014 Isolation at Multi-Pack Scale",c:'ERG (Emergency Response Guidebook) Guide 147 specifies a 100-foot minimum isolation. At a battery recycling facility this must be treated as a <span class="hl">starting point only.</span> Facility footprint, smoke direction, drainage pathways, and adjacent occupancies require reassessment.',src:SRC.erg147},
  {t:"PFAS Plume from Recycling Facility Fires",c:'Battery recycling fires may produce a PFAS (Per- and Polyfluoroalkyl Substances) plume from combustion of fluorinated electrolyte compounds. <span class="warn">Downwind of the fire is a PFAS exposure zone.</span>',src:SRC.teexEmissions}],
 q:"You are establishing an initial perimeter at a "+fac.name+". Conditions: "+cond.wx+". What is the correct approach to perimeter size and shape?",
 ans:[
  {text:"Start with the ERG (Emergency Response Guidebook) 147 minimum of 100 feet in all directions and expand immediately downwind based on smoke and plume direction. Treat the downwind sector as a larger hazard zone given PFAS (Per- and Polyfluoroalkyl Substances) combustion plume risk.",correct:true,trap:""},
  {text:"Start with the ERG 147 minimum of 100 feet and expand primarily in the upwind direction to account for wind shift risk. The current downwind sector is already evacuated, so upwind expansion prevents workers from being caught if wind reverses.",correct:false,trap:"The downwind sector is the primary expansion priority because the active plume travels downwind. Upwind expansion for wind-shift preparedness is a secondary consideration, not the primary driver. Downwind plume direction is where PFAS and combustion gas concentrations are highest right now."},
  {text:"Apply a uniform 100-foot circular perimeter in all directions. This matches ERG 147 guidance and is consistent with standard isolation protocol for any lithium battery incident.",correct:false,trap:"A uniform 100-foot circle treats all directions equally at a facility where wind creates a defined downwind hazard zone. The 100-foot minimum is the floor \u2014 the downwind sector requires expansion based on plume direction, smoke behavior, and proximity of adjacent occupancies."},
  {text:"Use the building walls as your perimeter boundaries. Battery recycling facilities are fixed structures and the walls define where the hazard is contained.",correct:false,trap:"Building walls do not contain a battery fire hazard plume. Smoke, vent gases, and PFAS combustion products exit through openings, HVAC systems, and structural gaps. The isolation perimeter must extend beyond the building footprint."}]},

{level:'ops',cat:"Entry Restriction",skill:"Operations-Level No-Entry Decision",
 refs:[{t:"Why Entry is Prohibited at Operations Level",c:'Battery recycling facilities have three concurrent entry hazards: <span class="warn">unknown voltage from mixed charge-state modules, toxic off-gas from thermal runaway, and PFAS (Per- and Polyfluoroalkyl Substances) dermal and inhalation exposure.</span> Structural PPE addresses none of these.',src:SRC.oshaLiIon},
  {t:"Smoke as a Hazard Indicator",c:'<span class="hl">Visible smoke from the exterior confirms an active hazard inside \u2014 not a safe interior condition.</span> HF (Hydrogen Fluoride) and HCN (Hydrogen Cyanide) may be at IDLH (Immediately Dangerous to Life or Health) concentrations within the smoke.',src:SRC.ntsbEV}],
 q:"Smoke is visible from the exterior of the "+fac.name+". A crew member suggests a quick interior search for any workers who may not have evacuated. No one has SCBA donned. What is the correct decision?",
 ans:[
  {text:"No entry without SCBA at minimum, and no entry at the operations level into an active battery recycling facility fire regardless of PPE worn. Account for workers at the exterior through accountability. Request hazmat and relay potential victim information to hazmat command.",correct:true,trap:""},
  {text:"Don available SCBA then enter immediately to clear the building. SCBA eliminates the inhalation hazard, which is the primary concern in a smoke environment. Limit the search to the accessible area near the entrance and exit immediately if conditions worsen.",correct:false,trap:"SCBA addresses inhalation only. It does not address arc flash from charged modules at unknown voltages or PFAS dermal exposure from contaminated surfaces. Operations-level personnel do not enter active battery facility fires regardless of respiratory protection. This is a hazmat team function."},
  {text:"Quick interior entry without SCBA is acceptable if limited to the immediately accessible area near the entrance and you exit at the first sign of deteriorating conditions.",correct:false,trap:"Battery facility smoke at the entrance level may contain HF and HCN at rapidly incapacitating concentrations. A single breath of HCN above its IDLH (Immediately Dangerous to Life or Health) of 50 ppm causes rapid incapacitation. 'Limiting exposure time' is not a protection strategy against these compounds. No entry without SCBA."},
  {text:"Entry is acceptable if crew members hold their breath during the initial sweep near the entrance and limit time inside to under 90 seconds.",correct:false,trap:"HF and HCN penetrate through mucous membranes and skin as well as through inhalation. Breath-holding does not protect against dermal exposure or mucous membrane absorption in a smoke-filled environment. No entry without SCBA, and no operations-level entry regardless."}]},

{level:'ops',cat:"Personnel Positioning",skill:"Wind-Based Positioning at Recycling Facility",
 refs:[{t:"Combustion Plume from Battery Recycling Fires",c:'Battery recycling fires produce a plume containing <span class="warn">HF (Hydrogen Fluoride), HCN (Hydrogen Cyanide), CO (Carbon Monoxide), and PFAS (Per- and Polyfluoroalkyl Substances) combustion products.</span> This plume travels downwind and is not visible at hazardous concentrations.',src:SRC.teexEmissions},
  {t:"Conditions: "+fac.name,c:'Current conditions: '+cond.wx+'<br>Operational note: '+cond.note,src:null}],
 q:"You arrive at a "+fac.name+" with smoke showing. Conditions: "+cond.wx+". Where do you position command, apparatus, and staging?",
 ans:[
  {text:"Position all apparatus and personnel upwind and uphill of the facility. Stage command at the upwind perimeter. Keep all personnel out of the smoke plume path and treat the downwind sector as a contaminated zone until atmospheric monitoring confirms otherwise.",correct:true,trap:""},
  {text:"Position apparatus upwind but allow one unit to stage crosswind for lateral observation. A crosswind position provides a perpendicular sightline for size-up while keeping that unit outside the direct plume path.",correct:false,trap:"Crosswind positioning places personnel within the plume spread zone, which extends laterally from the centerline. Adequate size-up observation can be achieved from an upwind position. A crosswind staging position is not outside the hazard zone for a sustained battery recycling fire."},
  {text:"Position apparatus near the building entrance on the windward side for fastest hazmat team access when they arrive. Proximity to the entrance speeds subsequent hazmat operations.",correct:false,trap:"Facility entrance staging may be downwind or adjacent to vent discharge depending on building orientation. Proximity to the entrance does not override upwind staging. Hazmat teams can travel from upwind staging to their operational position."},
  {text:"Position downwind where the smoke is most visible for size-up reporting and reposition when hazmat arrives. Visual monitoring of fire behavior is the key priority for the first-arriving officer.",correct:false,trap:"Combustion plume products are present downwind at hazardous concentrations below visibility threshold. Positioning for visual access does not override upwind staging. Adequate size-up can be accomplished from upwind positions."}]},

{level:'ops',cat:"Civilian Management",skill:"Worker Assembly Point Verification",
 refs:[{t:"Assembly Points at Battery Facilities",c:'Battery recycling assembly points may be <span class="warn">in the downwind plume path, adjacent to drainage areas, or within the isolation perimeter.</span> Designated for non-emergency conditions. Verify before confirming safe.',src:SRC.oshaLiIon},
  {t:"PFAS Ground Contamination",c:'Runoff from a battery recycling fire carries PFAS (Per- and Polyfluoroalkyl Substances) into the surrounding area. <span class="hl">Stage personnel on impervious surfaces upwind \u2014 PFAS ground contamination is a secondary exposure pathway on soil and grass.</span>',src:SRC.teexEmissions}],
 q:"Workers from the "+fac.name+" have self-evacuated to a grassy staging area on the south side. Wind is from the north and smoke is visible from the building’s south face. What action do you take?",
 ans:[
  {text:"Relocate workers immediately. The south-side grassy area is downwind of the smoke discharge and in the plume path. Grass also presents PFAS (Per- and Polyfluoroalkyl Substances) ground contamination risk from runoff. Move workers upwind to an impervious surface on the north side at or beyond the ERG (Emergency Response Guidebook) 147 perimeter.",correct:true,trap:""},
  {text:"Relocate workers from the grassy area to the east or west side of the building. A perpendicular position to the north wind places them crosswind, out of the direct plume path, while keeping them close to the facility for accountability.",correct:false,trap:"Crosswind positioning places workers within the plume spread zone, which extends laterally from the centerline. Moving them to the east or west does not guarantee they are outside the plume. Move workers to the upwind north side, not a crosswind position."},
  {text:"Keep workers in the south lot but move them from the grass to the paved parking area. Impervious surface eliminates the PFAS ground contact risk while keeping them accessible for accountability.",correct:false,trap:"Moving to impervious surface addresses PFAS ground contamination but does not address the plume inhalation hazard. The south lot paved area is still downwind of the smoke discharge. Workers must be relocated to the upwind north side, not just moved to pavement in the same downwind zone."},
  {text:"The facility’s designated assembly area was selected as part of their emergency plan. Coordinate with the facility safety officer before relocating workers from their designated staging location.",correct:false,trap:"Facility assembly areas account for normal conditions, not plume direction during active battery fires. Real-time incident conditions override pre-planned assembly locations. If the designated area is in the plume path, relocate workers immediately without waiting for safety officer coordination."}]},

{level:'ops',cat:"Resource Management",skill:"Operations-Level Resource Request \u2014 Recycling",
 refs:[{t:"Resources Required for Recycling Facility Response",c:'Battery recycling facility incidents require: <span class="hl">hazmat team, environmental authority notification for PFAS and runoff, ALS (Advanced Life Support) medical standby, and utility company if building power is involved.</span>',src:SRC.ntsbEV},
  {t:"Technical Resource Access at Recycling Facilities",c:'No single OEM (Original Equipment Manufacturer) to contact. <span class="hl">CHEMTREC (Chemical Transportation Emergency Center) at 1-800-424-9300 and the facility\u2019s chemical inventory documentation are your primary technical resources.</span>',src:SRC.evfiresafe}],
 q:"You are first on scene at a "+fac.name+". "+inc.desc+" What resources do you request on your initial transmission, and what differs from an ESS facility response?",
 ans:[
  {text:"Request hazmat team, ALS (Advanced Life Support) medical standby, environmental authority notification for PFAS (Per- and Polyfluoroalkyl Substances) and runoff, and utility company if building power is involved. Unlike an ESS incident, there is no single manufacturer to contact \u2014 use CHEMTREC (Chemical Transportation Emergency Center) and facility documentation as your technical resources.",correct:true,trap:""},
  {text:"Request hazmat team, ALS standby, and ESS manufacturer contact through CHEMTREC (Chemical Transportation Emergency Center). The technical resource pathway is the same as an ESS incident because both involve lithium-ion chemistry and CHEMTREC connects you to battery manufacturer emergency lines.",correct:false,trap:"Battery recycling facilities process modules from multiple manufacturers. There is no single OEM to contact because chemistry source is mixed. The technical resource pathway differs from an ESS incident \u2014 CHEMTREC for general guidance and facility documentation for specific chemical inventory, not a single OEM emergency line."},
  {text:"Request hazmat team and ALS standby immediately. Environmental notification is the hazmat team\u2019s responsibility once they arrive and assess the contamination scope.",correct:false,trap:"Environmental notification at a battery recycling facility fire should be initiated by first-arriving units who identify runoff or plume conditions, not deferred to hazmat arrival. PFAS contamination is a significant environmental event requiring early notification."},
  {text:"Request mutual aid engine companies for additional water supply along with hazmat and ALS. Battery recycling fires require high water volume and establishing supply early is the highest operational priority.",correct:false,trap:"Water volume for battery fires is a hazmat team decision, not a first-arriving operations-level determination. The hazard is not a water supply problem. Hazmat resources and technical assessment are the priority before any water is applied."}]},

{level:'ops',cat:"Suppression Decision",skill:"Water Application \u2014 Operations-Level Scope",
 refs:[{t:"Water Application \u2014 Not an Operations-Level Decision",c:'Water application at a battery recycling facility requires assessment of runoff contamination pathways and containment readiness. <span class="warn">Operations-level responders do not initiate water application \u2014 this is a hazmat team function.</span>',src:SRC.oshaLiIon},
  {t:"Uncontrolled Runoff Risk",c:'<span class="warn">Each gallon applied picks up electrolyte and PFAS (Per- and Polyfluoroalkyl Substances) contamination.</span> Water applied without containment in place adds to the contamination problem.',src:SRC.teexEmissions}],
 q:"Fire is visible from storage racks at the "+fac.name+". Your engine has a charged hand line. You have not been briefed by hazmat. A crew member recommends beginning exterior water application from a safe perimeter distance. What is the correct decision?",
 ans:[
  {text:"Do not apply water without hazmat guidance. Water at a battery recycling facility requires contamination runoff assessment and containment planning before the first gallon is applied. Hold the line ready, maintain the perimeter, and await hazmat authorization.",correct:true,trap:""},
  {text:"Do not apply water yet, but pre-position hand lines and establish a water supply so you can begin immediately upon hazmat authorization. Pre-positioning without flowing saves time once authorization is given.",correct:false,trap:"Pre-positioning hand lines near the building in preparation for water application is appropriate \u2014 this option is correct in principle. However, establishing a large water supply suggests commitment to high-volume attack before hazmat assesses the need. Pre-position conservatively and wait for hazmat to define the application plan, volume, and containment requirements."},
  {text:"Begin exterior water application from a safe perimeter distance. Cooling adjacent racks from outside the perimeter does not require hazmat authorization and is an appropriate operations-level action.",correct:false,trap:"Exterior water application still generates PFAS-contaminated runoff flowing toward drainage infrastructure. 'From a safe distance' addresses personnel safety, not the environmental consequence of uncontrolled runoff. Water application requires hazmat guidance regardless of distance from the building."},
  {text:"Apply water briefly to knock down visible flames, then hold until hazmat arrives. A brief application controls spread without creating significant runoff.",correct:false,trap:"There is no threshold below which water application at a battery recycling facility is environmentally inconsequential. Additionally, temporary knockdown without cell-level cooling leads to rapid re-ignition, creating a larger fire with the same runoff without solving the problem."}]},

{level:'ops',cat:"Exposure Protection",skill:"Adjacent Occupancy Protective Actions",
 refs:[{t:"Downwind Exposure Protection",c:'Neighboring occupancies downwind are in the plume path of HF (Hydrogen Fluoride), HCN (Hydrogen Cyanide), and PFAS (Per- and Polyfluoroalkyl Substances) combustion products. <span class="hl">Shelter-in-place is appropriate for short-duration plumes. Evacuation is required for sustained plume events.</span>',src:SRC.ntsbEV},
  {t:"Shelter-in-Place vs Evacuation",c:'<span class="warn">A sustained battery recycling fire is not a short-duration plume event.</span> Shelter-in-place relying on building airtightness for an open-ended duration is not reliable protection.',src:SRC.oshaLiIon}],
 q:"An occupied apartment building is 200 feet downwind of the "+fac.name+". The fire is producing a sustained heavy smoke plume. What is your recommended protective action for the apartment building occupants?",
 ans:[
  {text:"Evacuate the downwind apartment building. A sustained battery recycling fire produces an ongoing plume with HF (Hydrogen Fluoride), HCN (Hydrogen Cyanide), and PFAS (Per- and Polyfluoroalkyl Substances). Shelter-in-place is for short-duration or diminishing plumes. This is a sustained event requiring evacuation to an upwind staging area.",correct:true,trap:""},
  {text:"Shelter-in-place the apartment building with enhanced protocols: seal windows and doors, disable HVAC, and monitor occupants at 30-minute intervals. Enhanced shelter-in-place provides better protection than evacuation through a potentially contaminated egress route.",correct:false,trap:"Enhanced shelter-in-place relies on building airtightness for an open-ended sustained fire event. Modern residential construction is not designed as a sealed atmospheric barrier. A multi-hour battery recycling fire plume exceeds the protective tolerance of residential shelter-in-place regardless of enhancement measures. Evacuate upwind."},
  {text:"Shelter-in-place the apartment building. Modern residential construction provides sufficient airtightness to protect occupants from a plume event of this duration and concentration.",correct:false,trap:"Modern residential construction is not designed as a sealed atmospheric barrier. HVAC systems, door and window gaps, and occupant behavior reduce actual protection significantly. A sustained battery recycling fire plume exceeds the design tolerance of residential shelter-in-place. Evacuate."},
  {text:"No immediate protective action is needed at 200 feet. This exceeds the ERG 147 minimum isolation distance and occupants are outside the established responder perimeter.",correct:false,trap:"ERG 147 isolation distances establish a minimum perimeter for responder safety, not the threshold beyond which no public protective action is needed. A downwind occupancy at 200 feet may be in the plume path from a sustained battery recycling fire. Plume exposure does not stop at the isolation perimeter boundary."}]},

{level:'ops',cat:"Post-Fire Stabilization",skill:"Re-Ignition Risk Communication at Command Transfer",
 refs:[{t:"ERG 2024, Guide 147 \u2014 Re-Ignition",c:'ERG (Emergency Response Guidebook) Guide 147 documents re-ignition risk for lithium battery fires <span class="warn">up to weeks after initial extinguishment.</span>',src:SRC.erg147},
  {t:"Command Transfer Communication",c:'<span class="hl">First-arriving officers who transfer command must explicitly communicate re-ignition risk and the absence of hazmat clearance to incoming command</span> \u2014 it is not a self-evident condition.',src:SRC.oshaLiIon}],
 q:"You have managed the scene at the "+fac.name+" for 40 minutes. The fire appears visually controlled and you are transferring command to the arriving hazmat officer. What critical information must you communicate?",
 ans:[
  {text:"Communicate that no re-entry clearance has been given, re-ignition risk per ERG (Emergency Response Guidebook) Guide 147 extends potentially for weeks, the perimeter has not been reduced, the status of environmental authority notification, and the location of all personnel. Do not describe the scene as 'controlled' without these qualifiers.",correct:true,trap:""},
  {text:"Communicate perimeter location, personnel accountability, environmental notification status, and resource requests made. Characterize the scene as 'fire controlled, perimeter established' to give incoming command an accurate operational status they can build on.",correct:false,trap:"'Fire controlled, perimeter established' without qualification implies a stability that ERG 147 explicitly does not support. Incoming hazmat command needs to know 'controlled' means visually suppressed, not stable, and that re-ignition risk and no technical assessment has occurred. An unqualified 'controlled' creates false confidence."},
  {text:"Transfer the perimeter location and personnel accountability. The hazmat officer will conduct their own assessment \u2014 avoid pre-characterizing conditions they will independently evaluate and develop their own situational awareness.",correct:false,trap:"Re-ignition risk, re-entry clearance status, and environmental notification status are operational facts, not pre-characterizations. If environmental notification has not been initiated, the hazmat officer needs to know to initiate it immediately. These are transfer briefing requirements, not items the hazmat officer will discover on their own."},
  {text:"Focus on the operational logistics: personnel location, resource staging, and utility contacts made. Technical assessment is the hazmat officer’s role and you should not attempt to characterize conditions beyond what your operations-level training covers.",correct:false,trap:"Re-ignition risk communication is not a technical assessment \u2014 it is a citation of ERG 147 guidance that every responder should relay at command transfer. Withholding that information because it feels like a technical characterization creates a gap in incoming command's situational awareness."}]},

{level:'ops',cat:"Respiratory Protection",skill:"SCBA Decision at Recycling Facility Perimeter",
 refs:[{t:"Chemical Odor at Recycling Facility Perimeter",c:'Battery recycling fires produce HF (Hydrogen Fluoride), HCN (Hydrogen Cyanide), and organic combustion products with a distinct odor. <span class="warn">Detectable odor at the perimeter means you are already in a contaminated atmosphere.</span>',src:SRC.faaVentGas},
  {t:"SCBA Threshold at Recycling Facility Perimeters",c:'<span class="hl">Any detectable chemical odor at the established perimeter means the perimeter must be moved outward</span> and SCBA must be donned before any further approach.',src:SRC.oshaLiIon}],
 q:"While establishing the perimeter at the "+fac.name+", a crew member reports a distinct chemical burning odor at the current perimeter line. No one is wearing SCBA (Self-Contained Breathing Apparatus). What is the immediate action?",
 ans:[
  {text:"Back up immediately to fresh air. Odor at the perimeter line means everyone at that position is in a contaminated atmosphere. Don SCBA before any further approach. Move the perimeter outward to where no odor is detectable without SCBA. Notify command that the perimeter must be expanded.",correct:true,trap:""},
  {text:"Don SCBA at your current positions, then move the perimeter outward 50 feet to clear the odor. SCBA provides adequate protection for moving the perimeter while already at the odor threshold.",correct:false,trap:"Donning SCBA while already in a contaminated atmosphere means breathing contaminated air during the donning process. Back up to fresh air first, then don SCBA. Never don respiratory protection in the contaminated zone."},
  {text:"Note the odor, continue without SCBA, and move the perimeter outward 100 feet to increase buffer. At perimeter distance, a chemical odor is expected near a battery fire and does not indicate an immediately dangerous concentration.",correct:false,trap:"Odor detection of HF at approximately 0.04 ppm means you are already in a confirmed contaminated atmosphere. You cannot reliably judge concentration by odor strength alone. Moving the perimeter without first donning SCBA continues exposure during the movement. Back up first, then don SCBA."},
  {text:"Evacuate all personnel entirely and suspend operations until hazmat arrives. Odor at the perimeter means all operations-level work is unsafe regardless of protective measures.",correct:false,trap:"Withdrawing entirely leaves the scene without control. Back up to fresh air, don SCBA, and re-establish the perimeter at a safe distance. Operations-level perimeter work continues from a respiratory-protected position at a safe distance."}]},

{level:'ops',cat:"Resource Positioning",skill:"Apparatus and Hazmat Staging Location",
 refs:[{t:"Staging Location Requirements",c:'Staging must be: <span class="hl">upwind of the facility, outside the isolation perimeter, on impervious surface, and accessible to hazmat resources without traveling through the plume path.</span>',src:SRC.oshaLiIon},
  {t:"Hazmat Team Access Routing",c:'<span class="hl">Designate an approach route from upwind that avoids the downwind sector</span> and communicate it over radio before hazmat units arrive.',src:SRC.ntsbEV}],
 q:"You are setting up staging for an arriving hazmat team at the "+fac.name+". Conditions: "+cond.wx+". What factors determine your staging location and how do you direct incoming hazmat apparatus?",
 ans:[
  {text:"Stage upwind on impervious surface at or beyond the ERG (Emergency Response Guidebook) 147 isolation distance. Direct incoming hazmat via a route that approaches from upwind and avoids the downwind plume sector. Communicate the approach route over radio before hazmat units arrive.",correct:true,trap:""},
  {text:"Stage upwind on impervious surface and mark the staging area. Allow incoming hazmat units to self-navigate using their onboard mapping, and radio the staging location coordinates. Self-navigation prevents you from tying up radio traffic with approach guidance.",correct:false,trap:"Onboard mapping routes hazmat units along the most direct path, which may take them through the plume or downwind sector. Communicate the approach route explicitly before they arrive. Do not rely on self-navigation for hazmat apparatus staging at an active plume event."},
  {text:"Stage at the facility entrance on the nearest accessible side to minimize equipment travel time. Proximity to the entrance positions hazmat closest to where they will operate.",correct:false,trap:"Facility entrance staging may be downwind or adjacent to vent discharge depending on building orientation. Proximity to the operational area does not override upwind staging requirements. Hazmat teams travel from upwind staging to their entry point."},
  {text:"Stage on whichever side has the most available space. Adequate staging area for hazmat equipment is the primary positioning factor, and a cramped upwind staging area slows hazmat setup.",correct:false,trap:"Available space is a secondary factor. Upwind positioning is the primary requirement. If the largest available area is downwind, find sufficient upwind space even if it is smaller or less convenient."}]},

{level:'ops',cat:"Regulatory Notification",skill:"Environmental Notification at Recycling Incidents",
 refs:[{t:"PFAS Runoff \u2014 Environmental Notification",c:'Battery recycling fires generate PFAS (Per- and Polyfluoroalkyl Substances) contaminated runoff requiring environmental authority notification. <span class="hl">Notification must occur as soon as a release is identified</span> \u2014 not after containment is attempted.',src:SRC.teexEmissions},
  {t:"Documentation at Recycling Incidents",c:'Document observed runoff direction, drainage pathway, approximate volume, time of observation, and weather conditions. <span class="warn">This documentation becomes part of the required regulatory record.</span>',src:SRC.oshaLiIon}],
 q:"You observe contaminated water flowing from the "+fac.name+" toward storm drains on the south side of the property. You have not yet established containment. What is the correct notification action?",
 ans:[
  {text:"Notify environmental authorities immediately. Document what you observed, flow direction, approximate volume, and exact time. Notification and containment happen concurrently. PFAS-contaminated runoff reaching storm drains is a regulated release event that triggers immediate notification.",correct:true,trap:""},
  {text:"Establish containment first, then notify. Reporting a confirmed release with containment already in place gives environmental authorities a more actionable picture and allows them to confirm whether a field response is needed.",correct:false,trap:"Environmental notification is triggered by identification of a release, not by the outcome of containment. Delaying to present a complete picture may leave environmental authorities without time to deploy their own protective measures. Notify concurrently with containment action."},
  {text:"Notify only if containment fails and water actually enters the storm drain. A PFAS release that is successfully contained at the curb does not trigger the same reporting requirement as an uncontrolled discharge to the stormwater system.",correct:false,trap:"Notification requirements are triggered by the release event itself. The flowing contaminated water is a release event. You cannot know the outcome at the time of observation. Notify immediately regardless of expected containment success."},
  {text:"Environmental notification for a PFAS release is a specialized function. Wait for the hazmat team and document your observation so they can initiate notification with full technical context on arrival.",correct:false,trap:"Notification obligations do not wait for a higher-level unit. If you identify a release at the operations level, you initiate notification. Passing the decision to hazmat delays notification by their entire response time."}]},

{level:'tech',cat:"Initial Size-Up",skill:"Hazard Recognition \u2014 Non-Standard Environment",
 refs:[{t:"Battery Recycling Facility \u2014 Baseline Hazard Profile",c:'Unlike a single-vehicle incident: <span class="warn">chemistry is mixed, state of charge is unknown, and physical damage has already begun the off-gassing process before you arrive.</span> A single rack can contain the stored energy equivalent of 10\u201320 EV (Electric Vehicle) battery packs.',src:SRC.ntsbEV},
  {t:"Scene: "+fac.name,c:fac.detail,src:null}],
 q:"You arrive at a "+fac.name+". "+inc.desc+" The rack holds modules from multiple vehicle sources in varying condition. What does your initial size-up prioritize differently from a single-vehicle EV incident?",
 ans:[
  {text:"Assume mixed chemistries with unknown state of charge across all modules. Treat every module as energized regardless of appearance. PFAS (Per- and Polyfluoroalkyl Substances) contamination from prior processing damage may already be present. Establish a larger initial perimeter than a single-vehicle incident.",correct:true,trap:""},
  {text:"Assume the worst-case single chemistry \u2014 NMC (Nickel Manganese Cobalt) \u2014 across all modules. Planning for NMC in all positions gives you the most conservative thermal onset and propagation assumptions, simplifying the size-up without underestimating the hazard.",correct:false,trap:"Assuming NMC worst-case is a valid chemistry planning approach, but the key difference from a single-vehicle incident is not chemistry assumption \u2014 it is the combined energy inventory across multiple mixed-source modules, unknown charge states, and pre-existing physical damage. Address energy scale and damage history in your size-up, not only chemistry."},
  {text:"Focus size-up on the actively burning modules. That is the immediate hazard. Intact-appearing adjacent modules are stable until they show thermal involvement such as swelling or visible off-gassing.",correct:false,trap:"Intact-appearing modules at a recycling facility may be internally damaged from prior processing, retain significant charge, and already be in early thermal runaway with no visible external signs. Waiting for visible indicators removes the intervention window. Treat the entire rack as involved."},
  {text:"Apply the same size-up priorities as a single-vehicle EV incident. Chemistry hazards are the same regardless of facility type, and battery recycling facilities are subject to the same regulations as vehicle incidents.",correct:false,trap:"A single rack at a battery recycling facility contains the energy equivalent of 10\u201320 full EV battery packs across mixed chemistries with unknown charge states and pre-existing physical damage. Energy scale, damage baseline, and PFAS pre-incident contamination all differ materially from a single-vehicle incident."}]},

{level:'tech',cat:"Chemistry Assessment",skill:"Worst-Case Chemistry Planning",
 refs:[{t:"Mixed Chemistry at Recycling Facilities",c:'Damaged battery modules in recycling facilities may retain significant charge with compromised enclosures. Mixed chemistries \u2014 <span class="hl">NMC (Nickel Manganese Cobalt), LFP (Lithium Iron Phosphate), NCA (Nickel Cobalt Aluminum), and LMO (Lithium Manganese Oxide)</span> \u2014 may be stored adjacent with limited labeling once processing begins.',src:SRC.faaVentGas},
  {t:"NMC Worst-Case Profile",c:'NMC: thermal onset <span class="warn">approximately 150\u00b0C (302\u00b0F)</span>, cathode releases oxygen making fire self-sustaining, fast cell-to-cell propagation. <span class="hl">When chemistry is unknown, plan for NMC.</span>',src:SRC.teexEmissions}],
 q:"Your monitoring instruments confirm lithium-containing battery material but cannot distinguish chemistry type. The facility supervisor states the rack contains modules from 'various makes and models processed this week.' What is your working assumption for tactical planning?",
 ans:[
  {text:"Assume NMC (Nickel Manganese Cobalt) chemistry across the entire rack \u2014 lowest thermal onset (~150\u00b0C), cathode oxygen release making the fire self-sustaining, and fast cell-to-cell propagation. Safer to over-plan for NMC and encounter LFP than to plan for LFP and encounter NMC.",correct:true,trap:""},
  {text:"Assume NMC chemistry for the fire attack and suppression plan, but LFP chemistry for the post-fire monitoring and re-entry window. NMC requires the most aggressive fire attack; LFP requires the shortest monitoring period. Combining the worst case for each phase gives you a conservative plan across the whole incident.",correct:false,trap:"Post-fire monitoring and re-entry periods are not governed by chemistry alone \u2014 they apply to the entire rack regardless of chemistry identified. If NMC is assumed for fire attack, NMC re-ignition risk assumptions apply for monitoring. You cannot use different chemistry assumptions for different phases of the same incident."},
  {text:"Average the chemistry profiles across the four common types. Planning for an intermediate thermal onset and propagation speed represents the actual mixed condition more accurately than assuming all modules are worst-case.",correct:false,trap:"Chemistry profiles do not average. Each module behaves according to its own chemistry independently. If one NMC module is present, you have NMC fire behavior risk from that module regardless of what surrounds it. Average planning means you have under-planned for the worst module in the rack."},
  {text:"Request facility workers to identify which modules came from which vehicle make so chemistry can be sorted before proceeding with fire attack planning.",correct:false,trap:"Sending workers back into proximity of an active rack fire to identify modules creates a civilian casualty risk. Additionally, module-to-vehicle traceability is frequently lost once processing begins. This approach is not safe or workable under incident conditions."}]},

{level:'tech',cat:"Contamination Baseline Assessment",skill:"Pre-Existing PFAS Recognition",
 refs:[{t:"PFAS (Per- and Polyfluoroalkyl Substances) at Recycling Facilities \u2014 Pre-Incident Contamination",c:'Battery modules with compromised enclosures <span class="warn">leak electrolyte containing fluorinated compounds during normal processing operations.</span> A recycling facility may have an established contamination baseline before your response begins.',src:SRC.teexEmissions},
  {t:"Environmental Notification Must Account for Baseline",c:'<span class="hl">Environmental notification must account for contamination that already exists, not only what the current incident adds.</span>',src:null}],
 q:"During initial assessment of the "+fac.name+", you notice staining around floor drains and a faint chemical odor throughout \u2014 prior to the fire reaching any storage racks. Workers confirm a small battery fire was extinguished with dry chemical two weeks ago. What does this tell you about your contamination baseline?",
 ans:[
  {text:"The facility has a pre-existing contamination baseline from prior incidents and ongoing electrolyte leakage during processing. Runoff control must account for contamination already present. Notify environmental authorities about pre-existing contamination as a separate matter from the current incident.",correct:true,trap:""},
  {text:"The facility has a pre-existing contamination baseline. This means your runoff containment calculations should subtract the pre-existing volume from the current incident contribution, since environmental authorities will assess total site contamination, not incident-specific contamination.",correct:false,trap:"Environmental notification and runoff management address total contamination present \u2014 you do not subtract pre-existing volumes. A pre-existing contamination baseline means the drainage system is already carrying contamination before you apply a single gallon of water. Total contamination in the drainage system is what matters, regardless of which incident generated it."},
  {text:"The most recent extinguisher use was dry chemical, not AFFF (Aqueous Film-Forming Foam). No PFAS was introduced by prior suppression, so the floor drain staining is from electrolyte only, not PFAS.",correct:false,trap:"Dry chemical extinguishers do not contribute PFAS, but that is not the only contamination source at a recycling facility. Electrolyte leakage from damaged modules during normal processing is an ongoing source of fluorinated compound exposure to floor drains regardless of what suppression agents have been used. Dry chemical use does not rule out electrolyte-source PFAS contamination."},
  {text:"Floor drain staining is a facility housekeeping issue. It indicates inadequate spill cleanup procedures but does not represent a contamination baseline relevant to the current incident response.",correct:false,trap:"Floor drain staining at a battery recycling facility indicates prior electrolyte and chemical discharge into the drainage system. This is directly relevant to your runoff control decisions \u2014 the drains are already carrying contamination before you apply a single gallon of fire attack water. This is a missed hazard assessment if treated as housekeeping."}]},

{level:'tech',cat:"Water Application Decision",skill:"Suppression with Pre-Damaged Battery Stock",
 refs:[{t:"Water Application \u2014 Damaged vs Intact Enclosures",c:'Damaged modules allow water to contact cell internals more directly than an intact sealed pack. This increases cooling effect per gallon but also <span class="warn">increases contaminated runoff volume per gallon.</span> Apply only the water necessary for thermal interruption.',src:SRC.teexEmissions},
  {t:"Runoff Contamination at Recycling Scale",c:'Pre-existing surface PFAS (Per- and Polyfluoroalkyl Substances) combined with water contacting open-enclosure cell material means runoff contamination accumulates faster than at a single intact-pack incident. <span class="hl">Containment urgency is higher here than at a sealed-pack incident.</span>',src:null}],
 q:"At the "+fac.name+", fire has spread to three modules on a rack. You are applying water for cooling. Compared to a single intact passenger EV fire, what additional factor applies to your water application decision here?",
 ans:[
  {text:"Each gallon contacting damaged open-enclosure cell material picks up more electrolyte contamination than water on a sealed pack. Runoff contamination per gallon is higher here. Apply only the volume necessary for thermal interruption and treat containment as more urgent than at a single intact-pack incident.",correct:true,trap:""},
  {text:"Each gallon contacting open-enclosure cells provides more direct cooling than on a sealed pack. This means you can achieve thermal interruption with less total water than at a sealed-pack incident, reducing both time and contaminated runoff volume.",correct:false,trap:"More direct cell contact does increase cooling efficiency per gallon, but it simultaneously increases contaminated runoff volume per gallon. The tactical goal is the minimum water necessary for thermal interruption, not a calculation that less water is needed. Contamination rate increases even if efficiency increases."},
  {text:"Damaged cells store less energy than intact cells, so the fire will extinguish faster and total water needed is reduced. No additional consideration specific to damaged stock applies.",correct:false,trap:"Physical damage does not reliably reduce stored charge. Modules in a recycling facility may be mechanically damaged but electrically intact, retaining most or all of their original charge. Assuming reduced energy from physical damage can lead to under-resourcing cooling and inadequate sustained application."},
  {text:"Water application considerations at a recycling facility are the same as any EV battery incident. The containment planning and contamination factors are identical regardless of whether the modules have intact or compromised enclosures.",correct:false,trap:"Intact sealed pack versus open-enclosure damaged modules are physically different conditions. The rate at which water picks up electrolyte and fluorinated compounds per gallon differs materially. Treating them as equivalent misses the contamination magnitude difference and results in inadequate runoff containment planning."}]},

{level:'tech',cat:"Overhaul Approach",skill:"Post-Fire Debris Handling \u2014 Unknown Charge State",
 refs:[{t:"Post-Fire Debris at Battery Recycling Facilities",c:'Post-fire debris includes partially burned modules that may retain significant charge, cell material in various states of damage, and surface-bound PFAS (Per- and Polyfluoroalkyl Substances). <span class="warn">Standard overhaul \u2014 raking, turning over debris \u2014 releases surface-bound PFAS and risks arc flash from energized cell material.</span>',src:SRC.oshaLiIon},
  {t:"Conventional Overhaul Experience Does Not Transfer",c:'At a battery recycling facility, <span class="warn">mechanical disturbance of debris is itself a hazard-generating action.</span> TIC (Thermal Imaging Camera) monitoring from a safe distance is the correct post-knockdown assessment tool.',src:SRC.teexEmissions}],
 q:"The fire at the "+fac.name+" is visually out. Command requests overhaul to confirm complete extinguishment. A storage rack has collapsed and battery modules are intermixed with debris on the floor. What is the correct overhaul approach?",
 ans:[
  {text:"Do not conduct conventional overhaul. Do not rake, move, or physically disturb battery modules or debris \u2014 all material must be assumed energized and PFAS (Per- and Polyfluoroalkyl Substances) contaminated. Use TIC (Thermal Imaging Camera) monitoring of the debris field from a safe distance. Contact the facility’s technical team for debris handling guidance.",correct:true,trap:""},
  {text:"Conduct overhaul using non-conductive tools \u2014 rubber-handled rakes and non-conductive gloves eliminate the arc flash hazard and allow safe assessment of the debris field while managing PFAS exposure through Level B PPE.",correct:false,trap:"Non-conductive tools provide limited protection against arc flash from 400\u2013800V module-level charges. Arc flash from a partially charged cell is not contact-dependent \u2014 it occurs across a gap. Non-conductive tools do not address the arc flash hazard. The debris field requires TIC monitoring, not physical disturbance."},
  {text:"Conduct overhaul using copious water application to the debris field while personnel remain outside the hot zone. Flooding the debris suppresses any re-ignition risk and dilutes PFAS surface contamination before manual handling begins.",correct:false,trap:"Flooding the debris field generates large volumes of PFAS-contaminated runoff proportional to the water applied. It does not eliminate the arc flash hazard from energized modules in the debris, and excess water may reach and re-wet modules that have stabilized. TIC monitoring is the correct assessment method, not pre-flooding."},
  {text:"Modules that are visibly burned through with cell casing breached are confirmed discharged and can be moved safely. Only intact-appearing modules require arc flash precautions during overhaul.",correct:false,trap:"Visual burn-through of a cell casing does not confirm full electrical discharge. Internal electrode material may retain energy even when the external structure is destroyed. This assumption has caused arc flash injuries during battery incident recovery operations. Visible destruction does not equal electrical safety."}]},

{level:'tech',cat:"Atmospheric Monitoring",skill:"TIC Limitations in Wet Conditions",
 refs:[{t:"TIC (Thermal Imaging Camera) Performance in Rain",c:'Active rainfall reduces surface temperatures rapidly, diminishing TIC contrast. <span class="warn">Rain may mask thermal anomalies that indicate residual thermal runaway inside a battery debris field.</span>',src:SRC.teexEmissions},
  {t:"Wet Weather Monitoring Strategy",c:'In rain conditions: increase monitoring frequency, supplement TIC with contact temperature measurement at safe accessible points, and extend the post-event monitoring period before any stabilization determination. <span class="hl">TIC is a lagging indicator in rain \u2014 do not rely on it alone.</span>',src:SRC.oshaLiIon}],
 q:"You are monitoring the debris field at the "+fac.name+" after knockdown. Conditions: "+cond.wx+". Your TIC shows no significant thermal anomalies. Does this confirm the debris field is thermally stable?",
 ans:[
  {text:"No. Active rainfall cools debris surfaces rapidly, reducing TIC contrast and potentially masking hotspots from residual thermal runaway. Increase monitoring frequency, supplement TIC with contact temperature measurement at accessible safe points, and extend the post-event monitoring period before any stabilization determination.",correct:true,trap:""},
  {text:"No, but rain provides an additional benefit in this case: continuous surface cooling from rainfall actively suppresses residual thermal runaway in the debris field. The combined effect of firefighting water and rain provides more cooling than either alone, shortening the monitoring period needed.",correct:false,trap:"Rain cools surfaces but does not penetrate into thermally active cell interiors. Surface cooling from rain that masks TIC anomalies is not the same as cell-level thermal stabilization. Rain shortens the apparent TIC monitoring window, not the actual stabilization time required. Extend the monitoring period, do not shorten it."},
  {text:"Yes. Near-ambient TIC readings combined with active rain cooling represent a conservative confirmation of stability. Rain actively suppresses any remaining thermal activity, and TIC confirming near-ambient means the combined effect is complete.",correct:false,trap:"Rain can cool a surface that is still thermally active at the cell level to near-ambient in minutes. TIC reads surface temperature, not the cell-level temperature where re-ignition originates. Near-ambient TIC in rain conditions is not a stability confirmation. Supplement with contact measurement and extend the monitoring period."},
  {text:"Yes for modules with confirmed water contact during fire attack. Modules that received direct water application have been cooled to the cell level and TIC confirmation of near-ambient surface temperature is sufficient for those modules.",correct:false,trap:"Water application during fire attack addresses active thermal runaway at the time of application. It does not permanently prevent re-ignition. Cells can re-enter thermal runaway after water application stops if internal temperatures remain elevated. TIC confirmation in rain conditions is not sufficient for any modules."}]},

{level:'tech',cat:"Decontamination",skill:"Responder PFAS Decontamination \u2014 Post-Incident",
 refs:[{t:"PFAS Dermal Exposure from Battery Recycling Incidents",c:'Battery recycling fires generate PFAS (Per- and Polyfluoroalkyl Substances) surface contamination on debris, floors, and runoff pathways. <span class="warn">Standard structural fire decontamination \u2014 brushing down turnout gear \u2014 does not remove PFAS.</span>',src:SRC.teexEmissions},
  {t:"Decontamination Protocol for PFAS Exposure",c:'Responders in proximity to battery recycling debris require: <span class="hl">gross decontamination before gear doffing, gear bagging for specialized cleaning, skin washing with soap and water, and health monitoring documentation.</span> Do not transport contaminated gear in personal vehicles.',src:SRC.oshaLiIon}],
 q:"Your entry team has completed debris monitoring at the "+fac.name+". Their turnout gear has visible surface contamination from contact with the debris field. What is the correct decontamination sequence before leaving the scene?",
 ans:[
  {text:"Conduct gross decontamination of the entry team before gear doffing \u2014 wash down exterior gear surfaces with soap and water in the decontamination corridor. Bag contaminated gear for specialized PFAS-aware cleaning. Document all personnel in the proximity zone for health monitoring. Do not transport contaminated gear in personal or department vehicles without proper containment.",correct:true,trap:""},
  {text:"Conduct gross decontamination with soap and water before gear doffing. After decontamination, gear can be transported in sealed plastic bags in department apparatus compartments without specialized containment \u2014 sealed bags prevent cross-contamination during transport.",correct:false,trap:"Sealed plastic bags in apparatus compartments can leak or be accessed by personnel who then contact PFAS-contaminated gear surfaces. Contaminated gear transport requires proper hazardous waste containment, not standard plastic bags in standard compartments. Specialists cleaning facilities require proper chain of custody transport, not improvised bag containment."},
  {text:"Complete gross decon with soap and water at the scene. Gear that has passed gross decon can be returned to service after a standard washing at the station. Gross decon plus station washing constitutes a complete decontamination cycle for PFAS-contaminated gear.",correct:false,trap:"Standard station washing machines are not rated for PFAS removal and may spread contamination to other gear washed in the same machine. PFAS-contaminated gear requires specialized cleaning by a certified contractor. Station washing does not constitute a complete decontamination cycle for this type of contamination."},
  {text:"Transport all contaminated gear directly to a hazmat decontamination facility without conducting field decon. Field decon that is not thorough enough may spread PFAS and is worse than no decon in some circumstances.",correct:false,trap:"Transporting undecontaminated gear from scene to facility spreads PFAS contamination along the transport route and exposes transport personnel. Gross decontamination at scene removes the bulk of surface contamination before transport. Scene gross decon and specialized facility cleaning are sequential steps, not alternatives."}]},

{level:'tech',cat:"Electrical Hazard",skill:"Charge State Assessment \u2014 Visually Damaged Modules",
 refs:[{t:"Visual Damage vs Electrical Hazard",c:'Battery modules may be physically deformed or cracked while retaining significant charge. <span class="warn">Physical damage does not correlate with electrical discharge.</span> A crushed module cell may retain 80\u201390% of its original charge.',src:SRC.ntsbEV},
  {t:"Why Visual Assessment Fails",c:'Lithium-ion cell charge is an electrochemical property of the electrode-electrolyte interface. Only verified discharge through calibrated metering confirms safe charge state. <span class="hl">Visual assessment cannot determine charge state under any circumstances.</span>',src:SRC.oshaLiIon}],
 q:"During debris assessment at the "+fac.name+", a crew member identifies a module that is visibly crushed with the cell casing breached and electrode material partially exposed. They suggest this module is discharged from the physical damage and can be handled without arc flash precautions. Is this correct?",
 ans:[
  {text:"No. Physical damage to a cell casing does not discharge the module. A crushed or breached module may retain 80\u201390% of its original charge through the intact electrode-electrolyte interface. All modules must be assumed fully charged until individually verified discharged by calibrated metering.",correct:true,trap:""},
  {text:"No. The breached casing may have caused an internal short circuit that is still dissipating energy. A module in active internal short has a different hazard profile than a discharged module \u2014 it is generating heat and may still re-ignite, not simply present an arc flash hazard.",correct:false,trap:"While the internal short concern is valid, the core error in the crew member\u2019s reasoning is that physical damage equals discharge. This option correctly identifies additional hazard but does not address the fundamental point: visual assessment cannot determine charge state. The correct answer addresses why physical damage does not equal discharge."},
  {text:"Partially correct. A module with the electrode material directly exposed to air is undergoing accelerated self-discharge through air exposure. The discharge rate depends on humidity and electrode material chemistry, but exposed electrode surface indicates significant charge reduction.",correct:false,trap:"Electrode material exposed to air does not discharge the module through air exposure in a meaningful timeframe. Electrode-air reactions are slow, temperature-dependent, and do not produce rapid electrical discharge. A breached module retains its electrochemical charge regardless of air exposure to the electrode material."},
  {text:"Correct for mechanically crushed modules only. Crushing produces internal short circuits that discharge the module rapidly through internal resistance. A module that has been physically crushed is safe to approach once the initial heating from the short circuit dissipates.",correct:false,trap:"Physical crushing may cause an internal short, but internal shorts do not reliably discharge modules completely. The short circuit path depends on the specific internal geometry of the damage, which cannot be assessed visually. Partial short discharge still leaves significant energy in the module. Visual destruction does not equal electrical safety."}]},

{level:'tech',cat:"Environmental Notification",skill:"What to Report \u2014 PFAS and Runoff",
 refs:[{t:"Environmental Reporting Requirements",c:'Battery recycling facility fires may trigger multiple reporting obligations. Environmental authorities need: <span class="hl">facility type, incident description, estimated runoff volume, drainage pathway, pre-existing contamination history, and weather conditions affecting runoff movement.</span>',src:SRC.oshaLiIon},
  {t:"Pre-Existing Contamination Context",c:'If the facility has a prior contamination history, <span class="warn">this pre-existing baseline must be reported separately from the current incident\u2019s contribution.</span>',src:SRC.teexEmissions}],
 q:"You are initiating environmental authority notification for a fire at the "+fac.name+" that has generated contaminated runoff. What specific information must your notification include?",
 ans:[
  {text:"Report facility name and type, incident description, estimated runoff volume and drainage pathway, any observable pre-existing contamination such as prior drain staining or incident history from workers, weather conditions affecting runoff movement, and time of initial observation. Request guidance on PFAS (Per- and Polyfluoroalkyl Substances) -specific reporting obligations.",correct:true,trap:""},
  {text:"Report facility name, fire location, and that contaminated water is present. Environmental authorities conduct their own assessment to determine reporting specifics, so providing too much detail in the initial notification may conflict with their independent assessment.",correct:false,trap:"Environmental authorities need actionable information to deploy appropriate resources. General notification without drainage pathway, estimated volume, and facility type does not allow them to assess the scale of the event or identify which resources to deploy. Provide all available information \u2014 more detail improves their response, it does not conflict with their assessment."},
  {text:"Report the incident as a general hazmat release. PFAS-specific reporting obligations are determined by the environmental agency based on their classification of the material, not by the first-responder\u2019s characterization at notification.",correct:false,trap:"First responders are required to provide accurate characterization of the release to the extent known. Reporting a battery recycling facility fire with PFAS-containing runoff as a 'general hazmat release' understates the known nature of the event. Identify it specifically \u2014 the environmental authority makes final regulatory categorization, but your notification accuracy determines their initial response."},
  {text:"Report only the current incident\u2019s runoff. Pre-existing contamination at the facility is the facility\u2019s regulatory responsibility and should not be included in the emergency incident notification.",correct:false,trap:"Pre-existing contamination is directly relevant to the environmental authority's response assessment. An incident that adds contamination to an already-contaminated drainage system is a different scope than a first-time contamination event. Report the pre-existing conditions along with the current incident."}]},

{level:'tech',cat:"Technical Assistance",skill:"Reachback Resources for Battery Recycling Incidents",
 refs:[{t:"Reachback Resources \u2014 No Single Manufacturer",c:'Battery recycling facilities process modules from multiple manufacturers. <span class="hl">CHEMTREC (Chemical Transportation Emergency Center) at 1-800-424-9300 is the primary reachback resource</span> for chemistry identification and technical guidance.',src:SRC.evfiresafe},
  {t:"Facility Documentation as a Technical Resource",c:'<span class="hl">The facility\u2019s chemical inventory, SDS (Safety Data Sheets) for electrolyte compounds, and material processing records provide the most facility-specific technical data available.</span>',src:SRC.oshaLiIon}],
 q:"You need technical guidance on propagation risk and cell chemistry at the "+fac.name+". The facility does not have a single manufacturer to contact. What resources do you access, and in what order?",
 ans:[
  {text:"Contact CHEMTREC (Chemical Transportation Emergency Center) at 1-800-424-9300 as your primary technical reachback for chemistry identification and general guidance. Simultaneously, obtain the facility’s chemical inventory documentation and SDS (Safety Data Sheets) for electrolyte compounds \u2014 these provide the most facility-specific data available.",correct:true,trap:""},
  {text:"Contact CHEMTREC (Chemical Transportation Emergency Center) as primary reachback. Once CHEMTREC identifies the predominant chemistry, contact that chemistry's primary manufacturer as a secondary reachback for specific propagation and re-entry guidance.",correct:false,trap:"At a mixed-source recycling facility, no single manufacturer\u2019s guidance covers the full range of chemistries present. Even if CHEMTREC identifies a predominant chemistry, adjacent modules from other manufacturers may behave differently. Facility documentation provides broader coverage than a single OEM contact for a mixed-chemistry rack."},
  {text:"Contact your state fire marshal\u2019s technical assistance line first. State-level technical assistance is available 24 hours and provides guidance applicable to all manufacturers without requiring chemistry-specific identification.",correct:false,trap:"State fire marshal technical assistance provides regulatory and general guidance, not installation-specific ESS technical data or real-time chemistry-specific propagation assessment. CHEMTREC and facility documentation are the correct primary technical resources for incident-level guidance."},
  {text:"ERG (Emergency Response Guidebook) Guide 147 provides complete technical guidance for battery recycling incidents. Reachback is not required when ERG guidance is already available and the chemistry is confirmed as lithium-ion.",correct:false,trap:"ERG Guide 147 provides initial response guidance for lithium battery incidents generally. It does not provide facility-specific chemistry data, propagation rates for mixed-chemistry racks, or re-entry clearance criteria. ERG 147 is your initial action reference, not a substitute for technical reachback."}]}

];}
</script></body></html>
