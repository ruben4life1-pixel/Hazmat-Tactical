<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battery Storage &amp; Recycling Facilities | Hazmat Tactical</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a0e1a;--navy-card:#141c2e;--navy-elevated:#1a2340;--amber:#f0a500;--amber-dim:rgba(240,165,0,0.15);--amber-glow:rgba(240,165,0,0.08);--red:#e03a3a;--red-dim:rgba(224,58,58,0.12);--green:#22c55e;--green-dim:rgba(34,197,94,0.12);--border:rgba(255,255,255,0.07);--border-amber:rgba(240,165,0,0.3);--text:#e8eaf0;--text-muted:#6b7280;--text-dim:#9ca3af;--display:'Bebas Neue',sans-serif;--ui:'Barlow Condensed',sans-serif;--body:'Rajdhani',sans-serif;--mono:'IBM Plex Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);color:var(--text);font-family:var(--body);min-height:100vh;overflow-x:hidden;line-height:1.6}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(240,165,0,0.04) 0%,transparent 60%);pointer-events:none;z-index:0}
.site-header{border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:64px;background:rgba(10,14,26,0.92);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50;box-shadow:0 1px 0 var(--border),0 8px 32px rgba(0,0,0,.5)}
.site-title{font-family:var(--body);font-size:1.2rem;font-weight:700;letter-spacing:4px;text-transform:uppercase}
.site-title span{color:var(--amber)}
.header-badge{font-family:var(--mono);font-size:.58rem;color:var(--text-muted);letter-spacing:.2em;text-transform:uppercase;margin-left:auto;border:1px solid var(--border);padding:4px 10px;border-radius:2px}
.wrap{max-width:820px;margin:0 auto;padding:0 20px 80px;position:relative;z-index:1}
.hero{text-align:center;padding:48px 0 36px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);border:1px solid var(--border-amber);padding:6px 16px;border-radius:2px;margin-bottom:20px;background:var(--amber-dim);box-shadow:0 0 16px rgba(240,165,0,.12)}
.hero h1{font-family:var(--display);font-size:clamp(2.2rem,6vw,3.6rem);letter-spacing:4px;text-transform:uppercase;line-height:1.0;margin-bottom:8px}
.hero-sub{font-family:var(--body);font-size:1.1rem;font-weight:500;color:var(--text-dim);max-width:520px;margin:0 auto 24px}
.hero-rule{width:120px;height:3px;margin:0 auto;background:linear-gradient(90deg,transparent,var(--amber),transparent);border:none;border-radius:2px}
.disclaimer{text-align:center;font-family:var(--mono);font-size:.7rem;color:var(--amber);letter-spacing:.15em;text-transform:uppercase;padding:10px 16px;border:1px solid var(--border-amber);border-radius:4px;background:var(--amber-dim);margin-bottom:28px}
.controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:center;margin-bottom:32px}
.section-toggle{display:flex;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.sec-btn,.lev-btn{font-family:var(--ui);font-size:.9rem;font-weight:700;padding:11px 24px;background:var(--navy-card);color:var(--text-dim);border:none;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s}
.sec-btn.active,.lev-btn.active{background:var(--amber);color:var(--navy)}
.sec-btn:hover:not(.active),.lev-btn:hover:not(.active){background:var(--navy-elevated);color:var(--text)}
.gen-btn{font-family:var(--ui);font-weight:700;font-size:.95rem;padding:11px 32px;background:var(--amber);color:var(--navy);border:none;border-radius:4px;cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s;box-shadow:0 0 20px rgba(240,165,0,.2)}
.gen-btn:hover{transform:translateY(-1px);box-shadow:0 0 32px rgba(240,165,0,.35)}
.sc-card{background:var(--navy-card);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:6px;padding:20px;margin-bottom:20px}
.sc-label{font-family:var(--ui);font-size:.75rem;color:var(--amber);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:10px}
.sc-body{font-family:var(--body);font-size:1rem;color:var(--text);line-height:1.8}
.sc-body strong{color:var(--amber);font-weight:600}
.sc-note{font-family:var(--mono);font-size:.75rem;color:var(--text-muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);line-height:1.7}
.level-banner{font-family:var(--mono);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;padding:5px 14px;border-radius:2px;display:inline-block;margin-bottom:16px}
.level-banner.ops{color:#60a5fa;border:1px solid rgba(59,130,246,0.4);background:rgba(59,130,246,0.1)}
.level-banner.tech{color:var(--amber);border:1px solid var(--border-amber);background:var(--amber-dim)}
.level-banner.all{color:var(--green);border:1px solid rgba(34,197,94,0.35);background:rgba(34,197,94,0.08)}
.q-card{background:var(--navy-card);border:1px solid var(--border);border-radius:6px;margin-bottom:20px;overflow:hidden}
.q-head{padding:14px 20px;background:var(--navy-elevated);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.q-num{font-family:var(--ui);font-size:.8rem;color:var(--amber);font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.q-skill{font-family:var(--mono);font-size:.68rem;color:var(--text-muted);letter-spacing:.5px}
.q-tag{font-family:var(--mono);font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:3px 8px;border-radius:2px}
.q-tag.ops{color:#60a5fa;border:1px solid rgba(59,130,246,0.3);background:rgba(59,130,246,0.08)}
.q-tag.tech{color:var(--amber);border:1px solid rgba(240,165,0,0.25);background:var(--amber-glow)}
.ref-panel{background:var(--navy-elevated);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:6px;padding:16px 18px;margin:14px 20px}
.ref-title{font-family:var(--ui);font-size:.75rem;color:var(--amber);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:8px}
.ref-body{font-family:var(--mono);font-size:.8rem;color:var(--text-dim);line-height:1.9}
.ref-body .hl{color:var(--amber);font-weight:500}
.ref-body .warn{color:var(--red);font-weight:500}
.ref-src{font-family:var(--mono);font-size:.68rem;color:var(--text-muted);margin-top:8px;font-style:italic}
.q-text{padding:16px 20px;font-family:var(--body);font-size:1.05rem;font-weight:500;color:var(--text);line-height:1.7;border-bottom:1px solid var(--border)}
.q-options{padding:14px 20px}
.opt-btn{display:block;width:100%;text-align:left;font-family:var(--body);font-size:.95rem;padding:14px 16px;margin:7px 0;background:var(--navy-elevated);border:1px solid var(--border);border-radius:5px;color:var(--text);cursor:pointer;transition:all .2s;line-height:1.6}
.opt-btn:hover:not(.selected):not(.locked){border-color:rgba(240,165,0,.4);background:rgba(240,165,0,.04)}
.opt-btn.selected{border-color:var(--amber);background:var(--amber-dim)}
.opt-btn.correct{border-color:var(--green)!important;background:var(--green-dim)!important;color:var(--green)!important}
.opt-btn.incorrect{border-color:var(--red)!important;background:var(--red-dim)!important;color:#f87171!important}
.opt-btn.locked{cursor:default;opacity:.65}
.opt-btn.locked.correct{opacity:1}
.commit-btn{display:block;width:100%;font-family:var(--ui);font-weight:700;font-size:.9rem;padding:12px;margin:10px 0 4px;background:var(--amber);color:var(--navy);border:none;border-radius:5px;cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s}
.commit-btn:hover{box-shadow:0 0 20px rgba(240,165,0,.3)}
.commit-btn:disabled{background:var(--navy-elevated);color:var(--text-muted);cursor:default;box-shadow:none}
.fb-panel{padding:16px 20px;border-top:1px solid var(--border);display:none}
.fb-panel.show{display:block}
.fb-panel.correct-fb{border-left:3px solid var(--green)}
.fb-panel.incorrect-fb{border-left:3px solid var(--red)}
.fb-label{font-family:var(--ui);font-size:.85rem;font-weight:700;letter-spacing:1px;margin-bottom:8px}
.fb-label.correct{color:var(--green)}
.fb-label.incorrect{color:var(--red)}
.fb-text{font-family:var(--body);font-size:.92rem;color:var(--text-dim);line-height:1.75}
.fb-text strong{color:var(--text)}
.drill-refs{background:var(--navy-card);border:1px solid var(--border);border-top:3px solid var(--amber);border-radius:6px;padding:28px 24px;margin-top:36px;display:none}
.drill-refs.show{display:block}
.dr-title{font-family:var(--display);font-size:1.5rem;color:var(--amber);letter-spacing:3px;margin-bottom:4px}
.dr-sub{font-family:var(--body);color:var(--text-muted);font-size:.9rem;margin-bottom:20px}
.ref-item{padding:14px 0;border-bottom:1px solid var(--border)}
.ref-item:last-child{border-bottom:none}
.ri-name{font-family:var(--ui);font-size:.88rem;color:var(--text);font-weight:600}
.ri-pub{font-family:var(--mono);font-size:.72rem;color:var(--text-muted);margin-top:2px}
.ri-link{font-family:var(--mono);font-size:.72rem;color:var(--amber);text-decoration:none;display:inline-block;margin-top:4px}
.ri-link:hover{text-decoration:underline}
@media(max-width:640px){.hero h1{font-size:2rem}.controls{flex-direction:column;align-items:stretch}.section-toggle{width:100%}.sec-btn,.lev-btn{flex:1;text-align:center;padding:11px 8px}.gen-btn{width:100%}.header-badge{display:none}}
</style>
</head>
<body>
<header class="site-header">
  <div class="site-title"><span>HAZMAT</span> TACTICAL</div>
  <div class="header-badge">Training Use Only</div>
</header>
<div class="wrap">
  <div class="hero">
    <div class="hero-badge">&#9889; EV &amp; Energy Storage Emergencies</div>
    <h1>Battery Storage &amp;<br>Recycling Facilities</h1>
    <p class="hero-sub">You get the scenario. You get the reference. You make the call.</p>
    <hr class="hero-rule">
  </div>
  <div class="disclaimer">&#9888; For Training Use Only &mdash; Not for Use During Live Incidents</div>
  <div class="controls">
    <div class="section-toggle">
      <button class="sec-btn active" data-sec="ess" onclick="setSection('ess')">ESS Facility</button>
      <button class="sec-btn" data-sec="recycling" onclick="setSection('recycling')">Battery Recycling</button>
    </div>
    <div class="section-toggle">
      <button class="lev-btn active" data-lev="ops" onclick="setLevel('ops')">Operations</button>
      <button class="lev-btn" data-lev="tech" onclick="setLevel('tech')">Technician</button>
      <button class="lev-btn" data-lev="all" onclick="setLevel('all')">All Levels</button>
    </div>
    <button class="gen-btn" onclick="generateDrill()">Generate Drill</button>
  </div>
  <div id="drillArea"></div>
</div>
<script>
'use strict';
var currentSection='ess',currentLevel='ops',selectedAnswers={},answeredCount=0,totalQuestions=5,usedSources=new Set();
var SRC={
  erg147:{n:"ERG 2024 \u2014 Guide 147: Lithium Ion and Sodium Ion Batteries",u:"https://cameochemicals.noaa.gov/erg_guides/en/Guide_147.pdf",p:"DOT / PHMSA (Pipeline and Hazardous Materials Safety Administration)"},
  nfpa855:{n:"NFPA 855 (2023) \u2014 Standard for the Installation of Stationary Energy Storage Systems",u:"https://www.nfpa.org/product/nfpa-855-standard/p0855code",p:"NFPA (National Fire Protection Association)"},
  oshaLiIon:{n:"OSHA (Occupational Safety and Health Administration) \u2014 Lithium-Ion Battery Safety (OSHA 4480)",u:"https://www.osha.gov/sites/default/files/publications/OSHA4480.pdf",p:"OSHA"},
  faaVentGas:{n:"FAA \u2014 Lithium Battery Thermal Runaway Vent Gas Analysis (DOT/FAA/TC-15/59)",u:"https://www.fire.tc.faa.gov/pdf/TC-15-59.pdf",p:"FAA (Federal Aviation Administration) / DOT"},
  teexEmissions:{n:"TEEX (Texas A&M Engineering Extension Service) / UL FSRI \u2014 Lithium-Ion Battery Fires and Emissions Characterization",u:"https://teex.org/wp-content/uploads/LITHIUM-ION-BATTERY-FIRES-AND-EMISSIONS-CHARACTERIZATION.pdf",p:"TEEX / UL FSRI (Fire Safety Research Institute)"},
  ntsbEV:{n:"NTSB (National Transportation Safety Board) \u2014 Safety Risks to Emergency Responders from Li-Ion Battery Fires in EVs",u:"https://www.ntsb.gov/safety/safety-studies/Documents/SR2001.pdf",p:"NTSB"},
  evfiresafe:{n:"EV FireSafe \u2014 EV Emergency Response Resources",u:"https://www.evfiresafe.com/ev-fire-emergency-response-guides",p:"EV FireSafe"}
};
var ESS_FACILITIES=[
  {name:"Utility-Scale Outdoor ESS (Energy Storage System) Installation",desc:"containerized battery units in a secured outdoor enclosure adjacent to a power substation",detail:"Multiple container units, each housing battery modules. Perimeter fencing. No overhead structure.",volt:"1,000\u20131,500V DC (Direct Current)",suppDesc:"built-in water mist suppression integrated into each container unit",suppType:"water"},
  {name:"Commercial Building Basement ESS Room",desc:"enclosed ESS room in the basement of a 6-story commercial office building",detail:"Mechanical exhaust ventilation required by NFPA 855. Floor drains connected to building sump. Occupied floors above.",volt:"480\u2013800V DC (Direct Current)",suppDesc:"Novec 1230 clean agent suppression system installed in the ESS room",suppType:"cleanagent"},
  {name:"Data Center UPS (Uninterruptible Power Supply) Battery Room",desc:"large battery installation supporting a secured data center",detail:"Dense rack configuration. Mechanical ventilation and suppression installed. 24-hour personnel on site.",volt:"480\u2013800V DC (Direct Current)",suppDesc:"FM-200 (HFC-227ea) clean agent suppression integrated with the data center fire protection system",suppType:"cleanagent"},
  {name:"Industrial Manufacturing Facility ESS",desc:"on-site energy storage supporting a manufacturing operation",detail:"ESS in a dedicated structure adjacent to the main manufacturing building. Drainage to industrial floor drains.",volt:"800\u20131,200V DC (Direct Current)",suppDesc:"wet-pipe sprinkler system covering the ESS structure",suppType:"water"}
];
var ESS_INCIDENTS=[
  {type:"BMS (Battery Management System) Alarm \u2014 Pre-Fire",desc:"BMS (Battery Management System) alarm activated. Smoke detector triggered but no visible flames. Mechanical exhaust ventilation running. Workers evacuated."},
  {type:"Active Fire \u2014 Suppression System Operating",desc:"Visible fire from one battery container unit. Automated suppression system actively discharging. Workers evacuated."},
  {type:"Active Fire \u2014 Suppression System Failed",desc:"Visible fire from one battery unit. Suppression system activated but failed to control fire. System no longer discharging."},
  {type:"Post-Suppression \u2014 Re-Ignition Reported",desc:"Initial fire controlled two hours ago. Suppression operated. Unit now re-dispatched \u2014 visible smoke returning from the previously involved unit."},
  {type:"Worker-Reported Overheating \u2014 No Fire",desc:"Facility worker reports strong chemical odor and a temperature warning on the BMS display. No visible fire or smoke. Building partially evacuated."}
];
var REC_FACILITIES=[
  {name:"Battery Processing Warehouse",desc:"indoor warehouse where EV battery packs are disassembled and modules sorted for recycling",detail:"Storage racks throughout. Mix of intact packs, partially disassembled modules, and individual cells. HVAC (Heating, Ventilation, and Air Conditioning) present."},
  {name:"Outdoor Battery Storage Yard",desc:"fenced outdoor area where collected EV batteries are staged prior to processing",detail:"Open-air storage on pallets and racks. Mixed condition levels. Drainage to adjacent soil and storm drains."},
  {name:"Transport Staging Facility",desc:"facility where batteries collected from repair shops and dealerships are staged before transport to recycling processors",detail:"Shipping containers and pallet storage. Mixed sources, unknown incident history. Limited on-site fire protection."}
];
var REC_INCIDENTS=[
  {type:"Single Rack Fire",desc:"Fire reported in one storage rack. Workers evacuated. Adjacent racks in close proximity. Smoke visible from building exterior."},
  {type:"Multi-Rack Involvement",desc:"Fire has spread to multiple adjacent racks. Heavy smoke. Workers evacuated. Total modules involved unknown."},
  {type:"Worker-Discovered Smoldering",desc:"Worker discovered smoldering modules during processing. Facility evacuated. No open flame. Odor described as chemical burning."},
  {type:"Post-Hours Alarm Activation",desc:"Fire alarm activated after facility closed. No workers on scene. Unknown interior conditions. Camera system confirms smoke visible inside."}
];
var CONDITIONS=[
  {time:"Daytime \u2014 1400 hours",wx:"Clear, 84\u00b0F, wind 8 mph from the southwest",note:"Wind from southwest. Drainage dry. Plume will track northeast."},
  {time:"Night \u2014 0130 hours",wx:"Overcast, 58\u00b0F, wind 12 mph from the northwest",note:"Reduced visibility. Drainage wet from earlier rain. Wind variable."},
  {time:"Daytime \u2014 0900 hours",wx:"Rain, 44\u00b0F, wind calm",note:"Active rainfall \u2014 runoff management critical. TIC (Thermal Imaging Camera) contrast reduced in wet conditions."}
];
function setSection(s){currentSection=s;document.querySelectorAll('.sec-btn').forEach(function(b){b.classList.toggle('active',b.dataset.sec===s)})}
function setLevel(l){currentLevel=l;document.querySelectorAll('.lev-btn').forEach(function(b){b.classList.toggle('active',b.dataset.lev===l)})}
function rnd(arr){return arr[Math.floor(Math.random()*arr.length)]}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function escQ(s){return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

function generateDrill(){
  selectedAnswers={};answeredCount=0;usedSources=new Set();
  var area=document.getElementById('drillArea');
  area.innerHTML='';
  var cond=rnd(CONDITIONS);
  var allQ,scHtml;
  if(currentSection==='ess'){
    var fac=rnd(ESS_FACILITIES),inc=rnd(ESS_INCIDENTS);
    scHtml='<div class="sc-card"><div class="sc-label">&#9889; ESS Facility Incident</div><div class="sc-body">'
      +'<strong>Facility:</strong> '+fac.name+'<br><strong>Description:</strong> '+fac.desc
      +'<br><strong>System Detail:</strong> '+fac.detail+'<br><strong>Operating Voltage:</strong> '+fac.volt
      +'<br><strong>Suppression System:</strong> '+fac.suppDesc
      +'<br><strong>Incident:</strong> '+inc.type+'<br><strong>Conditions:</strong> '+inc.desc
      +'<div class="sc-note">Time: '+cond.time+' &nbsp;|&nbsp; Weather: '+cond.wx+'<br>Operational note: '+cond.note+'</div></div></div>';
    allQ=buildESSQuestions(fac,inc,cond);
  } else {
    var rfac=rnd(REC_FACILITIES),rinc=rnd(REC_INCIDENTS);
    scHtml='<div class="sc-card"><div class="sc-label">&#9850; Battery Recycling Facility Incident</div><div class="sc-body">'
      +'<strong>Facility:</strong> '+rfac.name+'<br><strong>Description:</strong> '+rfac.desc
      +'<br><strong>Facility Detail:</strong> '+rfac.detail
      +'<br><strong>Incident:</strong> '+rinc.type+'<br><strong>Conditions:</strong> '+rinc.desc
      +'<div class="sc-note">Time: '+cond.time+' &nbsp;|&nbsp; Weather: '+cond.wx+'<br>Operational note: '+cond.note+'</div></div></div>';
    allQ=buildRecyclingQuestions(rfac,rinc,cond);
  }
  var pool=currentLevel==='all'?allQ:allQ.filter(function(q){return q.level===currentLevel});
  var questions=shuffle(pool).slice(0,5);
  totalQuestions=questions.length;
  var lvlLabel=currentLevel==='ops'?'Operations Level':currentLevel==='tech'?'Technician Level':'All Levels';
  var h=scHtml+'<div class="level-banner '+currentLevel+'">&#9654; '+lvlLabel+'</div>';
  questions.forEach(function(q,qi){
    var shuf=shuffle(q.ans.map(function(a){return{text:a.text,correct:a.correct,trap:a.trap||''}}));
    h+='<div class="q-card" id="qc-'+qi+'">';
    h+='<div class="q-head"><span class="q-num">Question '+(qi+1)+' \u2014 '+q.cat+'</span><span class="q-skill">'+q.skill+'</span><span class="q-tag '+q.level+'">'+(q.level==='ops'?'OPS':'TECH')+'</span></div>';
    q.refs.forEach(function(r){
      if(r.src)usedSources.add(r.src);
      h+='<div class="ref-panel"><div class="ref-title">'+r.t+'</div><div class="ref-body">'+r.c+'</div>'+(r.src?'<div class="ref-src">\u2014 '+r.src.p+'</div>':'')+'</div>';
    });
    h+='<div class="q-text">'+q.q+'</div><div class="q-options" id="qo-'+qi+'">';
    shuf.forEach(function(a,ai){
      h+='<button class="opt-btn" id="ob-'+qi+'-'+ai+'" onclick="selAns('+qi+','+ai+')" data-c="'+a.correct+'" data-t="'+escQ(a.trap)+'">'+a.text+'</button>';
    });
    h+='<button class="commit-btn" id="cb-'+qi+'" onclick="commitAns('+qi+')" disabled>Commit to Decision</button>';
    h+='</div><div class="fb-panel" id="fb-'+qi+'"></div></div>';
  });
  h+='<div class="drill-refs" id="drillRefs"><div class="dr-title">Drill References</div><div class="dr-sub">Sources used in this drill \u2014 verify or explore further.</div><div id="refsList"></div></div>';
  area.innerHTML=h;
  area.scrollIntoView({behavior:'smooth',block:'start'});
}

function selAns(qi,ai){
  if(document.getElementById('cb-'+qi).style.display==='none')return;
  document.querySelectorAll('#qo-'+qi+' .opt-btn').forEach(function(o){o.classList.remove('selected')});
  document.getElementById('ob-'+qi+'-'+ai).classList.add('selected');
  selectedAnswers[qi]=ai;
  document.getElementById('cb-'+qi).disabled=false;
}
function commitAns(qi){
  var ai=selectedAnswers[qi];if(ai===undefined)return;
  var sel=document.getElementById('ob-'+qi+'-'+ai);
  var ok=sel.dataset.c==='true';
  document.querySelectorAll('#qo-'+qi+' .opt-btn').forEach(function(o){o.classList.add('locked');if(o.dataset.c==='true')o.classList.add('correct')});
  if(!ok)sel.classList.add('incorrect');
  document.getElementById('cb-'+qi).style.display='none';
  var fb=document.getElementById('fb-'+qi);fb.classList.add('show');
  if(ok){fb.classList.add('correct-fb');fb.innerHTML='<div class="fb-label correct">\u2713 CORRECT DECISION</div><div class="fb-text">You correctly applied the reference material to this scenario.</div>';}
  else{fb.classList.add('incorrect-fb');fb.innerHTML='<div class="fb-label incorrect">\u2717 INCORRECT DECISION</div><div class="fb-text"><strong>Why this is wrong:</strong> '+sel.dataset.t+'</div>';}
  answeredCount++;
  if(answeredCount===totalQuestions)showRefs();
  if(qi+1<totalQuestions)setTimeout(function(){document.getElementById('qc-'+(qi+1)).scrollIntoView({behavior:'smooth',block:'start'})},800);
}
function showRefs(){
  var d=document.getElementById('drillRefs'),r=document.getElementById('refsList'),h='';
  usedSources.forEach(function(s){h+='<div class="ref-item"><div class="ri-name">'+s.n+'</div><div class="ri-pub">Publisher: '+s.p+'</div><a class="ri-link" href="'+s.u+'" target="_blank" rel="noopener">View Source \u2197</a></div>'});
  [SRC.erg147,SRC.nfpa855,SRC.evfiresafe].forEach(function(s){if(!usedSources.has(s))h+='<div class="ref-item"><div class="ri-name">'+s.n+'</div><div class="ri-pub">Publisher: '+s.p+' \u2014 Additional resource</div><a class="ri-link" href="'+s.u+'" target="_blank" rel="noopener">View Source \u2197</a></div>'});
  r.innerHTML=h;d.classList.add('show');
  var btn=document.createElement('div');btn.style.cssText='text-align:center;margin-top:24px';
  btn.innerHTML='<button class="gen-btn" onclick="generateDrill()">Generate New Drill</button>';
  d.appendChild(btn);
  setTimeout(function(){d.scrollIntoView({behavior:'smooth',block:'start'})},500);
}


function buildESSQuestions(fac,inc,cond){return[

{level:'ops',cat:"Scene Size-Up",skill:"First-Arriving Operations-Level Response",
 refs:[{t:"ERG 2024, Guide 147 \u2014 Initial Isolation",c:'ERG (Emergency Response Guidebook) Guide 147 directs a minimum isolation of <span class="hl">100 feet in all directions</span> for lithium battery incidents. At ESS (Energy Storage System) scale, this is a floor, not a ceiling.',src:SRC.erg147},
  {t:"Operations-Level Scope at ESS Incidents",c:'The correct role is <span class="hl">isolate, deny entry, evacuate, and call for resources.</span> Do not enter, apply water, or interact with facility systems.',src:SRC.oshaLiIon}],
 q:"You are first-arriving at a "+fac.name+". "+inc.desc+" No hazmat resources on scene. You have operations-level training. What is your immediate action sequence?",
 ans:[
  {text:"Establish command upwind, deny entry to all personnel, relocate workers away from vent discharge, establish a 100-foot perimeter per ERG (Emergency Response Guidebook) 147, and request hazmat team, utility company, and ALS (Advanced Life Support) standby. Do not enter.",correct:true,trap:""},
  {text:"Establish command upwind, deny entry, and relocate workers. While awaiting hazmat, conduct a brief interior check for trapped workers using structural PPE and limiting your time inside to under two minutes.",correct:false,trap:"ESS environments contain "+fac.volt+" voltage and may have HF (Hydrogen Fluoride) and HCN (Hydrogen Cyanide) at IDLH (Immediately Dangerous to Life or Health) concentrations. Structural PPE provides no protection against either. 'Brief exposure' is not a safe concept here."},
  {text:"Establish command upwind and deny entry. Deploy hand lines from a safe perimeter distance to cool the exterior of the involved unit while awaiting hazmat arrival.",correct:false,trap:"Exterior water application requires runoff contamination assessment and voltage confirmation before starting. Operations-level responders do not initiate water application at ESS incidents regardless of distance from the building."},
  {text:"Establish command upwind and deny entry. Obtain access codes and system documentation from the facility manager, then stage near the entrance to guide incoming hazmat resources.",correct:false,trap:"Staging near the entrance places personnel in proximity to vent discharge and "+fac.volt+" systems. Facility documentation is obtained at perimeter distance. Stage upwind at ERG 147 isolation distance, not at the entrance."}]},

{level:'ops',cat:"Alarm Recognition",skill:"BMS Alarm as Pre-Fire Indicator",
 refs:[{t:"BMS (Battery Management System) Alarm \u2014 What It Means",c:'A BMS alarm indicates a detected parameter outside safe limits. It is a <span class="hl">safety system activation, not a nuisance alarm.</span> A BMS alarm preceding visible fire is a recognized pre-thermal-runaway indicator.',src:SRC.nfpa855},
  {t:"Pre-Fire Indicators at ESS Facilities",c:'<span class="warn">Waiting for visible confirmation means waiting for conditions to worsen.</span> A BMS alarm warrants the same immediate response as a reported fire.',src:SRC.teexEmissions}],
 q:"You respond to a "+fac.name+". Incident: BMS (Battery Management System) alarm, no visible fire or smoke. Workers say this alarm activates occasionally and resets on its own. What is the correct interpretation and response?",
 ans:[
  {text:"Treat the BMS alarm as a confirmed pre-fire condition regardless of worker reports. Evacuate all personnel, establish an isolation perimeter, and request hazmat. A BMS alarm reflects a measured system anomaly, not a sensor response to ambient conditions.",correct:true,trap:""},
  {text:"Treat the BMS alarm as a confirmed pre-fire condition. Evacuate workers but allow the facility manager to remain inside to attempt a manual reset while you stage outside and monitor for developing smoke.",correct:false,trap:"Allowing any personnel to remain inside during a BMS alarm keeps them in a potential IDLH (Immediately Dangerous to Life or Health) environment. Facility managers are trained on normal operations, not thermal runaway conditions. Evacuate everyone and deny all re-entry."},
  {text:"Monitor for 5\u201310 minutes and allow workers to attempt a manual reset while you stage near the entrance. Worker familiarity with the system is relevant operational data.",correct:false,trap:"Prior BMS alarms that 'reset on their own' may represent prior thermal events that self-resolved, not proof of an unreliable sensor. A BMS alarm reflects a measured system parameter. Every BMS alarm warrants full response until hazmat assesses."},
  {text:"Document the response and stand by at the entrance. If no visible fire or odor develops within 10 minutes, advise the facility to contact their equipment vendor and return to service.",correct:false,trap:"A 10-minute standby at the entrance keeps personnel in proximity to a system potentially in early thermal runaway. BMS alarms do not always show visible progression. Leaving without hazmat clearance on a BMS alarm is not safe."}]},

{level:'ops',cat:"Suppression System Interaction",skill:"Engineered System Support \u2014 Operations Level",
 refs:[{t:"NFPA (National Fire Protection Association) 855 \u2014 Engineered Suppression",c:'When actively discharging, the suppression system is <span class="hl">performing its designed function.</span> The correct first-responder action is to support the system, not override it.',src:SRC.nfpa855},
  {t:"Operations-Level Suppression Role",c:'<span class="warn">Shutting down or supplementing a functioning engineered system without hazmat guidance removes protections designed specifically for this hazard.</span>',src:SRC.oshaLiIon}],
 q:"You arrive at a "+fac.name+". The automated suppression system ("+fac.suppDesc+") is actively discharging. Your officer asks whether to supplement with hand lines or shut it down to limit damage. What do you recommend?",
 ans:[
  {text:"Neither action. Do not shut down the suppression system and do not supplement with hand lines without hazmat guidance. Establish the perimeter, protect exposures from outside, and support the system until hazmat arrives.",correct:true,trap:""},
  {text:"Do not shut the system down, but supplement with exterior hand lines from perimeter distance. The suppression system handles the interior while hand lines address exterior surface temperatures and prevent spread to adjacent units.",correct:false,trap:"Exterior water application still requires assessment of runoff contamination pathways and voltage status before starting. The suppression system running does not authorize supplemental water at the operations level. This is a hazmat team decision."},
  {text:"Shut down the suppression system to protect adjacent equipment and begin manual attack with hand lines. The hand lines give you direct control over fire spread.",correct:false,trap:"Stopping active suppression returns fire control to the battery cells. Manual attack at "+fac.volt+" without hazmat-level PPE (Personal Protective Equipment) and electrical assessment creates electrocution risk. Equipment preservation does not justify removing fire protection."},
  {text:"Allow the system to run for 3\u20135 minutes. If the fire is not controlled by then, shut it down and switch to manual attack with hand lines to direct suppression where needed.",correct:false,trap:"A suppression system that has not controlled the fire may still be cooling adjacent cells. Three to five minutes is not a valid assessment window for ESS thermal runaway. Hazmat resources make this determination, not a timed field observation."}]},

{level:'ops',cat:"Personnel Positioning",skill:"Upwind Staging at ESS Vent Discharge",
 refs:[{t:"ESS Vent Gas Discharge \u2014 Secondary Hazard Zone",c:'NFPA 855-required ventilation exhausts <span class="warn">HF (Hydrogen Fluoride), HCN (Hydrogen Cyanide), and CO (Carbon Monoxide)</span> to the building exterior. <span class="hl">All personnel must be upwind of the exhaust discharge point.</span>',src:SRC.nfpa855},
  {t:"Off-Gas Toxicity \u2014 No Visual Warning",c:'HF and HCN are colorless. <span class="warn">You cannot see your way to a safe position. Wind direction is your primary positioning tool.</span>',src:SRC.faaVentGas}],
 q:"Sizing up a "+fac.name+", you observe a chemical odor plume from roof vents on the north side. Conditions: "+cond.wx+". Where do you position command, staging, and all personnel?",
 ans:[
  {text:"Position all apparatus and personnel upwind, away from the north-side vent discharge. Treat the downwind sector as an extension of the hot zone until atmospheric monitoring confirms otherwise. No personnel downwind of the discharge point.",correct:true,trap:""},
  {text:"Position upwind but within visual range of the vent discharge on the north side. Monitoring the plume behavior closely from a short distance helps you track whether conditions are improving or worsening before hazmat arrives.",correct:false,trap:"HF and HCN are colorless. Close visual monitoring of the vent discharge creates inhalation exposure to the highest-concentration point in the plume. Monitoring is conducted from a downwind-safe position at perimeter distance, not near the discharge source."},
  {text:"Position on whichever side gives the best sightline to the involved unit. Visual monitoring of fire behavior is the priority sizing factor, and you can reposition once hazmat arrives.",correct:false,trap:"Adequate size-up information can be gathered from upwind positions. Positioning for fire observation does not override upwind staging. Keeping personnel in a potentially downwind position until hazmat arrives creates unnecessary exposure time."},
  {text:"Stage on the north side near the vent discharge to monitor plume output directly and relay real-time concentration changes to command.",correct:false,trap:"The north-side vent discharge is the highest-concentration exit point for all HF, HCN, and CO generated by the event. Positioning personnel there for monitoring creates direct inhalation exposure to potentially IDLH (Immediately Dangerous to Life or Health) concentrations."}]},

{level:'ops',cat:"Isolation & Perimeter",skill:"ERG Guide 147 Application at ESS Scale",
 refs:[{t:"ERG 2024, Guide 147 \u2014 Isolation Distances",c:'ERG (Emergency Response Guidebook) Guide 147 specifies a minimum <span class="hl">100-foot initial isolation in all directions</span> for lithium battery incidents. At ESS scale this is a starting point, not the final answer.',src:SRC.erg147},
  {t:"Expanding the Initial Perimeter",c:'Factors requiring expansion: vent plume direction, building size, adjacent occupied structures, and wind speed. <span class="hl">Establish the minimum immediately and reassess with hazmat resources.</span>',src:SRC.ntsbEV}],
 q:"You are establishing an isolation perimeter at a "+fac.name+". What is the correct initial distance per ERG (Emergency Response Guidebook) Guide 147, and what factors might require expansion?",
 ans:[
  {text:"Start with 100 feet in all directions per ERG 147 minimum. At an ESS facility expand beyond that based on vent plume direction, building footprint, proximity of exposures, and wind. Establish the minimum immediately and adjust upward.",correct:true,trap:""},
  {text:"Start with 100 feet in all directions per ERG 147 minimum. Expand only in the downwind direction based on plume travel. Upwind and crosswind sectors remain at 100 feet since the hazard is directional once wind direction is confirmed.",correct:false,trap:"ERG 147 specifies 100 feet in all directions as a minimum. ESS vent discharge can shift with wind change, and adjacent cell thermal events are not directional. Reducing the upwind and crosswind sectors below the ERG minimum creates gaps in the perimeter."},
  {text:"Apply 50 feet for a BMS alarm without confirmed fire. The full 100-foot ERG distance applies only once active fire is confirmed, since the hazard level is lower pre-ignition.",correct:false,trap:"ERG Guide 147 does not tier isolation distance by fire status. A BMS alarm involves a confirmed system anomaly and potential off-gassing. Apply the full 100-foot minimum from the outset regardless of fire confirmation."},
  {text:"Use the facility’s posted emergency evacuation zone rather than ERG distances. Facility zones are engineered for the specific installation and are more accurate than general ERG guidance for fixed facilities.",correct:false,trap:"Facility evacuation zones are designed for normal operations and may not account for vent discharge direction or current wind. ERG 147 is your reliable reference when facility documentation cannot be verified as accurate for current conditions."}]},

{level:'ops',cat:"Civilian Management",skill:"Worker Evacuation Staging Verification",
 refs:[{t:"Facility Assembly Points \u2014 May Not Be Safe",c:'Workers may self-evacuate to an assembly area that is <span class="warn">downwind of vent discharge or within the isolation perimeter.</span> Verify assembly point position relative to wind direction before confirming it as safe.',src:SRC.oshaLiIon},
  {t:"Plume Path vs. Assembly Area",c:'Facility assembly points account for normal operations, not ESS vent discharge direction. <span class="hl">Do not assume the facility assembly point is safe \u2014 verify it relative to the plume.</span>',src:SRC.nfpa855}],
 q:"Workers have self-evacuated from the "+fac.name+" to the east parking lot assembly area. The vent discharge is on the east wall, and wind is from the west. What action do you take?",
 ans:[
  {text:"Relocate workers immediately. The east assembly area is downwind of the vent discharge and in the plume path. Move all workers upwind to the west side at or beyond the ERG (Emergency Response Guidebook) 147 isolation distance. Establish accountability as you relocate.",correct:true,trap:""},
  {text:"Relocate workers to the north or south side of the building rather than the opposite end. A perpendicular position to wind direction places them crosswind rather than upwind or downwind, reducing direct plume exposure.",correct:false,trap:"Crosswind positioning still places personnel within the plume spread zone, which extends laterally from the centerline. Upwind is the correct staging position, not crosswind. Move workers to the upwind west side, not a perpendicular position."},
  {text:"Advise workers to shelter inside their vehicles in the east lot. Vehicle bodies provide a barrier between personnel and any airborne contaminants from the vent discharge.",correct:false,trap:"Vehicle bodies do not filter HF (Hydrogen Fluoride) or HCN (Hydrogen Cyanide). Neither gas is stopped by a car door or window. Remaining downwind in any configuration maintains plume exposure. Relocation to the upwind side is required."},
  {text:"The facility’s designated assembly area was selected as part of their emergency plan. Do not override it without confirmation from the facility’s safety officer.",correct:false,trap:"Facility assembly areas account for normal conditions, not vent discharge direction or current wind. Real-time incident conditions override pre-planned assembly locations. If the assembly area is in the plume path, relocate workers immediately."}]},

{level:'ops',cat:"Resource Management",skill:"Operations-Level Resource Request",
 refs:[{t:"Resources Required for ESS Response",c:'ESS incidents require: <span class="hl">hazmat team, utility company for de-energization, ALS (Advanced Life Support) medical standby, and ESS manufacturer emergency technical guidance.</span> Request early \u2014 utility and manufacturer response times are long.',src:SRC.ntsbEV},
  {t:"Manufacturer Emergency Access",c:'<span class="hl">CHEMTREC (Chemical Transportation Emergency Center) at 1-800-424-9300 connects you to manufacturer emergency contacts</span> when facility documentation is unavailable.',src:SRC.evfiresafe}],
 q:"You are the first-arriving officer at a "+fac.name+". "+inc.desc+" What resources do you request immediately, and why does timing matter?",
 ans:[
  {text:"Request hazmat team, utility company for de-energization, ALS (Advanced Life Support) medical standby, and ESS manufacturer contact through CHEMTREC (Chemical Transportation Emergency Center). Request all four early \u2014 utility and manufacturer callbacks are slow and their arrival gates re-entry.",correct:true,trap:""},
  {text:"Request hazmat team, utility company for de-energization, and ALS standby immediately. Contact the manufacturer only after hazmat arrives and confirms thermal runaway \u2014 premature manufacturer contact before the situation is assessed creates unnecessary escalation.",correct:false,trap:"Manufacturer callbacks take significant time. Waiting for hazmat to arrive before initiating manufacturer contact delays their availability by the entire hazmat response time. Request all four resources concurrently from the outset."},
  {text:"Request hazmat team and ALS standby immediately. Utility and manufacturer contacts are secondary resources that hazmat will coordinate on arrival \u2014 they don’t need to be on your initial request.",correct:false,trap:"Utility and manufacturer contacts have the longest response times of all four resources. Every minute of delay in requesting them extends the time before re-entry or de-energization is possible. Initiate all four requests simultaneously."},
  {text:"Request mutual aid engine companies for additional water supply and hand line crews. ESS fires require high water volume and establishing supply early is the highest operational priority.",correct:false,trap:"Water volume for an ESS fire is a hazmat team decision, not a first-arriving operations-level determination. The hazard is not a water supply problem \u2014 it is a high-voltage, toxic atmosphere requiring assessment before any water is applied."}]},

{level:'ops',cat:"Scene Control",skill:"Unauthorized Entry Prevention",
 refs:[{t:"ESS Entry Hazards \u2014 Not Mitigated by Familiarity",c:'Facility personnel are trained on normal operations, not post-event conditions. An ESS room after an alarm or fire may contain <span class="warn">HF, HCN at IDLH (Immediately Dangerous to Life or Health) concentrations and arc flash hazard at '+fac.volt+'.</span>',src:SRC.oshaLiIon},
  {t:"No Civilian Re-Entry Before Hazmat Clearance",c:'<span class="hl">No facility personnel re-entry until the hazmat team formally terminates the incident</span> and the manufacturer provides clearance. Applies regardless of role or stated urgency.',src:SRC.nfpa855}],
 q:"The facility manager at the "+fac.name+" wants to re-enter the ESS room with you to show you the BMS (Battery Management System) display readings. They say they are the most qualified person on site to interpret the equipment. What is your response?",
 ans:[
  {text:"Deny entry to both of you. ESS room conditions after an alarm or fire may include IDLH (Immediately Dangerous to Life or Health) concentrations of HF and HCN and arc flash hazard at "+fac.volt+". Neither of you has the PPE or training for entry under these conditions.",correct:true,trap:""},
  {text:"Deny entry to yourself but allow the facility manager to enter alone. They are the system owner, they assume their own risk, and their system knowledge may be needed to interpret conditions that external responders cannot assess without them.",correct:false,trap:"Scene control authority gives incident command the obligation to deny entry to the hazard zone including property owners. The facility manager has no SCBA (Self-Contained Breathing Apparatus) or arc flash protection for a degraded ESS environment. Allowing entry creates a rescue problem."},
  {text:"Allow both of you to enter briefly with SCBA (Self-Contained Breathing Apparatus) donned. Limit time inside to under two minutes. Their system knowledge reduces interpretation time and therefore total crew exposure.",correct:false,trap:"SCBA addresses inhalation only. At "+fac.volt+", arc flash hazard in a degraded ESS room requires arc flash PPE rated for that voltage. SCBA does not provide that protection. Operations-level personnel do not enter ESS environments regardless of respiratory protection worn."},
  {text:"Allow the facility manager to enter just to the doorway threshold to retrieve BMS documentation while you remain outside.",correct:false,trap:"Doorway positioning at an actively venting ESS room creates inhalation exposure. Vent pressure may push off-gases toward the entrance. BMS documentation and system status can be obtained remotely or through the manufacturer’s emergency line without any building approach."}]},

{level:'ops',cat:"Environmental Protection",skill:"Operations-Level Runoff Limitation",
 refs:[{t:"Contaminated Runoff \u2014 Ops-Level Action",c:'Operations-level responders can take immediate action: <span class="hl">blocking accessible storm drains from outside the perimeter</span> prevents the most irreversible consequence of an ESS incident.',src:SRC.teexEmissions},
  {t:"Environmental Notification Timing",c:'<span class="warn">Notify environmental authorities as soon as a release is identified</span> \u2014 not after containment is in place. Notification and containment happen concurrently.',src:SRC.oshaLiIon}],
 q:"Water is flowing from the "+fac.name+" toward a storm drain at the edge of the parking lot outside your perimeter. No hazmat resources are on scene. What can you do at the operations level?",
 ans:[
  {text:"Block the storm drain using available materials from outside the perimeter to prevent contaminated water entering the stormwater system. Notify command to initiate environmental authority notification immediately. Document runoff direction, approximate volume, and time of observation.",correct:true,trap:""},
  {text:"Block the storm drain and redirect the flow toward the building using a tool, keeping contamination on-scene where hazmat can manage it when they arrive.",correct:false,trap:"Redirecting flow toward the building may return contaminated water to an area where personnel are working or where additional runoff is being generated. Without a drainage plan, redirection changes where the problem goes rather than solving it. Blocking the drain is the correct action."},
  {text:"The storm drain is outside the perimeter and therefore outside the incident scene. Focus on perimeter control and let hazmat address runoff when they arrive.",correct:false,trap:"A drain outside your perimeter still becomes part of the incident consequence when contaminated water reaches it. Once water enters the stormwater system the discharge cannot be reversed. Blocking an accessible drain from outside the hot zone is within operations-level scope."},
  {text:"Contaminated runoff only requires immediate action if it reaches a waterway directly. A parking lot storm drain connects to infrastructure that hazmat will address during environmental notification.",correct:false,trap:"Storm drains connect to stormwater infrastructure that discharges to waterways. Once contaminated water enters the drain, the discharge has occurred. Block the drain before the water reaches it, not after."}]},

{level:'ops',cat:"Post-Fire Stabilization",skill:"Re-Ignition Risk Communication",
 refs:[{t:"ERG 2024, Guide 147 \u2014 Re-Ignition Risk",c:'ERG (Emergency Response Guidebook) Guide 147 states lithium battery fires may reignite at any point after extinguishment, <span class="warn">up to weeks after the incident.</span>',src:SRC.erg147},
  {t:"Facility Re-Entry \u2014 Not an Operations-Level Decision",c:'Clearing an ESS facility for re-entry requires hazmat team termination, manufacturer clearance, and documented atmospheric monitoring. <span class="hl">No operations-level responder can grant re-entry clearance.</span>',src:SRC.nfpa855}],
 q:"Two hours after the fire appears visually out at the "+fac.name+", the facility manager asks whether workers can return to assess equipment damage. TIC (Thermal Imaging Camera) readings on the exterior appear near-ambient. What do you tell them?",
 ans:[
  {text:"Re-entry clearance is not yours to give at the operations level. ERG (Emergency Response Guidebook) 147 identifies re-ignition risk up to weeks after knockdown. Exterior TIC readings do not confirm internal cell stability. The hazmat team and manufacturer must formally clear the facility.",correct:true,trap:""},
  {text:"Exterior TIC readings near ambient combined with two hours elapsed time indicate the cells have stabilized. Re-entry with SCBA (Self-Contained Breathing Apparatus) is appropriate at this point for a brief visual assessment.",correct:false,trap:"Exterior TIC readings at a containerized ESS reflect container wall temperature, not internal cell temperature. Container thermal mass creates a significant lag between surface and cell-level temperatures. Two hours is not a validated stabilization window. Surface-cool does not mean internally stable."},
  {text:"Conditional re-entry is acceptable if workers wear SCBA and limit time inside to under 15 minutes for a visual survey only. Document the re-entry and conditions observed.",correct:false,trap:"At the operations level you lack the atmospheric data, electrical status confirmation, and manufacturer guidance needed to establish any re-entry conditions. SCBA addresses inhalation only. Conditional re-entry at your discretion is not within scope."},
  {text:"Allow the facility manager to enter alone for a brief visual check. They know the system better than external TIC monitoring can reveal from outside the container.",correct:false,trap:"Post-fire ESS assessment requires hazmat-level evaluation of off-gas concentrations, electrical status, and cell thermal state. Operations familiarity does not qualify anyone for post-fire re-entry assessment. Deny entry."}]},

{level:'ops',cat:"Respiratory Protection",skill:"SCBA Threshold Decision at ESS Perimeter",
 refs:[{t:"Odor Detection \u2014 Not a Safe-to-Approach Signal",c:'HF (Hydrogen Fluoride) has an odor threshold around 0.04 ppm, far below its IDLH (Immediately Dangerous to Life or Health) of 30 ppm. <span class="warn">Detectable odor means you are already in a contaminated atmosphere.</span>',src:SRC.faaVentGas},
  {t:"SCBA Upon Odor Detection",c:'<span class="hl">Back up to fresh air, don SCBA before any further approach, and relocate the perimeter outward.</span> Never don SCBA while still in a contaminated zone.',src:SRC.oshaLiIon}],
 q:"While establishing the perimeter at the "+fac.name+", you detect a sharp chemical odor. You are not wearing SCBA (Self-Contained Breathing Apparatus). What is the correct immediate action?",
 ans:[
  {text:"Back up immediately to fresh air. Odor means you are already in the hazard zone. Don SCBA before any further approach, then relocate the perimeter outward to where no odor is detectable without SCBA. Notify command of off-gassing at the prior perimeter location.",correct:true,trap:""},
  {text:"Don SCBA at your current position before moving further. Your current location is workable with SCBA in place \u2014 the odor confirms the hazard but does not mean you are at an immediately dangerous concentration at that distance.",correct:false,trap:"Donning SCBA while already in a contaminated atmosphere means breathing contaminated air during the donning process. Back up to fresh air first, then don SCBA. Never don respiratory protection in a contaminated zone regardless of perceived concentration."},
  {text:"Note the odor in your size-up report and continue without SCBA. A faint chemical odor at the perimeter is an expected finding and does not indicate an immediately dangerous concentration at that distance.",correct:false,trap:"HF odor at any detectable level means you are above the odor threshold of approximately 0.04 ppm. You cannot reliably judge concentration by odor strength alone. Waiting for symptoms before donning SCBA uses your body as an air monitor. Don SCBA immediately upon odor detection."},
  {text:"Evacuate all personnel from the area entirely and suspend operations until hazmat arrives. Odor at the perimeter means no operations-level perimeter work can safely continue.",correct:false,trap:"Withdrawing entirely leaves the scene without control. Back up to fresh air, don SCBA, and re-establish the perimeter at a safe distance where no odor is detectable without SCBA. Operations-level perimeter work continues from a respiratory-protected position."}]},

{level:'ops',cat:"Regulatory Notification",skill:"Environmental Authority Notification Timing",
 refs:[{t:"When to Notify Environmental Authorities",c:'<span class="hl">Notify as soon as a release or threatened release is identified</span> \u2014 not after attempting containment. Notification and containment happen concurrently.',src:SRC.oshaLiIon},
  {t:"Ops-Level Notification Obligation",c:'Operations-level responders who identify contaminated runoff have an immediate notification obligation. Document what you observed, where, and the exact time \u2014 this becomes part of the regulatory record.',src:null}],
 q:"You observe contaminated water flowing from the "+fac.name+" toward parking lot storm drains. You have not yet established containment. When do you notify environmental authorities?",
 ans:[
  {text:"Notify immediately. Do not wait for containment first. Document what you observed, flow direction, and exact time. Notification and containment happen at the same time \u2014 delayed notification does not satisfy the regulatory obligation.",correct:true,trap:""},
  {text:"Establish a basic containment barrier first, then notify. Reporting a confirmed release with containment already in place gives environmental authorities a more complete picture and allows them to dispatch the appropriate level of response.",correct:false,trap:"Environmental notification is triggered by identification of a release, not by the outcome of containment efforts. Delaying to present a complete picture may leave environmental authorities without time to deploy their own protective measures. Notify concurrently with containment action."},
  {text:"Notify only if containment fails and water actually enters the storm drain. A release that is successfully contained does not trigger the same reporting requirement as an uncontrolled discharge.",correct:false,trap:"Notification requirements are triggered by the release event itself. The flowing contaminated water is a release event regardless of whether containment will succeed. You cannot know the outcome at the time of observation. Notify immediately."},
  {text:"Environmental notification is a hazmat team responsibility. Document your observation and pass it to hazmat command when they arrive so they can initiate notification with full technical context.",correct:false,trap:"Notification obligations do not wait for a higher-level unit. If you identify a release at the operations level, you initiate notification. Passing the decision to hazmat delays notification by their entire response time."}]}

,{level:'tech',cat:"Suppression System Response",skill:"Engineered System Interaction \u2014 Agent Type",
 refs:[{t:"NFPA (National Fire Protection Association) 855 \u2014 Suppression System Types",c:'System type varies by facility: water mist or sprinklers for outdoor and industrial ESS (Energy Storage System); <span class="hl">clean agent systems (Novec 1230 or FM-200) for commercial and data center installations.</span> Agent type determines runoff and re-entry assessment.',src:SRC.nfpa855},
  {t:"Scene: "+fac.name,c:'Voltage: <span class="warn">'+fac.volt+'</span> | Suppression: '+fac.suppDesc,src:null}],
 q:"You arrive at a "+fac.name+". "+inc.desc+" The automated suppression system is actively discharging. What is your first priority, and why does the suppression agent type matter?",
 ans:[
  {text:"Establish command upwind and identify the suppression agent type. Water-based systems generate contaminated runoff requiring immediate drain containment; clean agent systems do not produce runoff but post-discharge concentration may affect entry conditions. Do not interrupt active suppression.",correct:true,trap:""},
  {text:"Establish command upwind and identify the suppression agent type. Water-based systems require immediate drain blocking while clean agent systems are safe for SCBA-equipped entry once the discharge cycle completes, since the agent is rated safe for occupied spaces.",correct:false,trap:"Clean agent systems being 'rated safe for occupied spaces' applies during brief discharge in ventilated areas, not post-discharge in a sealed ESS room. Post-discharge clean agent concentration may exceed its NOAEL (No Observed Adverse Effect Level) and displace oxygen. SCBA is required for any entry after clean agent discharge regardless of agent rating."},
  {text:"Force entry to the battery container and apply water directly to the modules. The suppression system addresses surface suppression only, not cell-level cooling at ESS energy scale.",correct:false,trap:"Forcing entry into an ESS container during active suppression exposes crews to a toxic and energized atmosphere at "+fac.volt+" and risks arc flash and HF (Hydrogen Fluoride) inhalation. ESS containers are not entered during active fire conditions regardless of suppression status."},
  {text:"Shut down the suppression system to stop agent discharge and begin manual fire attack. Manual attack gives the hazmat team direct control over where suppression is applied.",correct:false,trap:"Stopping active suppression removes the primary engineered mitigation and returns fire control to the battery cells. Manual attack at "+fac.volt+" without hazmat-level PPE (Personal Protective Equipment) and electrical assessment creates electrocution and arc flash risk."}]},

{level:'tech',cat:"High-Voltage Isolation",skill:"ESS-Scale HV (High-Voltage) Recognition",
 refs:[{t:"ESS Voltage Scale",c:'ESS facilities operate at <span class="warn">'+fac.volt+'</span> \u2014 2 to 4 times the voltage of passenger EV (Electric Vehicle) traction packs. Arc flash energy increases exponentially with voltage. Utility company coordination is required before approach to energized ESS equipment.',src:SRC.ntsbEV},
  {t:"DC (Direct Current) Arc Flash at ESS Voltages",c:'DC arc flash does not self-extinguish at zero crossing as AC (Alternating Current) arc flash does. <span class="warn">A sustained DC arc at '+fac.volt+' cannot be interrupted by standard protective devices as quickly as an AC fault.</span>',src:SRC.oshaLiIon}],
 q:"The suppression system has controlled visible fire at the "+fac.name+". The facility manager confirms the system is still energized at "+fac.volt+". What is required before any personnel approach the battery enclosure?",
 ans:[
  {text:"Deny approach to the battery enclosure and request utility company response for verified de-energization. Maintain the perimeter and continue atmospheric monitoring. No personnel approach energized ESS equipment without utility coordination and arc flash PPE rated for "+fac.volt+".",correct:true,trap:""},
  {text:"Deny approach to the battery enclosure and request utility company response. While awaiting them, deploy one technician-level team member to the facility emergency disconnect to open it and confirm de-energization, allowing the rest of the crew to stage closer.",correct:false,trap:"Facility emergency disconnect switches open contactors but do not discharge energy stored in the battery modules. At "+fac.volt+", assuming a switch position equals full de-energization is potentially fatal. Verified de-energization requires calibrated metering by trained personnel, not a switch position check."},
  {text:"Apply standard EV high-voltage isolation protocol. The procedure is the same as a passenger EV system, with additional PPE appropriate for the higher voltage rating of this installation.",correct:false,trap:"ESS systems operate at 2\u20134 times the voltage of passenger EV traction packs. EV high-voltage training does not transfer to ESS isolation procedures, approach distances, or PPE requirements. The arc flash energy at "+fac.volt+" is not comparable to a 400V EV system."},
  {text:"Ground the system using standard grounding equipment from your hazmat unit to eliminate the voltage hazard before the entry team approaches.",correct:false,trap:"Grounding a live ESS system without confirmed de-energization creates immediate arc flash hazard. Grounding is performed after verified de-energization, not as a method to achieve it. Field improvisation at "+fac.volt+" is not an acceptable substitute for utility company procedures."}]},

{level:'tech',cat:"Ventilation System Decision",skill:"NFPA 855 Ventilation System Interaction",
 refs:[{t:"NFPA (National Fire Protection Association) 855 \u2014 Mechanical Exhaust Ventilation",c:'NFPA 855 requires mechanical exhaust ventilation for enclosed ESS installations. The system exhausts <span class="warn">HF (Hydrogen Fluoride), HCN (Hydrogen Cyanide), and CO (Carbon Monoxide)</span> to the exterior. When functioning, <span class="hl">the exhaust discharge point becomes a secondary hazard zone.</span>',src:SRC.nfpa855},
  {t:"SCBA Requirement Regardless of Ventilation Status",c:'A functioning NFPA 855 ventilation system reduces interior concentrations but does not eliminate them. <span class="warn">SCBA (Self-Contained Breathing Apparatus) is required inside the ESS room regardless of ventilation status.</span>',src:SRC.faaVentGas}],
 q:"You are managing a BMS (Battery Management System) alarm at a "+fac.name+". The BMS has triggered the mechanical exhaust ventilation system. A chemical odor plume is discharging from roof vents on the north side. What are your positioning and monitoring priorities?",
 ans:[
  {text:"Position all personnel and monitoring equipment upwind of the north-side vent discharge. Do not shut down the ventilation system \u2014 it is functioning as designed. Establish a hot zone around the exhaust discharge area and monitor downwind air quality for HF (Hydrogen Fluoride) and HCN (Hydrogen Cyanide).",correct:true,trap:""},
  {text:"Position all personnel and monitoring equipment upwind of the north-side vent discharge. Consider shutting down the ventilation system if downwind monitoring detects HF or HCN above action levels, to prevent continued public exposure beyond the perimeter.",correct:false,trap:"Shutting down NFPA 855-required ventilation concentrates HF, HCN, and CO inside the occupied building structure. The system reduces interior hazard. Stopping it in response to exterior detections traps the hazard where building occupants or entry teams may be present. The system runs regardless of exterior readings."},
  {text:"Position monitoring equipment directly at the roof exhaust discharge to obtain the highest concentration readings for entry planning. Personnel observe from 20 feet away with wind to their backs.",correct:false,trap:"The exhaust discharge point is the highest-concentration location for all off-gas species. Placing personnel or equipment there creates direct inhalation exposure. Monitoring is conducted downwind at a safe perimeter distance, not at the point of highest concentration."},
  {text:"Enter the ESS room to take direct interior readings. The ventilation system is actively clearing the air so interior concentrations are lower than at the exterior discharge point.",correct:false,trap:"Mechanical ventilation reduces but does not eliminate hazardous concentrations inside an active ESS room. SCBA is required for interior entry regardless of ventilation status. The ventilation system running confirms the hazard is present, not that entry conditions are safe."}]},

{level:'tech',cat:"Runoff & Environmental Control",skill:"ESS-Scale Contamination Management",
 refs:[{t:"Water Volume and Contamination at ESS Scale",c:'Water contacting battery material picks up HF (Hydrogen Fluoride), HCN (Hydrogen Cyanide), and electrolyte decomposition products regardless of appearance. <span class="hl">All runoff from an ESS incident must be treated as hazardous waste requiring proper disposal.</span>',src:SRC.teexEmissions},
  {t:"Drainage Context",c:fac.detail+' <span class="warn">Once contaminated water enters a drainage system, the discharge cannot be reversed.</span>',src:null}],
 q:"The fire is controlled at the "+fac.name+". Accumulated water from fire attack is flowing toward floor drains. What is your immediate priority?",
 ans:[
  {text:"Block floor drains immediately to prevent contaminated runoff from entering the drainage system. Notify environmental authorities. Document runoff volume and drainage pathway. Treat all accumulated water as hazardous waste requiring proper disposal regardless of visual appearance.",correct:true,trap:""},
  {text:"Block floor drains and begin pumping accumulated water back toward the involved battery units using portable pumps. Keeping contaminated water in the incident area maintains it under your control until hazmat can arrange proper disposal.",correct:false,trap:"Pumping accumulated water back toward involved units may reignite thermal runaway by introducing water to cells that have temporarily stabilized, and re-wets surfaces already beginning to cool. Contain in place using drain blocking and portable berms, do not redistribute the contaminated water."},
  {text:"Only water with visible discoloration or confirmed direct cell contact requires containment. Clear water that traveled across an unaffected floor surface can be discharged to facility drains.",correct:false,trap:"HF, HCN, and electrolyte decomposition products are colorless. Clear water appearance does not confirm safe discharge. All runoff from an ESS incident area must be contained and treated as hazardous waste regardless of visual characteristics."},
  {text:"Open floor drains to prevent flooding in the working area. The volume is too large to contain fully and environmental authorities can be notified after operations are complete.",correct:false,trap:"Volume difficulty does not waive the containment requirement. Once contaminated water enters the drainage system the discharge cannot be reversed. Environmental notification after discharge does not remediate it. Establish maximum containment and notify immediately."}]},

{level:'tech',cat:"Re-Ignition Assessment",skill:"Post-Fire Stabilization Judgment",
 refs:[{t:"ERG 2024, Guide 147 \u2014 Re-Ignition Language",c:'ERG 147 states a lithium-ion battery fire may reignite at any point after extinguishment, <span class="warn">up to weeks later.</span> Container thermal mass delays heat transfer. Exterior TIC (Thermal Imaging Camera) readings are a <span class="hl">lagging indicator.</span>',src:SRC.erg147},
  {t:"ESS Re-Ignition \u2014 Container Thermal Mass",c:'<span class="warn">No re-entry should occur without ESS manufacturer technical guidance and a minimum 24\u201348 hour monitoring period.</span> Surface TIC stabilization does not indicate cell-level stabilization.',src:SRC.nfpa855}],
 q:"Two hours after apparent knockdown at the "+fac.name+", TIC (Thermal Imaging Camera) readings on the container exterior show temperatures near ambient. The facility manager requests permission to re-enter to assess equipment. What is your recommendation?",
 ans:[
  {text:"Deny re-entry. Exterior TIC readings near ambient do not confirm internal cell stabilization in a containerized ESS unit. Require the manufacturer’s minimum monitoring period of 24\u201348 hours. Continue atmospheric monitoring and obtain manufacturer emergency technical guidance before considering re-entry.",correct:true,trap:""},
  {text:"Authorize re-entry with SCBA (Self-Contained Breathing Apparatus) and TIC in hand. A near-ambient exterior reading combined with two hours elapsed time and no smoke production meets the practical threshold for post-fire assessment entry.",correct:false,trap:"Exterior TIC readings reflect container wall temperature, not internal cell temperatures. Container thermal mass creates a significant lag. Surface-cool does not mean internally stable. Two hours is not a validated stabilization window for any ESS chemistry. This is the most common post-ESS-fire error."},
  {text:"Authorize re-entry for the hazmat team only, not facility personnel. A two-hour SCBA entry for atmospheric sampling and interior TIC mapping provides the data needed to make a formal clearance determination.",correct:false,trap:"Even a hazmat team entry at this point lacks the manufacturer technical guidance and minimum monitoring period required before any re-entry. Interior TIC mapping inside a potentially unstable ESS container is not a safe data collection method at two hours post-knockdown."},
  {text:"LFP (Lithium Iron Phosphate) confirmation would allow a shorter monitoring window. If chemistry is confirmed as LFP, two hours is sufficient given the higher thermal onset and slower propagation rate.",correct:false,trap:"LFP\u2019s higher thermal onset affects the active fire phase, not the post-fire thermal stabilization timeline of the pack. Once thermal runaway has propagated through a pack, re-ignition risk is not reduced by the initiating chemistry. ERG 147 re-ignition language applies to all lithium-ion chemistries without exception."}]},

{level:'tech',cat:"Atmospheric Monitoring",skill:"HF and HCN Threshold Application",
 refs:[{t:"HF and HCN \u2014 IDLH Values",c:'<span class="warn">HF (Hydrogen Fluoride) IDLH (Immediately Dangerous to Life or Health): 30 ppm.</span> Odor threshold approximately 0.04 ppm. <span class="warn">HCN (Hydrogen Cyanide) IDLH: 50 ppm.</span> HCN causes rapid incapacitation without reliable odor warning above IDLH.',src:SRC.faaVentGas},
  {t:"Entry Decision Framework",c:'Atmospheric monitoring drives entry level PPE (Personal Protective Equipment) decisions. <span class="hl">Trend matters more than any single snapshot. A rising reading despite active mitigation means the source is outpacing your controls.</span>',src:SRC.oshaLiIon}],
 q:"Your monitoring crew reports readings at the ESS room entrance at the "+fac.name+": HF (Hydrogen Fluoride) 12 ppm, HCN (Hydrogen Cyanide) 8 ppm. The ventilation system is running. How do these readings affect your entry decision?",
 ans:[
  {text:"Both readings are below IDLH (Immediately Dangerous to Life or Health) but significant with ventilation actively running. HF at 12 ppm is 40% of IDLH with mitigation in place. Do not commit an entry team without a confirmed downward trend. Reassess at 15-minute intervals.",correct:true,trap:""},
  {text:"Both readings are below IDLH and declining is not required before entry. Level B with SCBA (Self-Contained Breathing Apparatus) provides adequate protection at these concentrations. Below IDLH means the readings are within the safe operating range for a protected entry team.",correct:false,trap:"Below IDLH is not the same as safe for entry. The IDLH is the immediately dangerous threshold, not the threshold above which protection is required. At 12 ppm HF with ventilation running, the trend matters more than the snapshot. A rising or stable reading despite active ventilation means entry conditions are not improving."},
  {text:"HF at 12 ppm exceeds the IDLH of 30 ppm, requiring Level A entry with full encapsulation before any approach to the ESS room.",correct:false,trap:"HF IDLH is 30 ppm. A reading of 12 ppm is below IDLH, not above it. Misidentifying threshold values drives incorrect PPE selection in both directions. HF IDLH = 30 ppm, HCN IDLH = 50 ppm. Neither reading here exceeds IDLH, but trend data is still required before entry authorization."},
  {text:"HCN at 8 ppm exceeds its TWA (Time-Weighted Average) of 4.7 ppm, making this the controlling value. Level A entry is mandatory regardless of HF level when any compound exceeds its TWA at the entry point.",correct:false,trap:"TWA (Time-Weighted Average) values govern 8-hour occupational exposure for normal work, not emergency response entry thresholds. Entry decisions at hazmat incidents use IDLH comparisons and trend data, not TWA exceedance. At 8 ppm HCN versus an IDLH of 50 ppm, the reading is well below the entry threshold."}]},

{level:'tech',cat:"Technical Assistance",skill:"ESS Manufacturer Reachback Protocol",
 refs:[{t:"ESS Manufacturer Emergency Resources",c:'ESS manufacturers maintain 24-hour emergency technical lines providing chemistry-specific propagation data and re-entry clearance criteria. <span class="hl">CHEMTREC (Chemical Transportation Emergency Center) at 1-800-424-9300 connects you to manufacturer emergency contacts</span> when facility documentation is unavailable.',src:SRC.evfiresafe},
  {t:"When Manufacturer Guidance Is Required",c:'Manufacturer guidance is required before: post-fire container entry, de-energization beyond utility disconnect, re-entry clearance, and incident termination. <span class="warn">These decisions cannot be made by field responders alone.</span>',src:SRC.nfpa855}],
 q:"Thermal runaway is confirmed at the "+fac.name+". You need to assess re-entry feasibility and adjacent container propagation risk. The facility’s emergency contact list is unavailable. What technical resource do you access, and how?",
 ans:[
  {text:"Contact the ESS manufacturer’s 24-hour emergency technical line for chemistry-specific propagation data and re-entry criteria specific to this installation. If facility documentation is unavailable, contact CHEMTREC (Chemical Transportation Emergency Center) at 1-800-424-9300 to connect to the manufacturer.",correct:true,trap:""},
  {text:"Contact CHEMTREC (Chemical Transportation Emergency Center) directly. CHEMTREC maintains ESS-specific technical databases and can provide propagation assessment and re-entry criteria for major ESS manufacturers without requiring a separate manufacturer callback.",correct:false,trap:"CHEMTREC is a dispatch and relay service. They connect you to manufacturer resources and provide general hazard information but do not have system-specific propagation rates or re-entry criteria for individual ESS installations. Manufacturer contact is still required for facility-specific guidance."},
  {text:"Contact your state fire marshal's technical assistance line. State-level technical assistance provides ESS-specific guidance that applies to all manufacturers and is not dependent on obtaining proprietary manufacturer data.",correct:false,trap:"State fire marshal technical assistance provides regulatory and general guidance, not installation-specific ESS technical data. Propagation rates, energy inventory, and suppression adequacy criteria require manufacturer emergency technical resources, not regulatory agency guidance."},
  {text:"Use WISER (Wireless Information System for Emergency Responders) or CAMEO (Computer-Aided Management of Emergency Operations) to pull ESS propagation data. These databases contain lithium battery incident data sufficient for re-entry and propagation assessment.",correct:false,trap:"WISER and CAMEO contain general chemical hazard data, not system-specific propagation rates or energy inventory data for a specific ESS installation. These databases cannot substitute for manufacturer emergency technical guidance."}]},

{level:'tech',cat:"Electrical Hazard",skill:"Stranded Energy After Utility Disconnect",
 refs:[{t:"Stranded Energy in ESS Modules",c:'ESS battery modules store charge independently of the BMS (Battery Management System) and contactor network. Opening a disconnect switch removes the BMS control circuit but <span class="warn">does not discharge energy stored in individual modules.</span>',src:SRC.ntsbEV},
  {t:"Verified De-Energization",c:'<span class="hl">Verified de-energization requires calibrated metering at the module level by trained personnel.</span> A switch position, BMS display, or facility manager statement does not confirm safe module-level voltage.',src:SRC.oshaLiIon}],
 q:"The utility company has opened the main service disconnect at the "+fac.name+". The BMS (Battery Management System) display shows no active alarms. The facility manager states the system is de-energized. Can personnel approach the battery enclosure?",
 ans:[
  {text:"No. The utility disconnect removes the external supply but does not discharge energy stored in battery modules. At "+fac.volt+", each module retains its charge independently of disconnect status. Verified de-energization requires calibrated metering at the module level, not a switch position check.",correct:true,trap:""},
  {text:"No. The utility disconnect alone is insufficient. Request the facility manager to initiate a controlled discharge sequence through the BMS before approach. A BMS-initiated discharge combined with utility disconnect constitutes verified de-energization for approach purposes.",correct:false,trap:"A post-fire or post-alarm BMS may not accurately command or execute a controlled discharge sequence. Even a functioning BMS discharge sequence takes time and requires confirmation through calibrated metering. BMS-initiated discharge combined with disconnect is not equivalent to verified de-energization through calibrated metering."},
  {text:"Yes. The utility disconnect opening combined with BMS showing no alarms are the two confirmation steps required. This is equivalent to a lockout/tagout verification on a standard electrical system.",correct:false,trap:"ESS battery modules are not equivalent to standard electrical equipment under lockout/tagout. A standard electrical system stores no energy after disconnect. ESS modules store energy in every module regardless of disconnect status. BMS no-alarm means no detected anomaly, not no voltage at module terminals."},
  {text:"Yes, approach is safe on the side of the enclosure opposite the main disconnect. The disconnect isolates the circuit on the connected side and the far side is not energized through that circuit.",correct:false,trap:"ESS modules store energy throughout the enclosure regardless of where the disconnect is in the circuit. All modules retain charge until individually verified discharged by calibrated metering. There is no safe side based on disconnect location."}]},

{level:'tech',cat:"Chemistry Assessment",skill:"LFP vs NMC \u2014 ESS Tactical Implications",
 refs:[{t:"LFP vs NMC \u2014 Thermal Profile Comparison",c:'LFP (Lithium Iron Phosphate): thermal onset ~270\u00b0C (518\u00b0F), cathode does not release oxygen, slower propagation. NMC (Nickel Manganese Cobalt): thermal onset ~150\u00b0C (302\u00b0F), cathode releases oxygen, faster propagation. <span class="hl">LFP provides a wider intervention window, not a lower re-ignition risk.</span>',src:SRC.faaVentGas},
  {t:"Chemistry at ESS Scale",c:'At ESS energy inventory levels, both chemistries produce hazardous outcomes. <span class="warn">Chemistry affects timeline, not the fundamental protective action sequence.</span>',src:SRC.teexEmissions}],
 q:"Facility documentation at the "+fac.name+" confirms LFP (Lithium Iron Phosphate) chemistry throughout. How does this change your tactical approach compared to an NMC (Nickel Manganese Cobalt) system at the same site?",
 ans:[
  {text:"LFP\u2019s higher thermal onset (~270\u00b0C vs ~150\u00b0C for NMC) and absence of cathode oxygen release mean slower propagation and a wider intervention window. Adjust timing expectations accordingly. Isolation, monitoring, utility coordination, and manufacturer reachback requirements are unchanged.",correct:true,trap:""},
